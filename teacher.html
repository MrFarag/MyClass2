<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - المدرس</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: linear-gradient(145deg, #0f2a1f 0%, #1a3a2a 100%);
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      height: 60px;
      background: rgba(10, 25, 18, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .logo-top { font-size: 24px; font-weight: 900; color: #ffaa00; }
    .logo-top span { color: #fff; }
    .teacher-badge {
      background: #2a4a35;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #ffaa00;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-center {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0,0,0,0.3);
      padding: 8px 25px;
      border-radius: 40px;
      border: 1px solid #3a5a40;
    }
    .top-center span { display: flex; align-items: center; gap: 5px; }
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      gap: 8px;
      padding: 8px;
    }
    .left-sidebar {
      width: 70px;
      background: rgba(20, 40, 30, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 12px;
      border: 1px solid #3a5a40;
    }
    .nav-item {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      color: #aaa;
      transition: 0.2s;
      font-size: 11px;
    }
    .nav-item i { font-size: 22px; }
    .nav-item.active { background: #ffaa00; color: #000; }
    .nav-item:hover { background: #2a4a35; color: #fff; }
    .students-panels {
      width: 360px;
      background: rgba(20, 40, 30, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #3a5a40;
    }
    .student-panel {
      background: #1e3228;
      border-radius: 20px;
      border: 1px solid #2a4a30;
      overflow: hidden;
    }
    .student-panel-header {
      background: linear-gradient(90deg, #1a2e25, #2a4030);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #ffaa00;
    }
    .student-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffaa00, #cc8800);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      border: 2px solid #fff;
    }
    .student-info { flex: 1; }
    .student-name { font-weight: 700; font-size: 14px; }
    .student-status { font-size: 11px; color: #ccc; display: flex; align-items: center; gap: 5px; }
    .student-actions {
      display: flex;
      gap: 15px;
      color: #ffaa00;
      font-size: 18px;
    }
    .student-actions i { cursor: pointer; transition: 0.2s; }
    .student-actions i:hover { transform: scale(1.2); color: #fff; }
    .student-board-canvas {
      width: 100%;
      height: 110px;
      background: #fff;
    }
    .student-board-canvas canvas { width: 100%; height: 100%; display: block; background: #fff; }
    .board-area {
      flex: 1;
      display: flex;
      gap: 8px;
      overflow: hidden;
    }
    .main-board {
      flex: 1;
      background: #1e3228;
      border-radius: 24px;
      border: 2px solid #2a4a30;
      position: relative;
      overflow: hidden;
    }
    .board-header {
      position: absolute;
      top: 10px;
      right: 15px;
      z-index: 10;
      display: flex;
      gap: 15px;
      color: #ffaa00;
      font-size: 20px;
      background: rgba(0,0,0,0.4);
      padding: 8px 16px;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }
    .board-header i { cursor: pointer; }
    .main-board canvas { width: 100%; height: 100%; display: block; background: #fff; touch-action: none; }
    .second-board {
      width: 280px;
      background: #1e3228;
      border-radius: 24px;
      border: 2px solid #2a4a30;
      overflow: hidden;
    }
    .second-board canvas { width: 100%; height: 100%; display: block; background: #fff; }
    .bottom-bar {
      height: 80px;
      background: rgba(10, 25, 18, 0.95);
      backdrop-filter: blur(12px);
      border-top: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .toolbar-tools {
      display: flex;
      gap: 20px;
      background: #1a2e25;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid #3a5a40;
    }
    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #aaa;
      cursor: pointer;
      font-size: 11px;
    }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #ffaa00; }
    .color-picker {
      display: flex;
      gap: 5px;
      background: #1e3228;
      padding: 5px 10px;
      border-radius: 40px;
    }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.active { border-color: #fff; }
    .toolbar-actions { display: flex; gap: 12px; }
    .action-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: #2a4a35;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }
    .btn-mic.active { background: #ffaa00; color: #000; }
    .btn-end { background: #b71c1c; }
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e3228;
      width: 80%;
      height: 80%;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      border: 2px solid #ffaa00;
    }
    .modal-header {
      padding: 15px 20px;
      background: #0f2a1f;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-body { flex: 1; background: #fff; }
    .modal-body canvas { width: 100%; height: 100%; }
    .modal-footer {
      padding: 10px 20px;
      background: #0f2a1f;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .image-upload input { display: none; }
    .image-upload label {
      background: #ffaa00;
      color: #000;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo-top">My<span>Class</span>2</div>
    <div class="teacher-badge"><i class="fas fa-chalkboard-teacher"></i> المدرس: فراج</div>
    <div class="top-center">
      <span><i class="fas fa-circle" style="color:#4CAF50;"></i> مباشر</span>
      <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
    </div>
  </div>
  <div class="main-layout">
    <div class="left-sidebar">
      <div class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></div>
      <div class="nav-item"><i class="fas fa-door-open"></i><span>فصولي</span></div>
      <div class="nav-item"><i class="fas fa-chart-bar"></i><span>الدرجات</span></div>
      <div class="nav-item"><i class="fas fa-calendar-alt"></i><span>الجدول</span></div>
      <div class="nav-item"><i class="fas fa-comment-dots"></i><span>الرسائل</span></div>
      <div class="nav-item" style="margin-top:auto"><i class="fas fa-cog"></i><span>الاعدادات</span></div>
    </div>
    <div class="students-panels" id="studentsPanels"></div>
    <div class="board-area">
      <div class="main-board">
        <div class="board-header">
          <i class="fas fa-download" onclick="saveMainBoard()"></i>
          <i class="fas fa-eye" onclick="toggleGrid()"></i>
          <i class="fas fa-expand" onclick="toggleFullscreen()"></i>
          <i class="fas fa-trash" onclick="clearMainBoard()"></i>
        </div>
        <canvas id="mainBoardCanvas"></canvas>
      </div>
      <div class="second-board">
        <canvas id="secondBoardCanvas"></canvas>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="toolbar-tools">
      <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
      <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
      <div class="color-picker">
        <div class="color-dot active" style="background:#000000;" onclick="setColor('#000000',this)"></div>
        <div class="color-dot" style="background:#ff0000;" onclick="setColor('#ff0000',this)"></div>
        <div class="color-dot" style="background:#00ff00;" onclick="setColor('#00ff00',this)"></div>
        <div class="color-dot" style="background:#0000ff;" onclick="setColor('#0000ff',this)"></div>
        <div class="color-dot" style="background:#ffff00;" onclick="setColor('#ffff00',this)"></div>
        <div class="color-dot" style="background:#ff8800;" onclick="setColor('#ff8800',this)"></div>
        <div class="color-dot" style="background:#ff00ff;" onclick="setColor('#ff00ff',this)"></div>
      </div>
      <div class="image-upload">
        <label for="teacherImage"><i class="fas fa-image"></i> رفع صورة</label>
        <input type="file" id="teacherImage" accept="image/*" onchange="uploadTeacherImage(this)">
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="action-circle btn-cam"><i class="fas fa-video-slash"></i></button>
      <button class="action-circle btn-mic" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
      <button class="action-circle btn-screen"><i class="fas fa-desktop"></i></button>
      <button class="action-circle btn-hand"><i class="fas fa-hand-paper"></i></button>
      <button class="action-circle btn-end" onclick="endClass()"><i class="fas fa-power-off"></i></button>
    </div>
  </div>
  <div class="modal" id="correctionModal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modalStudentName">تصحيح سبورة الطالب</span>
        <div>
          <button class="action-circle" onclick="saveCorrection()" style="background:#ffaa00;"><i class="fas fa-save"></i></button>
          <button class="action-circle btn-end" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <div class="modal-body"><canvas id="modalCanvas"></canvas></div>
      <div class="modal-footer">
        <button class="action-circle" onclick="setModalTool('pen')" style="background:#ffaa00;"><i class="fas fa-pen-nib"></i></button>
        <button class="action-circle" onclick="setModalTool('eraser')" style="background:#ffaa00;"><i class="fas fa-eraser"></i></button>
        <div class="color-picker">
          <div class="color-dot" style="background:#ff0000;" onclick="setModalColor('#ff0000')"></div>
          <div class="color-dot" style="background:#00ff00;" onclick="setModalColor('#00ff00')"></div>
          <div class="color-dot" style="background:#0000ff;" onclick="setModalColor('#0000ff')"></div>
        </div>
      </div>
    </div>
  </div>
  <audio id="audioPlayer" style="display:none;"></audio>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({ apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8", databaseURL: "https://myclaive-default-rtdb.firebaseio.com" });
    const db = firebase.database();
    let teacherId = 'teacher_' + Date.now();
    let currentTool = 'pen';
    let currentColor = '#000000';
    let currentSize = 4;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let students = {};
    let waitingStudents = {};
    let currentSpeaker = null;

    const mainCanvas = document.getElementById('mainBoardCanvas');
    const secondCanvas = document.getElementById('secondBoardCanvas');
    const modalCanvas = document.getElementById('modalCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const secondCtx = secondCanvas.getContext('2d');
    const modalCtx = modalCanvas.getContext('2d');
    let currentModalStudentId = null;

    function resizeCanvases() {
      [mainCanvas, secondCanvas].forEach(c => {
        const parent = c.parentElement;
        c.width = parent.clientWidth;
        c.height = parent.clientHeight;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = currentSize;
      });
    }
    window.addEventListener('resize', resizeCanvases);
    setTimeout(resizeCanvases, 100);

    function getCanvasPoint(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    let points = [], sendTimer = null;
    function startDraw(e) {
      e.preventDefault(); isDrawing = true;
      const p = getCanvasPoint(e, mainCanvas);
      lastX = p.x; lastY = p.y;
      points = [{ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height }];
      mainCtx.beginPath(); mainCtx.moveTo(p.x, p.y);
    }
    function draw(e) {
      e.preventDefault(); if (!isDrawing) return;
      const p = getCanvasPoint(e, mainCanvas);
      mainCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
      mainCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
      mainCtx.lineTo(p.x, p.y); mainCtx.stroke(); mainCtx.beginPath(); mainCtx.moveTo(p.x, p.y);
      points.push({ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height });
      if (!sendTimer) sendTimer = setTimeout(() => { if (points.length) { db.ref('draw_t').push({ points, color: currentTool === 'eraser' ? null : currentColor, size: currentSize, ts: Date.now() }); points = []; } sendTimer = null; }, 30);
    }
    function stopDraw() {
      if (isDrawing) {
        isDrawing = false;
        if (points.length) db.ref('draw_t').push({ points, color: currentTool === 'eraser' ? null : currentColor, size: currentSize, ts: Date.now() });
        points = []; if (sendTimer) clearTimeout(sendTimer); sendTimer = null;
      }
    }
    mainCanvas.addEventListener('mousedown', startDraw);
    mainCanvas.addEventListener('mousemove', draw);
    mainCanvas.addEventListener('mouseup', stopDraw);
    mainCanvas.addEventListener('mouseleave', stopDraw);
    mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
    mainCanvas.addEventListener('touchmove', draw, { passive: false });
    mainCanvas.addEventListener('touchend', stopDraw);

    window.setTool = function(tool) { currentTool = tool; document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active')); document.getElementById('toolPen').classList.toggle('active', tool === 'pen'); document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser'); };
    window.setColor = function(color, el) { currentColor = color; document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('active')); el.classList.add('active'); };
    window.clearMainBoard = function() { mainCtx.fillStyle = '#fff'; mainCtx.fillRect(0,0,mainCanvas.width,mainCanvas.height); db.ref('boardCmd/main').push({ type: 'clear' }); };
    window.uploadTeacherImage = function(input) {
      if (!input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => { mainCtx.drawImage(img,0,0,mainCanvas.width,mainCanvas.height); db.ref('boardImg/main').set({ data: e.target.result, ts: Date.now() }); };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    };

    function setupListeners() {
      db.ref('joinRequests').on('child_added', snap => { waitingStudents[snap.val().id] = snap.val(); updateStudentsPanels(); });
      db.ref('joinRequests').on('child_removed', snap => { delete waitingStudents[snap.val().id]; updateStudentsPanels(); });
      db.ref('approvedStudents').on('value', snap => { students = snap.val() || {}; updateStudentsPanels(); });
      db.ref('onlineStudents').on('value', snap => { const online = snap.val() || {}; Object.keys(students).forEach(id => { if(students[id]) students[id].online = online[id] ? true : false; }); updateStudentsPanels(); });
      db.ref('handRaised').on('value', snap => { const hands = snap.val() || {}; Object.keys(students).forEach(id => { if(students[id]) students[id].handRaised = hands[id] ? true : false; }); updateStudentsPanels(); });
      db.ref('micRequests').on('child_added', snap => {
        const req = snap.val();
        if (req && students[req.studentId]) {
          if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
            if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
            currentSpeaker = req.studentId;
            db.ref('micPermissions/' + req.studentId).set({ allowed: true });
            db.ref('handRaised/' + req.studentId).remove();
          }
          snap.ref.remove();
        }
      });
      db.ref('draw_st').on('child_added', snap => {
        const d = snap.val(); if (!d || !d.points) return;
        secondCtx.strokeStyle = d.color || '#000'; secondCtx.lineWidth = d.size || 4;
        secondCtx.beginPath(); secondCtx.moveTo(d.points[0].x * secondCanvas.width, d.points[0].y * secondCanvas.height);
        for (let i=1; i<d.points.length; i++) secondCtx.lineTo(d.points[i].x * secondCanvas.width, d.points[i].y * secondCanvas.height);
        secondCtx.stroke();
      });
      db.ref('boardImg/stu').on('child_added', snap => updateStudentsPanels());
    }

    function updateStudentsPanels() {
      const container = document.getElementById('studentsPanels'); let html = '';
      Object.values(waitingStudents).forEach(s => {
        html += `<div class="student-panel" style="border-color:#f39c12;"><div class="student-panel-header"><div class="student-avatar">${s.name.charAt(0)}</div><div class="student-info"><div class="student-name">${s.name}</div><div class="student-status"><i class="fas fa-clock"></i> في الانتظار</div></div><div class="student-actions"><i class="fas fa-check-circle" style="color:#4CAF50;" onclick="event.stopPropagation(); approveStudent('${s.id}')"></i><i class="fas fa-times-circle" style="color:#b71c1c;" onclick="event.stopPropagation(); rejectStudent('${s.id}')"></i></div></div><div class="student-board-canvas" style="display:flex; align-items:center; justify-content:center;"><span style="color:#aaa;">بانتظار الموافقة</span></div></div>`;
      });
      Object.values(students).forEach(s => {
        if (!s.online) return;
        const statusIcon = s.handRaised ? '<i class="fas fa-hand-paper" style="color:#f59e0b;"></i>' : (currentSpeaker === s.id ? '<i class="fas fa-microphone" style="color:#22c55e;"></i>' : '<i class="fas fa-headphones" style="color:#aaa;"></i>');
        const statusText = s.handRaised ? ' رفع اليد' : (currentSpeaker === s.id ? ' يتحدث' : ' مستمع');
        html += `<div class="student-panel"><div class="student-panel-header"><div class="student-avatar" style="background:${s.handRaised?'#f59e0b':'#ffaa00'};">${s.name.charAt(0)}</div><div class="student-info"><div class="student-name">${s.name}</div><div class="student-status">${statusIcon} ${statusText}</div></div><div class="student-actions"><i class="fas fa-eye" title="عرض السبورة" onclick="event.stopPropagation(); openStudentBoard('${s.id}', '${s.name}')"></i><i class="fas fa-door-closed" title="طرد" onclick="event.stopPropagation(); kickStudent('${s.id}')"></i></div></div><div class="student-board-canvas"><canvas id="studentCanvas_${s.id}"></canvas></div></div>`;
      });
      container.innerHTML = html || '<div style="padding:20px; color:#aaa; text-align:center;">لا يوجد طلاب</div>';
      Object.values(students).forEach(s => {
        if (!s.online) return;
        const canvas = document.getElementById(`studentCanvas_${s.id}`);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const parent = canvas.parentElement;
        canvas.width = parent.clientWidth; canvas.height = parent.clientHeight;
        ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        db.ref('boardImg/stu/'+s.id).once('value', snap => {
          const data = snap.val();
          if (data && data.data) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img,0,0,canvas.width,canvas.height);
            img.src = data.data;
          }
        });
      });
      document.getElementById('studentsCount').textContent = Object.keys(students).length;
    }

    window.approveStudent = function(id) { const s = waitingStudents[id]; if(s) { students[id] = { id, name: s.name, online: true }; delete waitingStudents[id]; db.ref('approvedStudents/'+id).set(students[id]); db.ref('joinRequests/'+id).remove(); } };
    window.rejectStudent = function(id) { delete waitingStudents[id]; db.ref('joinRequests/'+id).remove(); };
    window.kickStudent = function(id) { if (currentSpeaker === id) { currentSpeaker = null; db.ref('micPermissions/'+id).remove(); } delete students[id]; db.ref('approvedStudents/'+id).remove(); db.ref('onlineStudents/'+id).remove(); };

    window.openStudentBoard = function(studentId, studentName) {
      currentModalStudentId = studentId;
      document.getElementById('modalStudentName').textContent = 'تصحيح سبورة ' + studentName;
      document.getElementById('correctionModal').classList.add('active');
      modalCanvas.width = modalCanvas.parentElement.clientWidth; modalCanvas.height = modalCanvas.parentElement.clientHeight;
      modalCtx.fillStyle = '#fff'; modalCtx.fillRect(0,0,modalCanvas.width,modalCanvas.height);
      db.ref('boardImg/stu/'+studentId).once('value', snap => {
        const data = snap.val();
        if (data && data.data) {
          const img = new Image();
          img.onload = () => modalCtx.drawImage(img,0,0,modalCanvas.width,modalCanvas.height);
          img.src = data.data;
        }
      });
    };
    window.closeModal = function() { document.getElementById('correctionModal').classList.remove('active'); };
    window.saveCorrection = function() {
      if (!currentModalStudentId) return;
      const dataURL = modalCanvas.toDataURL('image/jpeg',0.85);
      db.ref('boardImg/stu/'+currentModalStudentId).set({ data: dataURL, byTeacher: true, ts: Date.now() });
      alert('تم حفظ التصحيح'); closeModal();
    };
    let modalTool='pen', modalColor='#ff0000';
    window.setModalTool = function(t) { modalTool = t; };
    window.setModalColor = function(c) { modalColor = c; };

    window.toggleMic = function() { document.getElementById('micBtn').classList.toggle('active'); };
    window.endClass = function() { if(confirm('إنهاء الحصة؟')) window.location.reload(); };
    setupListeners();
  </script>
</body>
</html>
