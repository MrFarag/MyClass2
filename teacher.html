<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyClass2 - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }
        body {
            background: #0f172a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* الشريط العلوي */
        .top-bar {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #3b82f6;
            height: 55px;
        }
        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #3b82f6;
        }
        .logo b { color: #fff; }
        .teacher-name {
            background: #334155;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        /* التخطيط الرئيسي: ثلاث أعمدة */
        .main-layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        /* العمود الأيسر: قائمة سبورات الطلاب */
        .left-panel {
            width: 260px;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px;
            background: #334155;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .student-boards-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .board-item {
            background: #0f172a;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .board-item:hover {
            border-color: #3b82f6;
        }
        .board-item .avatar {
            width: 32px;
            height: 32px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .board-item .info {
            flex: 1;
        }
        .board-item .name {
            font-size: 13px;
            font-weight: 600;
        }
        .board-item .status {
            font-size: 10px;
            color: #94a3b8;
        }
        .board-item .badge {
            background: #ef4444;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
        }
        /* العمود الأوسط: السبورات الرئيسية */
        .center-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 8px;
            gap: 8px;
            overflow: hidden;
        }
        .board-card {
            flex: 1;
            background: #1e293b;
            border-radius: 12px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .board-header {
            padding: 8px 12px;
            background: #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid;
        }
        .teacher .board-header { border-bottom-color: #ef4444; }
        .students .board-header { border-bottom-color: #3b82f6; }
        .board-title {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
        }
        .live-badge {
            background: #ef4444;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 10px;
            display: none;
        }
        .live-badge.on { display: flex; }
        .canvas-area {
            flex: 1;
            background: #fff;
            position: relative;
            overflow: hidden;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        /* العمود الأيمن: قائمة الطلاب */
        .right-panel {
            width: 260px;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .student-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .student-item {
            background: #0f172a;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }
        .student-item.hand-raised { border-color: #f59e0b; }
        .student-item.speaking { border-color: #22c55e; }
        .student-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .student-avatar {
            width: 36px;
            height: 36px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .student-info {
            flex: 1;
        }
        .student-name {
            font-size: 13px;
            font-weight: 600;
        }
        .student-status {
            font-size: 10px;
            color: #94a3b8;
        }
        .student-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: #334155;
            border: none;
            color: #fff;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .action-btn.approve { background: #22c55e; }
        .action-btn.reject { background: #ef4444; }
        .action-btn.mic { background: #3b82f6; }
        /* شريط الأدوات السفلي */
        .toolbar {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            overflow-x: auto;
        }
        .tool-btn {
            background: #334155;
            border: none;
            color: #94a3b8;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .tool-btn.on { background: #3b82f6; color: #fff; }
        .color-picker {
            display: flex;
            gap: 4px;
        }
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .color-dot.on { border-color: #fff; transform: scale(1.1); }
        .size-selector {
            display: flex;
            gap: 4px;
            background: #334155;
            padding: 4px;
            border-radius: 8px;
        }
        .size-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .size-btn.on { background: #3b82f6; }
        .size-dot { background: #fff; border-radius: 50%; }
        /* شريط الحالة */
        .status-bar {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 5px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
            color: #94a3b8;
            height: 30px;
        }
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            display: inline-block;
            margin-left: 4px;
        }
        /* نافذة عرض سبورة الطالب للتأشير */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            width: 90%;
            height: 90%;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
        }
        .modal-header {
            padding: 12px;
            background: #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-body {
            flex: 1;
            background: #fff;
            position: relative;
        }
        .modal-body canvas {
            width: 100%;
            height: 100%;
        }
        .modal-footer {
            padding: 8px;
            background: #334155;
            display: flex;
            gap: 8px;
        }
        /* رفع الصور */
        .image-upload input {
            display: none;
        }
        .image-upload label {
            cursor: pointer;
            padding: 8px 12px;
            background: #3b82f6;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- الشريط العلوي -->
        <div class="top-bar">
            <div class="logo">My<b>Class</b>2</div>
            <div class="teacher-name" id="teacherNameDisplay">المدرس</div>
        </div>

        <!-- التخطيط الرئيسي ثلاثي الأعمدة -->
        <div class="main-layout">
            <!-- العمود الأيسر: سبورات الطلاب -->
            <div class="left-panel">
                <div class="panel-header">
                    <span><i class="fas fa-images"></i> سبورات الطلاب</span>
                    <span id="boardsCount">0</span>
                </div>
                <div class="student-boards-list" id="boardsList">
                    <!-- ستضاف سبورات الطلاب هنا -->
                </div>
            </div>

            <!-- العمود الأوسط: السبورات الرئيسية -->
            <div class="center-panel">
                <!-- سبورة المدرس -->
                <div class="board-card teacher">
                    <div class="board-header">
                        <div class="board-title"><i class="fas fa-chalkboard-teacher" style="color:#ef4444"></i> السبورة الرئيسية</div>
                        <div class="live-badge" id="liveBadge"><i class="fas fa-circle"></i> مباشر</div>
                    </div>
                    <div class="canvas-area">
                        <canvas id="teacherBoard"></canvas>
                    </div>
                </div>
                <!-- سبورة الطلاب (عرض آخر تحديث) -->
                <div class="board-card students">
                    <div class="board-header">
                        <div class="board-title"><i class="fas fa-users" style="color:#3b82f6"></i> آخر تحديث للطلاب</div>
                    </div>
                    <div class="canvas-area">
                        <canvas id="studentsBoard"></canvas>
                    </div>
                </div>
            </div>

            <!-- العمود الأيمن: قائمة الطلاب -->
            <div class="right-panel">
                <div class="panel-header">
                    <span><i class="fas fa-users"></i> الطلاب</span>
                    <span id="studentsCount">0</span>
                </div>
                <div class="student-list" id="studentsList">
                    <!-- ستضاف أسماء الطلاب هنا -->
                </div>
            </div>
        </div>

        <!-- شريط الأدوات السفلي -->
        <div class="toolbar">
            <button class="tool-btn on" id="penBtn" onclick="setTool('pen')"><i class="fas fa-pencil-alt"></i></button>
            <button class="tool-btn" id="eraserBtn" onclick="setTool('eraser')"><i class="fas fa-eraser"></i></button>
            <div class="color-picker">
                <div class="color-dot on" style="background:#1a1a1a" data-color="#1a1a1a" onclick="setColor(this)"></div>
                <div class="color-dot" style="background:#ef4444" data-color="#ef4444" onclick="setColor(this)"></div>
                <div class="color-dot" style="background:#3b82f6" data-color="#3b82f6" onclick="setColor(this)"></div>
                <div class="color-dot" style="background:#22c55e" data-color="#22c55e" onclick="setColor(this)"></div>
                <div class="color-dot" style="background:#f59e0b" data-color="#f59e0b" onclick="setColor(this)"></div>
            </div>
            <div class="size-selector">
                <button class="size-btn" onclick="setSize(2,this)"><div class="size-dot" style="width:4px;height:4px"></div></button>
                <button class="size-btn on" onclick="setSize(4,this)"><div class="size-dot" style="width:8px;height:8px"></div></button>
                <button class="size-btn" onclick="setSize(8,this)"><div class="size-dot" style="width:14px;height:14px"></div></button>
            </div>
            <div class="image-upload">
                <label for="teacherImage"><i class="fas fa-image"></i> رفع صورة</label>
                <input type="file" id="teacherImage" accept="image/*" onchange="uploadTeacherImage(this)">
            </div>
            <button class="tool-btn" onclick="clearTeacherBoard()"><i class="fas fa-trash"></i></button>
        </div>

        <!-- شريط الحالة -->
        <div class="status-bar">
            <div><span class="connection-dot" id="connectionDot"></span> <span id="connectionText">متصل</span></div>
            <div><i class="fas fa-bolt"></i> <span id="latency">24ms</span></div>
        </div>
    </div>

    <!-- النافذة المنبثقة لعرض سبورة الطالب والتأشير عليها -->
    <div class="modal" id="studentBoardModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalStudentName">سبورة الطالب</span>
                <div>
                    <button class="action-btn" onclick="saveCorrections()"><i class="fas fa-save"></i> حفظ</button>
                    <button class="action-btn" onclick="closeModal()"><i class="fas fa-times"></i> إغلاق</button>
                </div>
            </div>
            <div class="modal-body">
                <canvas id="modalCanvas"></canvas>
            </div>
            <div class="modal-footer">
                <button class="tool-btn" onclick="setModalTool('pen')"><i class="fas fa-pencil-alt"></i></button>
                <button class="tool-btn" onclick="setModalTool('eraser')"><i class="fas fa-eraser"></i></button>
                <div class="color-picker">
                    <div class="color-dot on" style="background:#ff0000" data-color="#ff0000" onclick="setModalColor(this)"></div>
                    <div class="color-dot" style="background:#00ff00" data-color="#00ff00" onclick="setModalColor(this)"></div>
                    <div class="color-dot" style="background:#0000ff" data-color="#0000ff" onclick="setModalColor(this)"></div>
                </div>
                <button class="tool-btn" onclick="clearModalBoard()"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        // ------------------------------------------------------------
        // تهيئة Firebase
        // ------------------------------------------------------------
        firebase.initializeApp({
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
        });
        const db = firebase.database();

        // ------------------------------------------------------------
        // المتغيرات العامة
        // ------------------------------------------------------------
        let teacherId = 'teacher_' + Date.now();
        let currentTool = 'pen';
        let currentColor = '#1a1a1a';
        let currentSize = 4;
        let isDrawing = false;
        let lastX = 0, lastY = 0;
        let students = {};            // الطلاب المعتمدون
        let waitingStudents = {};      // طلبات الانضمام
        let currentSpeaker = null;

        // الكانفاسات
        const teacherCanvas = document.getElementById('teacherBoard');
        const studentsCanvas = document.getElementById('studentsBoard');
        const teacherCtx = teacherCanvas.getContext('2d');
        const studentsCtx = studentsCanvas.getContext('2d');
        const modalCanvas = document.getElementById('modalCanvas');
        const modalCtx = modalCanvas.getContext('2d');
        let currentModalStudentId = null;

        // ------------------------------------------------------------
        // ضبط حجم الكانفاسات
        // ------------------------------------------------------------
        function resizeCanvases() {
            [teacherCanvas, studentsCanvas].forEach(c => {
                const parent = c.parentElement;
                c.width = parent.clientWidth;
                c.height = parent.clientHeight;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = currentSize;
            });
        }
        window.addEventListener('resize', resizeCanvases);
        setTimeout(resizeCanvases, 100);

        // ------------------------------------------------------------
        // الرسم على السبورة الرئيسية
        // ------------------------------------------------------------
        function getCanvasPoint(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const p = getCanvasPoint(e, teacherCanvas);
            lastX = p.x; lastY = p.y;
            teacherCtx.beginPath();
            teacherCtx.moveTo(p.x, p.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const p = getCanvasPoint(e, teacherCanvas);
            teacherCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
            teacherCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
            teacherCtx.lineTo(p.x, p.y);
            teacherCtx.stroke();
            teacherCtx.beginPath();
            teacherCtx.moveTo(p.x, p.y);
        }

        function stopDraw() {
            isDrawing = false;
        }

        teacherCanvas.addEventListener('mousedown', startDraw);
        teacherCanvas.addEventListener('mousemove', draw);
        teacherCanvas.addEventListener('mouseup', stopDraw);
        teacherCanvas.addEventListener('mouseleave', stopDraw);
        teacherCanvas.addEventListener('touchstart', startDraw, { passive: false });
        teacherCanvas.addEventListener('touchmove', draw, { passive: false });
        teacherCanvas.addEventListener('touchend', stopDraw);

        // ------------------------------------------------------------
        // أدوات الرسم
        // ------------------------------------------------------------
        window.setTool = function(tool) {
            currentTool = tool;
            document.getElementById('penBtn').classList.toggle('on', tool === 'pen');
            document.getElementById('eraserBtn').classList.toggle('on', tool === 'eraser');
        };
        window.setColor = function(el) {
            currentColor = el.dataset.color;
            document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('on'));
            el.classList.add('on');
        };
        window.setSize = function(size, btn) {
            currentSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            teacherCtx.lineWidth = size;
        };
        window.clearTeacherBoard = function() {
            teacherCtx.fillStyle = '#fff';
            teacherCtx.fillRect(0, 0, teacherCanvas.width, teacherCanvas.height);
            db.ref('boardCmd/main').push({ type: 'clear' });
        };
        window.uploadTeacherImage = function(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    teacherCtx.drawImage(img, 0, 0, teacherCanvas.width, teacherCanvas.height);
                    db.ref('boardImg/main').set({ data: e.target.result, ts: Date.now() });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        };

        // ------------------------------------------------------------
        // إدارة الطلاب
        // ------------------------------------------------------------
        function setupListeners() {
            // طلبات الانضمام
            db.ref('joinRequests').on('child_added', snap => {
                const s = snap.val();
                waitingStudents[s.id] = s;
                updateStudentsList();
            });
            db.ref('joinRequests').on('child_removed', snap => {
                const s = snap.val();
                delete waitingStudents[s.id];
                updateStudentsList();
            });

            // الطلاب المعتمدين
            db.ref('approvedStudents').on('value', snap => {
                students = snap.val() || {};
                updateStudentsList();
                updateBoardsList();
            });

            // حالة التواجد
            db.ref('onlineStudents').on('value', snap => {
                const online = snap.val() || {};
                Object.keys(students).forEach(id => {
                    if (students[id]) students[id].online = online[id] ? true : false;
                });
                updateStudentsList();
            });

            // رفع اليد
            db.ref('handRaised').on('value', snap => {
                const hands = snap.val() || {};
                Object.keys(students).forEach(id => {
                    if (students[id]) students[id].handRaised = hands[id] ? true : false;
                });
                updateStudentsList();
            });

            // طلبات المايك
            db.ref('micRequests').on('child_added', snap => {
                const req = snap.val();
                if (req && students[req.studentId]) {
                    if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
                        if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
                        currentSpeaker = req.studentId;
                        db.ref('micPermissions/' + req.studentId).set({ allowed: true });
                        db.ref('handRaised/' + req.studentId).remove();
                    }
                    snap.ref.remove();
                }
            });

            // استقبال صور سبورات الطلاب
            db.ref('boardImg/stu').on('child_added', snap => {
                updateBoardsList(); // تحديث القائمة عند وصول صورة جديدة
            });

            // استقبال رسم الطلاب لتحديث السبورة السفلية
            db.ref('draw_st').on('child_added', snap => {
                const data = snap.val();
                if (!data) return;
                // يمكن رسم آخر تحديث على studentsCanvas (اختياري)
            });
        }

        // تحديث قائمة الطلاب في العمود الأيمن
        function updateStudentsList() {
            const container = document.getElementById('studentsList');
            let html = '';

            // طلبات الانضمام
            Object.values(waitingStudents).forEach(s => {
                html += `
                    <div class="student-item hand-raised">
                        <div class="student-header">
                            <div class="student-avatar">${s.name.charAt(0)}</div>
                            <div class="student-info">
                                <div class="student-name">${s.name}</div>
                                <div class="student-status">⏳ في انتظار الموافقة</div>
                            </div>
                        </div>
                        <div class="student-actions">
                            <button class="action-btn approve" onclick="approveStudent('${s.id}')"><i class="fas fa-check"></i> قبول</button>
                            <button class="action-btn reject" onclick="rejectStudent('${s.id}')"><i class="fas fa-times"></i> رفض</button>
                        </div>
                    </div>
                `;
            });

            // الطلاب المعتمدون
            Object.values(students).forEach(s => {
                if (!s.online) return;
                const hand = s.handRaised ? 'hand-raised' : '';
                const speaking = (currentSpeaker === s.id) ? 'speaking' : '';
                html += `
                    <div class="student-item ${hand} ${speaking}">
                        <div class="student-header">
                            <div class="student-avatar">${s.name.charAt(0)}</div>
                            <div class="student-info">
                                <div class="student-name">${s.name}</div>
                                <div class="student-status">${s.handRaised ? '✋ رفع يد' : (currentSpeaker === s.id ? '🎤 يتحدث' : '🔊 مستمع')}</div>
                            </div>
                        </div>
                        <div class="student-actions">
                            ${s.handRaised ? `
                                <button class="action-btn approve" onclick="allowMic('${s.id}')"><i class="fas fa-microphone"></i></button>
                                <button class="action-btn reject" onclick="rejectHand('${s.id}')"><i class="fas fa-times"></i></button>
                            ` : ''}
                            ${currentSpeaker === s.id ? `
                                <button class="action-btn mic" onclick="stopMic('${s.id}')"><i class="fas fa-microphone-slash"></i></button>
                            ` : ''}
                            <button class="action-btn" onclick="openStudentBoard('${s.id}', '${s.name}')"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html || '<div style="padding:10px; text-align:center">لا يوجد طلاب</div>';
            document.getElementById('studentsCount').textContent = Object.keys(students).length;
        }

        // تحديث قائمة سبورات الطلاب في العمود الأيسر
        function updateBoardsList() {
            const container = document.getElementById('boardsList');
            let html = '';

            Object.values(students).forEach(s => {
                if (!s.online) return;
                html += `
                    <div class="board-item" onclick="openStudentBoard('${s.id}', '${s.name}')">
                        <div class="avatar">${s.name.charAt(0)}</div>
                        <div class="info">
                            <div class="name">${s.name}</div>
                            <div class="status">${s.handRaised ? '✋' : ''}</div>
                        </div>
                        <i class="fas fa-chevron-left"></i>
                    </div>
                `;
            });

            container.innerHTML = html || '<div style="padding:10px; text-align:center">لا توجد سبورات</div>';
            document.getElementById('boardsCount').textContent = Object.keys(students).length;
        }

        // إجراءات الموافقة
        window.approveStudent = function(id) {
            const s = waitingStudents[id];
            if (s) {
                students[id] = { id, name: s.name, online: true };
                delete waitingStudents[id];
                db.ref('approvedStudents/' + id).set(students[id]);
                db.ref('joinRequests/' + id).remove();
            }
        };
        window.rejectStudent = function(id) {
            delete waitingStudents[id];
            db.ref('joinRequests/' + id).remove();
        };
        window.allowMic = function(id) {
            if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
            currentSpeaker = id;
            students[id].handRaised = false;
            db.ref('micPermissions/' + id).set({ allowed: true });
            db.ref('handRaised/' + id).remove();
        };
        window.rejectHand = function(id) {
            students[id].handRaised = false;
            db.ref('handRaised/' + id).remove();
        };
        window.stopMic = function(id) {
            if (currentSpeaker === id) {
                currentSpeaker = null;
                db.ref('micPermissions/' + id).remove();
            }
        };

        // ------------------------------------------------------------
        // فتح سبورة الطالب للتأشير
        // ------------------------------------------------------------
        window.openStudentBoard = function(studentId, studentName) {
            currentModalStudentId = studentId;
            document.getElementById('modalStudentName').textContent = 'سبورة ' + studentName;
            document.getElementById('studentBoardModal').classList.add('active');
            // تحميل صورة السبورة من Firebase
            db.ref('boardImg/stu/' + studentId).once('value', snap => {
                const data = snap.val();
                if (data && data.data) {
                    const img = new Image();
                    img.onload = () => {
                        modalCtx.clearRect(0, 0, modalCanvas.width, modalCanvas.height);
                        modalCtx.drawImage(img, 0, 0, modalCanvas.width, modalCanvas.height);
                    };
                    img.src = data.data;
                } else {
                    modalCtx.fillStyle = '#fff';
                    modalCtx.fillRect(0, 0, modalCanvas.width, modalCanvas.height);
                }
            });
        };

        window.closeModal = function() {
            document.getElementById('studentBoardModal').classList.remove('active');
        };

        window.saveCorrections = function() {
            if (!currentModalStudentId) return;
            const dataURL = modalCanvas.toDataURL('image/jpeg', 0.85);
            db.ref('boardImg/stu/' + currentModalStudentId).set({ data: dataURL, byTeacher: true, ts: Date.now() });
            alert('تم حفظ التصحيح وإرساله للطالب');
        };

        // أدوات الرسم داخل المودال
        let modalTool = 'pen';
        let modalColor = '#ff0000';
        window.setModalTool = function(tool) { modalTool = tool; };
        window.setModalColor = function(el) {
            modalColor = el.dataset.color;
            document.querySelectorAll('#studentBoardModal .color-dot').forEach(c => c.classList.remove('on'));
            el.classList.add('on');
        };
        window.clearModalBoard = function() {
            modalCtx.fillStyle = '#fff';
            modalCtx.fillRect(0, 0, modalCanvas.width, modalCanvas.height);
        };
        // (يمكن إضافة أحداث الرسم على modalCanvas إذا أردت)

        // ------------------------------------------------------------
        // الصوت (اختصاراً، مشابه للكود السابق)
        // ------------------------------------------------------------
        // يمكن إضافة دالات الصوت هنا (مشابهة للمشروع السابق)

        // ------------------------------------------------------------
        // حالة الاتصال
        // ------------------------------------------------------------
        db.ref('.info/connected').on('value', snap => {
            const ok = snap.val();
            document.getElementById('connectionDot').style.background = ok ? '#22c55e' : '#ef4444';
            document.getElementById('connectionText').textContent = ok ? 'متصل' : 'غير متصل';
        });
        setInterval(() => {
            document.getElementById('latency').textContent = (10 + Math.floor(Math.random() * 25)) + 'ms';
        }, 3000);

        // بدء الاستماع
        setupListeners();
    </script>
</body>
</html>
