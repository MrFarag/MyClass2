<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>MyClass2 Pro - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bl: #3b82f6;
            --rd: #ef4444;
            --gn: #22c55e;
            --yw: #f59e0b;
            --pp: #a855f7;
            --dk: #0f172a;
            --cd: #1e293b;
            --br: #334155;
            --mt: #475569;
            --dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--dk);
            color: #fff;
        }

        /* شاشة الدخول */
        #overlay {
            position: fixed;
            inset: 0;
            background: var(--dk);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .jcard {
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 24px;
            padding: 40px 28px;
            width: 300px;
            text-align: center;
        }

        .jlogo {
            font-size: 30px;
            font-weight: 900;
            color: var(--bl);
        }

        .jlogo b {
            color: #fff;
        }

        .jsub {
            font-size: 13px;
            color: var(--dim);
            margin: 6px 0 22px;
        }

        .jcard input {
            width: 100%;
            padding: 12px;
            background: var(--br);
            border: 1px solid var(--mt);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            text-align: center;
            outline: none;
            margin-bottom: 12px;
        }

        .jcard input:focus {
            border-color: var(--bl);
        }

        .jbtn {
            width: 100%;
            padding: 12px;
            background: var(--bl);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* التطبيق الرئيسي */
        #app {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
        }

        /* الشريط العلوي */
        .top {
            height: 48px;
            background: var(--cd);
            border-bottom: 2px solid var(--br);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-size: 17px;
            font-weight: 900;
            color: var(--bl);
        }

        .logo b {
            color: #fff;
        }

        .topright {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nchip {
            background: var(--br);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .hbtn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--br);
            color: var(--dim);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* لوحة الطلاب الجانبية (مزدوجة) */
        .students-panel {
            position: fixed;
            top: 48px;
            left: 0;
            bottom: 0;
            width: 300px;
            background: var(--cd);
            border-left: 1px solid var(--br);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            z-index: 200;
        }

        .students-panel.visible {
            transform: translateX(0);
        }

        .panel-tabs {
            display: flex;
            background: var(--br);
            padding: 5px;
            gap: 5px;
        }

        .panel-tab {
            flex: 1;
            background: var(--mt);
            border: none;
            color: #fff;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .panel-tab.active {
            background: var(--bl);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .student-list-item {
            background: var(--br);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .student-list-item.hand-raised {
            border-color: var(--yw);
        }

        .student-list-item.speaking {
            border-color: var(--gn);
        }

        .student-list-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            background: var(--bl);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .student-info {
            flex: 1;
        }

        .student-name {
            font-weight: 600;
        }

        .student-status {
            font-size: 11px;
            color: var(--dim);
        }

        .student-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .action-btn {
            background: var(--mt);
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn.approve {
            background: var(--gn);
        }

        .action-btn.reject {
            background: var(--rd);
        }

        .action-btn.mic {
            background: var(--bl);
        }

        .student-board-thumb {
            width: 100%;
            height: 80px;
            background: #fff;
            border-radius: 8px;
            margin-top: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .student-board-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumb-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .student-board-thumb:hover .thumb-overlay {
            opacity: 1;
        }

        .board-detail {
            position: fixed;
            top: 48px;
            left: 300px;
            right: 0;
            bottom: 0;
            background: var(--cd);
            display: none;
            flex-direction: column;
            z-index: 250;
        }

        .board-detail.active {
            display: flex;
        }

        .board-detail-header {
            padding: 12px;
            background: var(--br);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .board-detail-header button {
            background: var(--mt);
            border: none;
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .board-detail-canvas {
            flex: 1;
            background: #fff;
            position: relative;
        }

        .board-detail-canvas canvas {
            width: 100%;
            height: 100%;
            background: #fff;
        }

        .board-detail-toolbar {
            background: var(--br);
            padding: 8px;
            display: flex;
            gap: 5px;
        }

        .board-detail-toolbar button {
            background: var(--mt);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* منطقة المحتوى الرئيسي */
        .main-area {
            flex: 1;
            margin-right: 0;
            transition: margin 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .main-area.panel-open {
            margin-right: 300px;
        }

        .control-bar {
            background: var(--cd);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--br);
        }

        .control-btn {
            background: var(--br);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .control-btn.mic-on {
            background: var(--gn);
        }

        .control-btn.mic-off {
            background: var(--rd);
        }

        .control-btn.screen-on {
            background: var(--pp);
        }

        .boards {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            padding: 5px;
            gap: 5px;
        }

        .bcard {
            flex: 1;
            background: var(--cd);
            border-radius: 12px;
            border: 1px solid var(--br);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .bhead {
            height: 33px;
            padding: 0 10px;
            background: var(--br);
            border-bottom: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .tboard .bhead {
            border-bottom-color: var(--rd);
        }

        .sboard .bhead {
            border-bottom-color: var(--bl);
        }

        .btitle {
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .carea {
            flex: 1;
            background: #fff;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .carea canvas {
            position: absolute;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
        }

        #mainBoard {
            touch-action: none;
            cursor: crosshair;
        }

        .livebadge {
            background: var(--rd);
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            display: none;
            align-items: center;
            gap: 3px;
            color: #fff;
        }

        .livebadge.on {
            display: flex;
        }

        .tbar {
            background: var(--cd);
            border-top: 1px solid var(--br);
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .tsep {
            width: 1px;
            height: 32px;
            background: var(--br);
            flex-shrink: 0;
        }

        .tg {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        .tb {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: var(--br);
            color: var(--dim);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.12s;
        }

        .tb.on {
            background: var(--bl);
            color: #fff;
        }

        .clrs {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .cl {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            transition: 0.1s;
        }

        .cl.on {
            border-color: #fff;
            transform: scale(1.12);
        }

        .szs {
            display: flex;
            gap: 2px;
            align-items: center;
            background: var(--br);
            padding: 3px 5px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .sz {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 3px 4px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sz.on {
            background: var(--bl);
        }

        .sdot {
            background: #fff;
            border-radius: 50%;
        }

        .breakout-bar {
            background: var(--cd);
            border-top: 1px solid var(--br);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .room-btn {
            background: var(--br);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .room-btn.active {
            background: var(--pp);
        }

        .room-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        .sbar {
            height: 26px;
            background: var(--cd);
            border-top: 1px solid var(--br);
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--dim);
            flex-shrink: 0;
        }

        .conn {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gn);
        }
    </style>
</head>
<body>
    <!-- شاشة الدخول -->
    <div id="overlay">
        <div class="jcard">
            <div class="jlogo">My<b>Class</b>2</div>
            <p class="jsub">منصة التعليم التفاعلي</p>
            <input type="text" id="teacherName" placeholder="اسم المدرس" maxlength="25" value="مدرس">
            <button class="jbtn" onclick="startTeaching()">بدء الحصة</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="app" style="display: none;">
        <!-- الشريط العلوي -->
        <div class="top">
            <div class="logo">My<b>Class</b>2</div>
            <div class="topright">
                <span class="nchip" id="teacherNameChip">مدرس</span>
                <button class="hbtn" onclick="toggleStudentsPanel()">
                    <i class="fas fa-users"></i>
                </button>
            </div>
        </div>

        <!-- لوحة الطلاب الجانبية (سبورات الطلاب) -->
        <div class="students-panel" id="studentsPanel">
            <div class="panel-tabs">
                <button class="panel-tab active" id="tabRequests" onclick="switchPanelTab('requests')">
                    <i class="fas fa-clock"></i> الطلبات
                </button>
                <button class="panel-tab" id="tabBoards" onclick="switchPanelTab('boards')">
                    <i class="fas fa-images"></i> سبورات الطلاب
                </button>
            </div>
            <div class="panel-content" id="panelRequests">
                <!-- طلبات الانضمام ورفع اليد تظهر هنا -->
            </div>
            <div class="panel-content" id="panelBoards" style="display: none;">
                <!-- قائمة الطلاب مع سبوراتهم -->
            </div>
        </div>

        <!-- نافذة عرض سبورة الطالب بالتفصيل (للت
