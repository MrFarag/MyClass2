<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyClass - المدرس</title>
<link rel="stylesheet" href="teacher.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- ═══ TOP BAR ═══ -->
<div class="top-bar">
  <div class="brand">
    <span class="brand-name">MyClass - المدرس</span>
    <a href="https://wa.me/201141010981" class="wa-btn tip" data-tip="تواصل عبر واتساب" target="_blank">
      <i class="fab fa-whatsapp"></i>
    </a>
  </div>
  <div class="stats">
    <span class="phone"><i class="fab fa-whatsapp"></i> 01141010981</span>
    <span><i class="fas fa-users"></i><span id="cnt">0</span> طالب</span>
    <span><i class="fas fa-signal"></i><span id="lat">--ms</span></span>
  </div>
</div>

<!-- ═══ BODY ═══ -->
<div class="body">

  <!-- لوحة الشرائح -->
  <div class="slides-panel" id="slidesPanel">
    <div class="slides-header">
      <span><i class="fas fa-layer-group"></i> شرائحي</span>
      <label class="slide-upload-btn tip" data-tip="رفع صور كشرائح">
        <i class="fas fa-upload"></i>
        <input type="file" multiple accept="image/*" onchange="uploadSlides(this)">
      </label>
    </div>
    <div class="slides-list" id="slidesList"></div>
  </div>

  <!-- عمود السبورة -->
  <div class="board-col">
    <div class="bh">
      <!-- يسار: شريط الأدوات الصغير -->
      <div class="bh-left"></div>

      <!-- وسط: زر التقليب -->
      <div class="bh-center">
        <button id="bh-toggle" class="bh-toggle-btn bh-mode-teach tip"
                data-tip="الوضع: شرح — انقر للتبديل إلى اختبار"
                onclick="toggleBoardMode()">
          <i class="fas fa-chalkboard-teacher" id="bh-icon"></i>
          <span id="bh-label">شرح</span>
        </button>
      </div>

      <!-- يمين: رفع ملف -->
      <div class="bh-ctrl">
        <label id="bh-upload" class="bh-btn bh-btn-media tip"
               data-tip="رفع صورة / PDF / Word على السبورة">
          <i class="fas fa-file-upload"></i> رفع
          <input type="file" id="boardFileInput" accept="image/*,.pdf,.doc,.docx"
                 onchange="uploadMediaFile(this,
                   this.files[0] && this.files[0].type.startsWith('image/') ? 'image'
                   : this.files[0] && this.files[0].name.toLowerCase().endsWith('.pdf') ? 'pdf'
                   : 'word')">
        </label>
      </div>
    </div>
    <div class="board-wrap" id="bWrap">
      <canvas id="mc"></canvas>
    </div>
  </div>

  <!-- لوحة الطلاب -->
  <div class="panel" id="studentsPanel">
    <div class="panel-h">
      <span><i class="fas fa-users"></i> الطلاب</span>
      <span id="cntP">0</span>
    </div>
    <div class="panel-list" id="sList">
      <div style="color:#aaa;text-align:center;padding:12px;font-size:11px">لا يوجد طلاب</div>
    </div>
  </div>

</div>

<!-- ═══ BOTTOM TOOLBAR ═══ -->
<div class="bot">

  <!-- أدوات الرسم -->
  <div class="tools">
    <div class="ti on tip" id="tiPen"    data-tip="قلم حر"           onclick="setTool('pen')">    <i class="fas fa-pen"></i><span>قلم</span></div>
    <div class="ti tip"    id="tiEra"    data-tip="ممحاة"             onclick="setTool('eraser')"> <i class="fas fa-eraser"></i><span>ممحاة</span></div>
    <div class="ti tip"    id="tiHL"     data-tip="تظليل نيون"        onclick="setTool('highlight')"><i class="fas fa-highlighter"></i><span>نيون</span></div>
    <div class="ti-sep"></div>
    <div class="ti tip"    id="tiSel"    data-tip="تحديد"             onclick="setTool('select')"> <i class="fas fa-mouse-pointer"></i><span>تحديد</span></div>
    <div class="ti tip"    id="tiLine"   data-tip="خط مستقيم"         onclick="setTool('line')">   <i class="fas fa-slash"></i><span>خط</span></div>
    <div class="ti tip"    id="tiArrow"  data-tip="سهم"               onclick="setTool('arrow')">  <i class="fas fa-long-arrow-alt-right"></i><span>سهم</span></div>
    <div class="ti tip"    id="tiRect"   data-tip="مستطيل"            onclick="setTool('rect')">   <i class="far fa-square"></i><span>مستطيل</span></div>
    <div class="ti tip"    id="tiCircle" data-tip="دائرة"             onclick="setTool('circle')"> <i class="far fa-circle"></i><span>دائرة</span></div>
    <div class="ti tip"    id="tiTri"    data-tip="مثلث"              onclick="setTool('tri')">    <i class="fas fa-play" style="transform:rotate(-90deg)"></i><span>مثلث</span></div>
  </div>

  <!-- ألوان -->
  <div class="dots">
    <div class="dot tip on" data-tip="أسود"    style="background:#000000"                     onclick="setClr('#000000',this)"></div>
    <div class="dot tip"    data-tip="أحمر"    style="background:#e53935"                     onclick="setClr('#e53935',this)"></div>
    <div class="dot tip"    data-tip="برتقالي" style="background:#f59e0b"                     onclick="setClr('#f59e0b',this)"></div>
    <div class="dot tip"    data-tip="أخضر"    style="background:#22c55e"                     onclick="setClr('#22c55e',this)"></div>
    <div class="dot tip"    data-tip="أزرق"    style="background:#00aaff"                     onclick="setClr('#00aaff',this)"></div>
    <div class="dot tip"    data-tip="بنفسجي"  style="background:#9c27b0"                     onclick="setClr('#9c27b0',this)"></div>
    <div class="dot tip"    data-tip="أبيض"    style="background:#ffffff;border-color:#555"   onclick="setClr('#ffffff',this)"></div>
  </div>

  <!-- سمك القلم -->
  <div class="sz-row">
    <button class="sz-btn tip" data-tip="تقليل السمك" onclick="adjSz(-1)">−</button>
    <span class="sz-val" id="szV">4</span>
    <button class="sz-btn tip" data-tip="زيادة السمك" onclick="adjSz(1)">+</button>
  </div>

  <!-- خلفية السبورة - ألوان جديدة -->
  <div class="bg-wrap">
    <span class="bg-label">خلفية</span>
    <div class="bg-swatches">
      <div class="bg-dot tip" data-tip="أبيض"        style="background:#ffffff;border:2px solid #aaa" onclick="setBoardBg('#ffffff',this)"></div>
      <div class="bg-dot tip" data-tip="أخضر داكن"   style="background:#1a3a1a"                       onclick="setBoardBg('#1a3a1a',this)"></div>
      <div class="bg-dot tip" data-tip="زيتوني"       style="background:#2d3d1e"                       onclick="setBoardBg('#2d3d1e',this)"></div>
      <div class="bg-dot tip" data-tip="بني محمر"     style="background:#3e1f10"                       onclick="setBoardBg('#3e1f10',this)"></div>
      <div class="bg-dot tip" data-tip="كريمي"        style="background:#f5ead8;border:2px solid #bbb" onclick="setBoardBg('#f5ead8',this)"></div>
      <div class="bg-dot tip" data-tip="رمادي داكن"   style="background:#252525"                       onclick="setBoardBg('#252525',this)"></div>
    </div>
  </div>

  <!-- تكبير + ملاءمة + مسح -->
  <div class="zoom-row">
    <button class="zb tip" data-tip="تصغير"        onclick="Z(-0.1)"><i class="fas fa-search-minus"></i></button>
    <span   class="zv" id="zv">100%</span>
    <button class="zb tip" data-tip="تكبير"        onclick="Z(0.1)"><i class="fas fa-search-plus"></i></button>
    <button class="zb tip" data-tip="ملاءمة الشاشة" onclick="fit()"><i class="fas fa-compress-arrows-alt"></i></button>
    <button class="zb zb-clear tip" data-tip="مسح السبورة" onclick="clearB()"><i class="fas fa-trash-alt"></i></button>
  </div>

  <!-- أزرار التحكم -->
  <div class="acts">
    <button class="ab ab-send tip" data-tip="رفع للطلاب" id="modeSend" onclick="sendSlideToStudents()">
      <i class="fas fa-upload"></i>
    </button>
    <button class="ab tip" data-tip="تشغيل / إيقاف الميكروفون" id="micBtn" onclick="toggleMic()">
      <i class="fas fa-microphone-slash"></i>
    </button>
    <button class="ab tip" data-tip="حفظ السبورة PNG" onclick="saveB()">
      <i class="fas fa-download"></i>
    </button>
    <button class="ab tip" data-tip="ملء الشاشة" onclick="goFS()">
      <i class="fas fa-expand"></i>
    </button>
    <button class="ab red tip" data-tip="إنهاء الحصة" onclick="endClass()">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>

</div>

<!-- ═══ MEDIA MODAL ═══ -->
<div id="mediaModal" class="media-modal" onclick="if(event.target===this)closeMediaModal()">
  <div class="media-modal-box">
    <div class="media-modal-hdr">
      <span><i class="fas fa-file-upload"></i> رفع ملف على السبورة</span>
      <button class="media-close" onclick="closeMediaModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="media-modal-body">
      <div class="media-drop">
        <i class="fas fa-cloud-upload-alt"></i>
        <p>اختر نوع الملف الذي تريد رفعه</p>
        <div class="media-types">
          <label class="media-badge img" style="cursor:pointer" title="رفع صورة">
            <i class="fas fa-image"></i> صورة
            <input type="file" accept="image/*" onchange="uploadMediaFile(this,'image')">
          </label>
          <label class="media-badge pdf" style="cursor:pointer" title="رفع PDF">
            <i class="fas fa-file-pdf"></i> PDF
            <input type="file" accept=".pdf" onchange="uploadMediaFile(this,'pdf')">
          </label>
          <label class="media-badge doc" style="cursor:pointer" title="رفع Word">
            <i class="fas fa-file-word"></i> Word
            <input type="file" accept=".doc,.docx" onchange="uploadMediaFile(this,'word')">
          </label>
        </div>
      </div>
      <div id="mediaStatus" class="media-status" style="display:none"></div>
    </div>
  </div>
</div>

<!-- Tooltip -->
<div id="globalTip" class="global-tip"></div>

<audio id="audioEl" autoplay></audio>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
/* ════ Tooltip System ════ */
(function(){
  var tip = document.getElementById('globalTip');
  var ht, af;
  function place(el){
    cancelAnimationFrame(af);
    af = requestAnimationFrame(function(){
      var r   = el.getBoundingClientRect();
      var tw  = tip.offsetWidth  || 120;
      var th  = tip.offsetHeight || 26;
      var left = r.left + r.width/2 - tw/2;
      left = Math.max(6, Math.min(window.innerWidth - tw - 6, left));
      var top  = r.top > th + 12 ? r.top - th - 8 : r.bottom + 8;
      tip.style.left = left + 'px';
      tip.style.top  = top  + 'px';
    });
  }
  document.addEventListener('mouseover', function(e){
    var el = e.target.closest('.tip');
    if (!el || !el.dataset.tip) return;
    clearTimeout(ht);
    tip.textContent = el.dataset.tip;
    tip.classList.add('show');
    place(el);
  });
  document.addEventListener('mousemove', function(e){
    var el = e.target.closest('.tip');
    if (el && el.dataset.tip) place(el);
  });
  document.addEventListener('mouseout', function(e){
    if (e.target.closest('.tip')) ht = setTimeout(function(){ tip.classList.remove('show'); }, 100);
  });
  document.addEventListener('mousedown', function(){ tip.classList.remove('show'); });
})();
</script>

<script src="teacher.js"></script>
</body>
</html>
