<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MyClass2 - المدرس (نسخة محسنة)</title>
  <!-- ربط ملفات CSS الخارجية -->
  <link rel="stylesheet" href="teacher.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<!-- الشريط العلوي -->
<div class="top-bar">
  <div class="brand">
    <a class="wa-btn" href="https://wa.me/201141010981" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <span class="brand-name">Mr. Farag Kohail | Physics</span>
  </div>
  <div class="stats">
    <span><i class="fas fa-circle" style="color:#4CAF50"></i>مباشر</span>
    <span><i class="fas fa-users"></i><span id="cnt">0</span></span>
    <span><i class="fas fa-wifi"></i><span id="lat">--</span></span>
  </div>
  <span class="phone">01141010981</span>
</div>

<!-- المحتوى الرئيسي -->
<div class="body">
  <!-- الشريط الجانبي (قائمة الطلاب) -->
  <div class="panel">
    <div class="panel-h"><span><i class="fas fa-users"></i> المشاركون</span><span id="cntP">0</span></div>
    <div class="panel-list" id="sList"><div style="color:#aaa;text-align:center;padding:14px;font-size:11px">لا يوجد طلاب</div></div>
  </div>

  <!-- منطقة السبورة -->
  <div class="board-col">
    <div class="bh">
      <span class="bh-title" id="bTitle">السبورة الرئيسية</span>
      <div class="bh-ctrl">
        <button class="zb" onclick="Z(-0.15)"><i class="fas fa-minus"></i></button>
        <span class="zv" id="zv">—</span>
        <button class="zb" onclick="Z(0.15)"><i class="fas fa-plus"></i></button>
        <button class="zb" onclick="fit()">ملاءمة</button>

        <i class="ci fas fa-trash-alt" onclick="clearB()" title="مسح"></i>
        <i class="ci fas fa-download" onclick="saveB()" title="حفظ"></i>
        <i class="ci fas fa-expand" onclick="goFS()"></i>
      </div>
    </div>
    <div class="board-wrap" id="bWrap">
      <canvas id="mc"></canvas>
    </div>
  </div>
</div>

<!-- الشريط السفلي (أدوات الرسم) -->
<div class="bot">
  <div class="tools">
    <div class="ti on" id="tiPen" onclick="setTool('pen')"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
    <div class="ti"    id="tiEra" onclick="setTool('eraser')"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
    <div class="ti"    id="tiHL"  onclick="setTool('highlight')" title="قلم فسفوري">
      <i class="fas fa-highlighter" style="color:#ffff00;text-shadow:0 0 6px #ffff00"></i><span>نيون</span>
    </div>
    <div class="ti-sep"></div>
    <!-- الأشكال الهندسية -->
    <div class="ti" id="tiLine"   onclick="setTool('line')"   title="خط مستقيم"><i class="fas fa-slash"></i><span>خط</span></div>
    <div class="ti" id="tiArrow"  onclick="setTool('arrow')"  title="سهم"><i class="fas fa-arrow-right"></i><span>سهم</span></div>
    <div class="ti" id="tiRect"   onclick="setTool('rect')"   title="مستطيل"><i class="far fa-square"></i><span>مستطيل</span></div>
    <div class="ti" id="tiCircle" onclick="setTool('circle')" title="دائرة"><i class="far fa-circle"></i><span>دائرة</span></div>
    <div class="ti" id="tiTri"    onclick="setTool('tri')"    title="مثلث"><i class="fas fa-caret-up" style="font-size:18px"></i><span>مثلث</span></div>
    <div class="ti-sep"></div>
    <div class="dots">
      <div class="dot on"  style="background:#000"    onclick="setClr('#000',this)"></div>
      <div class="dot"     style="background:#e53935" onclick="setClr('#e53935',this)"></div>
      <div class="dot"     style="background:#1e88e5" onclick="setClr('#1e88e5',this)"></div>
      <div class="dot"     style="background:#43a047" onclick="setClr('#43a047',this)"></div>
      <div class="dot"     style="background:#fb8c00" onclick="setClr('#fb8c00',this)"></div>
      <div class="dot"     style="background:#8e24aa" onclick="setClr('#8e24aa',this)"></div>
      <div class="dot"     style="background:#fff;border:2px solid #555" onclick="setClr('#fff',this)"></div>
      <!-- فسفوري -->
      <div class="dot dot-neon" style="background:#39ff14" onclick="setClr('#39ff14',this)" title="فسفوري أخضر"></div>
      <div class="dot dot-neon" style="background:#ffff00" onclick="setClr('#ffff00',this)" title="فسفوري أصفر"></div>
      <div class="dot dot-neon" style="background:#ff69b4" onclick="setClr('#ff69b4',this)" title="فسفوري وردي"></div>
      <div class="dot dot-neon" style="background:#00ffff" onclick="setClr('#00ffff',this)" title="فسفوري سماوي"></div>
    </div>
    <div class="ti-sep"></div>
    <button class="zb zb-clear" onclick="clearB()" title="مسح السبورة"><i class="fas fa-eraser"></i> Clear</button>
    <label class="ulbl"><i class="fas fa-image"></i>صورة<input type="file" accept="image/*" onchange="uploadImg(this)"></label>
  </div>
  <div class="acts">
    <button class="home-fab" id="homeFab" onclick="mainBoard()" title="الرئيسية">
      <i class="fas fa-home"></i><span>الرئيسية</span>
    </button>
    <button class="ab mic-btn" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone-slash"></i></button>
    <button class="ab" onclick="resetAll()" title="تصفير الجلسة"><i class="fas fa-broom"></i></button>
    <button class="ab red" onclick="endClass()"><i class="fas fa-power-off"></i></button>
  </div>
</div>

<!-- نافذة معاينة الواجب -->
<div class="modal" id="corrModal">
  <div class="mc">
    <div class="mh">
      <span class="mh-title" id="corrTitle">معاينة واجب الطالب</span>
      <div style="display:flex;gap:8px;">
        <button onclick="sendCorr()" style="background:#4CAF50;color:#fff;border:none;padding:7px 18px;border-radius:20px;cursor:pointer;font-family:Cairo,sans-serif;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;">
          <i class="fas fa-paper-plane"></i> إرسال للطالب
        </button>
        <button onclick="closeCorr()" style="background:#b71c1c;color:#fff;border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
    <div class="mb" id="corrImgWrap"></div>
    <div class="mf">
      <span style="font-size:11px;color:#aaa;"><i class="fas fa-info-circle"></i> المعاينة فقط — اضغط "إرسال للطالب" لإرسالها لسبورته</span>
    </div>
  </div>
</div>

<!-- عنصر صوت مخفي -->
<audio id="audioEl" autoplay style="display:none"></audio>

<!-- ربط Firebase وملف JavaScript الخارجي -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="teacher.js"></script>
</body>
</html>
