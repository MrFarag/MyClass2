<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - المدرس</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: #1a2e25; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .top-bar { height: 70px; background: linear-gradient(90deg,#0f2a1f,#1e3a2a); border-bottom: 2px solid #ffaa00; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .teacher-name { font-size: 18px; font-weight: 900; color: #ffaa00; }
    .teacher-desc { font-size: 12px; color: #ccc; }
    .teacher-phone { font-size: 14px; color: #ffaa00; direction: ltr; }
    .top-center { display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.3); padding: 4px 20px; border-radius: 30px; }
    .top-center span { font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .top-center i { color: #ffaa00; }
    .main-layout { flex: 1; display: flex; overflow: hidden; padding: 8px; gap: 8px; }
    .students-panel { width: 280px; background: #1e3228; border-radius: 24px; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border: 1px solid #3a5a40; order: 1; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; color: #ffaa00; font-weight: 700; }
    .student-item { background: #1a2e25; border-radius: 40px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #2a4a30; transition: 0.2s; }
    .student-avatar { width: 36px; height: 36px; border-radius: 50%; background: #ffaa00; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; flex-shrink: 0; font-size: 15px; }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .student-status { font-size: 10px; color: #ccc; display: flex; align-items: center; gap: 4px; }
    .student-actions { display: flex; gap: 8px; color: #ffaa00; font-size: 15px; flex-shrink: 0; }
    .student-actions i { cursor: pointer; transition: 0.2s; }
    .student-actions i:hover { transform: scale(1.2); color: #fff; }
    .board-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; order: 2; }
    .board-header { height: 44px; background: #1e3228; border-radius: 20px 20px 0 0; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #2a4a30; border-bottom: none; }
    .board-header-right { display: flex; align-items: center; gap: 18px; }
    .board-header-right i { color: #ffaa00; cursor: pointer; font-size: 17px; transition: 0.2s; }
    .board-header-right i:hover { color: #fff; transform: scale(1.15); }
    .current-board-title { font-weight: 700; color: #ffaa00; }
    .main-board { flex: 1; background: #1e3228; border-radius: 0 0 20px 20px; border: 1px solid #2a4a30; overflow: hidden; }
    .main-board canvas { width: 100%; height: 100%; display: block; background: #fff; touch-action: none; cursor: crosshair; }
    .icon-sidebar { width: 70px; background: #1e3228; border-radius: 24px; display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 20px; border: 1px solid #3a5a40; order: 3; }
    .nav-item { width: 50px; height: 50px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; color: #aaa; font-size: 10px; }
    .nav-item i { font-size: 22px; }
    .nav-item.active { background: #ffaa00; color: #000; }
    .bottom-bar { height: 80px; background: #0f2a1f; border-top: 2px solid #ffaa00; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .toolbar-tools { display: flex; gap: 16px; background: #1a2e25; padding: 8px 20px; border-radius: 50px; border: 1px solid #3a5a40; align-items: center; }
    .tool-item { display: flex; flex-direction: column; align-items: center; color: #aaa; cursor: pointer; font-size: 10px; transition: 0.2s; }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #ffaa00; }
    .color-picker { display: flex; gap: 5px; background: #1e3228; padding: 5px 10px; border-radius: 40px; align-items: center; }
    .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: #fff; transform: scale(1.2); }
    .toolbar-actions { display: flex; gap: 12px; }
    .action-circle { width: 52px; height: 52px; border-radius: 50%; border: none; background: #2a4a35; color: #fff; font-size: 22px; cursor: pointer; transition: 0.2s; }
    .action-circle:hover { filter: brightness(1.25); transform: scale(1.05); }
    .btn-mic.active { background: #ffaa00; color: #000; }
    .btn-end { background: #b71c1c; }
    .image-upload input { display: none; }
    .image-upload label { background: #ffaa00; color: #000; padding: 6px 16px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
    .modal { position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.92); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .modal.active { display: flex; }
    .modal-content { background: #1e3228; width: 92%; height: 92%; border-radius: 28px; display: flex; flex-direction: column; border: 2px solid #ffaa00; }
    .modal-header { padding: 14px 20px; background: #0f2a1f; display: flex; justify-content: space-between; align-items: center; border-radius: 26px 26px 0 0; }
    .modal-body { flex: 1; background: #fff; overflow: hidden; }
    .modal-body canvas { width: 100%; height: 100%; display: block; cursor: crosshair; touch-action: none; }
    .modal-footer { padding: 10px 20px; background: #0f2a1f; display: flex; gap: 12px; align-items: center; border-radius: 0 0 26px 26px; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    .blink { animation: blink 1s infinite; }
  </style>
</head>
<body>
<div class="top-bar">
  <div><div class="teacher-name">Mr_Farag_Kohail</div><div class="teacher-desc">منصة الفيزياء للثانوية العامة</div></div>
  <div class="top-center">
    <span><i class="fas fa-circle" style="color:#4CAF50"></i> مباشر</span>
    <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
    <span><i class="fas fa-wifi"></i> <span id="latency">--</span></span>
  </div>
  <div class="teacher-phone">01141010981</div>
</div>

<div class="main-layout">
  <div class="students-panel">
    <div class="panel-header"><span><i class="fas fa-users"></i> المشاركون</span><span id="studentsCountPanel">0</span></div>
    <div id="studentsList"><div style="color:#aaa;text-align:center;padding:20px;font-size:13px;">لا يوجد طلاب</div></div>
  </div>

  <div class="board-area">
    <div class="board-header">
      <div class="current-board-title" id="currentBoardTitle">السبورة الرئيسية</div>
      <div class="board-header-right">
        <i class="fas fa-home" title="السبورة الرئيسية" onclick="switchToMainBoard()"></i>
        <i class="fas fa-trash-alt" title="مسح" onclick="clearBoard()"></i>
        <i class="fas fa-download" title="حفظ" onclick="saveBoard()"></i>
        <i class="fas fa-expand" title="ملء الشاشة" onclick="toggleFullscreen()"></i>
      </div>
    </div>
    <div class="main-board"><canvas id="mainBoardCanvas"></canvas></div>
  </div>

  <div class="icon-sidebar">
    <div class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></div>
    <div class="nav-item"><i class="fas fa-door-open"></i><span>فصول</span></div>
    <div class="nav-item"><i class="fas fa-chart-bar"></i><span>الدرجات</span></div>
    <div class="nav-item"><i class="fas fa-calendar-alt"></i><span>الجدول</span></div>
    <div class="nav-item" style="margin-top:auto"><i class="fas fa-cog"></i><span>إعدادات</span></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="toolbar-tools">
    <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
    <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
    <div class="color-picker">
      <div class="color-dot active" style="background:#000" onclick="setColor('#000',this)"></div>
      <div class="color-dot" style="background:#e53935" onclick="setColor('#e53935',this)"></div>
      <div class="color-dot" style="background:#1e88e5" onclick="setColor('#1e88e5',this)"></div>
      <div class="color-dot" style="background:#43a047" onclick="setColor('#43a047',this)"></div>
      <div class="color-dot" style="background:#fb8c00" onclick="setColor('#fb8c00',this)"></div>
      <div class="color-dot" style="background:#8e24aa" onclick="setColor('#8e24aa',this)"></div>
    </div>
    <div class="image-upload"><label for="tImg"><i class="fas fa-image"></i> رفع صورة</label><input type="file" id="tImg" accept="image/*" onchange="uploadImg(this)"></div>
  </div>
  <div class="toolbar-actions">
    <button class="action-circle btn-mic" id="micBtn" title="تشغيل المايك" onclick="toggleMic()"><i class="fas fa-microphone-slash"></i></button>
    <button class="action-circle" title="تصفير" onclick="resetAll()" style="background:#2a4a35"><i class="fas fa-broom"></i></button>
    <button class="action-circle btn-end" title="إنهاء الحصة" onclick="endClass()"><i class="fas fa-power-off"></i></button>
  </div>
</div>

<!-- نافذة التصحيح -->
<div class="modal" id="corrModal">
  <div class="modal-content">
    <div class="modal-header">
      <span id="corrTitle" style="font-weight:700;color:#ffaa00">تصحيح الواجب</span>
      <div style="display:flex;gap:10px">
        <button class="action-circle" onclick="sendCorrection()" style="background:#4CAF50" title="إرسال"><i class="fas fa-paper-plane"></i></button>
        <button class="action-circle btn-end" onclick="closeCorr()" title="إغلاق"><i class="fas fa-times"></i></button>

    <div class="modal-footer">
      <button class="action-circle" onclick="corrTool='pen'" style="background:#ffaa00" title="قلم"><i class="fas fa-pen-nib"></i></button>
      <button class="action-circle" onclick="corrTool='eraser'" style="background:#555" title="ممحاة"><i class="fas fa-eraser"></i></button>
      <div class="color-picker">
        <div class="color-dot active" style="background:#e53935" onclick="corrColor='#e53935';setCorrDot(this)"></div>
        <div class="color-dot" style="background:#1e88e5" onclick="corrColor='#1e88e5';setCorrDot(this)"></div>
        <div class="color-dot" style="background:#43a047" onclick="corrColor='#43a047';setCorrDot(this)"></div>
        <div class="color-dot" style="background:#000" onclick="corrColor='#000';setCorrDot(this)"></div>
      </div>
    </div>
  </div>
</div>

<audio id="audioEl" autoplay style="display:none"></audio>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
(function(){
  // ══════════════════════════════════════════════════════
  //  Firebase
  // ══════════════════════════════════════════════════════
  firebase.initializeApp({
    apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
    databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
  });
  const db = firebase.database();

  // ══════════════════════════════════════════════════════
  //  Canvas إعداد
  // ══════════════════════════════════════════════════════
  const mc = document.getElementById('mainBoardCanvas');
  const mx = mc.getContext('2d');

  function initCtx(ctx) { ctx.lineCap='round'; ctx.lineJoin='round'; }
  initCtx(mx);

  let savedDataUrl = null;
  function resizeMC() {
    const p = mc.parentElement;
    const prev = (mc.width > 0 && mc.height > 0) ? mc.toDataURL() : null;
    mc.width = p.clientWidth; mc.height = p.clientHeight;
    initCtx(mx);
    mx.fillStyle='#fff'; mx.fillRect(0,0,mc.width,mc.height);
    if (prev) { const i=new Image(); i.onload=()=>mx.drawImage(i,0,0,mc.width,mc.height); i.src=prev; }
  }
  window.addEventListener('resize', ()=>setTimeout(resizeMC,100));
  setTimeout(resizeMC,100);

  // ══════════════════════════════════════════════════════
  //  حالة التطبيق
  // ══════════════════════════════════════════════════════
  let currentTool='pen', currentColor='#000', currentSize=4;
  let isDrawing=false, strokeId=0;
  let points=[], sendTimer=null;
  let students={}, waiting={}, images={};
  let currentSpeaker=null, currentBoard='main';
  let lastMainImg=null, lastStuImg={};

  // ══════════════════════════════════════════════════════
  //  رسم المدرس
  // ══════════════════════════════════════════════════════
  function getXY(e,canvas){
    const r=canvas.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return { x:(t.clientX-r.left)*(canvas.width/r.width), y:(t.clientY-r.top)*(canvas.height/r.height) };
  }

  mc.addEventListener('mousedown', startDraw);
  mc.addEventListener('mousemove', moveDraw);
  mc.addEventListener('mouseup', stopDraw);
  mc.addEventListener('mouseleave', stopDraw);
  mc.addEventListener('touchstart', startDraw, {passive:false});
  mc.addEventListener('touchmove', moveDraw, {passive:false});
  mc.addEventListener('touchend', stopDraw);

  function startDraw(e) {
    e.preventDefault();
    isDrawing=true; strokeId=Date.now(); points=[];
    const p=getXY(e,mc);
    initCtx(mx); mx.beginPath(); mx.moveTo(p.x,p.y);
    points.push({x:p.x/mc.width, y:p.y/mc.height});
  }
  function moveDraw(e) {
    e.preventDefault(); if(!isDrawing) return;
    const p=getXY(e,mc);
    mx.strokeStyle = currentTool==='eraser'?'#fff':currentColor;
    mx.lineWidth = currentTool==='eraser'?currentSize*5:currentSize;
    mx.lineTo(p.x,p.y); mx.stroke(); mx.beginPath(); mx.moveTo(p.x,p.y);
    points.push({x:p.x/mc.width, y:p.y/mc.height});
    if(!sendTimer) sendTimer=setTimeout(flush,20);
  }
  function flush() {
    sendTimer=null; if(!points.length) return;
    db.ref('draw_t').push({pts:points.slice(), c:currentTool==='eraser'?null:currentColor, s:currentSize, sid:strokeId, ts:Date.now()});
    points=[];
  }
  function stopDraw() {
    if(!isDrawing) return; isDrawing=false;
    if(sendTimer){clearTimeout(sendTimer);sendTimer=null;}
    flush();
    lastMainImg = mc.toDataURL();
  }

  // ══════════════════════════════════════════════════════
  //  استقبال رسم الطالب (عند مشاهدة سبورته)
  // ══════════════════════════════════════════════════════
  const stuLP={}, stuLS={};
  db.ref('draw_st').on('child_added', snap=>{
    const d=snap.val();
    if(!d||!d.pts||!d.studentId) return;
    if(currentBoard!==d.studentId) return;
    drawBatch(mx,mc,d,stuLP,stuLS,d.studentId);
  });

  function drawBatch(ctx,canvas,d,lp,ls,key){
    const pts=d.pts, c=d.c, s=d.s||4, sid=d.sid;
    if(!pts||!pts.length) return;
    initCtx(ctx);
    ctx.strokeStyle=c===null?'#fff':c;
    ctx.lineWidth=c===null?s*5:s;
    ctx.beginPath();
    if(lp[key] && sid && sid===ls[key]) {
      ctx.moveTo(lp[key].x, lp[key].y);
    } else {
      ctx.moveTo(pts[0].x*canvas.width, pts[0].y*canvas.height);
    }
    pts.forEach(p=>ctx.lineTo(p.x*canvas.width, p.y*canvas.height));
    ctx.stroke();
    const last=pts[pts.length-1];
    lp[key]={x:last.x*canvas.width, y:last.y*canvas.height};
    ls[key]=sid;
  }

  // ══════════════════════════════════════════════════════
  //  أدوات الرسم
  // ══════════════════════════════════════════════════════
  window.setTool=function(t){ currentTool=t; document.getElementById('toolPen').classList.toggle('active',t==='pen'); document.getElementById('toolEraser').classList.toggle('active',t==='eraser'); };
  window.setColor=function(c,el){ currentColor=c; document.querySelectorAll('.toolbar-tools .color-dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); };
  window.clearBoard=function(){ mx.fillStyle='#fff'; mx.fillRect(0,0,mc.width,mc.height); db.ref('boardCmd').push({type:'clear',ts:Date.now()}); lastMainImg=null; };
  window.saveBoard=function(){ const a=document.createElement('a'); a.download='board.png'; a.href=mc.toDataURL(); a.click(); };
  window.toggleFullscreen=function(){ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen(); };
  window.uploadImg=function(input){
    if(!input.files[0]) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const cw=mc.width,ch=mc.height,r=img.width/img.height,cr=cw/ch;
        let dw,dh;
        if(r>cr){dw=cw;dh=cw/r;}else{dh=ch;dw=ch*r;}
        mx.fillStyle='#fff'; mx.fillRect(0,0,cw,ch);
        mx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);
        const dataUrl=mc.toDataURL('image/jpeg',0.85);
        lastMainImg=dataUrl;
        db.ref('boardImg').set({data:dataUrl,ts:Date.now()});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
    input.value='';
  };

  // ══════════════════════════════════════════════════════
  //  السبورات
  // ══════════════════════════════════════════════════════
  window.switchToMainBoard=function(){
    currentBoard='main';
    document.getElementById('currentBoardTitle').textContent='السبورة الرئيسية';
    mx.fillStyle='#fff'; mx.fillRect(0,0,mc.width,mc.height);
    if(lastMainImg){ const i=new Image(); i.onload=()=>mx.drawImage(i,0,0,mc.width,mc.height); i.src=lastMainImg; }
  };
  window.viewStudentBoard=function(sid,name){
    currentBoard=sid;
    document.getElementById('currentBoardTitle').textContent='سبورة '+name;
    mx.fillStyle='#fff'; mx.fillRect(0,0,mc.width,mc.height);
    if(lastStuImg[sid]){ const i=new Image(); i.onload=()=>mx.drawImage(i,0,0,mc.width,mc.height); i.src=lastStuImg[sid]; }
  };

  // صور سبورة الطالب المحفوظة
  db.ref('boardImg_stu').on('child_changed', snap=>{ const d=snap.val(); if(d) loadStuBoardImg(snap.key,d); });
  db.ref('boardImg_stu').on('child_added', snap=>{ const d=snap.val(); if(d) loadStuBoardImg(snap.key,d); });
  function loadStuBoardImg(sid,d){
    lastStuImg[sid]=d.data;
    if(currentBoard===sid){ const i=new Image(); i.onload=()=>{ mx.clearRect(0,0,mc.width,mc.height); mx.drawImage(i,0,0,mc.width,mc.height); }; i.src=d.data; }
  }

  // ══════════════════════════════════════════════════════
  //  إدارة الطلاب
  // ══════════════════════════════════════════════════════
  function render(){
    const c=document.getElementById('studentsList');
    let h='';
    Object.values(waiting).forEach(s=>{
      h+=`<div class="student-item" style="border-color:#f39c12">
        <div class="student-avatar" style="background:#f39c12">${s.name[0]}</div>
        <div class="student-info"><div class="student-name">${s.name}</div><div class="student-status"><i class="fas fa-clock blink"></i> انتظار</div></div>
        <div class="student-actions">
          <i class="fas fa-check-circle" style="color:#4CAF50" title="قبول" onclick="approveS('${s.id}')"></i>
          <i class="fas fa-times-circle" style="color:#b71c1c" title="رفض" onclick="rejectS('${s.id}')"></i>
        </div></div>`;
    });
    Object.values(students).forEach(s=>{
      if(!s.online) return;
      const hasImg=images[s.id]&&images[s.id].length>0;
      const spk=currentSpeaker===s.id;
      const hand=s.handRaised;
      const ico=hand?'<i class="fas fa-hand-paper blink" style="color:#f59e0b"></i>':spk?'<i class="fas fa-microphone" style="color:#22c55e"></i>':'<i class="fas fa-headphones" style="color:#aaa"></i>';
      const txt=hand?'رفع اليد':spk?'يتحدث':'مستمع';
      h+=`<div class="student-item">
        <div class="student-avatar" style="background:${hand?'#f59e0b':'#ffaa00'}">${s.name[0]}</div>
        <div class="student-info"><div class="student-name">${s.name}</div><div class="student-status">${ico} ${txt}</div></div>
        <div class="student-actions">
          ${hasImg?`<i class="fas fa-image" title="تصحيح" onclick="openCorr('${s.id}','${s.name}')"></i>`:''}
          <i class="fas fa-eye" title="عرض السبورة" onclick="viewStudentBoard('${s.id}','${s.name}')"></i>
          ${spk?`<i class="fas fa-microphone-slash" style="color:#e53935" title="كتم" onclick="revokeMic('${s.id}')"></i>`:''}
          <i class="fas fa-sign-out-alt" style="color:#b71c1c" title="طرد" onclick="kickS('${s.id}')"></i>
        </div></div>`;
    });
    c.innerHTML=h||'<div style="color:#aaa;text-align:center;padding:20px;font-size:13px">لا يوجد طلاب</div>';
    const cnt=Object.values(students).filter(s=>s.online).length;
    document.getElementById('studentsCount').textContent=cnt;
    document.getElementById('studentsCountPanel').textContent=cnt;
  }

  db.ref('joinRequests').on('child_added', snap=>{ const s=snap.val(); if(s){waiting[s.id]=s; render();} });
  db.ref('joinRequests').on('child_removed', snap=>{ const s=snap.val(); if(s){delete waiting[s.id]; render();} });
  db.ref('approvedStudents').on('value', snap=>{ students=snap.val()||{}; render(); });
  db.ref('onlineStudents').on('value', snap=>{
    const o=snap.val()||{};
    Object.keys(students).forEach(id=>{ if(students[id]) students[id].online=!!o[id]; });
    render();
  });
  db.ref('handRaised').on('value', snap=>{
    const h=snap.val()||{};
    Object.keys(students).forEach(id=>{ if(students[id]) students[id].handRaised=!!h[id]; });
    render();
  });
  db.ref('micRequests').on('child_added', snap=>{
    const req=snap.val(); if(!req) return;
    const name=(students[req.studentId]&&students[req.studentId].name)||req.studentName||'طالب';
    if(confirm(`الطالب "${name}" يريد التحدث. هل تسمح؟`)){
      if(currentSpeaker) db.ref('micPermissions/'+currentSpeaker).remove();
      currentSpeaker=req.studentId;
      db.ref('micPermissions/'+req.studentId).set({allowed:true,ts:Date.now()});
      db.ref('handRaised/'+req.studentId).remove();
    }
    snap.ref.remove(); render();
  });
  db.ref('studentImages').on('child_added', snap=>{
    const img=snap.val(); if(!img||!img.studentId) return;
    if(!images[img.studentId]) images[img.studentId]=[];
    images[img.studentId].push(img); render();
  });

  window.approveS=function(id){
    const s=waiting[id]; if(!s) return;
    delete waiting[id];
    db.ref('approvedStudents/'+id).set({id,name:s.name});
    db.ref('joinRequests/'+id).remove();
    render();
  };
  window.rejectS=function(id){ delete waiting[id]; db.ref('joinRequests/'+id).remove(); render(); };
  window.kickS=function(id){
    if(currentSpeaker===id){currentSpeaker=null;db.ref('micPermissions/'+id).remove();}
    delete students[id];
    db.ref('approvedStudents/'+id).remove();
    db.ref('onlineStudents/'+id).remove();
    render();
  };
  window.revokeMic=function(id){
    currentSpeaker=null; db.ref('micPermissions/'+id).remove(); render();
  };

  // ══════════════════════════════════════════════════════
  //  نافذة التصحيح
  // ══════════════════════════════════════════════════════
  const cc=document.getElementById('corrCanvas');
  const cx=cc.getContext('2d');
  initCtx(cx);
  let corrTool='pen', corrColor='#e53935', corrDrawing=false, corrStuId=null;

  window.openCorr=function(sid,name){
    const imgs=images[sid]; if(!imgs||!imgs.length) return;
    corrStuId=sid;
    document.getElementById('corrTitle').textContent='تصحيح واجب '+name;
    document.getElementById('corrModal').classList.add('active');
    setTimeout(()=>{
      const p=cc.parentElement;
      cc.width=p.clientWidth; cc.height=p.clientHeight;
      initCtx(cx); cx.fillStyle='#fff'; cx.fillRect(0,0,cc.width,cc.height);
      const img=new Image();
      img.onload=()=>cx.drawImage(img,0,0,cc.width,cc.height);
      img.src=imgs[imgs.length-1].data;
    },60);
  };
  window.closeCorr=()=>document.getElementById('corrModal').classList.remove('active');
  window.sendCorrection=function(){
    if(!corrStuId) return;
    db.ref('correctedImg/'+corrStuId).set({data:cc.toDataURL('image/jpeg',0.85),ts:Date.now()});
    alert('✅ تم إرسال التصحيح للطالب');
    closeCorr();
  };
  window.setCorrDot=function(el){ document.querySelectorAll('#corrModal .color-dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); };

  function corrXY(e){ return getXY(e,cc); }
  cc.addEventListener('mousedown', e=>{corrDrawing=true;const p=corrXY(e);initCtx(cx);cx.beginPath();cx.moveTo(p.x,p.y);});
  cc.addEventListener('mousemove', e=>{if(!corrDrawing)return;const p=corrXY(e);cx.strokeStyle=corrTool==='eraser'?'#fff':corrColor;cx.lineWidth=corrTool==='eraser'?20:4;cx.lineTo(p.x,p.y);cx.stroke();cx.beginPath();cx.moveTo(p.x,p.y);});
  cc.addEventListener('mouseup',()=>corrDrawing=false);
  cc.addEventListener('mouseleave',()=>corrDrawing=false);
  cc.addEventListener('touchstart',e=>{e.preventDefault();corrDrawing=true;const p=corrXY(e);initCtx(cx);cx.beginPath();cx.moveTo(p.x,p.y);},{passive:false});
  cc.addEventListener('touchmove',e=>{e.preventDefault();if(!corrDrawing)return;const p=corrXY(e);cx.strokeStyle=corrTool==='eraser'?'#fff':corrColor;cx.lineWidth=corrTool==='eraser'?20:4;cx.lineTo(p.x,p.y);cx.stroke();cx.beginPath();cx.moveTo(p.x,p.y);},{passive:false});
  cc.addEventListener('touchend',()=>corrDrawing=false);

  // ══════════════════════════════════════════════════════
  //  المايك - WebRTC
  // ══════════════════════════════════════════════════════
  const RTC={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
  let tStream=null, micOn=false;
  const peers={}; // sid->RTCPeerConnection (teacher->student)
  let stuPc=null; // student->teacher

  async function callStudent(sid){
    if(peers[sid]) return;
    const pc=new RTCPeerConnection(RTC);
    peers[sid]=pc;
    if(tStream) tStream.getTracks().forEach(t=>pc.addTrack(t,tStream));
    pc.onicecandidate=e=>{ if(e.candidate) db.ref('rtc/t2s_ice/'+sid).push(e.candidate.toJSON()); };
    pc.onconnectionstatechange=()=>{ if(['failed','closed','disconnected'].includes(pc.connectionState)){pc.close();delete peers[sid];} };
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    db.ref('rtc/t2s_offer/'+sid).set({sdp:offer.sdp,type:offer.type});
    db.ref('rtc/s2t_answer/'+sid).on('value',async snap=>{
      const a=snap.val();
      if(a&&pc.signalingState==='have-local-offer') await pc.setRemoteDescription(new RTCSessionDescription(a)).catch(()=>{});
    });
    db.ref('rtc/s2t_ice/'+sid).on('child_added',async snap=>{
      const ice=snap.val(); if(ice){try{await pc.addIceCandidate(new RTCIceCandidate(ice));}catch(e){} snap.ref.remove();}
    });
  }

  window.toggleMic=async function(){
    const btn=document.getElementById('micBtn');
    if(!micOn){
      try{
        tStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
        micOn=true; btn.classList.add('active'); btn.innerHTML='<i class="fas fa-microphone"></i>'; btn.title='إيقاف المايك';
        Object.keys(students).forEach(sid=>{ if(students[sid]&&students[sid].online) callStudent(sid); });
        db.ref('rtc/join_notify').on('child_added',snap=>{ const sid=snap.val(); if(sid&&micOn) callStudent(sid); snap.ref.remove(); });
      }catch(err){ alert('تعذر تشغيل المايك:\n'+err.message); }
    }else{
      micOn=false; btn.classList.remove('active'); btn.innerHTML='<i class="fas fa-microphone-slash"></i>'; btn.title='تشغيل المايك';
      if(tStream){tStream.getTracks().forEach(t=>t.stop());tStream=null;}
      Object.values(peers).forEach(pc=>pc.close()); Object.keys(peers).forEach(k=>delete peers[k]);
      db.ref('rtc/t2s_offer').remove(); db.ref('rtc/t2s_ice').remove();
    }
  };

  // استقبال صوت الطالب المصرح له
  db.ref('micPermissions').on('child_added', async snap=>{
    const sid=snap.key; if(!snap.val()?.allowed) return;
    if(stuPc){stuPc.close();stuPc=null;}
    const pc=new RTCPeerConnection(RTC); stuPc=pc;
    pc.ontrack=e=>{ const a=document.getElementById('audioEl'); a.srcObject=e.streams[0]; a.play().catch(()=>{}); };
    pc.onicecandidate=e=>{ if(e.candidate) db.ref('rtc/t2s_stu_ice/'+sid).push(e.candidate.toJSON()); };

    // انتظر offer من الطالب
    db.ref('rtc/s2t_stu_offer/'+sid).on('value',async snap2=>{
      const offer=snap2.val(); if(!offer||pc.signalingState!=='stable') return;
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const ans=await pc.createAnswer();
      await pc.setLocalDescription(ans);
      db.ref('rtc/t2s_stu_answer/'+sid).set({sdp:ans.sdp,type:ans.type});
    });
    db.ref('rtc/s2t_stu_ice/'+sid).on('child_added',async snap2=>{
      const ice=snap2.val(); if(ice){try{await pc.addIceCandidate(new RTCIceCandidate(ice));}catch(e){} snap2.ref.remove();}
    });
  });
  db.ref('micPermissions').on('child_removed',()=>{
    if(stuPc){stuPc.close();stuPc=null;}
    const a=document.getElementById('audioEl'); a.srcObject=null;
  });

  // ══════════════════════════════════════════════════════
  //  إنهاء / تصفير
  // ══════════════════════════════════════════════════════
  window.endClass=function(){ if(confirm('إنهاء الحصة؟')) window.location.reload(); };
  window.resetAll=function(){
    if(!confirm('سيتم حذف جميع بيانات الجلسة. متأكد؟')) return;
    if(tStream){tStream.getTracks().forEach(t=>t.stop());tStream=null;}
    Object.values(peers).forEach(pc=>pc.close());
    ['joinRequests','approvedStudents','onlineStudents','handRaised','micRequests','micPermissions',
     'studentImages','draw_t','draw_st','boardCmd','boardImg','boardImg_stu','correctedImg','rtc'].forEach(k=>db.ref(k).remove());
    students={}; waiting={}; images={}; currentSpeaker=null; currentBoard='main';
    switchToMainBoard(); render();
  };

  // Latency ping
  setInterval(()=>{
    const t=Date.now();
    db.ref('ping_t').set(t);
    setTimeout(()=>{ db.ref('ping_t').once('value',()=>{ document.getElementById('latency').textContent=(Date.now()-t)+'ms'; }); },500);
  },5000);
})();
</script>
</body>
</html>
