<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MyClass2 - المدرس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--bl:#3b82f6;--rd:#ef4444;--gn:#22c55e;--yw:#f59e0b;
      --dk:#0f172a;--cd:#1e293b;--br:#334155;--mt:#475569;--dim:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
html,body{height:100%;overflow:hidden;background:var(--dk);color:#fff}
/* HEADER */
.hdr{height:50px;background:var(--cd);border-bottom:2px solid var(--br);
     padding:0 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-size:20px;font-weight:900;color:var(--bl)}.logo b{color:#fff}
.hchips{display:flex;gap:8px;align-items:center}
.chip{background:var(--br);padding:4px 12px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px}
.livec{background:var(--rd);padding:4px 12px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:6px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
/* SHELL */
#wrap{height:calc(100vh - 50px);display:flex;flex-direction:column}
.body{flex:1;display:flex;overflow:hidden;min-height:0}
/* SIDEBAR */
.sidebar{width:215px;background:var(--cd);border-left:2px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.stitle{padding:10px 12px;font-size:11px;font-weight:700;color:var(--dim);border-bottom:1px solid var(--br)}
.slist{flex:1;overflow-y:auto;padding:5px}
.slist::-webkit-scrollbar{width:3px}.slist::-webkit-scrollbar-thumb{background:var(--br)}
.sitem{padding:7px 9px;border-radius:9px;margin-bottom:3px;border:1px solid transparent;transition:.15s}
.sitem:hover{background:var(--br)}
.sitem.act{background:rgba(59,130,246,.15);border-color:var(--bl)}
.sitem.spk{background:rgba(34,197,94,.1);border-color:var(--gn)}
.sitem.wait{background:rgba(245,158,11,.08);border-color:var(--yw)}
.sn{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-bottom:4px}
.sbadges{display:flex;align-items:center;gap:4px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--gn);flex-shrink:0}
/* MIC & EYE buttons on student row */
.icon-btn{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;
  font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.15s}
.mic-off{background:var(--br);color:var(--dim)}
.mic-wait{background:rgba(245,158,11,.25);color:var(--yw);animation:blink .8s infinite}
.mic-on{background:var(--gn);color:#fff}
.eye-btn{background:var(--br);color:var(--dim)}
.eye-btn.act{background:var(--bl);color:#fff}
.hand-ico{font-size:13px}
/* Redesigned student row */
.srow{display:flex;align-items:center;justify-content:space-between;gap:4px}
.sicons{display:flex;gap:3px;align-items:center;flex-shrink:0}
.ib{width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;
    font-size:12px;display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:.15s}
.mic-ib.mic-off{background:var(--br);color:var(--dim)}
.mic-ib.mic-off:hover{background:var(--mt);color:#fff}
.mic-ib.mic-wait{background:rgba(245,158,11,.25);color:var(--yw);animation:blink .8s infinite}
.mic-ib.mic-on{background:var(--gn);color:#fff}
.conn-ib{background:var(--br);cursor:default}
.kick-ib{background:rgba(239,68,68,.15);color:var(--rd)}
.kick-ib:hover{background:var(--rd);color:#fff}
.req-bar{margin-top:4px;padding:3px 6px;background:rgba(245,158,11,.1);border-radius:6px;
         font-size:10px;color:var(--yw);border:1px solid rgba(245,158,11,.3)}
/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.bwrap{flex:1;background:#fff;position:relative;overflow:hidden;min-height:0}
#mc{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair;display:block}
.blbl{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);color:#fff;
      padding:3px 10px;border-radius:12px;font-size:11px;pointer-events:none;z-index:5}
/* TOOLBAR */
.tbar{background:var(--cd);border-top:1px solid var(--br);padding:6px 10px;
      display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow-x:auto;flex-shrink:0}
.tsep{width:1px;height:32px;background:var(--br);flex-shrink:0}
.tg{display:flex;gap:3px;flex-shrink:0}
.tb{width:37px;height:37px;border-radius:8px;border:1px solid transparent;
    background:var(--br);color:var(--dim);cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.12s}
.tb:hover{background:var(--mt);color:#fff}.tb.on{background:var(--bl);color:#fff}
.tb.del{background:rgba(239,68,68,.15);color:var(--rd)}.tb.del:hover{background:var(--rd);color:#fff}
.clrs{display:flex;gap:4px;align-items:center;flex-shrink:0}
.cl{width:25px;height:25px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:.1s}
.cl.on{border-color:#fff;transform:scale(1.15)}
.szs{display:flex;gap:2px;align-items:center;background:var(--br);padding:3px 5px;border-radius:8px;flex-shrink:0}
.sz{border:none;background:transparent;cursor:pointer;padding:3px 4px;border-radius:5px;
    display:flex;align-items:center;justify-content:center}
.sz.on{background:var(--bl)}.sdot2{background:#fff;border-radius:50%}
/* TEACHER MIC (toolbar) */
.tmicw{display:flex;align-items:center;gap:7px;margin-right:auto;flex-shrink:0}
.tmiclbl{font-size:11px;color:var(--dim)}
.tmicbtn{width:37px;height:37px;border-radius:8px;border:none;
         background:var(--br);color:var(--dim);cursor:pointer;font-size:14px;
         display:flex;align-items:center;justify-content:center;transition:.15s}
.tmicbtn.on{background:var(--gn);color:#fff;box-shadow:0 0 0 3px rgba(34,197,94,.3)}
/* TOASTS */
#toasts{position:fixed;top:56px;left:50%;transform:translateX(-50%);
        z-index:600;display:flex;flex-direction:column;gap:7px;pointer-events:none;min-width:300px}
.toast{background:var(--cd);border:1px solid var(--br);border-radius:12px;
       padding:12px 16px;display:flex;align-items:center;gap:10px;
       pointer-events:all;box-shadow:0 8px 28px rgba(0,0,0,.45);animation:tin .3s ease}
@keyframes tin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.ticon{font-size:18px;flex-shrink:0}
.ttxt{flex:1;font-size:12px}.ttxt b{display:block;font-size:13px;margin-bottom:2px}
.tbtns{display:flex;gap:5px}
.tbtn{padding:5px 12px;border-radius:16px;border:none;font-size:12px;font-weight:700;
      cursor:pointer;font-family:'Cairo',sans-serif}
.tok{background:var(--gn);color:#fff}.tno{background:var(--br);color:var(--dim)}
/* STATUS */
.sbar{height:27px;background:var(--cd);border-top:1px solid var(--br);padding:0 12px;
      display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--dim);flex-shrink:0}
</style>
</head>
<body>
<div class="hdr">
  <div class="logo">My<b>Class</b>2</div>
  <div class="hchips">
    <div class="chip"><i class="fas fa-users"></i><span id="cnt">0</span></div>
    <div class="chip"><i class="fas fa-hand-paper" style="color:var(--yw)"></i><span id="hcnt">0</span></div>
    <div class="livec"><i class="fas fa-circle" style="font-size:8px"></i> مباشر</div>
  </div>
</div>
<div id="wrap">
  <div class="body">
    <!-- BOARD -->
    <div class="content">
      <div class="bwrap" id="bwrap">
        <canvas id="mc"></canvas>
        <div class="blbl" id="blbl">السبورة الرئيسية</div>
      </div>
      <div class="tbar" style="position:relative">
        <div class="tg">
          <button class="tb on" id="bpen" onclick="setTool('pen')"><i class="fas fa-pencil-alt"></i></button>
          <button class="tb" id="bera" onclick="setTool('eraser')"><i class="fas fa-eraser"></i></button>
        </div>
        <div class="tsep"></div>
        <div class="clrs">
          <div class="cl on" style="background:#1a1a1a" data-c="#1a1a1a" onclick="setClr(this)"></div>
          <div class="cl" style="background:#ef4444" data-c="#ef4444" onclick="setClr(this)"></div>
          <div class="cl" style="background:#3b82f6" data-c="#3b82f6" onclick="setClr(this)"></div>
          <div class="cl" style="background:#22c55e" data-c="#22c55e" onclick="setClr(this)"></div>
          <div class="cl" style="background:#f59e0b" data-c="#f59e0b" onclick="setClr(this)"></div>
          <div class="cl" style="background:#a855f7" data-c="#a855f7" onclick="setClr(this)"></div>
          <input type="color" style="width:25px;height:25px;border-radius:50%;border:2px solid #fff;cursor:pointer;padding:0;flex-shrink:0" oninput="penClr=this.value">
        </div>
        <div class="tsep"></div>
        <div class="szs">
          <button class="sz" onclick="setSz(2,this)"><div class="sdot2" style="width:4px;height:4px"></div></button>
          <button class="sz on" onclick="setSz(5,this)"><div class="sdot2" style="width:8px;height:8px"></div></button>
          <button class="sz" onclick="setSz(13,this)"><div class="sdot2" style="width:14px;height:14px"></div></button>
        </div>
        <div class="tsep"></div>
        <div class="tg">
          <button class="tb del" onclick="clearBoard()"><i class="fas fa-trash"></i></button>
        </div>
        <div class="tmicw">
          <span class="tmiclbl" id="spkLbl"></span>
          <button class="tmicbtn" id="tmicbtn" onclick="toggleTeacherMic()" title="ميكروفون المدرس">
            <i class="fas fa-microphone-slash" id="tmicico"></i>
          </button>
        </div>
      </div>
    </div>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="stitle"><i class="fas fa-users"></i> الطلاب</div>
      <div class="slist" id="slist">
        <div style="color:var(--dim);font-size:12px;text-align:center;padding:20px">لا يوجد طلاب بعد</div>
      </div>
    </div>
  </div>
  <div class="sbar">
    <span>⚡ <span id="lat">--</span>ms</span>
    <span id="viewlbl" style="color:var(--bl)"></span>
  </div>
</div>
<div id="toasts"></div>
<audio id="stuAudio" style="display:none"></audio>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
  authDomain:"myclaive.firebaseapp.com",
  databaseURL:"https://myclaive-default-rtdb.firebaseio.com",
  projectId:"myclaive",storageBucket:"myclaive.firebasestorage.app",
  messagingSenderId:"507299311714",
  appId:"1:507299311714:web:c90440ee4353cfac17613b"
});
const db = firebase.database();

// ── RESET ALL DATA ON LOAD ──────────────────────────────────────────────────
['joinRequests','approvedStudents','onlineStudents','handRaised',
 'micRequests','micPermissions','stroke','boardImg','boardCmd',
 'audio','stuAudio','audioMeta','teacher'
].forEach(p => db.ref(p).remove());

// ── STATE ───────────────────────────────────────────────────────────────────
const students = {}, micWaiting = new Set();
let curView = 'main', curSpeaker = null;
const snaps = {}, hist = {};
let penTool='pen', penClr='#1a1a1a', penSz=5;
let tMicOn=false, tStream=null, tRec=null;

// ── CANVAS ──────────────────────────────────────────────────────────────────
const CV = document.getElementById('mc');
const CX = CV.getContext('2d');

function fitCV(){
  const p=CV.parentElement, w=p.offsetWidth, h=p.offsetHeight;
  if(!w||!h) return;
  const s=(CV.width&&CV.height)?CX.getImageData(0,0,CV.width,CV.height):null;
  CV.width=w; CV.height=h;
  CX.fillStyle='#fff'; CX.fillRect(0,0,w,h);
  if(s) try{CX.putImageData(s,0,0);}catch(e){}
}
window.addEventListener('resize',()=>{saveSnap();fitCV();restoreSnap();});
setTimeout(fitCV,0);

function saveSnap(){ try{snaps[curView]=CX.getImageData(0,0,CV.width,CV.height);}catch(e){} }
function restoreSnap(){
  CX.fillStyle='#fff'; CX.fillRect(0,0,CV.width,CV.height);
  if(snaps[curView]) try{CX.putImageData(snaps[curView],0,0);}catch(e){}
}
function pushHist(){
  if(!hist[curView]) hist[curView]=[];
  const h=hist[curView]; if(h.length>=20) h.shift();
  try{h.push(CX.getImageData(0,0,CV.width,CV.height));}catch(e){}
}

// ===== بداية قسم الرسم (Drawing Section) =====================================
// دوال الرسم المحسّنة: ترسل نقاطاً فردية إلى Firebase بعد تطبيع الإحداثيات
let drawingEnhanced = false;
let lastXEnhanced = 0, lastYEnhanced = 0;

function getPosEnhanced(e) {
    const rect = CV.getBoundingClientRect();
    const scaleX = CV.width / rect.width;
    const scaleY = CV.height / rect.height;
    let clientX, clientY;
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function startDrawEnhanced(e) {
    e.preventDefault();
    drawingEnhanced = true;
    const pos = getPosEnhanced(e);
    lastXEnhanced = pos.x; lastYEnhanced = pos.y;
    CX.beginPath();
    CX.moveTo(pos.x, pos.y);
    // إرسال نقطة البداية (بداية السطر)
    sendPoint(pos.x, pos.y, true);
}

function drawEnhanced(e) {
    e.preventDefault();
    if (!drawingEnhanced) return;
    const pos = getPosEnhanced(e);

    if (penTool === 'eraser') {
        CX.globalCompositeOperation = 'destination-out';
        CX.lineWidth = penSz * 4;
    } else {
        CX.globalCompositeOperation = 'source-over';
        CX.strokeStyle = penClr;
        CX.lineWidth = penSz;
    }

    CX.lineTo(pos.x, pos.y);
    CX.stroke();
    CX.beginPath();
    CX.moveTo(pos.x, pos.y);

    sendPoint(pos.x, pos.y, false);

    lastXEnhanced = pos.x; lastYEnhanced = pos.y;
}

function stopDrawEnhanced() {
    if (!drawingEnhanced) return;
    drawingEnhanced = false;
    CX.beginPath();
    CX.globalCompositeOperation = 'source-over';
    pushHist(); saveSnap();
}

function sendPoint(x, y, isStart) {
    if (!CV.width || !CV.height) return;
    // تطبيع الإحداثيات (0-1) لتناسب جميع الأجهزة
    const normX = x / CV.width;
    const normY = y / CV.height;
    const normLastX = lastXEnhanced / CV.width;
    const normLastY = lastYEnhanced / CV.height;
    db.ref('teacherDrawings').push({
        x: normX, y: normY,
        lastX: normLastX, lastY: normLastY,
        color: penTool === 'eraser' ? 'eraser' : penClr,
        size: penTool === 'eraser' ? penSz * 4 : penSz,
        ts: Date.now()
    });
}

// ربط أحداث الرسم باللوحة
const bwrap = document.getElementById('bwrap');
bwrap.addEventListener('mousedown', startDrawEnhanced);
bwrap.addEventListener('mousemove', drawEnhanced);
bwrap.addEventListener('mouseup', stopDrawEnhanced);
bwrap.addEventListener('mouseleave', stopDrawEnhanced);
bwrap.addEventListener('touchstart', startDrawEnhanced, { passive: false });
bwrap.addEventListener('touchmove', drawEnhanced, { passive: false });
bwrap.addEventListener('touchend', stopDrawEnhanced);
bwrap.addEventListener('contextmenu', e => e.preventDefault());
// ===== نهاية قسم الرسم (End of Drawing Section) ==============================

// ── VIEW SWITCH ─────────────────────────────────────────────────────────────
function viewMain(){
  saveSnap(); curView='main'; restoreSnap();
  document.getElementById('blbl').textContent='السبورة الرئيسية';
  document.getElementById('viewlbl').textContent='';
  renderList();
}
function viewStudent(id){
  saveSnap(); curView=id; restoreSnap();
  const n=students[id]?.name||id;
  document.getElementById('blbl').innerHTML=
    `✏️ سبورة ${n} <span style="font-size:10px;background:rgba(59,130,246,.3);padding:1px 7px;border-radius:8px;margin-right:5px">يمكنك الكتابة</span>`;
  document.getElementById('viewlbl').textContent=`تعرض: ${n}`;
  renderList();
  // Load latest image from Firebase
  db.ref('boardImg/stu/'+id).once('value',snap=>{
    const d=snap.val();
    if(!d||!d.data||curView!==id) return;
    const img=new Image();
    img.onload=()=>{
      CX.fillStyle='#fff'; CX.fillRect(0,0,CV.width,CV.height);
      CX.drawImage(img,0,0,CV.width,CV.height); saveSnap();
    };
    img.src=d.data;
  });
}

// ── RECEIVE STUDENT STROKES ──────────────────────────────────────────────────
const offscr={};
function getOff(id){
  if(!offscr[id]){
    const c=document.createElement('canvas');
    c.width=CV.width||800;c.height=CV.height||500;
    const cx=c.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,c.width,c.height);
    offscr[id]={c,cx};
  }
  return offscr[id];
}
function applyStroke(ctx,d,W,H){
  ctx.save();
  if(d.t==='e'){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=d.w*W*4;}
  else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=d.c;ctx.lineWidth=d.w*W;}
  ctx.lineCap='round';ctx.lineJoin='round';
  let first=true;
  (d.b||[]).forEach(pt=>{
    const x=pt.x*W,y=pt.y*H;
    if(pt.s||first){ctx.beginPath();ctx.moveTo(x,y);first=false;}
    else{ctx.lineTo(x,y);ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);}
  });
  ctx.restore();
}
db.ref('stroke/S').on('child_added',snap=>{
  const d=snap.val(); if(!d||!d.b||!d.sid) return;
  const id=d.sid;
  if(id===curView){applyStroke(CX,d,CV.width,CV.height);saveSnap();}
  else{const o=getOff(id);applyStroke(o.cx,d,o.c.width,o.c.height);try{snaps[id]=o.cx.getImageData(0,0,o.c.width,o.c.height);}catch(e){}}
  snap.ref.remove();
});

// ── TOOL CONTROLS ─────────────────────────────────────────────────────────────
function setTool(t){penTool=t;document.getElementById('bpen').classList.toggle('on',t==='pen');document.getElementById('bera').classList.toggle('on',t==='eraser');CV.style.cursor=t==='eraser'?'cell':'crosshair';}
function setClr(el){penClr=el.dataset.c;document.querySelectorAll('.cl').forEach(c=>c.classList.remove('on'));el.classList.add('on');}
function setSz(s,btn){penSz=s;document.querySelectorAll('.sz').forEach(b=>b.classList.remove('on'));btn.classList.add('on');}
function clearBoard(){
  CX.fillStyle='#fff'; CX.fillRect(0,0,CV.width,CV.height);
  hist[curView]=[]; snaps[curView]=null;
  db.ref('teacherCommands').push({type:'clear',ts:Date.now()});
}

// ── STUDENT LIST ──────────────────────────────────────────────────────────────
function renderList(){
  const list=document.getElementById('slist');
  const arr=Object.values(students).filter(s=>s.online);
  document.getElementById('cnt').textContent=arr.length;
  document.getElementById('hcnt').textContent=arr.filter(s=>s.hand).length;
  if(!arr.length){list.innerHTML='<div style="color:var(--dim);font-size:12px;text-align:center;padding:20px">لا يوجد طلاب بعد</div>';return;}
  let html=`<div class="sitem ${curView==='main'?'act':''}" onclick="viewMain()" style="cursor:pointer;margin-bottom:6px"><span class="sn">🖥 السبورة الرئيسية</span></div>`;
  arr.forEach(s=>{
    const isSpk=curSpeaker===s.id, isWait=micWaiting.has(s.id);
    let cls=curView===s.id?'act':''; if(isSpk)cls+=' spk';else if(isWait)cls+=' wait';
    const micCls=isSpk?'mic-on':(isWait?'mic-wait':'mic-off');
    const micIco=isSpk?'fa-microphone-slash':(isWait?'fa-hourglass-half':'fa-microphone');
    const micTip=isSpk?'إلغاء الميكروفون':'منح الميكروفون';
    const eyeCls=curView===s.id?'act':'';
    html+=`<div class="sitem ${cls}" onclick="viewStudent('${s.id}')" style="cursor:pointer">
      <div class="srow">
        <span class="sn">${s.name}${s.hand?' ✋':''}</span>
        <div class="sicons">
          <button class="ib mic-ib ${micCls}" title="${micTip}" onclick="handleMicBtn('${s.id}',event)">
            <i class="fas ${micIco}"></i>
          </button>
          <div class="ib conn-ib" title="متصل"><i class="fas fa-circle" style="font-size:7px;color:var(--gn)"></i></div>
          <button class="ib kick-ib" title="طرد الطالب" onclick="kickStudent('${s.id}',event)">
            <i class="fas fa-user-times"></i>
          </button>
        </div>
      </div>
      ${isWait&&!isSpk?'<div class="req-bar"><i class="fas fa-microphone" style="font-size:9px"></i> يطلب الميكروفون — اضغط <i class="fas fa-microphone" style="font-size:9px"></i> للسماح</div>':''}
    </div>`;
  });
  list.innerHTML=html;
}

// ── KICK STUDENT ─────────────────────────────────────────────────────────────
function kickStudent(id,e){
  e.stopPropagation();
  if(!confirm('هل تريد طرد هذا الطالب؟')) return;
  if(curSpeaker===id){db.ref('micPermissions/'+id).remove();curSpeaker=null;}
  if(curView===id) viewMain();
  delete students[id];
  db.ref('approvedStudents/'+id).remove();
  db.ref('onlineStudents/'+id).remove();
  db.ref('kicked/'+id).set({ts:Date.now()});
  renderList();
}

// ── MIC BUTTON FOR STUDENT ────────────────────────────────────────────────────
function handleMicBtn(id,e){
  e.stopPropagation();
  if(curSpeaker===id){
    db.ref('micPermissions/'+id).remove();
    curSpeaker=null;
    document.getElementById('spkLbl').textContent='';
  } else {
    if(curSpeaker) db.ref('micPermissions/'+curSpeaker).remove();
    curSpeaker=id;
    micWaiting.delete(id);
    db.ref('micPermissions/'+id).set({allowed:true});
    db.ref('handRaised/'+id).remove();
    if(students[id]) students[id].hand=false;
    document.getElementById('spkLbl').textContent=students[id]?.name||'';
  }
  renderList();
}

// ── FIREBASE LISTENERS ────────────────────────────────────────────────────────
db.ref('joinRequests').on('child_added',async snap=>{
  const s=snap.val(); if(!s) return;
  snap.ref.remove();
  const ok=await toast(`${s.name} يريد الانضمام`,'طالب جديد','👤',['قبول','رفض'],'var(--bl)');
  if(ok===0){students[s.id]={id:s.id,name:s.name,online:true,hand:false};db.ref('approvedStudents/'+s.id).set({id:s.id,name:s.name});}
  renderList();
});

db.ref('onlineStudents').on('value',snap=>{
  const data=snap.val()||{};
  Object.keys(students).forEach(id=>{
    const was=students[id].online;
    students[id].online=!!data[id];
    if(was&&!data[id]){
      setTimeout(()=>{if(students[id]&&!students[id].online){if(curView===id)viewMain();delete students[id];db.ref('approvedStudents/'+id).remove();renderList();}},6000);
    }
  });
  renderList();
});

db.ref('handRaised').on('value',snap=>{
  const data=snap.val()||{};
  Object.keys(students).forEach(id=>{if(students[id])students[id].hand=!!data[id];});
  renderList();
});

db.ref('micRequests').on('child_added',async snap=>{
  const r=snap.val(); if(!r) return;
  snap.ref.remove();
  micWaiting.add(r.studentId); renderList();
  const ok=await toast(`${r.studentName} يريد التحدث`,'طلب ميكروفون','🎤',['سماح','رفض'],'var(--gn)');
  micWaiting.delete(r.studentId);
  if(ok===0) handleMicBtn(r.studentId,{stopPropagation:()=>{}});
  else renderList();
});

// Receive student audio
const stuAP=document.getElementById('stuAudio');
let stuLastTs=0;
db.ref('stuAudio/chunk').on('value',snap=>{
  const d=snap.val();
  if(!d||!d.data||d.ts<=stuLastTs) return;
  stuLastTs=d.ts;
  const blob=dataURLtoBlob(d.data);
  const url=URL.createObjectURL(blob);
  stuAP.src=url;
  stuAP.play().catch(()=>{});
  stuAP.onended=()=>URL.revokeObjectURL(url);
});
function dataURLtoBlob(dataURL){
  const arr=dataURL.split(','), mime=arr[0].match(/:(.*?);/)[1];
  const bstr=atob(arr[1]); let n=bstr.length;
  const u8=new Uint8Array(n);
  while(n--) u8[n]=bstr.charCodeAt(n);
  return new Blob([u8],{type:mime});
}

// ── TEACHER MICROPHONE ────────────────────────────────────────────────────────
async function toggleTeacherMic(){
  const btn=document.getElementById('tmicbtn'), ico=document.getElementById('tmicico');
  if(!tMicOn){
    try{
      tStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      tMicOn=true;
      btn.classList.add('on'); ico.className='fas fa-microphone';
      tRec=new MediaRecorder(tStream,{mimeType:'audio/webm'});
      tRec.ondataavailable=ev=>{
        if(ev.data.size<1) return;
        const fr=new FileReader();
        fr.onload=()=>db.ref('audio/chunk').set({data:fr.result,ts:Date.now()});
        fr.readAsDataURL(ev.data);
      };
      tRec.start(400);
      db.ref('audioMeta').set({active:true,ts:Date.now()});
      // Keep cycling to avoid large chunks
      const iv=setInterval(()=>{
        if(!tMicOn){clearInterval(iv);return;}
        if(tRec&&tRec.state==='recording'){tRec.stop();tRec.start(400);}
      },400);
    }catch(err){
      alert('تعذّر الوصول للميكروفون. تأكد من السماح بالإذن.');
    }
  } else {
    tMicOn=false;
    if(tStream) tStream.getTracks().forEach(t=>t.stop());
    if(tRec){try{tRec.stop();}catch(_){}}
    btn.classList.remove('on'); ico.className='fas fa-microphone-slash';
    db.ref('audioMeta').set({active:false,ts:Date.now()});
    document.getElementById('spkLbl').textContent='';
  }
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(title,sub,icon,btns,border){
  return new Promise(res=>{
    const box=document.getElementById('toasts'), el=document.createElement('div');
    el.className='toast'; el.style.borderRight=`3px solid ${border||'var(--br)'}`;
    el.innerHTML=`<div class="ticon">${icon}</div><div class="ttxt"><b>${title}</b>${sub}</div>
      <div class="tbtns">${btns.map((b,i)=>`<button class="tbtn ${i===0?'tok':'tno'}" data-i="${i}">${b}</button>`).join('')}</div>`;
    el.querySelectorAll('.tbtn').forEach(b=>b.onclick=()=>{el.remove();res(+b.dataset.i);});
    box.appendChild(el);
    setTimeout(()=>{if(el.parentNode){el.remove();res(-1);}},15000);
  });
}

setInterval(()=>{document.getElementById('lat').textContent=10+Math.floor(Math.random()*25);},3000);
