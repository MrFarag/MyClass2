.board-col{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ══ BOARD WRAP ══
   تملأ العرض الكامل المتاح.
   الارتفاع بنسبة 16:9 — إذا تجاوز الحاوية → سكرول عمودي.
   لا overflow-x — العرض يساوي عرض الحاوية دائماً. */
.board-wrap{
  flex:1;min-height:0;
  overflow-x:hidden;overflow-y:auto;
  background:#333;
  position:relative;
}
#cvMain,#cvOver{position:absolute;top:0;left:0;display:block}
#cvMain{background:#fff}
#cvOver{background:transparent;cursor:crosshair}
#imgLayer{position:absolute;top:0;left:0;pointer-events:none;z-index:5}
#cvOver{z-index:10}
#txtBox{position:absolute;display:none;z-index:20}

.tools{display:flex;gap:5px;background:#1a2e25;padding:4px 10px;border-radius:50px;border:1px solid #3a5a40;align-items:center;flex-shrink:0}
.ti{display:flex;flex-direction:column;align-items:center;color:#555;cursor:pointer;font-size:9px;transition:.2s;min-width:28px}
.ti i{font-size:17px;line-height:1.3;display:block;text-align:center}
.ti.on{color:#ffaa00}.ti:hover{color:#ccc}
.sep{width:1px;height:28px;background:#2a4a35;margin:0 2px;flex-shrink:0}
.dots{display:flex;gap:3px;align-items:center}
.dot{width:19px;height:19px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s;flex-shrink:0}
.dot.on{border-color:#fff;transform:scale(1.2)}
.sz-row{display:flex;align-items:center;gap:3px}
.sz-btn{width:20px;height:20px;border-radius:50%;background:#2a4a35;border:none;color:#ffaa00;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;line-height:1}
.sz-val{font-size:10px;color:#aaa;min-width:18px;text-align:center}
.acts{display:flex;gap:6px;flex-shrink:0;margin-right:auto}
.ab{width:42px;height:42px;border-radius:50%;border:none;background:#2a4a35;color:#fff;font-size:17px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}

.ulbl{background:#ffaa00;color:#000;padding:4px 10px;border-radius:30px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:700;font-size:11px;white-space:nowrap}
input[type=file]{display:none}

/* floating image */
.img-wrap{position:absolute;user-select:none;cursor:default;z-index:6}
.img-wrap::before{content:'';position:absolute;inset:-2px;border:1.5px dashed rgba(255,170,0,0);border-radius:3px;pointer-events:none;transition:border-color .2s}
.img-wrap:hover::before,.img-wrap.foc::before{border-color:rgba(255,170,0,.6)}
.img-wrap img{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}
.hnd{position:absolute;width:10px;height:10px;background:#ffaa00;border-radius:50%;opacity:0;transition:opacity .15s;pointer-events:auto;z-index:4}
.img-wrap:hover .hnd,.img-wrap.foc .hnd{opacity:1}
.hnd-nw{top:-5px;right:-5px;cursor:nw-resize}
.hnd-n{top:-5px;left:calc(50% - 5px);cursor:n-resize}
.hnd-ne{top:-5px;left:-5px;cursor:ne-resize}
.hnd-e{top:calc(50% - 5px);left:-5px;cursor:e-resize}
.hnd-se{bottom:-5px;left:-5px;cursor:se-resize}
.hnd-s{bottom:-5px;left:calc(50% - 5px);cursor:s-resize}
.hnd-sw{bottom:-5px;right:-5px;cursor:sw-resize}
.hnd-w{top:calc(50% - 5px);right:-5px;cursor:w-resize}
.img-ok,.img-del{position:absolute;top:-13px;width:22px;height:22px;border-radius:50%;border:none;color:#fff;font-size:11px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:5;line-height:1}
.img-ok{left:-13px;background:#4CAF50}
.img-del{right:-13px;background:#e53935}
.img-wrap.foc .img-ok,.img-wrap.foc .img-del{display:flex}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;z-index:3000}

.mcard{background:#1e3228;width:94%;height:92%;border-radius:20px;display:flex;flex-direction:column;border:2px solid #ffaa00;overflow:hidden}
.mhead{padding:10px 16px;background:#0f2a1f;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}

.mbody{flex:1;background:#f0f0f0;overflow:auto;display:flex;align-items:center;justify-content:center;min-height:0}

.mfoot{padding:8px 16px;background:#0f2a1f;display:flex;gap:8px;align-items:center;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}.blink{animation:blink 1s infinite}
</style>

<script>
(function(){'use strict';
firebase.initializeApp({apiKey:"AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",databaseURL:"https://myclaive-default-rtdb.firebaseio.com"});
const db=firebase.database();
const KEYS=['joinRequests','approvedStudents','onlineStudents','handRaised','micRequests','micPermissions','studentImages','hw_uploads','draw_t','draw_st','boardCmd','boardImg_stu','correctedImg','rtc','teacher_draw','boardSnap','sessionStart'];

/* SESSION TIMER — يبدأ فوراً بغض النظر عن المسح */
const sessionStart=Date.now();

/* امسح كل البيانات القديمة أولاً، ثم اضبط sessionStart */
Promise.all(KEYS.map(k=>db.ref(k).remove())).then(()=>{
  db.ref('sessionStart').set(sessionStart);
  startListeners(); /* سجّل المستمعات بعد اكتمال المسح فقط */
});
setInterval(()=>{
  const s=Math.floor((Date.now()-sessionStart)/1000);
  document.getElementById('sessionTimer').textContent=
    String(Math.floor(s/3600)).padStart(2,'0')+':'+
    String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+
    String(s%60).padStart(2,'0');
},1000);

const CW=1280,CH=720;
const cvMain=document.getElementById('cvMain');
const cvOver=document.getElementById('cvOver');
const ctx=cvMain.getContext('2d');
const ovCtx=cvOver.getContext('2d');
cvMain.width=cvOver.width=CW;
cvMain.height=cvOver.height=CH;
ctx.fillStyle='#fff';ctx.fillRect(0,0,CW,CH);

/* UNDO/REDO */
const UST=[],RST=[],MH=30;
function saveState(){UST.push(cvMain.toDataURL('image/jpeg',.85));if(UST.length>MH)UST.shift();RST.length=0;updUR();}
function updUR(){document.getElementById('undoBtn').disabled=!UST.length;document.getElementById('redoBtn').disabled=!RST.length;}
window.undo=()=>{if(!UST.length)return;RST.push(cvMain.toDataURL('image/jpeg',.85));restCV(UST.pop());updUR();};
window.redo=()=>{if(!RST.length)return;UST.push(cvMain.toDataURL('image/jpeg',.85));restCV(RST.pop());updUR();};
function restCV(d){const i=new Image();i.onload=()=>{ctx.clearRect(0,0,CW,CH);ctx.drawImage(i,0,0,CW,CH);pushFinal();};i.src=d;}

/* ══ SCALE — fill width, scroll height ══ */
let scale=1;
const bWrap=document.getElementById('bWrap');

function applyScale(s){
  s=Math.max(.05,Math.min(5,s));scale=s;
  const W=Math.round(CW*s),H=Math.round(CH*s);
  cvMain.style.width=cvOver.style.width=W+'px';
  cvMain.style.height=cvOver.style.height=H+'px';
  document.getElementById('imgLayer').style.width=W+'px';
  document.getElementById('imgLayer').style.height=H+'px';
  bWrap.style.minHeight=H+'px';
  document.getElementById('zv').textContent=Math.round(s*100)+'%';
}
function fit(){
  const W=bWrap.clientWidth||(window.innerWidth-160);
  applyScale(W/CW);
}
window.Z=d=>applyScale(scale+d);
window.fit=fit;
setTimeout(fit,100);
window.addEventListener('resize',()=>setTimeout(fit,80));

function getXY(e){
  const r=cvOver.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*(CW/r.width),y:(src.clientY-r.top)*(CH/r.height)};
}

let tool='pen',clr='#000',sz=4;
let isDown=false,ox=0,oy=0,ex=0,ey=0,pts=[],ptimer=null,strokeId=0,lastSnapAt=0;
let students={},waiting={},images={};
let currentSpeaker=null,currentBoard='main';
let lastMainSnap=null,lastStuSnap={};
/* map: studentId → Firebase off() cleanup */
const stuListeners={};

window.adjSz=d=>{sz=Math.max(1,Math.min(40,sz+d));document.getElementById('szV').textContent=sz;};
window.setClr=(c,el)=>{clr=c;document.querySelectorAll('.dot').forEach(d=>d.classList.remove('on'));el.classList.add('on');};
window.setTool=t=>{
  tool=t;
  ['Pen','Era','Line','Rect','Circ','Arr','Txt'].forEach(n=>{const e=document.getElementById('ti'+n);if(e)e.classList.remove('on');});
  const m={pen:'tiPen',era:'tiEra',line:'tiLine',rect:'tiRect',circ:'tiCirc',arr:'tiArr',txt:'tiTxt'};
  if(m[t])document.getElementById(m[t]).classList.add('on');
  cvOver.style.cursor=t==='era'?'cell':t==='txt'?'text':'crosshair';
};

function drawShapeOn(c,t,x1,y1,x2,y2,color,lw){
  c.save();c.lineCap=c.lineJoin='round';c.strokeStyle=color;c.fillStyle=color;c.lineWidth=lw;
  if(t==='line'){c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();}
  else if(t==='rect'){c.beginPath();c.strokeRect(x1,y1,x2-x1,y2-y1);}
  else if(t==='circ'){const rx=Math.abs(x2-x1)/2,ry=Math.abs(y2-y1)/2;c.beginPath();c.ellipse(x1+(x2-x1)/2,y1+(y2-y1)/2,rx||1,ry||1,0,0,Math.PI*2);c.stroke();}
  else if(t==='arr'){
    const a=Math.atan2(y2-y1,x2-x1),hs=Math.max(14,lw*4);
    c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
    c.beginPath();c.moveTo(x2,y2);
    c.lineTo(x2-hs*Math.cos(a-.42),y2-hs*Math.sin(a-.42));
    c.lineTo(x2-hs*Math.cos(a+.42),y2-hs*Math.sin(a+.42));
    c.closePath();c.fill();
  }
  c.restore();
}

function pushSnap(q){
  const now=Date.now();if(now-lastSnapAt<80)return;lastSnapAt=now;
  const tmp=document.createElement('canvas');tmp.width=CW;tmp.height=CH;
  const tc=tmp.getContext('2d');tc.drawImage(cvMain,0,0);tc.drawImage(cvOver,0,0);
  _send(tmp.toDataURL('image/jpeg',q||.72));
}
function pushFinal(){
  ovCtx.clearRect(0,0,CW,CH);lastSnapAt=Date.now();
  const d=cvMain.toDataURL('image/jpeg',.88);
  if(currentBoard==='main')lastMainSnap=d;
  _send(d);
}
function _send(d){
  const ts=Date.now();
  if(currentBoard!=='main')db.ref('teacher_draw/'+currentBoard).push({snap:d,ts});
  else db.ref('boardSnap').push({d,ts});
}

cvOver.addEventListener('mousedown',onDown);
cvOver.addEventListener('mousemove',onMove);
cvOver.addEventListener('mouseup',onUp);
cvOver.addEventListener('mouseleave',onUp);
cvOver.addEventListener('touchstart',onDown,{passive:false});
cvOver.addEventListener('touchmove',onMove,{passive:false});
cvOver.addEventListener('touchend',onUp);
cvOver.addEventListener('click',e=>{if(tool==='txt')openTxt(e);});

function onDown(e){
  e.preventDefault();if(tool==='txt')return;
  isDown=true;strokeId=Date.now();pts=[];
  const p=getXY(e);ox=ex=p.x;oy=ey=p.y;
  if(tool==='pen'||tool==='era'){ctx.lineCap=ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(ox,oy);}
}
function onMove(e){
  e.preventDefault();if(!isDown)return;
  const p=getXY(e);ex=p.x;ey=p.y;
  if(tool==='pen'){
    ctx.lineWidth=sz;ctx.strokeStyle=clr;ctx.lineCap=ctx.lineJoin='round';
    ctx.lineTo(ex,ey);ctx.stroke();ctx.beginPath();ctx.moveTo(ex,ey);
    pts.push({x:ex/CW,y:ey/CH});
    if(!ptimer)ptimer=setTimeout(flushPen,12);
  } else if(tool==='era'){
    ctx.lineWidth=sz*6;ctx.strokeStyle='#fff';ctx.lineCap=ctx.lineJoin='round';
    ctx.lineTo(ex,ey);ctx.stroke();ctx.beginPath();ctx.moveTo(ex,ey);
    pushSnap(.72);
  } else {
    ovCtx.clearRect(0,0,CW,CH);drawShapeOn(ovCtx,tool,ox,oy,ex,ey,clr,sz);pushSnap(.72);
  }
}
function onUp(e){
  if(!isDown)return;isDown=false;
  if(ptimer){clearTimeout(ptimer);ptimer=null;}
  if(tool==='pen'){saveState();flushPen();if(currentBoard==='main')lastMainSnap=cvMain.toDataURL('image/jpeg',.85);}
  else if(tool==='era'){saveState();pushFinal();}
  else if(tool!=='txt'){saveState();drawShapeOn(ctx,tool,ox,oy,ex,ey,clr,sz);pushFinal();}
}
function flushPen(){
  ptimer=null;if(!pts.length)return;
  const data={pts:pts.slice(),c:clr,s:sz,sid:strokeId,ts:Date.now()};
  if(currentBoard!=='main')db.ref('teacher_draw/'+currentBoard).push(data);
  else db.ref('draw_t').push(data);
  pts=[];
}

/* TEXT */
let txtPos=null;
function openTxt(e){
  const p=getXY(e);txtPos=p;
  const box=document.getElementById('txtBox');
  const inp=document.getElementById('txtInput');
  const ro=cvOver.getBoundingClientRect(),rw=bWrap.getBoundingClientRect();
  box.style.left=(ro.left-rw.left+bWrap.scrollLeft+p.x*scale)+'px';
  box.style.top =(ro.top -rw.top +bWrap.scrollTop +p.y*scale)+'px';
  inp.style.fontSize=Math.max(14,sz*3)+'px';inp.style.color=clr;inp.value='';
  box.style.display='block';inp.focus();
}
document.getElementById('txtInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    if(this.value.trim()&&txtPos){
      saveState();
      ctx.font='bold '+Math.max(14,sz*3)+'px Cairo';ctx.fillStyle=clr;ctx.fillText(this.value.trim(),txtPos.x,txtPos.y);
      pushFinal();
    }
    document.getElementById('txtBox').style.display='none';
  }
  if(e.key==='Escape')document.getElementById('txtBox').style.display='none';
});

/* STUDENT STROKES on student-board view */
const stuLP={};
db.ref('draw_st').on('child_added',snap=>{
  const d=snap.val();
  if(!d||!d.pts||!d.studentId||currentBoard!==d.studentId)return;
  ctx.lineWidth=d.c?(d.s||4):(d.s||4)*6;
  ctx.strokeStyle=d.c||'#fff';ctx.lineCap=ctx.lineJoin='round';
  const key=d.studentId;
  ctx.beginPath();
  if(stuLP[key]&&d.sid===stuLP[key].sid)ctx.moveTo(stuLP[key].x,stuLP[key].y);
  else ctx.moveTo(d.pts[0].x*CW,d.pts[0].y*CH);
  d.pts.forEach(p=>ctx.lineTo(p.x*CW,p.y*CH));ctx.stroke();
  const last=d.pts[d.pts.length-1];stuLP[key]={x:last.x*CW,y:last.y*CH,sid:d.sid};
});

/* FLOATING IMAGE (teacher adds to own board) */
let focW=null,allWrps=[];
window.addImg=function(input){
  if(!input.files[0])return;
  const fr=new FileReader();fr.onload=ev=>_addMovable(ev.target.result);
  fr.readAsDataURL(input.files[0]);input.value='';
};
function _addMovable(src){
  const layer=document.getElementById('imgLayer');
  const wrap=document.createElement('div');wrap.className='img-wrap';
  wrap.style.cssText='left:60px;top:40px;width:320px;height:220px;';
  const img=document.createElement('img');img.src=src;
  img.style.cssText='pointer-events:auto;cursor:move;width:100%;height:100%;display:block;';
  const HNDS=[
    {cls:'hnd-nw',ax:0,ay:0},{cls:'hnd-n',ax:.5,ay:0},{cls:'hnd-ne',ax:1,ay:0},
    {cls:'hnd-e',ax:1,ay:.5},{cls:'hnd-se',ax:1,ay:1},{cls:'hnd-s',ax:.5,ay:1},
    {cls:'hnd-sw',ax:0,ay:1},{cls:'hnd-w',ax:0,ay:.5}
  ];
  const hNodes={};
  HNDS.forEach(({cls})=>{const h=document.createElement('div');h.className='hnd '+cls;hNodes[cls]=h;wrap.appendChild(h);});
  const bOk=document.createElement('button');bOk.className='img-ok';bOk.innerHTML='<i class="fas fa-check"></i>';bOk.title='دمج في السبورة';
  const bDel=document.createElement('button');bDel.className='img-del';bDel.innerHTML='<i class="fas fa-times"></i>';bDel.title='حذف';
  wrap.appendChild(img);wrap.appendChild(bOk);wrap.appendChild(bDel);
  layer.appendChild(wrap);allWrps.push(wrap);focWrap(wrap);
  img.addEventListener('mousedown',ev=>{
    if(ev.button!==0)return;ev.stopPropagation();ev.preventDefault();focWrap(wrap);
    const x0=ev.clientX,y0=ev.clientY,l0=parseFloat(wrap.style.left)||0,t0=parseFloat(wrap.style.top)||0;
    const mm=ev2=>{wrap.style.left=(l0+(ev2.clientX-x0)/scale)+'px';wrap.style.top=(t0+(ev2.clientY-y0)/scale)+'px';};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
  HNDS.forEach(({cls,ax,ay})=>{
    hNodes[cls].addEventListener('mousedown',ev=>{
      ev.stopPropagation();ev.preventDefault();focWrap(wrap);
      const x0=ev.clientX,y0=ev.clientY;
      const l0=parseFloat(wrap.style.left)||0,t0=parseFloat(wrap.style.top)||0;
      const w0=parseFloat(wrap.style.width)||320,h0=parseFloat(wrap.style.height)||220;
      const mm=ev2=>{
        const dx=(ev2.clientX-x0)/scale,dy=(ev2.clientY-y0)/scale;
        let nl=l0,nt=t0,nw=w0,nh=h0;
        if(ax===0){nl=l0+dx;nw=Math.max(40,w0-dx);}else if(ax===1){nw=Math.max(40,w0+dx);}
        if(ay===0){nt=t0+dy;nh=Math.max(30,h0-dy);}else if(ay===1){nh=Math.max(30,h0+dy);}
        if(ax!==.5&&ay!==.5){nh=nw*(h0/w0);}
        wrap.style.left=nl+'px';wrap.style.top=nt+'px';wrap.style.width=nw+'px';wrap.style.height=nh+'px';
      };
      const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
      document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    });
  });
  bOk.addEventListener('click',()=>{
    saveState();
    const i2=new Image();i2.onload=()=>{
      ctx.drawImage(i2,parseFloat(wrap.style.left)||0,parseFloat(wrap.style.top)||0,parseFloat(wrap.style.width)||320,parseFloat(wrap.style.height)||220);
      pushFinal();
    };i2.src=src;rmWrap(wrap);
  });
  bDel.addEventListener('click',()=>rmWrap(wrap));
  document.addEventListener('mousedown',ev2=>{if(!wrap.contains(ev2.target))wrap.classList.remove('foc');},{capture:true});
}
function focWrap(w){if(focW&&focW!==w)focW.classList.remove('foc');focW=w;w.classList.add('foc');}
function rmWrap(w){const l=document.getElementById('imgLayer');if(l.contains(w))l.removeChild(w);const i=allWrps.indexOf(w);if(i>-1)allWrps.splice(i,1);if(focW===w)focW=null;}

/* BOARD COMMANDS */
window.clearB=()=>{saveState();ctx.fillStyle='#fff';ctx.fillRect(0,0,CW,CH);ovCtx.clearRect(0,0,CW,CH);db.ref('boardCmd').push({type:'clear',ts:Date.now()});lastMainSnap=null;};
window.saveB=()=>{const a=document.createElement('a');a.download='board.png';a.href=cvMain.toDataURL();a.click();};
window.goFS=()=>{document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();};
function loadOnCanvas(url){
  if(!url){ctx.fillStyle='#fff';ctx.fillRect(0,0,CW,CH);return;}
  const i=new Image();i.onload=()=>{ctx.clearRect(0,0,CW,CH);ctx.drawImage(i,0,0,CW,CH);};i.src=url;
}
window.mainBoard=()=>{
  currentBoard='main';
  document.getElementById('bTitle').textContent='السبورة الرئيسية';
  loadOnCanvas(lastMainSnap);
  db.ref('boardCmd').push({type:'teacher_returned_main',ts:Date.now()});
};
window.viewStuBoard=(sid,name)=>{
  currentBoard=sid;
  document.getElementById('bTitle').innerHTML=
    `سبورة ${name} <button onclick="shareBoard('${sid}','${name}')" style="background:#ffaa00;color:#000;border:none;padding:2px 10px;border-radius:12px;font-size:10px;cursor:pointer;font-family:Cairo,sans-serif;margin-right:6px"><i class="fas fa-share-alt"></i> مشاركة</button>`;
  loadOnCanvas(lastStuSnap[sid]||null);
};
window.shareBoard=(sid,name)=>{
  if(!lastStuSnap[sid]){alert('لا توجد صورة بعد.');return;}
  db.ref('boardCmd').push({type:'show_stu_board',studentId:sid,studentName:name,data:lastStuSnap[sid],ts:Date.now()});
};

function _onStuImg(sid, val){
  if(!val||!val.data) return;
  lastStuSnap[sid]=val.data;
  if(currentBoard===sid) loadOnCanvas(val.data);
  render();
}
function listenToStudent(sid){
  if(stuListeners[sid]) return;
  const ref=db.ref('boardImg_stu/'+sid);
  ref.on('value', snap=>{ if(snap.val()?.data) _onStuImg(sid, snap.val()); });
  stuListeners[sid]=ref;
}

/* STUDENTS */
function render(){
  let h='';
  Object.values(waiting).forEach(s=>{
    h+=`<div class="si" style="border-color:#f39c12">
      <div class="av" style="background:#f39c12">${s.name[0]}</div>
      <div class="sinfo"><div class="sname">${s.name}</div><div class="sstatus blink">⏳ انتظار</div></div>
      <div class="sact">
        <i class="fas fa-check-circle" style="color:#4CAF50" onclick="approveS('${s.id}')"></i>
        <i class="fas fa-times-circle" style="color:#b71c1c" onclick="rejectS('${s.id}')"></i>
      </div></div>`;
  });
  Object.values(students).forEach(s=>{
    if(!s.online)return;
    const spk=currentSpeaker===s.id,hand=s.handRaised;
    h+=`<div class="si">
      <div class="av" style="background:${hand?'#f59e0b':'#ffaa00'}">${s.name[0]}</div>
      <div class="sinfo"><div class="sname">${s.name}</div><div class="sstatus">${hand?'✋ يد':spk?'🎙️':'🎧'}</div></div>
      <div class="sact">
        ${images[s.id]?.length?`<i class="fas fa-image" onclick="openCorr('${s.id}','${s.name}')"></i>`:''}
        <i class="fas fa-eye" onclick="viewStuBoard('${s.id}','${s.name}')"></i>
        ${lastStuSnap[s.id]?`<i class="fas fa-share-alt" style="color:#4CAF50" onclick="shareBoard('${s.id}','${s.name}')"></i>`:''}
        ${spk?`<i class="fas fa-microphone-slash" style="color:#e53935" onclick="revokeMic('${s.id}')"></i>`:''}
        <i class="fas fa-sign-out-alt" style="color:#b71c1c" onclick="kickS('${s.id}')"></i>
      </div></div>`;
  });
  document.getElementById('sList').innerHTML=h||'<div style="color:#aaa;text-align:center;padding:12px;font-size:11px">لا يوجد طلاب</div>';
  const n=Object.values(students).filter(s=>s.online).length;
  document.getElementById('cnt').textContent=n;document.getElementById('cntP').textContent=n;
}

function startListeners(){
db.ref('joinRequests').on('child_added',snap=>{const s=snap.val();if(s){waiting[s.id]=s;render();}});
db.ref('joinRequests').on('child_removed',snap=>{const s=snap.val();if(s){delete waiting[s.id];render();}});
db.ref('approvedStudents').on('value',snap=>{
  students=snap.val()||{};
  Object.keys(students).forEach(sid=>listenToStudent(sid));
  render();
});
db.ref('onlineStudents').on('value',snap=>{
  const o=snap.val()||{};
  Object.keys(students).forEach(id=>{if(students[id])students[id].online=!!o[id];});
  render();
});
db.ref('handRaised').on('value',snap=>{
  const h=snap.val()||{};
  Object.keys(students).forEach(id=>{if(students[id])students[id].handRaised=!!h[id];});
  render();
});
db.ref('micRequests').on('child_added',snap=>{
  const req=snap.val();if(!req)return;
  const name=(students[req.studentId]?.name)||'طالب';
  if(confirm(`"${name}" يريد التحدث. تسمح؟`)){
    if(currentSpeaker)db.ref('micPermissions/'+currentSpeaker).remove();
    currentSpeaker=req.studentId;
    db.ref('micPermissions/'+req.studentId).set({allowed:true,ts:Date.now()});
    db.ref('handRaised/'+req.studentId).remove();
  }
  snap.ref.remove();render();
});
/* hw_uploads: push() → child_added مضمون */
db.ref('hw_uploads').on('child_added',snap=>{
  const img=snap.val(); if(!img?.studentId||!img?.data) return;
  if(!images[img.studentId]) images[img.studentId]=[];
  images[img.studentId].push(img);
  lastStuSnap[img.studentId]=img.data;
  if(currentBoard===img.studentId) loadOnCanvas(img.data);
  listenToStudent(img.studentId);
  render();
});
/* boardImg_stu: live preview */
db.ref('boardImg_stu').on('child_added',   s=>{if(s.val()?.data)_onStuImg(s.key,s.val());});
db.ref('boardImg_stu').on('child_changed', s=>{if(s.val()?.data)_onStuImg(s.key,s.val());});
} /* نهاية startListeners() */

window.approveS=id=>{
  const s=waiting[id];if(!s)return;delete waiting[id];
  db.ref('approvedStudents/'+id).set({id,name:s.name});
  db.ref('joinRequests/'+id).remove();
  listenToStudent(id); /* ابدأ الاستماع فور القبول */
  render();
};
window.rejectS=id=>{delete waiting[id];db.ref('joinRequests/'+id).remove();render();};
window.kickS=id=>{
  if(currentSpeaker===id){currentSpeaker=null;db.ref('micPermissions/'+id).remove();}
  /* إيقاف الاستماع */
  if(stuListeners[id]){stuListeners[id].off();delete stuListeners[id];}
  delete students[id];delete lastStuSnap[id];
  db.ref('approvedStudents/'+id).remove();db.ref('onlineStudents/'+id).remove();render();
};
window.revokeMic=id=>{currentSpeaker=null;db.ref('micPermissions/'+id).remove();render();};

/* CORRECTION */
let corrId=null;
window.openCorr=(sid,name)=>{
  const imgs=images[sid];if(!imgs?.length)return;corrId=sid;
  document.getElementById('corrTitle').textContent='واجب '+name;
  const w=document.getElementById('corrImgWrap');w.innerHTML='';
  const i=document.createElement('img');i.src=imgs[imgs.length-1].data;w.appendChild(i);
  document.getElementById('corrModal').classList.add('on');
};
window.closeCorr=()=>document.getElementById('corrModal').classList.remove('on');
window.sendCorr=()=>{
  if(!corrId)return;const imgs=images[corrId];if(!imgs?.length)return;
  db.ref('correctedImg/'+corrId).set({data:imgs[imgs.length-1].data,ts:Date.now()});
  alert('✅ تم الإرسال');closeCorr();
};

/* WebRTC */
const RTC={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
const AUD={audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,sampleRate:48000},video:false};
let tStream=null,micOn=false;const peers={};let stuPc=null;
async function callStu(sid){
  if(peers[sid]?.connectionState==='connected')return;
  if(peers[sid]){peers[sid].close();delete peers[sid];}
  const pc=new RTCPeerConnection(RTC);peers[sid]=pc;
  if(tStream)tStream.getTracks().forEach(t=>pc.addTrack(t,tStream));
  pc.onicecandidate=e=>{if(e.candidate)db.ref('rtc/t2s_ice/'+sid).push(e.candidate.toJSON());};
  pc.onconnectionstatechange=()=>{if(['failed','closed','disconnected'].includes(pc.connectionState)){pc.close();delete peers[sid];setTimeout(()=>{if(micOn&&students[sid]?.online)callStu(sid);},2000);}};
  const off=await pc.createOffer();off.sdp=off.sdp.replace('useinbandfec=1','useinbandfec=1;maxaveragebitrate=128000');
  await pc.setLocalDescription(off);db.ref('rtc/t2s_offer/'+sid).set({sdp:off.sdp,type:off.type});
  db.ref('rtc/s2t_answer/'+sid).on('value',async s=>{const a=s.val();if(a&&pc.signalingState==='have-local-offer')await pc.setRemoteDescription(new RTCSessionDescription(a)).catch(()=>{});});
  db.ref('rtc/s2t_ice/'+sid).on('child_added',async s=>{const c=s.val();if(c){try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(_){}s.ref.remove();}});
}
window.toggleMic=async()=>{
  const btn=document.getElementById('micBtn');
  if(!micOn){
    try{
      tStream=await navigator.mediaDevices.getUserMedia(AUD);micOn=true;
      btn.classList.add('on');btn.innerHTML='<i class="fas fa-microphone"></i>';
      Object.keys(students).forEach(sid=>{if(students[sid]?.online)callStu(sid);});
      db.ref('rtc/join_notify').on('child_added',s=>{const sid=s.val();if(sid&&micOn)callStu(sid);s.ref.remove();});
    }catch(err){alert('خطأ: '+err.message);}
  } else {
    micOn=false;btn.classList.remove('on');btn.innerHTML='<i class="fas fa-microphone-slash"></i>';
    if(tStream){tStream.getTracks().forEach(t=>t.stop());tStream=null;}
    Object.values(peers).forEach(p=>p.close());Object.keys(peers).forEach(k=>delete peers[k]);
    db.ref('rtc/t2s_offer').remove();db.ref('rtc/t2s_ice').remove();
  }
};
db.ref('micPermissions').on('child_added',async snap=>{
  const sid=snap.key;if(!snap.val()?.allowed)return;if(stuPc){stuPc.close();stuPc=null;}
  const pc=new RTCPeerConnection(RTC);stuPc=pc;
  pc.ontrack=e=>{const a=document.getElementById('audioEl');a.srcObject=e.streams[0];a.play().catch(()=>{});};
  pc.onicecandidate=e=>{if(e.candidate)db.ref('rtc/t2s_stu_ice/'+sid).push(e.candidate.toJSON());};
  db.ref('rtc/s2t_stu_offer/'+sid).on('value',async s2=>{
    const off=s2.val();if(!off||pc.signalingState!=='stable')return;
    await pc.setRemoteDescription(new RTCSessionDescription(off));
    const ans=await pc.createAnswer();await pc.setLocalDescription(ans);
    db.ref('rtc/t2s_stu_answer/'+sid).set({sdp:ans.sdp,type:ans.type});
  });
  db.ref('rtc/s2t_stu_ice/'+sid).on('child_added',async s2=>{const c=s2.val();if(c){try{await pc.addIceCandidate(new RTCIceCandidate(c));}catch(_){}s2.ref.remove();}});
});
db.ref('micPermissions').on('child_removed',()=>{if(stuPc){stuPc.close();stuPc=null;}document.getElementById('audioEl').srcObject=null;});

window.endClass=()=>{if(confirm('إنهاء الحصة؟'))window.location.reload();};
window.resetAll=()=>{
  if(!confirm('حذف كل البيانات؟'))return;
  if(tStream){tStream.getTracks().forEach(t=>t.stop());tStream=null;}
  Object.values(peers).forEach(p=>p.close());
  Object.values(stuListeners).forEach(r=>r.off());
  Object.keys(stuListeners).forEach(k=>delete stuListeners[k]);
  Promise.all(KEYS.map(k=>db.ref(k).remove())).then(()=>{
    db.ref('sessionStart').set(sessionStart);
    startListeners();
  });
  students={};waiting={};images={};currentSpeaker=null;currentBoard='main';
  UST.length=0;RST.length=0;updUR();mainBoard();render();
};
setInterval(()=>{
  const t=Date.now();db.ref('ping_t').set(t);
  setTimeout(()=>db.ref('ping_t').once('value',()=>{document.getElementById('lat').textContent=(Date.now()-t)+'ms';}),600);
},7000);
})();
</script>
