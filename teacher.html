<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المدرس - MyClass2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: Arial; display: flex; flex-direction: column; height: 100vh; background: #333; color: white; }
        header { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        canvas { flex: 1; background: white; touch-action: none; width: 100%; height: 100%; }
        .toolbar { background: #444; padding: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 12px; background: #666; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button.active { background: #f90; }
        #studentsList { background: #222; padding: 5px; max-height: 100px; overflow-y: auto; }
        .student-item { display: flex; justify-content: space-between; padding: 3px; margin: 2px; background: #333; border-radius: 3px; }
        .student-item button { background: #0a0; padding: 2px 8px; }
    </style>
</head>
<body>
    <header>
        <span><i class="fas fa-chalkboard-teacher"></i> المدرس</span>
        <span id="onlineCount">0 طالب</span>
    </header>

    <canvas id="board"></canvas>

    <div class="toolbar">
        <button id="penBtn" class="active" onclick="setPen()"><i class="fas fa-pencil-alt"></i> قلم</button>
        <button id="eraserBtn" onclick="setEraser()"><i class="fas fa-eraser"></i> ممحاة</button>
        <button onclick="clearBoard()"><i class="fas fa-trash"></i> مسح</button>
        <button id="audioBtn" onclick="toggleAudio()"><i class="fas fa-microphone"></i> ميكروفون</button>
    </div>

    <div id="studentsList">
        <!-- طلبات الانضمام تظهر هنا -->
    </div>

    <!-- Firebase & PeerJS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // ===== إعدادات Firebase (ثابتة) =====
        const firebaseConfig = {
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== عناصر الرسم =====
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 150;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        let drawing = false;
        let lastX = 0, lastY = 0;
        let currentTool = 'pen';
        let currentColor = '#000';
        let currentSize = 3;

        // ===== نظام الرسم القديم (بدون تعقيدات) =====
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e);
            
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = 20;
                ctx.strokeStyle = 'rgba(0,0,0,1)';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
            }

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            // إرسال الرسم إلى Firebase
            db.ref('teacherDrawings').push({
                x: pos.x, y: pos.y,
                lastX: lastX, lastY: lastY,
                color: currentTool === 'eraser' ? 'eraser' : currentColor,
                size: currentTool === 'eraser' ? 20 : currentSize,
                timestamp: Date.now()
            });

            lastX = pos.x; lastY = pos.y;
        }

        function stopDraw() {
            drawing = false;
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);

        // ===== أدوات الرسم =====
        window.setPen = () => {
            currentTool = 'pen';
            document.getElementById('penBtn').classList.add('active');
            document.getElementById('eraserBtn').classList.remove('active');
        };

        window.setEraser = () => {
            currentTool = 'eraser';
            document.getElementById('eraserBtn').classList.add('active');
            document.getElementById('penBtn').classList.remove('active');
        };

        window.clearBoard = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            db.ref('teacherCommands').push({ type: 'clear' });
        };

        // ===== نظام الموافقة على الطلاب =====
        const studentsList = document.getElementById('studentsList');
        db.ref('joinRequests').on('child_added', (snap) => {
            const req = snap.val();
            const div = document.createElement('div');
            div.className = 'student-item';
            div.id = 'req_' + snap.key;
            div.innerHTML = `
                <span>${req.studentName} (طلب دخول)</span>
                <button onclick="acceptStudent('${snap.key}', '${req.studentId}')">قبول</button>
            `;
            studentsList.appendChild(div);
        });

        window.acceptStudent = (reqId, studentId) => {
            db.ref('acceptedStudents/' + studentId).set(true);
            db.ref('joinRequests/' + reqId).remove();
            document.getElementById('req_' + reqId).remove();
        };

        db.ref('acceptedStudents').on('value', (snap) => {
            const count = snap.val() ? Object.keys(snap.val()).length : 0;
            document.getElementById('onlineCount').innerText = count + ' طالب';
        });

        // ===== نظام الصوت (PeerJS) =====
        let localStream, peer;
        peer = new Peer('teacher_' + Date.now());
        peer.on('open', (id) => {
            db.ref('teacherAudioId').set(id);
        });

        window.toggleAudio = async () => {
            const btn = document.getElementById('audioBtn');
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.innerHTML = '<i class="fas fa-microphone-slash"></i> إيقاف';
                    btn.style.background = '#f00';
                    db.ref('teacherAudioActive').set(true);
                } catch (err) {
                    alert('لا يمكن الوصول للميكروفون');
                }
            } else {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                btn.innerHTML = '<i class="fas fa-microphone"></i> ميكروفون';
                btn.style.background = '#666';
                db.ref('teacherAudioActive').set(false);
            }
        };

        // ===== الاستماع لطلبات الميكروفون من الطلاب (اختياري) =====
        db.ref('micRequests').on('child_added', (snap) => {
            const req = snap.val();
            if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
                db.ref('micPermissions/' + req.studentId).set({ allowed: true });
            }
            snap.ref.remove();
        });
    </script>
</body>
</html>
