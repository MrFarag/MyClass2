<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - المدرس</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #1a2e25;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* الشريط العلوي (مطابق للصورة) */
    .top-bar {
      height: 70px;
      background: linear-gradient(90deg, #0f2a1f 0%, #1e3a2a 100%);
      border-bottom: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .teacher-info {
      display: flex;
      flex-direction: column;
    }
    .teacher-name {
      font-size: 18px;
      font-weight: 900;
      color: #ffaa00;
    }
    .teacher-desc {
      font-size: 12px;
      color: #ccc;
    }
    .teacher-phone {
      font-size: 14px;
      color: #ffaa00;
      direction: ltr;
    }
    .logo-top {
      font-size: 24px;
      font-weight: 900;
      color: #ffaa00;
    }
    .logo-top span { color: #fff; }
    .top-center {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0,0,0,0.3);
      padding: 4px 20px;
      border-radius: 30px;
    }
    .top-center span { font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .top-center i { color: #ffaa00; }

    /* التخطيط الرئيسي */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }

    /* الشريط الجانبي الأيسر (أيقونات التنقل) */
    .left-sidebar {
      width: 70px;
      background: #1e3228;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 20px;
      border: 1px solid #3a5a40;
    }
    .nav-item {
      width: 50px;
      height: 50px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      color: #aaa;
      font-size: 10px;
    }
    .nav-item i { font-size: 22px; }
    .nav-item.active { background: #ffaa00; color: #000; }

    /* لوحة الطلاب (يسار) - بدون السبورة اليسرى */
    .students-panels {
      width: 340px;
      background: #1e3228;
      border-radius: 24px;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #3a5a40;
    }
    .student-panel {
      background: #1e3228;
      border-radius: 16px;
      border: 1px solid #2a4a30;
      overflow: hidden;
    }
    .student-panel-header {
      background: #1a2e25;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #ffaa00;
    }
    .student-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ffaa00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }
    .student-info { flex: 1; }
    .student-name { font-weight: 700; font-size: 13px; }
    .student-status { font-size: 10px; color: #ccc; display: flex; align-items: center; gap: 4px; }
    .student-actions {
      display: flex;
      gap: 12px;
      color: #ffaa00;
      font-size: 16px;
    }
    .student-actions i { cursor: pointer; transition: 0.2s; }
    .student-actions i:hover { transform: scale(1.15); color: #fff; }
    /* حذف السبورة المصغرة للطالب */

    /* منطقة السبورة الرئيسية فقط */
    .board-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .main-board {
      flex: 1;
      background: #1e3228;
      border-radius: 24px;
      border: 2px solid #2a4a30;
      position: relative;
      overflow: hidden;
    }
    .board-header {
      position: absolute;
      top: 10px;
      right: 15px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 30px;
      display: flex;
      gap: 15px;
      color: #ffaa00;
      font-size: 18px;
    }
    .board-header i { cursor: pointer; }
    .main-board canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none;
    }

    /* شريط الأدوات السفلي */
    .bottom-bar {
      height: 80px;
      background: #0f2a1f;
      border-top: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .toolbar-tools {
      display: flex;
      gap: 20px;
      background: #1a2e25;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid #3a5a40;
    }
    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #aaa;
      cursor: pointer;
      font-size: 10px;
    }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #ffaa00; }
    .color-picker {
      display: flex;
      gap: 5px;
      background: #1e3228;
      padding: 5px 10px;
      border-radius: 40px;
    }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.active { border-color: #fff; }
    .toolbar-actions {
      display: flex;
      gap: 12px;
    }
    .action-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: #2a4a35;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }
    .btn-mic.active { background: #ffaa00; color: #000; }
    .btn-end { background: #b71c1c; }
    /* زر التصفير */
    .btn-reset { background: #ffaa00; color: #000; }

    /* نافذة تعديل سبورة الطالب (اختياري) */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e3228;
      width: 80%;
      height: 80%;
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      border: 2px solid #ffaa00;
    }
    .modal-header {
      padding: 15px 20px;
      background: #0f2a1f;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-body { flex: 1; background: #fff; }
    .modal-body canvas { width: 100%; height: 100%; }
    .modal-footer {
      padding: 10px 20px;
      background: #0f2a1f;
      display: flex;
      gap: 15px;
      align-items: center;
    }
    .image-upload input { display: none; }
    .image-upload label {
      background: #ffaa00;
      color: #000;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <!-- الشريط العلوي مطابق للصورة -->
  <div class="top-bar">
    <div class="teacher-info">
      <span class="teacher-name">Mr_Farag_Kohail</span>
      <span class="teacher-desc">منصة الفيزياء للثانوية العامة</span>
    </div>
    <div class="teacher-phone">01141010981</div>
    <div class="top-center">
      <span><i class="fas fa-circle" style="color:#4CAF50;"></i> مباشر</span>
      <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
      <span><i class="fas fa-clock"></i> 24ms</span>
    </div>
  </div>

  <div class="main-layout">
    <!-- الشريط الجانبي الأيسر (أيقونات) -->
    <div class="left-sidebar">
      <div class="nav-item active"><i class="fas fa-home"></i><span>الرئيسية</span></div>
      <div class="nav-item"><i class="fas fa-door-open"></i><span>فصول</span></div>
      <div class="nav-item"><i class="fas fa-chart-bar"></i><span>الدرجات</span></div>
      <div class="nav-item"><i class="fas fa-calendar-alt"></i><span>الجدول</span></div>
      <div class="nav-item"><i class="fas fa-comment-dots"></i><span>الرسائل</span></div>
      <div class="nav-item" style="margin-top:auto"><i class="fas fa-cog"></i><span>الإعدادات</span></div>
    </div>

    <!-- لوحة الطلاب (يسار) بدون سبورة مصغرة -->
    <div class="students-panels" id="studentsPanels"></div>

    <!-- السبورة الرئيسية فقط (حذفنا السبورة اليسرى) -->
    <div class="board-area">
      <div class="main-board">
        <div class="board-header">
          <i class="fas fa-download" onclick="saveMainBoard()"></i>
          <i class="fas fa-eye" onclick="toggleGrid()"></i>
          <i class="fas fa-expand" onclick="toggleFullscreen()"></i>
          <i class="fas fa-trash" onclick="clearMainBoard()"></i>
        </div>
        <canvas id="mainBoardCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- شريط الأدوات السفلي مع زر تصفير -->
  <div class="bottom-bar">
    <div class="toolbar-tools">
      <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
      <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
      <div class="color-picker">
        <div class="color-dot active" style="background:#000000;" onclick="setColor('#000000',this)"></div>
        <div class="color-dot" style="background:#ff0000;" onclick="setColor('#ff0000',this)"></div>
        <div class="color-dot" style="background:#00ff00;" onclick="setColor('#00ff00',this)"></div>
        <div class="color-dot" style="background:#0000ff;" onclick="setColor('#0000ff',this)"></div>
        <div class="color-dot" style="background:#ffff00;" onclick="setColor('#ffff00',this)"></div>
        <div class="color-dot" style="background:#ff8800;" onclick="setColor('#ff8800',this)"></div>
      </div>
      <div class="image-upload">
        <label for="teacherImage"><i class="fas fa-image"></i> رفع صورة</label>
        <input type="file" id="teacherImage" accept="image/*" onchange="uploadTeacherImage(this)">
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="action-circle btn-cam"><i class="fas fa-video-slash"></i></button>
      <button class="action-circle btn-mic" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone"></i></button>
      <button class="action-circle btn-screen"><i class="fas fa-desktop"></i></button>
      <button class="action-circle btn-hand"><i class="fas fa-hand-paper"></i></button>
      <button class="action-circle btn-reset" onclick="resetAllData()"><i class="fas fa-broom"></i></button>
      <button class="action-circle btn-end" onclick="endClass()"><i class="fas fa-power-off"></i></button>
    </div>
  </div>

  <!-- نافذة تعديل سبورة الطالب (اختياري) -->
  <div class="modal" id="correctionModal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modalStudentName">تصحيح سبورة الطالب</span>
        <div>
          <button class="action-circle" onclick="saveCorrection()" style="background:#ffaa00;"><i class="fas fa-save"></i></button>
          <button class="action-circle btn-end" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
      </div>
      <div class="modal-body"><canvas id="modalCanvas"></canvas></div>
      <div class="modal-footer">
        <button class="action-circle" onclick="setModalTool('pen')" style="background:#ffaa00;"><i class="fas fa-pen-nib"></i></button>
        <button class="action-circle" onclick="setModalTool('eraser')" style="background:#ffaa00;"><i class="fas fa-eraser"></i></button>
        <div class="color-picker">
          <div class="color-dot" style="background:#ff0000;" onclick="setModalColor('#ff0000')"></div>
          <div class="color-dot" style="background:#00ff00;" onclick="setModalColor('#00ff00')"></div>
          <div class="color-dot" style="background:#0000ff;" onclick="setModalColor('#0000ff')"></div>
        </div>
      </div>
    </div>
  </div>

  <audio id="audioPlayer" style="display:none;"></audio>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    // تهيئة Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
      databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
    });
    const db = firebase.database();

    let currentTool = 'pen';
    let currentColor = '#000000';
    let currentSize = 4;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let students = {};          // الطلاب المعتمدون
    let waitingStudents = {};    // طلبات الانضمام
    let currentSpeaker = null;

    const mainCanvas = document.getElementById('mainBoardCanvas');
    const modalCanvas = document.getElementById('modalCanvas');
    const mainCtx = mainCanvas.getContext('2d');
    const modalCtx = modalCanvas.getContext('2d');
    let currentModalStudentId = null;

    // ضبط حجم الكانفاس الرئيسي
    function resizeCanvas() {
      const parent = mainCanvas.parentElement;
      if (!parent) return;
      mainCanvas.width = parent.clientWidth;
      mainCanvas.height = parent.clientHeight;
      mainCtx.fillStyle = '#fff';
      mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
      mainCtx.lineCap = 'round';
      mainCtx.lineJoin = 'round';
      mainCtx.lineWidth = currentSize;
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    // الحصول على إحداثيات الرسم
    function getCanvasPoint(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    // رسم المدرس وإرساله لجميع الطلاب
    let points = [];
    let sendTimer = null;

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      const p = getCanvasPoint(e, mainCanvas);
      lastX = p.x; lastY = p.y;
      points = [{ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height }];
      mainCtx.beginPath();
      mainCtx.moveTo(p.x, p.y);
    }

    function draw(e) {
      e.preventDefault();
      if (!isDrawing) return;
      const p = getCanvasPoint(e, mainCanvas);
      mainCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
      mainCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
      mainCtx.lineTo(p.x, p.y);
      mainCtx.stroke();
      mainCtx.beginPath();
      mainCtx.moveTo(p.x, p.y);
      points.push({ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height });
      if (!sendTimer) {
        sendTimer = setTimeout(() => {
          if (points.length) {
            db.ref('draw_t').push({
              points: points,
              color: currentTool === 'eraser' ? null : currentColor,
              size: currentSize,
              ts: Date.now()
            });
            points = [];
          }
          sendTimer = null;
        }, 30);
      }
    }

    function stopDraw() {
      if (isDrawing) {
        isDrawing = false;
        if (points.length) {
          db.ref('draw_t').push({
            points: points,
            color: currentTool === 'eraser' ? null : currentColor,
            size: currentSize,
            ts: Date.now()
          });
          points = [];
        }
        if (sendTimer) clearTimeout(sendTimer);
        sendTimer = null;
      }
    }

    mainCanvas.addEventListener('mousedown', startDraw);
    mainCanvas.addEventListener('mousemove', draw);
    mainCanvas.addEventListener('mouseup', stopDraw);
    mainCanvas.addEventListener('mouseleave', stopDraw);
    mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
    mainCanvas.addEventListener('touchmove', draw, { passive: false });
    mainCanvas.addEventListener('touchend', stopDraw);

    // أدوات الرسم
    window.setTool = function(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
      document.getElementById('toolPen').classList.toggle('active', tool === 'pen');
      document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
    };
    window.setColor = function(color, el) {
      currentColor = color;
      document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    };
    window.clearMainBoard = function() {
      mainCtx.fillStyle = '#fff';
      mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
      db.ref('boardCmd/main').push({ type: 'clear' });
    };
    window.uploadTeacherImage = function(input) {
      if (!input.files[0]) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
          db.ref('boardImg/main').set({ data: e.target.result, ts: Date.now() });
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    };

    // إدارة الطلاب
    function setupListeners() {
      // طلبات الانضمام
      db.ref('joinRequests').on('child_added', snap => {
        const s = snap.val();
        waitingStudents[s.id] = s;
        updateStudentsPanels();
      });
      db.ref('joinRequests').on('child_removed', snap => {
        const s = snap.val();
        delete waitingStudents[s.id];
        updateStudentsPanels();
      });

      // الطلاب المعتمدون
      db.ref('approvedStudents').on('value', snap => {
        students = snap.val() || {};
        updateStudentsPanels();
      });

      // حالة التواجد
      db.ref('onlineStudents').on('value', snap => {
        const online = snap.val() || {};
        Object.keys(students).forEach(id => {
          if (students[id]) students[id].online = online[id] ? true : false;
        });
        updateStudentsPanels();
      });

      // رفع اليد
      db.ref('handRaised').on('value', snap => {
        const hands = snap.val() || {};
        Object.keys(students).forEach(id => {
          if (students[id]) students[id].handRaised = hands[id] ? true : false;
        });
        updateStudentsPanels();
      });

      // طلبات المايك
      db.ref('micRequests').on('child_added', snap => {
        const req = snap.val();
        if (req && students[req.studentId]) {
          if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
            if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
            currentSpeaker = req.studentId;
            db.ref('micPermissions/' + req.studentId).set({ allowed: true });
            db.ref('handRaised/' + req.studentId).remove();
          }
          snap.ref.remove();
        }
      });

      // استقبال صور الطلاب
      db.ref('boardImg/stu').on('child_added', snap => {
        updateStudentsPanels(); // لا حاجة لرسم الصور لأننا أزلنا السبورة المصغرة
      });
    }

    function updateStudentsPanels() {
      const container = document.getElementById('studentsPanels');
      let html = '';

      // طلبات الانضمام
      Object.values(waitingStudents).forEach(s => {
        html += `
          <div class="student-panel" style="border-color:#f39c12;">
            <div class="student-panel-header">
              <div class="student-avatar">${s.name.charAt(0)}</div>
              <div class="student-info">
                <div class="student-name">${s.name}</div>
                <div class="student-status"><i class="fas fa-clock"></i> في الانتظار</div>
              </div>
              <div class="student-actions">
                <i class="fas fa-check-circle" style="color:#4CAF50;" title="قبول" onclick="event.stopPropagation(); approveStudent('${s.id}')"></i>
                <i class="fas fa-times-circle" style="color:#b71c1c;" title="رفض" onclick="event.stopPropagation(); rejectStudent('${s.id}')"></i>
              </div>
            </div>
          </div>
        `;
      });

      // الطلاب المعتمدون
      Object.values(students).forEach(s => {
        if (!s.online) return;
        const statusIcon = s.handRaised ? '<i class="fas fa-hand-paper" style="color:#f59e0b;"></i>' : (currentSpeaker === s.id ? '<i class="fas fa-microphone" style="color:#22c55e;"></i>' : '<i class="fas fa-headphones" style="color:#aaa;"></i>');
        const statusText = s.handRaised ? ' رفع اليد' : (currentSpeaker === s.id ? ' يتحدث' : ' مستمع');
        html += `
          <div class="student-panel">
            <div class="student-panel-header">
              <div class="student-avatar" style="background:${s.handRaised ? '#f59e0b' : '#ffaa00'};">${s.name.charAt(0)}</div>
              <div class="student-info">
                <div class="student-name">${s.name}</div>
                <div class="student-status">${statusIcon} ${statusText}</div>
              </div>
              <div class="student-actions">
                <i class="fas fa-eye" title="عرض السبورة" onclick="event.stopPropagation(); openStudentBoard('${s.id}', '${s.name}')"></i>
                <i class="fas fa-door-closed" title="طرد" onclick="event.stopPropagation(); kickStudent('${s.id}')"></i>
              </div>
            </div>
          </div>
        `;
      });

      container.innerHTML = html || '<div style="padding:20px; color:#aaa; text-align:center;">لا يوجد طلاب</div>';
      document.getElementById('studentsCount').textContent = Object.keys(students).length;
    }

    window.approveStudent = function(id) {
      const s = waitingStudents[id];
      if (s) {
        students[id] = { id, name: s.name, online: true };
        delete waitingStudents[id];
        db.ref('approvedStudents/' + id).set(students[id]);
        db.ref('joinRequests/' + id).remove();
      }
    };
    window.rejectStudent = function(id) {
      delete waitingStudents[id];
      db.ref('joinRequests/' + id).remove();
    };
    window.kickStudent = function(id) {
      if (currentSpeaker === id) {
        currentSpeaker = null;
        db.ref('micPermissions/' + id).remove();
      }
      delete students[id];
      db.ref('approvedStudents/' + id).remove();
      db.ref('onlineStudents/' + id).remove();
    };

    // فتح سبورة الطالب للتصحيح (اختياري)
    window.openStudentBoard = function(studentId, studentName) {
      currentModalStudentId = studentId;
      document.getElementById('modalStudentName').textContent = 'تصحيح سبورة ' + studentName;
      document.getElementById('correctionModal').classList.add('active');
      modalCanvas.width = modalCanvas.parentElement.clientWidth;
      modalCanvas.height = modalCanvas.parentElement.clientHeight;
      modalCtx.fillStyle = '#fff';
      modalCtx.fillRect(0, 0, modalCanvas.width, modalCanvas.height);
      db.ref('boardImg/stu/' + studentId).once('value', snap => {
        const data = snap.val();
        if (data && data.data) {
          const img = new Image();
          img.onload = () => modalCtx.drawImage(img, 0, 0, modalCanvas.width, modalCanvas.height);
          img.src = data.data;
        }
      });
    };
    window.closeModal = function() {
      document.getElementById('correctionModal').classList.remove('active');
    };
    window.saveCorrection = function() {
      if (!currentModalStudentId) return;
      const dataURL = modalCanvas.toDataURL('image/jpeg', 0.85);
      db.ref('boardImg/stu/' + currentModalStudentId).set({ data: dataURL, byTeacher: true, ts: Date.now() });
      alert('تم حفظ التصحيح');
      closeModal();
    };

    let modalTool = 'pen', modalColor = '#ff0000';
    window.setModalTool = function(t) { modalTool = t; };
    window.setModalColor = function(c) { modalColor = c; };

    window.toggleMic = function() {
      document.getElementById('micBtn').classList.toggle('active');
    };
    window.endClass = function() {
      if (confirm('إنهاء الحصة؟')) window.location.reload();
    };

    // تصفير كل البيانات القديمة في Firebase
    window.resetAllData = function() {
      if (confirm('سيتم حذف جميع الطلبات والطلاب الحاليين. هل أنت متأكد؟')) {
        db.ref('joinRequests').remove();
        db.ref('approvedStudents').remove();
        db.ref('onlineStudents').remove();
        db.ref('handRaised').remove();
        db.ref('micRequests').remove();
        db.ref('micPermissions').remove();
        students = {};
        waitingStudents = {};
        currentSpeaker = null;
        updateStudentsPanels();
      }
    };

    setupListeners();
  </script>
</body>
</html>
