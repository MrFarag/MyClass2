<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>MyClass2 Pro - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bl: #3b82f6;
            --rd: #ef4444;
            --gn: #22c55e;
            --yw: #f59e0b;
            --pp: #a855f7;
            --dk: #0f172a;
            --cd: #1e293b;
            --br: #334155;
            --mt: #475569;
            --dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--dk);
            color: #fff;
        }

        /* شاشة الدخول */
        #overlay {
            position: fixed;
            inset: 0;
            background: var(--dk);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .jcard {
            background: var(--cd);
            border: 1px solid var(--br);
            border-radius: 24px;
            padding: 40px 28px;
            width: 300px;
            text-align: center;
        }

        .jlogo {
            font-size: 30px;
            font-weight: 900;
            color: var(--bl);
        }

        .jlogo b {
            color: #fff;
        }

        .jsub {
            font-size: 13px;
            color: var(--dim);
            margin: 6px 0 22px;
        }

        .jcard input {
            width: 100%;
            padding: 12px;
            background: var(--br);
            border: 1px solid var(--mt);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            text-align: center;
            outline: none;
            margin-bottom: 12px;
        }

        .jcard input:focus {
            border-color: var(--bl);
        }

        .jbtn {
            width: 100%;
            padding: 12px;
            background: var(--bl);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* التطبيق الرئيسي */
        #app {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
        }

        /* الشريط العلوي */
        .top {
            height: 48px;
            background: var(--cd);
            border-bottom: 2px solid var(--br);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-size: 17px;
            font-weight: 900;
            color: var(--bl);
        }

        .logo b {
            color: #fff;
        }

        .topright {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nchip {
            background: var(--br);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* لوحة الطلاب الجانبية */
        .student-panel {
            width: 260px;
            background: var(--cd);
            border-left: 1px solid var(--br);
            position: fixed;
            top: 48px;
            left: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .student-panel.hidden {
            transform: translateX(100%);
        }

        .panel-header {
            padding: 12px;
            background: var(--br);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header button {
            background: var(--mt);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
        }

        .students-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .student-item {
            background: var(--br);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 6px;
            border: 1px solid transparent;
        }

        .student-item.hand-raised {
            border-color: var(--yw);
            background: #423d2b;
        }

        .student-item.speaking {
            border-color: var(--gn);
            background: #1a3a2a;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .student-avatar {
            width: 32px;
            height: 32px;
            background: var(--bl);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .student-details {
            flex: 1;
        }

        .student-name {
            font-size: 13px;
            font-weight: 600;
        }

        .student-status {
            font-size: 10px;
            color: var(--dim);
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .student-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: var(--mt);
            border: none;
            color: #fff;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            justify-content: center;
        }

        .action-btn.approve {
            background: var(--gn);
        }

        .action-btn.reject {
            background: var(--rd);
        }

        .action-btn.mic {
            background: var(--bl);
        }

        .action-btn.kick {
            background: var(--mt);
        }

        /* منطقة المحتوى الرئيسي */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-right: 260px;
            transition: margin 0.3s ease;
        }

        .main-area.expanded {
            margin-right: 0;
        }

        /* شريط التحكم */
        .control-bar {
            background: var(--cd);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--br);
        }

        .control-btn {
            background: var(--br);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .control-btn.mic-on {
            background: var(--gn);
        }

        .control-btn.mic-off {
            background: var(--rd);
        }

        .control-btn.screen-on {
            background: var(--pp);
        }

        /* السبورات */
        .boards {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            padding: 5px;
            gap: 5px;
        }

        .bcard {
            flex: 1;
            background: var(--cd);
            border-radius: 12px;
            border: 1px solid var(--br);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .bhead {
            height: 33px;
            padding: 0 10px;
            background: var(--br);
            border-bottom: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .tboard .bhead {
            border-bottom-color: var(--rd);
        }

        .sboard .bhead {
            border-bottom-color: var(--bl);
        }

        .btitle {
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .carea {
            flex: 1;
            background: #fff;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .carea canvas {
            position: absolute;
            inset: 0;
            display: block;
            width: 100%;
            height: 100%;
        }

        #tc {
            touch-action: none;
            cursor: crosshair;
        }

        .livebadge {
            background: var(--rd);
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            display: none;
            align-items: center;
            gap: 3px;
            color: #fff;
        }

        .livebadge.on {
            display: flex;
        }

        /* شريط الأدوات */
        .tbar {
            background: var(--cd);
            border-top: 1px solid var(--br);
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .tsep {
            width: 1px;
            height: 32px;
            background: var(--br);
            flex-shrink: 0;
        }

        .tg {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        .tb {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: var(--br);
            color: var(--dim);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.12s;
        }

        .tb.on {
            background: var(--bl);
            color: #fff;
        }

        .clrs {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .cl {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            flex-shrink: 0;
            transition: 0.1s;
        }

        .cl.on {
            border-color: #fff;
            transform: scale(1.12);
        }

        .szs {
            display: flex;
            gap: 2px;
            align-items: center;
            background: var(--br);
            padding: 3px 5px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .sz {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 3px 4px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sz.on {
            background: var(--bl);
        }

        .sdot {
            background: #fff;
            border-radius: 50%;
        }

        /* شريط الغرف المصغرة */
        .breakout-bar {
            background: var(--cd);
            border-top: 1px solid var(--br);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .room-btn {
            background: var(--br);
            border: none;
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        .room-btn.active {
            background: var(--pp);
        }

        .room-badge {
            background: var(--pp);
            padding: 2px 6px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 5px;
        }

        .room-selector {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* شريط الحالة */
        .sbar {
            height: 26px;
            background: var(--cd);
            border-top: 1px solid var(--br);
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--dim);
            flex-shrink: 0;
        }

        .conn {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gn);
        }
    </style>
</head>
<body>
    <!-- شاشة الدخول -->
    <div id="overlay">
        <div class="jcard">
            <div class="jlogo">My<b>Class</b>2</div>
            <p class="jsub">منصة التعليم التفاعلي</p>
            <input type="text" id="teacherName" placeholder="اسم المدرس" maxlength="25" value="مدرس">
            <button class="jbtn" onclick="startTeaching()">بدء الحصة</button>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="app" style="display: none;">
        <!-- الشريط العلوي -->
        <div class="top">
            <div class="logo">My<b>Class</b>2</div>
            <div class="topright">
                <span class="nchip" id="teacherNameChip">مدرس</span>
                <button class="tb" onclick="toggleStudentPanel()" style="width: auto; padding: 0 12px;">
                    <i class="fas fa-users"></i> الطلاب
                </button>
            </div>
        </div>

        <!-- لوحة الطلاب الجانبية -->
        <div class="student-panel" id="studentPanel">
            <div class="panel-header">
                <span><i class="fas fa-users"></i> الطلاب المتصلون</span>
                <button onclick="toggleStudentPanel()"><i class="fas fa-times"></i></button>
            </div>
            <div class="students-list" id="studentsList"></div>
        </div>

        <!-- المحتوى الرئيسي -->
        <div class="main-area" id="mainArea">
            <!-- شريط التحكم -->
            <div class="control-bar">
                <button class="control-btn" id="micBtn" onclick="toggleMicrophone()">
                    <i class="fas fa-microphone-slash" id="micIcon"></i>
                </button>
                <button class="control-btn" id="screenBtn" onclick="toggleScreenShare()">
                    <i class="fas fa-desktop"></i>
                </button>
                <button class="control-btn" onclick="clearBoard('main')">
                    <i class="fas fa-eraser"></i>
                </button>
                <span style="flex:1; text-align:center; font-size:12px;" id="speakerInfo">لا يوجد متحدث</span>
            </div>

            <!-- السبورات -->
            <div class="boards">
                <!-- السبورة الرئيسية -->
                <div class="bcard tboard">
                    <div class="bhead">
                        <div class="btitle">
                            <i class="fas fa-chalkboard-teacher" style="color:var(--rd)"></i> السبورة الرئيسية
                        </div>
                        <div class="livebadge" id="liveBadge">
                            <i class="fas fa-circle"></i> بث مباشر
                        </div>
                    </div>
                    <div class="carea"><canvas id="tc"></canvas></div>
                </div>
                <!-- سبورة الطلاب -->
                <div class="bcard sboard">
                    <div class="bhead">
                        <div class="btitle">
                            <i class="fas fa-users" style="color:var(--bl)"></i> سبورة الطلاب
                        </div>
                    </div>
                    <div class="carea"><canvas id="sc"></canvas></div>
                </div>
            </div>

            <!-- شريط الأدوات -->
            <div class="tbar">
                <div class="tg">
                    <button class="tb on" id="bpen" onclick="setTool('pen')"><i class="fas fa-pencil-alt"></i></button>
                    <button class="tb" id="bera" onclick="setTool('eraser')"><i class="fas fa-eraser"></i></button>
                </div>
                <div class="tsep"></div>
                <div class="clrs">
                    <div class="cl on" style="background:#1a1a1a" data-c="#1a1a1a" onclick="setClr(this)"></div>
                    <div class="cl" style="background:#ef4444" data-c="#ef4444" onclick="setClr(this)"></div>
                    <div class="cl" style="background:#3b82f6" data-c="#3b82f6" onclick="setClr(this)"></div>
                    <div class="cl" style="background:#22c55e" data-c="#22c55e" onclick="setClr(this)"></div>
                    <div class="cl" style="background:#f59e0b" data-c="#f59e0b" onclick="setClr(this)"></div>
                </div>
                <div class="tsep"></div>
                <div class="szs">
                    <button class="sz" onclick="setSz(1,this)"><div class="sdot" style="width:2px;height:2px"></div></button>
                    <button class="sz on" onclick="setSz(2,this)"><div class="sdot" style="width:4px;height:4px"></div></button>
                    <button class="sz" onclick="setSz(3,this)"><div class="sdot" style="width:6px;height:6px"></div></button>
                </div>
                <div class="tsep"></div>
                <button class="tb" onclick="clearBoard('teacher')"><i class="fas fa-trash"></i></button>
            </div>

            <!-- شريط الغرف المصغرة -->
            <div class="breakout-bar" id="breakoutBar">
                <button class="room-btn" onclick="createBreakoutRooms()">
                    <i class="fas fa-plus-circle"></i> إنشاء غرف
                </button>
                <button class="room-btn" onclick="endBreakoutRooms()">
                    <i class="fas fa-door-open"></i> إنهاء الغرف
                </button>
                <div class="room-selector" id="roomSelector"></div>
            </div>

            <!-- شريط الحالة -->
            <div class="sbar">
                <div class="conn"><div class="cdot" id="cdot"></div><span id="ct">متصل</span></div>
                <span id="lat">--ms</span>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // تهيئة Firebase
        firebase.initializeApp({
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
        });
        const db = firebase.database();

        // ===== متغيرات عامة =====
        let teacherId = 'teacher_' + Date.now();
        let teacherName = 'مدرس';
        let micOn = false;
        let mediaStream = null;
        let mediaRecorder = null;
        let screenStream = null;
        let screenRecorder = null;
        let isScreenSharing = false;
        let students = {};
        let waitingStudents = {};
        let currentSpeaker = null;
        let currentRoom = 'main';
        let breakoutRooms = {};
        let studentPanelVisible = true;
        let dClr = '#1a1a1a', dSz = 2, dTool = 'pen';

        // ===== Canvas =====
        const TC = document.getElementById('tc');
        const SC = document.getElementById('sc');
        const Tc = TC.getContext('2d');
        const Sc = SC.getContext('2d');

        // ===== بدء الحصة =====
        window.startTeaching = function() {
            const name = document.getElementById('teacherName').value.trim();
            if (name) teacherName = name;
            document.getElementById('teacherNameChip').textContent = teacherName;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            resizeCanvases();
            setupListeners();
            db.ref('teacher/online').set({ name: teacherName, online: true, room: 'main' });
            db.ref('.info/connected').on('value', snap => {
                if (snap.val()) {
                    db.ref('teacher/online').onDisconnect().remove();
                }
            });
        };

        // ===== ضبط حجم الكانفاس =====
        function resizeCanvases() {
            [TC, SC].forEach(c => {
                const parent = c.parentElement;
                c.width = parent.clientWidth;
                c.height = parent.clientHeight;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = 2;
            });
        }
        window.addEventListener('resize', resizeCanvases);

        // ===== الرسم على السبورة الرئيسية =====
        let isDrawing = false;
        let lastX = 0, lastY = 0;

        function getCanvasPoint(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            isDrawing = true;
            const p = getCanvasPoint(e, TC);
            lastX = p.x;
            lastY = p.y;
            Tc.beginPath();
            Tc.moveTo(p.x, p.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const p = getCanvasPoint(e, TC);
            Tc.strokeStyle = dTool === 'eraser' ? '#fff' : dClr;
            Tc.lineWidth = dTool === 'eraser' ? dSz * 5 : dSz * 2;
            Tc.lineTo(p.x, p.y);
            Tc.stroke();
            Tc.beginPath();
            Tc.moveTo(p.x, p.y);
        }

        function stopDraw() {
            isDrawing = false;
        }

        TC.addEventListener('mousedown', startDraw);
        TC.addEventListener('mousemove', draw);
        TC.addEventListener('mouseup', stopDraw);
        TC.addEventListener('mouseleave', stopDraw);
        TC.addEventListener('touchstart', startDraw, { passive: false });
        TC.addEventListener('touchmove', draw, { passive: false });
        TC.addEventListener('touchend', stopDraw);

        // ===== أدوات الرسم =====
        window.setTool = function(tool) {
            dTool = tool;
            document.getElementById('bpen').classList.toggle('on', tool === 'pen');
            document.getElementById('bera').classList.toggle('on', tool === 'eraser');
        };

        window.setClr = function(el) {
            dClr = el.dataset.c;
            document.querySelectorAll('.cl').forEach(c => c.classList.remove('on'));
            el.classList.add('on');
        };

        window.setSz = function(s, btn) {
            dSz = s;
            document.querySelectorAll('.sz').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
        };

        window.clearBoard = function(which) {
            if (which === 'main' || which === 'teacher') {
                Tc.fillStyle = '#fff';
                Tc.fillRect(0, 0, TC.width, TC.height);
                db.ref('boardCmd/main').push({ type: 'clear' });
            }
            if (which === 'students' || which === 'teacher') {
                Sc.fillStyle = '#fff';
                Sc.fillRect(0, 0, SC.width, SC.height);
                db.ref('boardCmd/students').push({ type: 'clear' });
            }
        };

        // ===== إدارة الطلاب =====
        function setupListeners() {
            // طلبات الانضمام
            db.ref('joinRequests').on('child_added', snap => {
                const s = snap.val();
                if (s && s.id) {
                    waitingStudents[s.id] = s;
                    updateStudentsList();
                }
            });

            db.ref('joinRequests').on('child_removed', snap => {
                const s = snap.val();
                if (s && s.id) delete waitingStudents[s.id];
                updateStudentsList();
            });

            // الطلاب المعتمدين
            db.ref('approvedStudents').on('value', snap => {
                students = snap.val() || {};
                updateStudentsList();
            });

            // حالة الطلاب
            db.ref('onlineStudents').on('value', snap => {
                const online = snap.val() || {};
                Object.keys(students).forEach(id => {
                    if (students[id]) students[id].online = online[id] ? true : false;
                });
                updateStudentsList();
            });

            // رفع اليد
            db.ref('handRaised').on('value', snap => {
                const hands = snap.val() || {};
                Object.keys(students).forEach(id => {
                    if (students[id]) students[id].handRaised = hands[id] ? true : false;
                });
                updateStudentsList();
            });

            // طلبات المايك
            db.ref('micRequests').on('child_added', snap => {
                const req = snap.val();
                if (req && req.studentId && students[req.studentId]) {
                    if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
                        if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
                        currentSpeaker = req.studentId;
                        students[req.studentId].handRaised = false;
                        db.ref('micPermissions/' + req.studentId).set({ allowed: true });
                        db.ref('handRaised/' + req.studentId).remove();
                        document.getElementById('speakerInfo').textContent = students[req.studentId].name + ' يتحدث';
                    }
                    snap.ref.remove();
                }
                updateStudentsList();
            });

            // طلبات الانضمام للغرف
            db.ref('breakout/joinRequests').on('child_added', snap => {
                const req = snap.val();
                if (req && req.studentId && breakoutRooms[req.roomId]) {
                    breakoutRooms[req.roomId].members[req.studentId] = {
                        name: req.studentName,
                        joinedAt: Date.now()
                    };
                    db.ref('breakout/assignments/' + req.studentId).set({
                        roomId: req.roomId,
                        approved: true
                    });
                    db.ref('breakout/rooms').set(breakoutRooms);
                }
                snap.ref.remove();
            });
        }

        function updateStudentsList() {
            const list = document.getElementById('studentsList');
            let html = '';

            // طلبات الانضمام
            Object.values(waitingStudents).forEach(s => {
                html += `
                    <div class="student-item hand-raised">
                        <div class="student-info">
                            <div class="student-avatar">${s.name.charAt(0)}</div>
                            <div class="student-details">
                                <div class="student-name">${s.name}</div>
                                <div class="student-status">في انتظار الموافقة</div>
                            </div>
                        </div>
                        <div class="student-actions">
                            <button class="action-btn approve" onclick="approveStudent('${s.id}')"><i class="fas fa-check"></i></button>
                            <button class="action-btn reject" onclick="rejectStudent('${s.id}')"><i class="fas fa-times"></i></button>
                        </div>
                    </div>
                `;
            });

            // الطلاب المعتمدين
            Object.values(students).forEach(s => {
                if (!s.online) return;
                const isSpeaking = (currentSpeaker === s.id);
                const handRaised = s.handRaised || false;
                html += `
                    <div class="student-item ${handRaised ? 'hand-raised' : ''} ${isSpeaking ? 'speaking' : ''}">
                        <div class="student-info">
                            <div class="student-avatar">${s.name.charAt(0)}</div>
                            <div class="student-details">
                                <div class="student-name">${s.name}</div>
                                <div class="student-status">
                                    ${handRaised ? '✋ رفع يد' : (isSpeaking ? '🎤 يتحدث' : '🔊 مستمع')}
                                </div>
                            </div>
                        </div>
                        <div class="student-actions">
                            ${handRaised ? `
                                <button class="action-btn approve" onclick="allowMic('${s.id}')"><i class="fas fa-microphone"></i></button>
                                <button class="action-btn reject" onclick="rejectHand('${s.id}')"><i class="fas fa-times"></i></button>
                            ` : ''}
                            ${isSpeaking ? `
                                <button class="action-btn mic" onclick="stopMic('${s.id}')"><i class="fas fa-microphone-slash"></i></button>
                            ` : ''}
                            <button class="action-btn kick" onclick="kickStudent('${s.id}')"><i class="fas fa-sign-out-alt"></i></button>
                        </div>
                    </div>
                `;
            });

            list.innerHTML = html || '<div style="padding:10px; text-align:center">لا يوجد طلاب</div>';
        }

        window.approveStudent = function(id) {
            const s = waitingStudents[id];
            if (s) {
                students[id] = { id, name: s.name, online: true };
                delete waitingStudents[id];
                db.ref('approvedStudents/' + id).set(students[id]);
                db.ref('joinRequests/' + id).remove();
                updateStudentsList();
            }
        };

        window.rejectStudent = function(id) {
            delete waitingStudents[id];
            db.ref('joinRequests/' + id).remove();
            updateStudentsList();
        };

        window.allowMic = function(id) {
            if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
            currentSpeaker = id;
            students[id].handRaised = false;
            db.ref('micPermissions/' + id).set({ allowed: true });
            db.ref('handRaised/' + id).remove();
            document.getElementById('speakerInfo').textContent = students[id].name + ' يتحدث';
            updateStudentsList();
        };

        window.rejectHand = function(id) {
            students[id].handRaised = false;
            db.ref('handRaised/' + id).remove();
            updateStudentsList();
        };

        window.stopMic = function(id) {
            if (currentSpeaker === id) {
                currentSpeaker = null;
                db.ref('micPermissions/' + id).remove();
                document.getElementById('speakerInfo').textContent = 'لا يوجد متحدث';
                updateStudentsList();
            }
        };

        window.kickStudent = function(id) {
            if (currentSpeaker === id) stopMic(id);
            delete students[id];
            db.ref('approvedStudents/' + id).remove();
            db.ref('onlineStudents/' + id).remove();
            updateStudentsList();
        };

        // ===== الصوت =====
        window.toggleMicrophone = async function() {
            const btn = document.getElementById('micBtn');
            const icon = document.getElementById('micIcon');
            if (!micOn) {
                try {
                    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    micOn = true;
                    btn.classList.remove('mic-off');
                    btn.classList.add('mic-on');
                    icon.className = 'fas fa-microphone';
                    startBroadcast();
                } catch (err) {
                    alert('تعذر الوصول للمايك');
                }
            } else {
                if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                if (mediaRecorder) mediaRecorder.stop();
                micOn = false;
                btn.classList.remove('mic-on');
                btn.classList.add('mic-off');
                icon.className = 'fas fa-microphone-slash';
                db.ref('audioMeta').set({ active: false });
                db.ref('audio').remove();
            }
        };

        function startBroadcast() {
            if (!mediaStream) return;
            mediaRecorder = new MediaRecorder(mediaStream);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        db.ref('audio/chunk').set({ data: reader.result, ts: Date.now() });
                    };
                    reader.readAsDataURL(e.data);
                }
            };
            mediaRecorder.start(500);
            db.ref('audioMeta').set({ active: true });
        }

        // ===== مشاركة الشاشة =====
        window.toggleScreenShare = async function() {
            const btn = document.getElementById('screenBtn');
            if (!isScreenSharing) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    isScreenSharing = true;
                    btn.classList.add('screen-on');
                    screenRecorder = new MediaRecorder(screenStream, { mimeType: 'video/webm' });
                    screenRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0) {
                            const reader = new FileReader();
                            reader.onload = () => {
                                db.ref('screenShare/chunk').set({ data: reader.result, ts: Date.now() });
                            };
                            reader.readAsDataURL(e.data);
                        }
                    };
                    screenRecorder.start(500);
                    screenStream.getVideoTracks()[0].onended = () => stopScreenShare();
                } catch (err) {
                    alert('تعذر بدء مشاركة الشاشة');
                }
            } else {
                stopScreenShare();
            }
        };

        function stopScreenShare() {
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            if (screenRecorder) screenRecorder.stop();
            isScreenSharing = false;
            document.getElementById('screenBtn').classList.remove('screen-on');
            db.ref('screenShare/chunk').remove();
        }

        // ===== الغرف المصغرة =====
        window.createBreakoutRooms = function() {
            const num = parseInt(prompt('عدد الغرف؟', '3')) || 3;
            breakoutRooms = {};
            for (let i = 1; i <= num; i++) {
                breakoutRooms[`room_${i}`] = { name: `غرفة ${i}`, members: {} };
            }
            updateRoomSelector();
            db.ref('breakout/rooms').set(breakoutRooms);
        };

        window.endBreakoutRooms = function() {
            if (confirm('إنهاء جميع الغرف؟')) {
                breakoutRooms = {};
                db.ref('breakout/rooms').remove();
                db.ref('breakout/assignments').remove();
                document.getElementById('roomSelector').innerHTML = '';
            }
        };

        function updateRoomSelector() {
            const sel = document.getElementById('roomSelector');
            let html = '';
            Object.keys(breakoutRooms).forEach(roomId => {
                const room = breakoutRooms[roomId];
                const count = Object.keys(room.members || {}).length;
                html += `
                    <div class="room-item ${currentRoom === roomId ? 'active' : ''}">
                        <i class="fas fa-users"></i> ${room.name}
                        <span class="room-badge">${count}</span>
                        <button class="room-btn" onclick="joinRoom('${roomId}')"><i class="fas fa-sign-in-alt"></i></button>
                    </div>
                `;
            });
            sel.innerHTML = html;
        }

        window.joinRoom = function(roomId) {
            currentRoom = roomId;
            db.ref('teacher/room').set(roomId);
            updateRoomSelector();
        };

        // ===== واجهة الطلاب الجانبية =====
        window.toggleStudentPanel = function() {
            studentPanelVisible = !studentPanelVisible;
            document.getElementById('studentPanel').classList.toggle('hidden', !studentPanelVisible);
            document.getElementById('mainArea').classList.toggle('expanded', !studentPanelVisible);
        };

        // ===== حالة الاتصال =====
        db.ref('.info/connected').on('value', snap => {
            const ok = snap.val();
            document.getElementById('cdot').style.background = ok ? 'var(--gn)' : 'var(--rd)';
            document.getElementById('ct').textContent = ok ? 'متصل' : 'غير متصل';
        });
        setInterval(() => {
            document.getElementById('lat').textContent = (10 + Math.floor(Math.random() * 25)) + 'ms';
        }, 3000);
    </script>
</body>
</html>
