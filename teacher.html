<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المدرس - MyClass2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* (هنا نفس التنسيقات السابقة مع تحسينات) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a2634;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            color: white;
        }
        .header {
            background: #2c3e50;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #e67e22;
            flex-shrink: 0;
        }
        .logo i { color: #e67e22; margin-left: 6px; }
        .online-count {
            background: #27ae60;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
        }
        .mic-indicator {
            display: none;
            background: #e74c3c;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            animation: pulse 1s infinite;
        }
        .mic-indicator.active { display: flex; gap: 5px; }
        @keyframes pulse { 50% { opacity: 0.6; } }

        /* منطقة السبورة */
        .board-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2c3e50;
            margin: 8px;
            border-radius: 12px;
            overflow: hidden;
        }
        .board-header {
            padding: 10px 15px;
            background: #34495e;
            border-bottom: 2px solid #e67e22;
        }
        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            background: #ecf0f1;
            -webkit-overflow-scrolling: touch;
        }
        #teacherCanvas {
            width: 2000px;
            height: 1500px;
            display: block;
            background: white;
            touch-action: none;
        }

        /* شريط الأدوات المحسّن */
        .toolbar {
            background: #34495e;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            border-top: 2px solid #e67e22;
            flex-shrink: 0;
            overflow-x: auto;
            justify-content: center;
        }
        .tool-group {
            display: flex;
            gap: 5px;
            background: #2c3e50;
            padding: 5px;
            border-radius: 12px;
        }
        .tool-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 10px;
            background: #3d566e;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn:hover { background: #e67e22; transform: scale(1.05); }
        .tool-btn.active { background: #e67e22; }
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid transparent;
            cursor: pointer;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        .size-btn {
            width: 48px;
            height: 48px;
            background: #3d566e;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        .size-btn.active { background: #e67e22; }

        /* منطقة الامتحانات والملفات */
        .exam-panel {
            background: #2c3e50;
            padding: 10px;
            border-top: 2px solid #e67e22;
            max-height: 200px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .exam-header {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .exam-btn {
            background: #27ae60;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }
        .exam-btn.danger { background: #e74c3c; }
        .submission-item {
            background: #34495e;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
        .online { background: #27ae60; }
        .offline { background: #e74c3c; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-chalkboard-teacher"></i> MyClass2 - المدرس</div>
        <div style="display: flex; gap: 10px;">
            <div class="mic-indicator" id="micIndicator"><i class="fas fa-microphone"></i> الميك شغال</div>
            <div class="online-count"><i class="fas fa-users"></i> <span id="onlineCount">0</span> طالب</div>
        </div>
    </div>

    <!-- السبورة -->
    <div class="board-container">
        <div class="board-header">
            <span><i class="fas fa-pen-fancy"></i> سبورة المدرس</span>
        </div>
        <div class="canvas-wrapper" id="teacherWrapper">
            <canvas id="teacherCanvas"></canvas>
        </div>
    </div>

    <!-- شريط الأدوات المحسّن -->
    <div class="toolbar">
        <!-- الألوان -->
        <div class="tool-group">
            <div class="color-btn active" style="background:#1a1a1a" onclick="changeColor('#1a1a1a',this)"></div>
            <div class="color-btn" style="background:#e74c3c" onclick="changeColor('#e74c3c',this)"></div>
            <div class="color-btn" style="background:#2980b9" onclick="changeColor('#2980b9',this)"></div>
            <div class="color-btn" style="background:#27ae60" onclick="changeColor('#27ae60',this)"></div>
            <div class="color-btn" style="background:#8e44ad" onclick="changeColor('#8e44ad',this)"></div>
        </div>
        <!-- أحجام القلم -->
        <div class="tool-group">
            <button class="size-btn" onclick="changeSize(2,this)">رفيع</button>
            <button class="size-btn active" onclick="changeSize(5,this)">وسط</button>
            <button class="size-btn" onclick="changeSize(10,this)">سميك</button>
        </div>
        <!-- الأدوات -->
        <div class="tool-group">
            <button class="tool-btn active" id="penBtn" onclick="setPen()"><i class="fas fa-pencil-alt"></i></button>
            <button class="tool-btn" id="eraserBtn" onclick="setEraser()"><i class="fas fa-eraser"></i></button>
            <button class="tool-btn" onclick="clearBoard()"><i class="fas fa-trash-alt"></i></button>
        </div>
        <!-- الصوت -->
        <div class="tool-group">
            <button class="tool-btn" id="audioBtn" onclick="toggleAudio()"><i class="fas fa-microphone"></i></button>
        </div>
        <!-- إرسال امتحان -->
        <div class="tool-group">
            <button class="tool-btn" onclick="showExamForm()" style="background:#f39c12"><i class="fas fa-file-alt"></i></button>
        </div>
    </div>

    <!-- لوحة إدارة الامتحانات والملفات -->
    <div class="exam-panel" id="examPanel">
        <div class="exam-header">
            <button class="exam-btn" onclick="showExamForm()"><i class="fas fa-plus"></i> إرسال امتحان جديد</button>
            <span id="examStatus"></span>
        </div>
        <div id="submissionsList" style="max-height: 120px; overflow-y: auto;">
            <!-- ستظهر هنا إجابات الطلاب -->
        </div>
    </div>

    <!-- Firebase & PeerJS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // ================== Firebase Config ==================
        const firebaseConfig = {
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // ================== عناصر الرسم ==================
        const canvas = document.getElementById('teacherCanvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('teacherWrapper');
        let drawing = false;
        let currentTool = 'pen';
        let currentColor = '#1a1a1a';
        let currentSize = 5;
        let lastX = 0, lastY = 0;

        canvas.width = 2000; canvas.height = 1500;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX + wrapper.scrollLeft * scaleX,
                y: (clientY - rect.top) * scaleY + wrapper.scrollTop * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e);
            
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = 'rgba(0,0,0,1)';
                ctx.lineWidth = 30;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
            }

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            // إرسال الرسم إلى الطلاب
            db.ref('teacherDrawings').push({
                x: pos.x, y: pos.y,
                lastX, lastY,
                color: currentTool === 'eraser' ? 'eraser' : currentColor,
                size: currentTool === 'eraser' ? 30 : currentSize,
                isEraser: currentTool === 'eraser',
                timestamp: Date.now()
            });

            lastX = pos.x; lastY = pos.y;
        }

        function stopDraw() {
            drawing = false;
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('touchcancel', stopDraw);

        function clearBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            db.ref('teacherCommands').push({ type: 'clear' });
        }

        // أدوات الرسم
        window.changeColor = (color, el) => {
            currentColor = color;
            currentTool = 'pen';
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('penBtn').classList.add('active');
            document.getElementById('eraserBtn').classList.remove('active');
        };

        window.changeSize = (size, el) => {
            currentSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        };

        window.setPen = () => {
            currentTool = 'pen';
            document.getElementById('penBtn').classList.add('active');
            document.getElementById('eraserBtn').classList.remove('active');
        };

        window.setEraser = () => {
            currentTool = 'eraser';
            document.getElementById('eraserBtn').classList.add('active');
            document.getElementById('penBtn').classList.remove('active');
        };

        // ================== الصوت باستخدام PeerJS ==================
        let localStream, peer;
        peer = new Peer('teacher_' + Date.now());

        peer.on('open', (id) => {
            console.log('معرف المدرس للصوت:', id);
            db.ref('teacherAudioId').set(id);
        });

        peer.on('call', (call) => {
            if (localStream) {
                call.answer(localStream);
            }
        });

        window.toggleAudio = async () => {
            const btn = document.getElementById('audioBtn');
            const indicator = document.getElementById('micIndicator');
            if (!localStream) {
                try {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                    btn.classList.add('active');
                    indicator.classList.add('active');
                    // تحديث حالة البث في قاعدة البيانات
                    db.ref('teacherAudioActive').set(true);
                } catch (err) {
                    alert('لا يمكن الوصول للميكروفون');
                    btn.innerHTML = '<i class="fas fa-microphone"></i>';
                }
            } else {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                btn.innerHTML = '<i class="fas fa-microphone"></i>';
                btn.classList.remove('active');
                indicator.classList.remove('active');
                db.ref('teacherAudioActive').set(false);
            }
        };

        // ================== إدارة الطلاب المتصلين ==================
        db.ref('onlineStudents').on('value', (snap) => {
            const students = snap.val();
            document.getElementById('onlineCount').innerText = students ? Object.keys(students).length : 0;
        });

        // ================== إرسال امتحان (نص / صورة) ==================
        window.showExamForm = () => {
            const examType = prompt('نوع الامتحان: 1- نص مع خيارات, 2- صورة');
            if (examType === '1') {
                const question = prompt('أدخل نص السؤال:');
                const options = prompt('أدخل الخيارات مفصولة بفاصلة (مثل: نعم,لا,ربما)');
                if (question && options) {
                    const optArray = options.split(',').map(s => s.trim());
                    db.ref('currentExam').set({
                        type: 'text',
                        question,
                        options: optArray,
                        timestamp: Date.now()
                    });
                }
            } else if (examType === '2') {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    const storageRef = storage.ref('exams/' + Date.now() + '_' + file.name);
                    await storageRef.put(file);
                    const url = await storageRef.getDownloadURL();
                    db.ref('currentExam').set({
                        type: 'image',
                        imageUrl: url,
                        timestamp: Date.now()
                    });
                };
                input.click();
            }
        };

        // ================== استقبال إجابات الطلاب ==================
        db.ref('submissions').on('child_added', (snap) => {
            const sub = snap.val();
            const list = document.getElementById('submissionsList');
            const div = document.createElement('div');
            div.className = 'submission-item';
            div.innerHTML = `
                <span>طالب: ${sub.studentId.substring(0,6)}</span>
                <span>${sub.answer ? 'إجابة: ' + sub.answer : ''}</span>
                ${sub.fileUrl ? `<a href="${sub.fileUrl}" target="_blank"><i class="fas fa-download"></i></a>` : ''}
            `;
            list.appendChild(div);
        });

        // تنظيف السبورة عند أمر المسح
        db.ref('teacherCommands').on('child_added', (snap) => {
            const cmd = snap.val();
            if (cmd.type === 'clear') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        });

        // منع القائمة اليمنى
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // تسجيل المدرس
        db.ref('teacher/online').set({ online: true });
        window.addEventListener('beforeunload', () => {
            db.ref('teacher/online').remove();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
        });
    </script>
</body>
</html>
