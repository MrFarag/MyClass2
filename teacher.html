<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - المدرس</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #1a2e25;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* ===== TOP BAR ===== */
    .top-bar {
      height: 50px;
      background: linear-gradient(90deg, #1a2e25 0%, #1e3a2a 100%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
      z-index: 10;
    }
    .top-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .menu-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      opacity: 0.8;
    }
    .user-avatar-top {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .top-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      color: #e0e0e0;
    }
    .top-center .divider {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.25);
    }
    .top-center .platform-name {
      font-weight: 700;
      color: #fff;
    }
    .top-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-top {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .logo-top span { color: #4CAF50; }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ===== LEFT SIDEBAR (nav icons) ===== */
    .left-sidebar {
      width: 60px;
      background: linear-gradient(180deg, #1a2e25 0%, #162520 100%);
      border-left: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 6px;
    }
    .nav-item {
      width: 46px;
      height: 52px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }
    .nav-item i { font-size: 18px; }
    .nav-item.active {
      background: rgba(76, 175, 80, 0.25);
      color: #4CAF50;
    }
    .nav-item:not(.active):hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }

    /* ===== STUDENTS PANELS (left thumbnails) ===== */
    .students-panels {
      width: 340px;
      background: #1a2a20;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
      border-left: 1px solid rgba(255,255,255,0.06);
      padding: 4px;
    }
    .student-panel {
      background: #1e3228;
      border-radius: 12px;
      position: relative;
      flex: 0 0 auto;
      margin-bottom: 6px;
      border: 1px solid #2a4a30;
      cursor: pointer;
      overflow: hidden;
    }
    .student-panel-header {
      background: rgba(0,0,0,0.7);
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      backdrop-filter: blur(4px);
      border-bottom: 1px solid #3a5a40;
    }
    .student-panel-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #4CAF50;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .student-panel-name { 
      font-size: 12px; 
      font-weight: 600; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      max-width: 90px; 
    }
    .student-panel-icons {
      margin-right: auto;
      display: flex;
      gap: 8px;
      align-items: center;
      color: #ddd;
      font-size: 13px;
    }
    .student-panel-icons i {
      cursor: pointer;
      transition: color 0.2s;
    }
    .student-panel-icons i:hover { color: #4CAF50; }
    .student-board-canvas {
      width: 100%;
      height: 120px;
      background: #fff;
      position: relative;
    }
    .student-board-canvas canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
    }

    /* ===== MAIN BOARD AREA ===== */
    .board-area {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }
    .main-board {
      flex: 1;
      position: relative;
      overflow: hidden;
      border-bottom: 3px solid #2a4a30;
      background: #fff;
    }
    .main-board::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #ffd700, #ffec6e, #ffd700);
      z-index: 5;
    }
    .board-top-icons {
      position: absolute;
      top: 10px;
      right: 14px;
      display: flex;
      gap: 10px;
      z-index: 5;
      color: rgba(0,0,0,0.45);
      font-size: 14px;
    }
    .board-top-icons i { cursor: pointer; transition: color 0.2s; }
    .board-top-icons i:hover { color: rgba(0,0,0,0.9); }
    .main-board canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none;
    }
    .second-board {
      width: 280px;
      background: #1e3228;
      border-right: 2px solid #2a4a30;
      position: relative;
      overflow: hidden;
    }
    .second-board canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
    }

    /* ===== BOTTOM BAR ===== */
    .bottom-bar {
      height: 72px;
      display: flex;
      align-items: center;
      background: #162520;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .toolbar-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toolbar-tools {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 8px 18px;
      display: flex;
      align-items: flex-end;
      gap: 18px;
    }
    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      opacity: 0.55;
      transition: opacity 0.2s;
      font-size: 10px;
      color: #ccc;
    }
    .tool-item.active { opacity: 1; color: #fff; }
    .tool-item i { font-size: 22px; }
    .tool-item.active i { color: #ffd700; }
    .toolbar-actions {
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .action-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 17px;
      border: none;
      transition: transform 0.15s;
    }
    .action-circle:hover { transform: scale(1.08); }
    .btn-cam { background: #2d4a35; color: #fff; }
    .btn-mic { background: #2d4a35; color: #fff; }
    .btn-screen { background: #4CAF50; color: #fff; }
    .btn-hand { background: #2d4a35; color: #fff; }
    .btn-end { background: #d32f2f; color: #fff; }

    /* ===== MODAL لتصحيح سبورة الطالب ===== */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e3228;
      width: 80%;
      height: 80%;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 12px;
      background: #1a2e25;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-body {
      flex: 1;
      background: #fff;
      position: relative;
    }
    .modal-body canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .modal-footer {
      padding: 8px;
      background: #1a2e25;
      display: flex;
      gap: 8px;
    }
    .image-upload input { display: none; }
    .image-upload label {
      cursor: pointer;
      padding: 5px 10px;
      background: #4CAF50;
      border-radius: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>

<!-- TOP BAR -->
<div class="top-bar">

    <div class="user-avatar-top"><i class="fas fa-user" style="font-size:13px"></i></div>

    <span class="divider"></span>

<audio id="audioPlayer" style="display:none"></audio>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
  // ------------------------------------------------------------
  // تهيئة Firebase
  // ------------------------------------------------------------
  firebase.initializeApp({
    apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
    databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
  });
  const db = firebase.database();

  // ------------------------------------------------------------
  // المتغيرات العامة
  // ------------------------------------------------------------
  let teacherId = 'teacher_' + Date.now();
  let currentTool = 'pen';
  let currentColor = '#000000';
  let currentSize = 4;
  let isDrawing = false;
  let lastX = 0, lastY = 0;
  let students = {};          // الطلاب المعتمدون
  let waitingStudents = {};    // طلبات الانضمام
  let currentSpeaker = null;
  let modalTool = 'pen';
  let modalColor = '#ff0000';

  const mainCanvas = document.getElementById('mainBoardCanvas');
  const secondCanvas = document.getElementById('secondBoardCanvas');
  const modalCanvas = document.getElementById('modalCanvas');
  const mainCtx = mainCanvas.getContext('2d');
  const secondCtx = secondCanvas.getContext('2d');
  const modalCtx = modalCanvas.getContext('2d');
  let currentModalStudentId = null;

  // ------------------------------------------------------------
  // ضبط حجم الكانفاسات
  // ------------------------------------------------------------
  function resizeCanvases() {
    [mainCanvas, secondCanvas].forEach(c => {
      const parent = c.parentElement;
      c.width = parent.clientWidth;
      c.height = parent.clientHeight;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, c.width, c.height);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = currentSize;
    });
  }
  window.addEventListener('resize', resizeCanvases);
  setTimeout(resizeCanvases, 100);

  // ------------------------------------------------------------
  // الرسم على السبورة الرئيسية
  // ------------------------------------------------------------
  function getCanvasPoint(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
  }

  function startDraw(e) {
    e.preventDefault();
    isDrawing = true;
    const p = getCanvasPoint(e, mainCanvas);
    lastX = p.x; lastY = p.y;
    mainCtx.beginPath();
    mainCtx.moveTo(p.x, p.y);
  }

  function draw(e) {
    e.preventDefault();
    if (!isDrawing) return;
    const p = getCanvasPoint(e, mainCanvas);
    mainCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
    mainCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
    mainCtx.lineTo(p.x, p.y);
    mainCtx.stroke();
    mainCtx.beginPath();
    mainCtx.moveTo(p.x, p.y);
  }

  function stopDraw() {
    isDrawing = false;
  }

  mainCanvas.addEventListener('mousedown', startDraw);
  mainCanvas.addEventListener('mousemove', draw);
  mainCanvas.addEventListener('mouseup', stopDraw);
  mainCanvas.addEventListener('mouseleave', stopDraw);
  mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
  mainCanvas.addEventListener('touchmove', draw, { passive: false });
  mainCanvas.addEventListener('touchend', stopDraw);

  // ------------------------------------------------------------
  // أدوات الرسم
  // ------------------------------------------------------------
  window.setTool = function(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
    document.getElementById('toolPen').classList.toggle('active', tool === 'pen');
    document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
  };

  window.openColorPicker = function() {
    const color = prompt('أدخل قيمة اللون (مثل #ff0000)', currentColor);
    if (color) currentColor = color;
  };

  window.clearMainBoard = function() {
    mainCtx.fillStyle = '#fff';
    mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
    db.ref('boardCmd/main').push({ type: 'clear' });
  };

  window.uploadTeacherImage = function(input) {
    if (!input.files[0]) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
        // إرسال الصورة لجميع الطلاب
        db.ref('boardImg/main').set({ data: e.target.result, ts: Date.now() });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
  };

  // ------------------------------------------------------------
  // إدارة الطلاب
  // ------------------------------------------------------------
  function setupListeners() {
    // طلبات الانضمام
    db.ref('joinRequests').on('child_added', snap => {
      const s = snap.val();
      waitingStudents[s.id] = s;
      updateStudentsPanels();
    });
    db.ref('joinRequests').on('child_removed', snap => {
      const s = snap.val();
      delete waitingStudents[s.id];
      updateStudentsPanels();
    });

    // الطلاب المعتمدين
    db.ref('approvedStudents').on('value', snap => {
      students = snap.val() || {};
      updateStudentsPanels();
    });

    // حالة التواجد
    db.ref('onlineStudents').on('value', snap => {
      const online = snap.val() || {};
      Object.keys(students).forEach(id => {
        if (students[id]) students[id].online = online[id] ? true : false;
      });
      updateStudentsPanels();
    });

    // رفع اليد
    db.ref('handRaised').on('value', snap => {
      const hands = snap.val() || {};
      Object.keys(students).forEach(id => {
        if (students[id]) students[id].handRaised = hands[id] ? true : false;
      });
      updateStudentsPanels();
    });

    // طلبات المايك
    db.ref('micRequests').on('child_added', snap => {
      const req = snap.val();
      if (req && students[req.studentId]) {
        if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
          if (currentSpeaker) db.ref('micPermissions/' + currentSpeaker).remove();
          currentSpeaker = req.studentId;
          db.ref('micPermissions/' + req.studentId).set({ allowed: true });
          db.ref('handRaised/' + req.studentId).remove();
        }
        snap.ref.remove();
      }
    });

    // استقبال صور سبورات الطلاب
    db.ref('boardImg/stu').on('child_added', snap => {
      updateStudentsPanels(); // لتحديث الصورة المصغرة
    });

    // استقبال رسم الطلاب لتحديث secondBoard
    db.ref('draw_st').on('child_added', snap => {
      const data = snap.val();
      if (!data || !data.points) return;
      // نرسم على secondBoard لآخر طالب أو نختار آخر تحديث
      // يمكن تبسيطاً رسم أي رسم قادم
      secondCtx.strokeStyle = data.color || '#000';
      secondCtx.lineWidth = data.size || 4;
      secondCtx.beginPath();
      secondCtx.moveTo(data.points[0].x * secondCanvas.width, data.points[0].y * secondCanvas.height);
      for (let i = 1; i < data.points.length; i++) {
        secondCtx.lineTo(data.points[i].x * secondCanvas.width, data.points[i].y * secondCanvas.height);
      }
      secondCtx.stroke();
    });
  }

  function updateStudentsPanels() {
    const container = document.getElementById('studentsPanels');
    let html = '';

    // طلبات الانضمام
    Object.values(waitingStudents).forEach(s => {
      html += `
        <div class="student-panel" style="background:#2a3a30;">
          <div class="student-panel-header">
            <div class="student-panel-avatar">${s.name.charAt(0)}</div>
            <span class="student-panel-name">${s.name} (طلب)</span>
            <div class="student-panel-icons">
              <i class="fas fa-door-open" title="دخول" onclick="event.stopPropagation(); approveStudent('${s.id}')"></i>
              <i class="fas fa-times-circle" title="رفض" onclick="event.stopPropagation(); rejectStudent('${s.id}')"></i>
            </div>
          </div>
          <div class="student-board-canvas" style="background:#1e2a22;">
            <svg viewBox="0 0 330 120" style="width:100%; height:100%; opacity:0.5;">
              <text x="50%" y="50%" fill="#aaa" font-size="16" text-anchor="middle">في الانتظار</text>
            </svg>
          </div>
        </div>
      `;
    });

    // الطلاب المعتمدون
    Object.values(students).forEach(s => {
      if (!s.online) return;
      html += `
        <div class="student-panel">
          <div class="student-panel-header">
            <div class="student-panel-avatar" style="background:${s.handRaised ? '#f59e0b' : '#4CAF50'}">${s.name.charAt(0)}</div>
            <span class="student-panel-name">${s.name}</span>
            <div class="student-panel-icons">
              ${s.handRaised ? '<i class="fas fa-hand-paper" style="color:#f59e0b;" title="رفع اليد"></i>' : ''}
              ${currentSpeaker === s.id ? '<i class="fas fa-microphone" style="color:#22c55e;" title="يتحدث"></i>' : ''}
              <i class="fas fa-eye" title="عرض السبورة" onclick="event.stopPropagation(); openStudentBoard('${s.id}', '${s.name}')"></i>
              <i class="fas fa-door-closed" title="طرد" onclick="event.stopPropagation(); kickStudent('${s.id}')"></i>
            </div>
          </div>
          <div class="student-board-canvas">
            <canvas id="studentCanvas_${s.id}" style="width:100%; height:100%;"></canvas>
          </div>
        </div>
      `;
    });

    container.innerHTML = html || '<div style="padding:20px; color:#aaa; text-align:center;">لا يوجد طلاب</div>';

    // تحميل صور سبورات الطلاب
    Object.values(students).forEach(s => {
      if (!s.online) return;
      const canvas = document.getElementById(`studentCanvas_${s.id}`);
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const parent = canvas.parentElement;
      canvas.width = parent.clientWidth;
      canvas.height = parent.clientHeight;
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      db.ref('boardImg/stu/' + s.id).once('value', snap => {
        const data = snap.val();
        if (data && data.data) {
          const img = new Image();
          img.onload = () => {
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          };
          img.src = data.data;
        }
      });
    });
  }

  window.approveStudent = function(id) {
    const s = waitingStudents[id];
    if (s) {
      students[id] = { id, name: s.name, online: true };
      delete waitingStudents[id];
      db.ref('approvedStudents/' + id).set(students[id]);
      db.ref('joinRequests/' + id).remove();
    }
  };
  window.rejectStudent = function(id) {
    delete waitingStudents[id];
    db.ref('joinRequests/' + id).remove();
  };
  window.kickStudent = function(id) {
    if (currentSpeaker === id) {
      currentSpeaker = null;
      db.ref('micPermissions/' + id).remove();
    }
    delete students[id];
    db.ref('approvedStudents/' + id).remove();
    db.ref('onlineStudents/' + id).remove();
  };

  // ------------------------------------------------------------
  // فتح سبورة الطالب للتصحيح
  // ------------------------------------------------------------
  window.openStudentBoard = function(studentId, studentName) {
    currentModalStudentId = studentId;
    document.getElementById('modalStudentName').textContent = 'تصحيح سبورة ' + studentName;
    document.getElementById('correctionModal').classList.add('active');

    modalCanvas.width = modalCanvas.parentElement.clientWidth;
    modalCanvas.height = modalCanvas.parentElement.clientHeight;
    modalCtx.fillStyle = '#fff';
    modalCtx.fillRect(0, 0, modalCanvas.width, modalCanvas.height);

    db.ref('boardImg/stu/' + studentId).once('value', snap => {
      const data = snap.val();
      if (data && data.data) {
        const img = new Image();
        img.onload = () => {
          modalCtx.drawImage(img, 0, 0, modalCanvas.width, modalCanvas.height);
        };
        img.src = data.data;
      }
    });
  };

  window.closeModal = function() {
    document.getElementById('correctionModal').classList.remove('active');
  };

  window.saveCorrection = function() {
    if (!currentModalStudentId) return;
    const dataURL = modalCanvas.toDataURL('image/jpeg', 0.85);
    db.ref('boardImg/stu/' + currentModalStudentId).set({ data: dataURL, byTeacher: true, ts: Date.now() });
    alert('تم حفظ التصحيح');
    closeModal();
  };

  window.setModalTool = function(tool) { modalTool = tool; };
  window.setModalColor = function(color) { modalColor = color; };

  // ------------------------------------------------------------
  // الصوت (مبسطة)
  // ------------------------------------------------------------
  window.toggleMic = function() {
    const micBtn = document.getElementById('micBtn');
    if (micBtn.style.background === 'rgb(76, 175, 80)') {
      micBtn.style.background = '#2d4a35';
      micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
    } else {
      micBtn.style.background = '#4CAF50';
      micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
    }
  };

  window.endClass = function() {
    if (confirm('هل تريد إنهاء الحصة؟')) window.location.reload();
  };

  // بدء الاستماع
  setupListeners();
</script>
</body>
</html>
