<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyClass - المدرس</title>
    <link rel="stylesheet" href="teacher.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="top-bar">
        <div class="brand">
            <span class="brand-name">MyClass - المدرس</span>
            <a href="https://wa.me/201141010981" class="wa-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        
        <div class="preview-section" id="previewSection" style="display:none;">
            <span id="previewTitle" style="color:#ffaa00;font-size:12px;font-weight:700;">معاينة</span>
            <select id="studentSlideSelect" onchange="onStudentSlideSelect(this)" style="padding:4px 8px;border-radius:6px;border:1px solid #2a5090;background:#071524;color:#fff;font-family:Cairo,sans-serif;font-size:11px;cursor:pointer;">
                <option value="__current__">📋 السبورة الحالية</option>
            </select>

        </div>
        
        <div class="mode-btns">
            <button class="mode-btn mode-send" id="modeSend" onclick="sendSlideToStudents()">
                <i class="fas fa-upload"></i> رفع
            </button>
        </div>
        
        <div class="stats">
            <span class="phone"><i class="fab fa-whatsapp"></i> 01141010981</span>
            <span><i class="fas fa-users"></i> <span id="cnt">0</span> طالب</span>
            <span><i class="fas fa-signal"></i> <span id="lat">--ms</span></span>
        </div>
    </div>

    <div class="body">
        <div class="slides-panel" id="slidesPanel">
            <div class="slides-header">
                <span><i class="fas fa-layer-group"></i> شرائحي</span>
                <label class="slide-upload-btn">
                    <i class="fas fa-upload"></i>
                    <input type="file" multiple accept="image/*" onchange="uploadSlides(this)">
                </label>
            </div>
            <div class="slides-list" id="slidesList"></div>
        </div>

        <div class="board-col">
            <div class="bh">
                <div class="bh-title" id="bTitle">السبورة الرئيسية</div>
                <div class="bh-ctrl">
                    <button class="zb" onclick="Z(-0.1)">−</button>
                    <span class="zv" id="zv">100%</span>
                    <button class="zb" onclick="Z(0.1)">+</button>
                    <button class="zb" onclick="fit()"><i class="fas fa-expand"></i></button>
                    <button class="zb zb-clear" onclick="clearB()">Clear</button>
                    <label class="ulbl">
                        <i class="fas fa-image"></i> صورة
                        <input type="file" accept="image/*" onchange="uploadImg(this)">
                    </label>
                </div>
            </div>
            
            <div class="board-wrap" id="bWrap">
                <canvas id="mc"></canvas>
            </div>
        </div>

        <div class="panel" id="studentsPanel">
            <div class="panel-h">
                <span><i class="fas fa-users"></i> الطلاب</span>
                <span id="cntP">0</span>
            </div>
            <div class="panel-list" id="sList">
                <div style="color:#aaa;text-align:center;padding:12px;font-size:11px">لا يوجد طلاب</div>
            </div>
        </div>
    </div>

    <div class="bot">
        <div class="tools">
            <div class="ti on" id="tiPen" onclick="setTool('pen')"><i class="fas fa-pen"></i><span>قلم</span></div>
            <div class="ti" id="tiEra" onclick="setTool('eraser')"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
            <div class="ti" id="tiHL" onclick="setTool('highlight')"><i class="fas fa-highlighter"></i><span>نيون</span></div>
            <div class="ti-sep"></div>
            <div class="ti" id="tiSel" onclick="setTool('select')"><i class="fas fa-mouse-pointer"></i><span>تحديد</span></div>
            <div class="ti" id="tiLine" onclick="setTool('line')"><i class="fas fa-slash"></i><span>خط</span></div>
            <div class="ti" id="tiArrow" onclick="setTool('arrow')"><i class="fas fa-long-arrow-alt-right"></i><span>سهم</span></div>
            <div class="ti" id="tiRect" onclick="setTool('rect')"><i class="far fa-square"></i><span>مستطيل</span></div>
            <div class="ti" id="tiCircle" onclick="setTool('circle')"><i class="far fa-circle"></i><span>دائرة</span></div>
            <div class="ti" id="tiTri" onclick="setTool('tri')"><i class="fas fa-play" style="transform:rotate(-90deg)"></i><span>مثلث</span></div>
        </div>
        
        <div class="dots">
            <div class="dot dot-neon" style="background:#000000" onclick="setClr('#000000',this)"></div>
            <div class="dot dot-neon" style="background:#e53935" onclick="setClr('#e53935',this)"></div>
            <div class="dot dot-neon" style="background:#f59e0b" onclick="setClr('#f59e0b',this)"></div>
            <div class="dot dot-neon" style="background:#22c55e" onclick="setClr('#22c55e',this)"></div>
            <div class="dot dot-neon" style="background:#00aaff" onclick="setClr('#00aaff',this)"></div>
            <div class="dot dot-neon" style="background:#9c27b0" onclick="setClr('#9c27b0',this)"></div>
            <div class="dot dot-neon" style="background:#ffffff" onclick="setClr('#ffffff',this)"></div>
        </div>
        
        <div class="sz-row">
            <button class="sz-btn" onclick="adjSz(-1)">−</button>
            <span class="sz-val" id="szV">4</span>
            <button class="sz-btn" onclick="adjSz(1)">+</button>
        </div>
        
        <div class="bg-dots-wrap">
            <span class="bg-label">خلفية</span>
            <div class="bg-dot" style="background:#ffffff" onclick="setBoardBg('#ffffff',this)"></div>
            <div class="bg-dot" style="background:#fef9e7" onclick="setBoardBg('#fef9e7',this)"></div>
            <div class="bg-dot" style="background:#e8f5e9" onclick="setBoardBg('#e8f5e9',this)"></div>
            <div class="bg-dot" style="background:#e3f2fd" onclick="setBoardBg('#e3f2fd',this)"></div>
            <div class="bg-dot" style="background:#1a2e25" onclick="setBoardBg('#1a2e25',this)"></div>
        </div>
        
        <div class="acts">
            <button class="ab" id="micBtn" onclick="toggleMic()"><i class="fas fa-microphone-slash"></i></button>
            <button class="ab" onclick="saveB()"><i class="fas fa-download"></i></button>
            <button class="ab" onclick="goFS()"><i class="fas fa-expand"></i></button>
            <button class="ab" id="sendCorrBtn" onclick="sendCorr()" style="display:none;background:#4CAF50;"><i class="fas fa-check"></i></button>
            <button class="ab red" onclick="endClass()"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <audio id="audioEl" autoplay></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="teacher.js"></script>
</body>
</html>
