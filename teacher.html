<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyClass2 - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== الألوان الفاقعة ========== */
        :root {
            --primary: #3b82f6;      /* أزرق فاقع */
            --danger: #ef4444;        /* أحمر فاقع */
            --success: #22c55e;       /* أخضر فاقع */
            --warning: #f59e0b;       /* برتقالي فاقع */
            --purple: #a855f7;         /* بنفسجي فاقع */
            --pink: #ec4899;           /* وردي فاقع */
            --dark: #0f172a;           /* كحلي غامق */
            --card: #1e293b;            /* أزرق داكن */
            --border: #334155;          /* رمادي */
            --medium: #475569;          /* رمادي متوسط */
            --light: #94a3b8;           /* رمادي فاتح */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--dark);
            color: #fff;
        }

        /* ========== الشريط العلوي ========== */
        .hdr {
            height: 50px;
            background: linear-gradient(90deg, #2c3e50, #1e2b3a);
            border-bottom: 2px solid var(--warning);
            padding: 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-size: 19px;
            font-weight: 900;
            color: var(--warning);
        }

        .logo b { color: #fff; }

        .hchips {
            display: flex;
            gap: 7px;
            align-items: center;
        }

        .chip {
            background: var(--purple);
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .livec {
            background: var(--danger);
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 50% { opacity: 0.45; } }

        /* ========== الحاوية الرئيسية ========== */
        #wrap {
            height: calc(100vh - 50px);
            display: flex;
            flex-direction: column;
        }

        .body {
            flex: 1;
            display: flex;
            overflow: hidden;
            min-height: 0;
        }

        /* ========== الشريط الجانبي (قائمة الطلاب) ========== */
        .sidebar {
            width: 240px;
            background: var(--card);
            border-left: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .stitle {
            padding: 9px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--light);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .slist {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
        }

        .slist::-webkit-scrollbar { width: 3px; background: var(--border); }
        .slist::-webkit-scrollbar-thumb { background: var(--medium); border-radius: 3px; }

        .sitem {
            padding: 7px 9px;
            border-radius: 9px;
            margin-bottom: 3px;
            border: 1px solid transparent;
            transition: 0.15s;
            cursor: pointer;
        }

        .sitem:hover { background: var(--border); }
        .sitem.act { background: rgba(59,130,246,0.13); border-color: var(--primary); }
        .sitem.spk { background: rgba(34,197,94,0.08); border-color: var(--success); }
        .sitem.wait { animation: rowpulse 0.8s infinite; }

        @keyframes rowpulse {
            0%,100% { border-color: rgba(245,158,11,0.25); }
            50% { border-color: var(--warning); background: rgba(245,158,11,0.07); }
        }

        .srow {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sn {
            font-size: 13px;
            font-weight: 700;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sicons {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-shrink: 0;
        }

        .ib {
            width: 27px;
            height: 27px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }

        .ib.mic { background: var(--medium); color: #fff; }
        .ib.mic:hover { background: var(--light); }
        .ib.mic.req { background: rgba(245,158,11,0.15); color: var(--warning); animation: ripple 0.75s infinite; }
        @keyframes ripple {
            0% { box-shadow: 0 0 0 0 rgba(245,158,11,0.65); }
            60% { box-shadow: 0 0 0 8px rgba(245,158,11,0); background: rgba(245,158,11,0.45); color: #fff; }
        }
        .ib.mic.on { background: var(--success); color: #fff; box-shadow: 0 0 0 3px rgba(34,197,94,0.35); }

        .ib.eye { background: var(--medium); color: #fff; }
        .ib.eye:hover { background: var(--light); }
        .ib.eye.on { background: var(--primary); color: #fff; }

        .ib.kick { background: rgba(239,68,68,0.12); color: var(--danger); }
        .ib.kick:hover { background: var(--danger); color: #fff; }

        /* ========== منطقة السبورة ========== */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }

        .bwrap {
            flex: 1;
            background: #fff;
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        #mc {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
            display: block;
        }

        .blbl {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.58);
            color: #fff;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            z-index: 5;
        }

        /* ========== شريط الأدوات ========== */
        .tbar {
            background: linear-gradient(90deg, #2c3e50, #1e2b3a);
            border-top: 1px solid var(--border);
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .tb {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: var(--medium);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tb:hover { background: var(--light); }
        .tb.on { background: var(--primary); }
        .tb.danger { background: rgba(239,68,68,0.13); color: var(--danger); }
        .tb.danger:hover { background: var(--danger); color: #fff; }
        .tb.savebtn { background: rgba(34,197,94,0.13); color: var(--success); }
        .tb.savebtn:hover { background: var(--success); color: #fff; }

        .clrs {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .cl {
            width: 23px;
            height: 23px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .cl.on { border-color: #fff; transform: scale(1.15); }

        .szs {
            display: flex;
            gap: 2px;
            align-items: center;
            background: var(--medium);
            padding: 3px 5px;
            border-radius: 8px;
        }

        .sz {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 5px;
            color: #fff;
        }

        .sz.on { background: var(--primary); }
        .sdot { background: #fff; border-radius: 50%; }

        /* ميكروفون المدرس */
        .tmicw {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-right: auto;
            flex-shrink: 0;
        }

        .tmiclbl {
            font-size: 10px;
            color: var(--light);
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tmicbtn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: var(--medium);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tmicbtn.on { background: var(--success); box-shadow: 0 0 0 3px rgba(34,197,94,0.3); }

        /* ========== شريط الحالة ========== */
        .sbar {
            height: 26px;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--light);
            flex-shrink: 0;
        }

        /* ========== إشعارات ========== */
        #toasts {
            position: fixed;
            top: 56px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 600;
            display: flex;
            flex-direction: column;
            gap: 6px;
            pointer-events: none;
            min-width: 280px;
        }

        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 11px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: all;
            box-shadow: 0 8px 28px rgba(0,0,0,0.4);
        }

        #saveok {
            position: fixed;
            bottom: 50px;
            right: 16px;
            background: var(--success);
            color: #fff;
            padding: 8px 16px;
            border-radius: 10px;
            display: none;
            z-index: 700;
        }
    </style>
</head>
<body>
    <!-- الشريط العلوي -->
    <div class="hdr">
        <div class="logo">My<b>Class</b>2</div>
        <div class="hchips">
            <div class="chip"><i class="fas fa-users"></i> <span id="cnt">0</span></div>
            <div class="chip"><i class="fas fa-hand-paper" style="color:var(--warning)"></i> <span id="hcnt">0</span></div>
            <div class="livec"><i class="fas fa-circle" style="font-size:7px"></i> مباشر</div>
            <button onclick="endSession()" style="background:var(--danger); border:none; color:#fff; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:5px">
                <i class="fas fa-power-off"></i> إنهاء
            </button>
        </div>
    </div>

    <!-- الحاوية الرئيسية -->
    <div id="wrap">
        <div class="body">
            <!-- منطقة السبورة -->
            <div class="content">
                <div class="bwrap" id="bwrap">
                    <canvas id="mc"></canvas>
                    <div class="blbl" id="blbl">السبورة الرئيسية</div>
                </div>
                <!-- شريط الأدوات -->
                <div class="tbar">
                    <!-- قلم / ممحاة -->
                    <button class="tb on" id="bpen" onclick="setTool('pen')" title="قلم"><i class="fas fa-pencil-alt"></i></button>
                    <button class="tb" id="bera" onclick="setTool('eraser')" title="ممحاة"><i class="fas fa-eraser"></i></button>

                    <!-- الألوان -->
                    <div class="clrs">
                        <div class="cl on" style="background:#111" data-c="#111" onclick="setClr(this)"></div>
                        <div class="cl" style="background:#ef4444" data-c="#ef4444" onclick="setClr(this)"></div>
                        <div class="cl" style="background:#3b82f6" data-c="#3b82f6" onclick="setClr(this)"></div>
                        <div class="cl" style="background:#22c55e" data-c="#22c55e" onclick="setClr(this)"></div>
                        <div class="cl" style="background:#f59e0b" data-c="#f59e0b" onclick="setClr(this)"></div>
                        <div class="cl" style="background:#a855f7" data-c="#a855f7" onclick="setClr(this)"></div>
                        <input type="color" value="#111111" style="width:23px;height:23px;border-radius:50%;border:2px solid #fff;cursor:pointer;padding:0" oninput="penClr=this.value">
                    </div>

                    <!-- أحجام القلم -->
                    <div class="szs">
                        <button class="sz" onclick="setSz(1,this)"><div class="sdot" style="width:3px;height:3px"></div></button>
                        <button class="sz on" onclick="setSz(2,this)"><div class="sdot" style="width:6px;height:6px"></div></button>
                        <button class="sz" onclick="setSz(4,this)"><div class="sdot" style="width:10px;height:10px"></div></button>
                    </div>

                    <!-- أدوات إضافية -->
                    <button class="tb danger" onclick="clearBoard()" title="مسح الكل"><i class="fas fa-trash"></i></button>
                    <button class="tb savebtn" onclick="saveImg()" title="حفظ كصورة"><i class="fas fa-download"></i></button>

                    <!-- ميكروفون المدرس -->
                    <div class="tmicw">
                        <span class="tmiclbl" id="spkLbl"></span>
                        <button class="tmicbtn" id="tmicbtn" onclick="toggleTeacherMic()" title="تشغيل/إيقاف الميكروفون">
                            <i class="fas fa-microphone-slash" id="tmicico"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- الشريط الجانبي (الطلاب) -->
            <div class="sidebar">
                <div class="stitle"><i class="fas fa-users"></i> الطلاب</div>
                <div class="slist" id="slist">
                    <div style="color:var(--light); text-align:center; padding:20px">لا يوجد طلاب بعد</div>
                </div>
            </div>
        </div>
        <!-- شريط الحالة السفلي -->
        <div class="sbar">
            <span>⚡ <span id="lat">--</span>ms</span>
            <span id="viewlbl"></span>
        </div>
    </div>

    <!-- إشعار حفظ الصورة -->
    <div id="saveok">✅ تم الحفظ</div>
    <!-- عنصر صوت الطالب (مخفي) -->
    <audio id="stuAudio" style="display:none"></audio>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ================== إعدادات Firebase ==================
        firebase.initializeApp({
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        });
        const db = firebase.database();

        // ================== المتغيرات العامة ==================
        const students = {};                 // بيانات الطلاب { id: { name, online, hand } }
        let curView = 'main';                 // العرض الحالي (main أو studentId)
        let curSpeaker = null;                // الطالب الذي يتحدث حالياً
        let penTool = 'pen';                   // أداة الرسم (pen, eraser)
        let penClr = '#111';                    // لون القلم الحالي
        let penSz = 2;                          // حجم القلم (1,2,4)
        let tMicOn = false;                      // حالة ميكروفون المدرس
        let tStream = null;                       // تيار الصوت
        let tRec = null;                           // مسجل الصوت
        let drawing = false;                       // حالة الرسم
        let lastX = 0, lastY = 0;                   // آخر نقطة رسم

        // عناصر الرسم
        const canvas = document.getElementById('mc');
        const ctx = canvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;

        // ================== ضبط حجم الكانفاس ==================
        function fitCanvas() {
            const parent = canvas.parentElement;
            const w = parent.clientWidth;
            const h = parent.clientHeight;
            if (!w || !h) return;
            canvas.width = w * DPR;
            canvas.height = h * DPR;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        fitCanvas();
        window.addEventListener('resize', fitCanvas);

        // ================== دوال الرسم ==================
        function getXY(e) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: ((cx - rect.left) / rect.width) * canvas.width,
                y: ((cy - rect.top) / rect.height) * canvas.height
            };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const p = getXY(e);
            lastX = p.x; lastY = p.y;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const p = getXY(e);
            if (penTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = penSz * 4;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = penClr;
                ctx.lineWidth = penSz * DPR;
            }
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);

            // إرسال النقاط للطلاب
            db.ref('stroke/T').push({
                x: p.x / canvas.width,
                y: p.y / canvas.height,
                lastX: lastX / canvas.width,
                lastY: lastY / canvas.height,
                c: penClr,
                w: penSz / 1000,
                t: penTool === 'eraser' ? 'e' : 'p',
                ts: Date.now()
            });
            lastX = p.x; lastY = p.y;
        }

        function endDraw() {
            drawing = false;
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
            // إرسال صورة نهائية للمشاهدة
            sendSnapshot();
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', endDraw);
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // ================== أدوات الرسم ==================
        window.setTool = (t) => {
            penTool = t;
            document.getElementById('bpen').classList.toggle('on', t === 'pen');
            document.getElementById('bera').classList.toggle('on', t === 'eraser');
        };

        window.setClr = (el) => {
            penClr = el.dataset.c;
            document.querySelectorAll('.cl').forEach(c => c.classList.remove('on'));
            el.classList.add('on');
        };

        window.setSz = (s, btn) => {
            penSz = s;
            document.querySelectorAll('.sz').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
        };

        window.clearBoard = () => {
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            db.ref('boardCmd').push({ type: 'clear', ts: Date.now() });
            sendSnapshot();
        };

        window.saveImg = () => {
            const tmp = document.createElement('canvas');
            tmp.width = canvas.width; tmp.height = canvas.height;
            tmp.getContext('2d').drawImage(canvas, 0, 0);
            const a = document.createElement('a');
            a.href = tmp.toDataURL('image/png');
            a.download = 'board_' + Date.now() + '.png';
            a.click();
            document.getElementById('saveok').style.display = 'block';
            setTimeout(() => document.getElementById('saveok').style.display = 'none', 2000);
        };

        function sendSnapshot() {
            const tmp = document.createElement('canvas');
            tmp.width = canvas.width; tmp.height = canvas.height;
            tmp.getContext('2d').drawImage(canvas, 0, 0);
            db.ref('boardImg/main').set({ data: tmp.toDataURL('image/jpeg', 0.9), ts: Date.now() });
        }

        // ================== ميكروفون المدرس ==================
        window.toggleTeacherMic = async () => {
            const btn = document.getElementById('tmicbtn');
            const ico = document.getElementById('tmicico');
            if (!tMicOn) {
                try {
                    tStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    tMicOn = true;
                    btn.classList.add('on');
                    ico.className = 'fas fa-microphone';
                    tRec = new MediaRecorder(tStream, { mimeType: 'audio/webm' });
                    tRec.ondataavailable = (ev) => {
                        if (ev.data.size < 1) return;
                        const reader = new FileReader();
                        reader.onload = () => db.ref('audio/chunk').set({ data: reader.result, ts: Date.now() });
                        reader.readAsDataURL(ev.data);
                    };
                    tRec.start(600);
                    db.ref('audioMeta').set({ active: true, ts: Date.now() });
                    setInterval(() => {
                        if (tMicOn && tRec && tRec.state === 'recording') {
                            tRec.stop();
                            tRec.start(600);
                        }
                    }, 600);
                } catch (err) {
                    alert('تعذر الوصول للميكروفون');
                }
            } else {
                tMicOn = false;
                if (tStream) tStream.getTracks().forEach(t => t.stop());
                if (tRec) try { tRec.stop(); } catch (_) {}
                btn.classList.remove('on');
                ico.className = 'fas fa-microphone-slash';
                db.ref('audioMeta').set({ active: false });
            }
        };

        // ================== إدارة الطلاب ==================
        function renderList() {
            const list = document.getElementById('slist');
            const arr = Object.values(students).filter(s => s.online);
            document.getElementById('cnt').textContent = arr.length;
            document.getElementById('hcnt').textContent = arr.filter(s => s.hand).length;
            if (!arr.length) {
                list.innerHTML = '<div style="color:var(--light); text-align:center; padding:20px">لا يوجد طلاب بعد</div>';
                return;
            }
            let html = `<div class="sitem ${curView === 'main' ? 'act' : ''}" onclick="viewMain()">
                <div class="srow"><span class="sn">🖥 السبورة الرئيسية</span></div></div>`;
            arr.forEach(s => {
                const isSpk = curSpeaker === s.id;
                const cls = curView === s.id ? 'act' : isSpk ? 'spk' : '';
                html += `<div class="sitem ${cls}" onclick="viewStudent('${s.id}')">
                    <div class="srow">
                        <span class="sn">${s.name}${s.hand ? ' ✋' : ''}</span>
                        <div class="sicons">
                            <button class="ib mic ${isSpk ? 'on' : ''}" onclick="handleMicBtn('${s.id}',event)"><i class="fas fa-microphone"></i></button>
                            <button class="ib eye ${curView === s.id ? 'on' : ''}" onclick="viewStudent('${s.id}');event.stopPropagation()"><i class="fas fa-eye"></i></button>
                            <button class="ib kick" onclick="kickStudent('${s.id}',event)"><i class="fas fa-user-times"></i></button>
                        </div>
                    </div>
                </div>`;
            });
            list.innerHTML = html;
        }

        // عرض السبورة الرئيسية
        window.viewMain = () => {
            curView = 'main';
            document.getElementById('blbl').textContent = 'السبورة الرئيسية';
            document.getElementById('viewlbl').textContent = '';
            renderList();
        };

        // عرض سبورة طالب معين
        window.viewStudent = (id) => {
            curView = id;
            const name = students[id]?.name || id;
            document.getElementById('blbl').innerHTML = `✏️ سبورة ${name} <span style="font-size:10px; background:rgba(59,130,246,0.25); padding:1px 7px; border-radius:8px; margin-right:5px">يمكنك الكتابة</span>`;
            document.getElementById('viewlbl').textContent = `تعرض: ${name}`;
            renderList();
            // تحميل صورة سبورة الطالب إذا كانت موجودة
            db.ref('boardImg/stu/' + id).once('value', (snap) => {
                const d = snap.val();
                if (d && d.data) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    img.src = d.data;
                }
            });
        };

        // التحكم بالميكروفون
        window.handleMicBtn = (id, e) => {
            e.stopPropagation();
            if (curSpeaker === id) {
                db.ref('micPermissions/' + id).remove();
                curSpeaker = null;
                document.getElementById('spkLbl').textContent = '';
            } else {
                if (curSpeaker) db.ref('micPermissions/' + curSpeaker).remove();
                curSpeaker = id;
                db.ref('micPermissions/' + id).set({ allowed: true });
                db.ref('handRaised/' + id).remove();
                if (students[id]) students[id].hand = false;
                document.getElementById('spkLbl').textContent = students[id]?.name || '';
            }
            renderList();
        };

        // طرد طالب
        window.kickStudent = (id, e) => {
            e.stopPropagation();
            if (!confirm('طرد هذا الطالب؟')) return;
            if (curSpeaker === id) {
                db.ref('micPermissions/' + id).remove();
                curSpeaker = null;
                document.getElementById('spkLbl').textContent = '';
            }
            delete students[id];
            db.ref('approvedStudents/' + id).remove();
            db.ref('onlineStudents/' + id).remove();
            db.ref('micRequests/' + id).remove();
            db.ref('kicked/' + id).set({ ts: Date.now() });
            renderList();
        };

        // ================== الاستماع لتغييرات Firebase ==================
        // طلبات الانضمام
        db.ref('joinRequests').on('child_added', (snap) => {
            const req = snap.val();
            if (req) {
                students[req.studentId] = { id: req.studentId, name: req.studentName, online: true, hand: false };
                db.ref('approvedStudents/' + req.studentId).set({ id: req.studentId, name: req.studentName });
                snap.ref.remove();
                renderList();
                // إظهار إشعار (اختياري)
            }
        });

        // حالة الاتصال للطلاب
        db.ref('onlineStudents').on('value', (snap) => {
            const data = snap.val() || {};
            Object.keys(students).forEach(id => {
                students[id].online = !!data[id];
            });
            renderList();
        });

        // رفع اليد
        db.ref('handRaised').on('value', (snap) => {
            const data = snap.val() || {};
            Object.keys(students).forEach(id => {
                if (students[id]) students[id].hand = !!data[id];
            });
            renderList();
        });

        // طلبات الميكروفون
        db.ref('micRequests').on('child_added', (snap) => {
            const req = snap.val();
            if (req) {
                // يمكن إظهار إشعار للمدرس
                snap.ref.remove();
            }
        });

        // ================== صوت الطالب ==================
        const stuAudio = document.getElementById('stuAudio');
        let lastStuTs = 0;
        db.ref('stuAudio/chunk').on('value', (snap) => {
            const d = snap.val();
            if (!d || !d.data || d.ts <= lastStuTs) return;
            lastStuTs = d.ts;
            const url = URL.createObjectURL(b64toBlob(d.data));
            stuAudio.src = url;
            stuAudio.play().catch(() => {});
        });

        // ================== إنهاء الجلسة ==================
        window.endSession = () => {
            if (!confirm('إنهاء الجلسة وطرد جميع الطلاب؟')) return;
            db.ref('sessionEnded').set({ ts: Date.now() });
            setTimeout(() => {
                ['joinRequests','approvedStudents','onlineStudents','handRaised',
                 'micRequests','micPermissions','stroke','boardImg','boardCmd',
                 'audio','stuAudio','audioMeta','kicked','teacher','sessionEnded'
                ].forEach(p => db.ref(p).remove());
                location.reload();
            }, 1500);
        };

        // دالة مساعدة لتحويل base64 إلى blob
        function b64toBlob(b64) {
            const [header, data] = b64.split(',');
            const mime = header.match(/:(.*?);/)[1];
            const bin = atob(data);
            const buf = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
            return new Blob([buf], { type: mime });
        }

        // تحديث وقت الاستجابة (للشكل)
        setInterval(() => {
            document.getElementById('lat').textContent = Math.floor(10 + Math.random() * 25);
        }, 3000);

        // تسجيل المدرس
        db.ref('teacher/online').set({ on: true });
        window.addEventListener('beforeunload', () => {
            db.ref('teacher/online').remove();
        });
    </script>
</body>
</html>
