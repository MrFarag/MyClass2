<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المدرس - MyClass2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #1e1e2f;
            color: white;
        }
        header {
            background: #2d2d44;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff9800;
            flex-shrink: 0;
        }
        .logo i { color: #ff9800; margin-left: 8px; }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .mic-status {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .mic-status.active {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }
        .mic-status i { font-size: 20px; }

        /* زر الطلب (يظهر دائماً) */
        .request-preview {
            background: #ff9800;
            color: #1e1e2f;
            padding: 5px 10px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 250px;
            transition: 0.2s;
        }
        .request-preview.pulse {
            animation: pulse 1s infinite;
        }
        .request-preview .student-name-short {
            background: rgba(0,0,0,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
            cursor: default;
        }
        .request-preview .student-name-short:hover {
            background: rgba(0,0,0,0.4);
            max-width: none;
            overflow: visible;
            position: relative;
        }
        .request-preview .request-actions {
            display: flex;
            gap: 5px;
        }
        .req-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
        }
        .req-btn.accept:hover { background: #4caf50; }
        .req-btn.reject:hover { background: #f44336; }
        .req-btn.mic:hover { background: #2196f3; }
        .req-btn.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .canvas-container {
            flex: 1;
            overflow: auto;
            background: #fff;
        }
        canvas {
            display: block;
            width: 2000px;
            height: 1500px;
            background: white;
            touch-action: none;
            cursor: crosshair;
        }
        .toolbar {
            background: #2d2d44;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            border-top: 2px solid #ff9800;
            align-items: center;
            flex-shrink: 0;
        }
        .toolbar::-webkit-scrollbar { height: 5px; background: #444; }
        .toolbar::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 5px; }
        .tool-btn {
            background: #3e3e5e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .tool-btn i { font-size: 18px; }
        .tool-btn:hover { background: #ff9800; }
        .tool-btn.active { background: #ff9800; }
        .color-picker {
            display: inline-flex;
            gap: 3px;
            background: #3e3e5e;
            padding: 4px;
            border-radius: 8px;
        }
        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        .size-slider {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3e3e5e;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .size-slider i { color: #ff9800; }
        .size-slider input {
            width: 100px;
            height: 5px;
            -webkit-appearance: none;
            background: #666;
            border-radius: 5px;
            outline: none;
        }
        .size-slider input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ff9800;
            border-radius: 50%;
            cursor: pointer;
        }

        /* قائمة الطلاب (مع أيقونات متراصة) */
        .students-panel {
            background: #2d2d44;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #444;
            flex-shrink: 0;
        }
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3e3e5e;
            padding: 5px 10px;
            margin: 3px 0;
            border-radius: 5px;
        }
        .student-item .student-name {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        .student-actions {
            display: flex;
            gap: 5px;
        }
        .student-btn {
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
        }
        .student-btn.accept:hover { background: #4caf50; }
        .student-btn.reject:hover { background: #f44336; }
        .student-btn.mic:hover { background: #2196f3; }

        /* الشريط السفلي (عداد الطلاب) */
        .bottom-status {
            background: transparent;
            padding: 5px 15px;
            text-align: left;
            font-size: 14px;
            color: #fff;
            border-top: 1px solid #444;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .student-counter {
            font-weight: bold;
            color: #4caf50;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-chalkboard-teacher"></i> MyClass2 - المدرس</div>
        <div class="header-right">
            <div class="mic-status" id="micButton" onclick="toggleAudio()" title="تشغيل/إيقاف الميكروفون">
                <i class="fas fa-microphone"></i>
            </div>
            <div class="request-preview" id="requestPreview">
                <div class="student-name-short" id="studentNameShort" title="لا يوجد طلبات">🔔</div>
                <div class="request-actions">
                    <button class="req-btn accept" id="acceptBtn" onclick="acceptCurrentRequest()" title="قبول"><i class="fas fa-check"></i></button>
                    <button class="req-btn reject" id="rejectBtn" onclick="rejectCurrentRequest()" title="رفض"><i class="fas fa-times"></i></button>
                    <button class="req-btn mic" id="micGrantBtn" onclick="grantMicToCurrentRequest()" title="منح الميكروفون"><i class="fas fa-microphone"></i></button>
                </div>
            </div>
        </div>
    </header>

    <div class="canvas-container" id="canvasContainer">
        <canvas id="board" width="2000" height="1500"></canvas>
    </div>

    <div class="toolbar">
        <button class="tool-btn active" id="penBtn" onclick="setTool('pen')" title="قلم"><i class="fas fa-pencil-alt"></i></button>
        <button class="tool-btn" id="eraserBtn" onclick="setTool('eraser')" title="ممحاة"><i class="fas fa-eraser"></i></button>
        <button class="tool-btn" onclick="clearBoard()" title="مسح"><i class="fas fa-trash-alt"></i></button>

        <div class="color-picker">
            <div class="color-btn active" style="background:#000;" onclick="setColor('#000',this)" title="أسود"></div>
            <div class="color-btn" style="background:#f44336;" onclick="setColor('#f44336',this)" title="أحمر"></div>
            <div class="color-btn" style="background:#4caf50;" onclick="setColor('#4caf50',this)" title="أخضر"></div>
            <div class="color-btn" style="background:#2196f3;" onclick="setColor('#2196f3',this)" title="أزرق"></div>
            <div class="color-btn" style="background:#ff9800;" onclick="setColor('#ff9800',this)" title="برتقالي"></div>
            <div class="color-btn" style="background:#9c27b0;" onclick="setColor('#9c27b0',this)" title="بنفسجي"></div>
            <div class="color-btn" style="background:#ffeb3b;" onclick="setColor('#ffeb3b',this)" title="أصفر"></div>
            <div class="color-btn" style="background:#795548;" onclick="setColor('#795548',this)" title="بني"></div>
        </div>

        <div class="size-slider">
            <i class="fas fa-circle" style="font-size:12px;"></i>
            <input type="range" id="sizeSlider" min="1" max="30" value="5" oninput="setSize(this.value)">
            <i class="fas fa-circle" style="font-size:20px;"></i>
        </div>

        <button class="tool-btn" onclick="drawShape('rect')" title="مستطيل"><i class="far fa-square"></i></button>
        <button class="tool-btn" onclick="drawShape('circle')" title="دائرة"><i class="far fa-circle"></i></button>
        <button class="tool-btn" onclick="drawShape('line')" title="خط"><i class="fas fa-slash"></i></button>
        <button class="tool-btn" onclick="drawShape('arrow')" title="سهم"><i class="fas fa-long-arrow-alt-left"></i></button>
        <button class="tool-btn" onclick="importImage()" title="صورة"><i class="fas fa-file-image"></i></button>
        <button class="tool-btn" onclick="addText()" title="نص"><i class="fas fa-font"></i></button>
        <button class="tool-btn" onclick="zoomIn()" title="تكبير"><i class="fas fa-search-plus"></i></button>
        <button class="tool-btn" onclick="zoomOut()" title="تصغير"><i class="fas fa-search-minus"></i></button>
        <button class="tool-btn" onclick="saveBoard()" title="حفظ"><i class="fas fa-download"></i></button>
        <button class="tool-btn" onclick="showExamForm()" title="امتحان"><i class="fas fa-file-alt"></i></button>
        <button class="tool-btn" onclick="undo()" title="تراجع"><i class="fas fa-undo"></i></button>
        <button class="tool-btn" onclick="redo()" title="إعادة"><i class="fas fa-redo"></i></button>
        <button class="tool-btn" onclick="gridToggle()" title="شبكة"><i class="fas fa-th"></i></button>
        <button class="tool-btn" onclick="lockBoard()" title="قفل"><i class="fas fa-lock"></i></button>
        <button class="tool-btn" onclick="unlockBoard()" title="فتح"><i class="fas fa-lock-open"></i></button>
    </div>

    <!-- قائمة الطلاب (مع أيقونات) -->
    <div class="students-panel" id="studentsList">
        <!-- سيتم تعبئتها ديناميكياً -->
    </div>

    <!-- الشريط السفلي (عداد الطلاب) -->
    <div class="bottom-status">
        <span class="student-counter" id="onlineCountBottom">0 طالب</span>
        <span id="extraInfo"></span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        db.ref('teacherDrawings').remove();
        db.ref('teacherCommands').remove();

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#000';
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, 2000, 1500);

        let drawing = false;
        let lastX = 0, lastY = 0;
        let currentTool = 'pen';
        let currentSize = 5;
        let currentColor = '#000';

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e);
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = currentSize * 2;
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
            }
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            db.ref('teacherDrawings').push({
                x: pos.x, y: pos.y,
                lastX: lastX, lastY: lastY,
                color: currentTool === 'eraser' ? 'eraser' : currentColor,
                size: currentTool === 'eraser' ? currentSize * 2 : currentSize,
                timestamp: Date.now()
            });

            lastX = pos.x; lastY = pos.y;
        }

        function stopDraw() {
            drawing = false;
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        window.setTool = (tool) => {
            currentTool = tool;
            document.getElementById('penBtn').classList.toggle('active', tool === 'pen');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        };

        window.setColor = (color, el) => {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        window.setSize = (size) => { currentSize = parseInt(size); };

        window.clearBoard = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            db.ref('teacherCommands').push({ type: 'clear', timestamp: Date.now() });
        };

        window.drawShape = () => {};
        window.importImage = () => {};
        window.addText = () => {};
        window.zoomIn = () => {};
        window.zoomOut = () => {};
        window.saveBoard = () => {};
        window.showExamForm = () => {};
        window.undo = () => {};
        window.redo = () => {};
        window.gridToggle = () => {};
        window.lockBoard = () => {};
        window.unlockBoard = () => {};

        // ===== طلبات الانضمام والميكروفون (زر الطلب النابض) =====
        const requestPreview = document.getElementById('requestPreview');
        const studentNameShort = document.getElementById('studentNameShort');
        const acceptBtn = document.getElementById('acceptBtn');
        const rejectBtn = document.getElementById('rejectBtn');
        const micGrantBtn = document.getElementById('micGrantBtn');
        let requestsArray = []; // طلبات الانضمام
        let micRequestsArray = []; // طلبات الميكروفون

        function getShortName(fullName) {
            return fullName.length <= 8 ? fullName : fullName.substring(0, 5) + '...';
        }

        function updateRequestPreview() {
            // الأولوية لطلبات الميكروفون (تظهر قبل طلبات الانضمام)
            if (micRequestsArray.length > 0) {
                const req = micRequestsArray[0];
                studentNameShort.innerText = getShortName(req.studentName) + ' 🎤';
                studentNameShort.title = req.studentName + ' يطلب الميكروفون';
                requestPreview.classList.add('pulse');
                acceptBtn.classList.remove('disabled');
                rejectBtn.classList.remove('disabled');
                micGrantBtn.classList.add('disabled'); // لا حاجة لمنح الميك من هنا
                return;
            }
            if (requestsArray.length > 0) {
                const first = requestsArray[0];
                studentNameShort.innerText = getShortName(first.studentName);
                studentNameShort.title = first.studentName + ' يطلب الانضمام';
                requestPreview.classList.add('pulse');
                acceptBtn.classList.remove('disabled');
                rejectBtn.classList.remove('disabled');
                micGrantBtn.classList.remove('disabled');
                return;
            }
            // لا توجد طلبات
            studentNameShort.innerText = '🔔';
            studentNameShort.title = 'لا يوجد طلبات';
            requestPreview.classList.remove('pulse');
            acceptBtn.classList.add('disabled');
            rejectBtn.classList.add('disabled');
            micGrantBtn.classList.add('disabled');
        }

        // قبول طلب الانضمام الحالي
        window.acceptCurrentRequest = () => {
            if (micRequestsArray.length > 0) {
                // قبول طلب ميكروفون (نمنح الميك)
                const req = micRequestsArray[0];
                db.ref('micPermissions/' + req.studentId).set({ allowed: true });
                db.ref('micRequests/' + req.key).remove();
                micRequestsArray.shift();
            } else if (requestsArray.length > 0) {
                const first = requestsArray[0];
                db.ref('acceptedStudents/' + first.studentId).set(true);
                db.ref('joinRequests/' + first.key).remove();
                requestsArray.shift();
            }
            updateRequestPreview();
        };

        // رفض الطلب الحالي
        window.rejectCurrentRequest = () => {
            if (micRequestsArray.length > 0) {
                const req = micRequestsArray[0];
                db.ref('micRequests/' + req.key).remove();
                micRequestsArray.shift();
            } else if (requestsArray.length > 0) {
                const first = requestsArray[0];
                db.ref('joinRequests/' + first.key).remove();
                requestsArray.shift();
            }
            updateRequestPreview();
        };

        // منح الميكروفون لطلب الانضمام (يقبل الطالب ويمنحه الميك)
        window.grantMicToCurrentRequest = () => {
            if (requestsArray.length === 0) return;
            const first = requestsArray[0];
            db.ref('acceptedStudents/' + first.studentId).set(true);
            db.ref('micPermissions/' + first.studentId).set({ allowed: true });
            db.ref('joinRequests/' + first.key).remove();
            requestsArray.shift();
            updateRequestPreview();
        };

        // الاستماع لطلبات الانضمام
        db.ref('joinRequests').on('child_added', (snap) => {
            const req = snap.val();
            req.key = snap.key;
            requestsArray.push(req);
            updateRequestPreview();
        });
        db.ref('joinRequests').on('child_removed', (snap) => {
            requestsArray = requestsArray.filter(r => r.key !== snap.key);
            updateRequestPreview();
        });

        // الاستماع لطلبات الميكروفون
        db.ref('micRequests').on('child_added', (snap) => {
            const req = snap.val();
            req.key = snap.key;
            micRequestsArray.push(req);
            updateRequestPreview();
        });
        db.ref('micRequests').on('child_removed', (snap) => {
            micRequestsArray = micRequestsArray.filter(r => r.key !== snap.key);
            updateRequestPreview();
        });

        // ===== عرض قائمة الطلاب المقبولين =====
        const studentsList = document.getElementById('studentsList');
        let acceptedStudents = {};

        function renderStudentsList() {
            let html = '';
            for (let id in acceptedStudents) {
                const student = acceptedStudents[id];
                html += `
                    <div class="student-item">
                        <span class="student-name" title="${student.name}">${student.name}</span>
                        <div class="student-actions">
                            <button class="student-btn mic" onclick="grantMicToStudent('${id}')" title="منح الميكروفون"><i class="fas fa-microphone"></i></button>
                            <button class="student-btn reject" onclick="kickStudent('${id}')" title="طرد"><i class="fas fa-user-times"></i></button>
                        </div>
                    </div>
                `;
            }
            if (html === '') {
                html = '<div style="text-align:center; padding:10px;">لا يوجد طلاب بعد</div>';
            }
            studentsList.innerHTML = html;
        }

        window.grantMicToStudent = (id) => {
            db.ref('micPermissions/' + id).set({ allowed: true });
        };

        window.kickStudent = (id) => {
            if (confirm('طرد هذا الطالب؟')) {
                db.ref('acceptedStudents/' + id).remove();
                db.ref('onlineStudents/' + id).remove();
                db.ref('micPermissions/' + id).remove();
                db.ref('kicked/' + id).set({ ts: Date.now() });
            }
        };

        db.ref('acceptedStudents').on('value', (snap) => {
            const data = snap.val() || {};
            acceptedStudents = {};
            for (let id in data) {
                // نحتاج اسم الطالب من studentData
                db.ref('studentData/' + id).once('value', (s) => {
                    const name = s.val() ? s.val().name : 'طالب';
                    acceptedStudents[id] = { name, id };
                    renderStudentsList();
                });
            }
            const count = Object.keys(data).length;
            document.getElementById('onlineCountBottom').innerText = count + ' طالب';
            renderStudentsList(); // مؤقت لحين تحميل الأسماء
        });

        // تحديث الأسماء عندما تتغير studentData
        db.ref('studentData').on('child_added', (snap) => {
            const data = snap.val();
            if (acceptedStudents[snap.key]) {
                acceptedStudents[snap.key].name = data.name;
                renderStudentsList();
            }
        });

        // ===== الصوت عبر PeerJS =====
        let localStream, peer;
        let calls = {};

        peer = new Peer('teacher_' + Date.now());

        peer.on('open', (id) => {
            db.ref('teacherAudioId').set(id);
        });

        peer.on('call', (call) => {
            if (localStream) {
                call.answer(localStream);
            }
        });

        window.toggleAudio = async () => {
            const btn = document.getElementById('micButton');
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true,
                            sampleRate: 48000,
                            channelCount: 2
                        }
                    });
                    btn.classList.add('active');
                    db.ref('teacherAudioActive').set(true);

                    const acceptedSnap = await db.ref('acceptedStudents').once('value');
                    const accepted = acceptedSnap.val() || {};
                    for (let studentId in accepted) {
                        const studentPeerId = await db.ref('studentPeerIds/' + studentId).once('value');
                        if (studentPeerId.exists()) {
                            const call = peer.call(studentPeerId.val(), localStream);
                            calls[studentId] = call;
                        }
                    }

                    db.ref('acceptedStudents').on('child_added', async (snap) => {
                        if (localStream) {
                            const newStudentId = snap.key;
                            setTimeout(async () => {
                                const studentPeerId = await db.ref('studentPeerIds/' + newStudentId).once('value');
                                if (studentPeerId.exists()) {
                                    const call = peer.call(studentPeerId.val(), localStream);
                                    calls[newStudentId] = call;
                                }
                            }, 2000);
                        }
                    });

                } catch (err) {
                    alert('لا يمكن الوصول للميكروفون');
                }
            } else {
                for (let id in calls) {
                    calls[id].close();
                }
                calls = {};
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                btn.classList.remove('active');
                db.ref('teacherAudioActive').set(false);
                db.ref('acceptedStudents').off('child_added');
            }
        };

        window.addEventListener('beforeunload', () => {
            db.ref('teacher/online').remove();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
        });
        db.ref('teacher/online').set({ online: true });
    </script>
</body>
</html>
