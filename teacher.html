<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المدرس - MyClass2</title>
    <!-- Font Awesome - 3 روابط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #1e1e2f;
            color: white;
        }
        header {
            background: #2d2d44;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ff9800;
        }
        .logo i { color: #ff9800; margin-left: 8px; }
        .online-count {
            background: #4caf50;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        canvas {
            flex: 1;
            background: white;
            touch-action: none;
            cursor: crosshair;
        }
        /* شريط الأدوات السفلي - قابل للتمرير */
        .toolbar {
            background: #2d2d44;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            border-top: 2px solid #ff9800;
            align-items: center;
            flex-shrink: 0;
        }
        .toolbar::-webkit-scrollbar { height: 5px; background: #444; }
        .toolbar::-webkit-scrollbar-thumb { background: #ff9800; border-radius: 5px; }
        .tool-btn {
            background: #3e3e5e;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .tool-btn i { font-size: 18px; }
        .tool-btn:hover { background: #ff9800; }
        .tool-btn.active { background: #ff9800; }
        .color-picker {
            display: inline-flex;
            gap: 3px;
            background: #3e3e5e;
            padding: 4px;
            border-radius: 8px;
        }
        .color-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        /* سليدر التحكم في السمك */
        .size-slider {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #3e3e5e;
            padding: 5px 10px;
            border-radius: 20px;
        }
        .size-slider i { color: #ff9800; }
        .size-slider input {
            width: 100px;
            height: 5px;
            -webkit-appearance: none;
            background: #666;
            border-radius: 5px;
            outline: none;
        }
        .size-slider input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #ff9800;
            border-radius: 50%;
            cursor: pointer;
        }
        .students-panel {
            background: #2d2d44;
            padding: 10px;
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid #444;
            flex-shrink: 0;
        }
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3e3e5e;
            padding: 5px 10px;
            margin: 3px 0;
            border-radius: 5px;
        }
        .student-item button {
            background: #4caf50;
            border: none;
            color: white;
            padding: 3px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
        }
        .audio-indicator {
            background: #f44336;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
        }
        .audio-indicator.active { display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><i class="fas fa-chalkboard-teacher"></i> MyClass2 - المدرس</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span class="audio-indicator" id="micIndicator"><i class="fas fa-microphone"></i> الميكروفون شغال</span>
            <span class="online-count" id="onlineCount">0 طالب</span>
        </div>
    </header>

    <canvas id="board"></canvas>

    <!-- شريط الأدوات السفلي (أيقونات فقط) -->
    <div class="toolbar">
        <!-- قلم / ممحاة -->
        <button class="tool-btn active" id="penBtn" onclick="setTool('pen')" title="قلم"><i class="fas fa-pencil-alt"></i></button>
        <button class="tool-btn" id="eraserBtn" onclick="setTool('eraser')" title="ممحاة"><i class="fas fa-eraser"></i></button>
        <button class="tool-btn" onclick="clearBoard()" title="مسح"><i class="fas fa-trash-alt"></i></button>

        <!-- ألوان متعددة (دائرية) -->
        <div class="color-picker">
            <div class="color-btn active" style="background:#000;" onclick="setColor('#000',this)" title="أسود"></div>
            <div class="color-btn" style="background:#f44336;" onclick="setColor('#f44336',this)" title="أحمر"></div>
            <div class="color-btn" style="background:#4caf50;" onclick="setColor('#4caf50',this)" title="أخضر"></div>
            <div class="color-btn" style="background:#2196f3;" onclick="setColor('#2196f3',this)" title="أزرق"></div>
            <div class="color-btn" style="background:#ff9800;" onclick="setColor('#ff9800',this)" title="برتقالي"></div>
            <div class="color-btn" style="background:#9c27b0;" onclick="setColor('#9c27b0',this)" title="بنفسجي"></div>
            <div class="color-btn" style="background:#ffeb3b;" onclick="setColor('#ffeb3b',this)" title="أصفر"></div>
            <div class="color-btn" style="background:#795548;" onclick="setColor('#795548',this)" title="بني"></div>
        </div>

        <!-- سليدر التحكم في السمك -->
        <div class="size-slider">
            <i class="fas fa-circle" style="font-size:12px;"></i>
            <input type="range" id="sizeSlider" min="1" max="30" value="5" oninput="setSize(this.value)">
            <i class="fas fa-circle" style="font-size:20px;"></i>
        </div>

        <!-- أدوات إضافية (بدون رسائل منبثقة) -->
        <button class="tool-btn" onclick="drawShape('rect')" title="مستطيل"><i class="far fa-square"></i></button>
        <button class="tool-btn" onclick="drawShape('circle')" title="دائرة"><i class="far fa-circle"></i></button>
        <button class="tool-btn" onclick="drawShape('line')" title="خط"><i class="fas fa-slash"></i></button>
        <button class="tool-btn" onclick="drawShape('arrow')" title="سهم"><i class="fas fa-long-arrow-alt-left"></i></button>
        <button class="tool-btn" onclick="importImage()" title="صورة"><i class="fas fa-file-image"></i></button>
        <button class="tool-btn" onclick="addText()" title="نص"><i class="fas fa-font"></i></button>
        <button class="tool-btn" onclick="zoomIn()" title="تكبير"><i class="fas fa-search-plus"></i></button>
        <button class="tool-btn" onclick="zoomOut()" title="تصغير"><i class="fas fa-search-minus"></i></button>
        <button class="tool-btn" onclick="saveBoard()" title="حفظ"><i class="fas fa-download"></i></button>
        <button class="tool-btn" onclick="showExamForm()" title="امتحان"><i class="fas fa-file-alt"></i></button>
        <button class="tool-btn" onclick="undo()" title="تراجع"><i class="fas fa-undo"></i></button>
        <button class="tool-btn" onclick="redo()" title="إعادة"><i class="fas fa-redo"></i></button>
        <button class="tool-btn" onclick="gridToggle()" title="شبكة"><i class="fas fa-th"></i></button>
        <button class="tool-btn" onclick="lockBoard()" title="قفل"><i class="fas fa-lock"></i></button>
        <button class="tool-btn" onclick="unlockBoard()" title="فتح"><i class="fas fa-lock-open"></i></button>

        <!-- ميكروفون -->
        <button class="tool-btn" id="audioBtn" onclick="toggleAudio()" title="ميكروفون"><i class="fas fa-microphone"></i></button>
    </div>

    <div class="students-panel" id="studentsList">
        <!-- طلبات الانضمام تظهر هنا -->
    </div>

    <!-- Firebase & PeerJS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // ===== Firebase Config =====
        const firebaseConfig = {
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // مسح جميع الرسومات القديمة عند بدء تشغيل المدرس
        db.ref('teacherDrawings').remove();
        db.ref('teacherCommands').remove();
        db.ref('boardImg').remove();

        // ===== عناصر الرسم =====
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 200; // اترك مساحة للشريط
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = 5;
        ctx.strokeStyle = '#000';

        let drawing = false;
        let lastX = 0, lastY = 0;
        let currentTool = 'pen';
        let currentSize = 5;
        let currentColor = '#000';

        // ===== الحصول على إحداثيات الرسم بدقة =====
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function startDraw(e) {
            e.preventDefault();
            drawing = true;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getPos(e);
            
            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = currentSize * 2; // ممحاة أكبر قليلاً
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = currentSize;
            }

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);

            // إرسال الرسم إلى Firebase
            db.ref('teacherDrawings').push({
                x: pos.x, y: pos.y,
                lastX: lastX, lastY: lastY,
                color: currentTool === 'eraser' ? 'eraser' : currentColor,
                size: currentTool === 'eraser' ? currentSize * 2 : currentSize,
                timestamp: Date.now()
            });

            lastX = pos.x; lastY = pos.y;
        }

        function stopDraw() {
            drawing = false;
            ctx.beginPath();
            ctx.globalCompositeOperation = 'source-over';
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mouseleave', stopDraw);
        canvas.addEventListener('touchstart', startDraw, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDraw);

        // ===== أدوات الرسم =====
        window.setTool = (tool) => {
            currentTool = tool;
            document.getElementById('penBtn').classList.toggle('active', tool === 'pen');
            document.getElementById('eraserBtn').classList.toggle('active', tool === 'eraser');
        };

        window.setColor = (color, el) => {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        };

        window.setSize = (size) => {
            currentSize = parseInt(size);
        };

        window.clearBoard = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            db.ref('teacherCommands').push({ type: 'clear', timestamp: Date.now() });
        };

        // وظائف إضافية (معطلة حالياً بدون رسائل منبثقة)
        window.drawShape = (shape) => { /* يمكن تفعيلها لاحقاً */ };
        window.importImage = () => {};
        window.addText = () => {};
        window.zoomIn = () => {};
        window.zoomOut = () => {};
        window.saveBoard = () => {};
        window.showExamForm = () => {};
        window.undo = () => {};
        window.redo = () => {};
        window.gridToggle = () => {};
        window.lockBoard = () => {};
        window.unlockBoard = () => {};

        // ===== نظام الموافقة على الطلاب =====
        const studentsList = document.getElementById('studentsList');
        db.ref('joinRequests').on('child_added', (snap) => {
            const req = snap.val();
            const div = document.createElement('div');
            div.className = 'student-item';
            div.id = 'req_' + snap.key;
            div.innerHTML = `
                <span><i class="fas fa-user-graduate"></i> ${req.studentName}</span>
                <button onclick="acceptStudent('${snap.key}', '${req.studentId}')"><i class="fas fa-check"></i> قبول</button>
            `;
            studentsList.appendChild(div);
        });

        window.acceptStudent = (reqId, studentId) => {
            db.ref('acceptedStudents/' + studentId).set(true);
            db.ref('joinRequests/' + reqId).remove();
            document.getElementById('req_' + reqId).remove();
        };

        db.ref('acceptedStudents').on('value', (snap) => {
            const count = snap.val() ? Object.keys(snap.val()).length : 0;
            document.getElementById('onlineCount').innerText = count + ' طالب';
        });

        // ===== الصوت عبر PeerJS =====
        let localStream, peer;
        peer = new Peer('teacher_' + Date.now());
        peer.on('open', (id) => {
            db.ref('teacherAudioId').set(id);
        });

        // استقبال مكالمات الطلاب (إذا أراد الطالب التحدث)
        peer.on('call', (call) => {
            if (localStream) {
                call.answer(localStream);
            }
        });

        window.toggleAudio = async () => {
            const btn = document.getElementById('audioBtn');
            const indicator = document.getElementById('micIndicator');
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    btn.classList.add('active');
                    indicator.classList.add('active');
                    db.ref('teacherAudioActive').set(true);
                } catch (err) {
                    alert('لا يمكن الوصول للميكروفون');
                }
            } else {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                btn.classList.remove('active');
                indicator.classList.remove('active');
                db.ref('teacherAudioActive').set(false);
            }
        };

        // استقبال طلبات الميكروفون من الطلاب
        db.ref('micRequests').on('child_added', (snap) => {
            const req = snap.val();
            if (confirm(`الطالب ${req.studentName} يريد التحدث. هل تسمح؟`)) {
                db.ref('micPermissions/' + req.studentId).set({ allowed: true });
            }
            snap.ref.remove();
        });

        window.addEventListener('beforeunload', () => {
            db.ref('teacher/online').remove();
            if (localStream) localStream.getTracks().forEach(t => t.stop());
        });
        db.ref('teacher/online').set({ online: true });
    </script>
</body>
</html>
