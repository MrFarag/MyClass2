<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الطالب - MyClass2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #1a1a2e;
            color: white;
        }
        header {
            background: #16213e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #0f3460;
        }
        .logo i { color: #e94560; margin-left: 8px; }
        canvas {
            flex: 1;
            background: white;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            background: #1a1a2e;
        }
        .login-box {
            background: #16213e;
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            border: 2px solid #e94560;
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #0f3460;
            color: white;
            text-align: center;
        }
        .login-box button {
            background: #e94560;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .wait-msg {
            margin-top: 15px;
            padding: 10px;
            background: #0f3460;
            border-radius: 8px;
            color: #ff0;
            display: none;
        }
        .error-msg { color: #ffaaaa; margin-top: 10px; }
        #mainContent {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .toolbar {
            background: #16213e;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #0f3460;
            justify-content: center;
        }
        .tool-btn {
            background: #0f3460;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn:hover { background: #e94560; }
        .status-bar {
            background: #16213e;
            padding: 5px 15px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #0f3460;
        }
        .audio-indicator {
            color: #e94560;
            display: none;
            align-items: center;
            gap: 5px;
        }
        .audio-indicator.active { display: flex; }
        /* رسالة جانبية (Toast) */
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #0f3460;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 4px solid #e94560;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 9999;
        }
        .toast-message.show { display: flex; }
    </style>
</head>
<body>
    <div class="toast-message" id="permissionToast">
        <i class="fas fa-microphone"></i>
        <span>المدرس منحك الإذن للتحدث</span>
    </div>

    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <h3><i class="fas fa-user-graduate"></i> تسجيل الدخول</h3>
            <input type="text" id="studentName" placeholder="الاسم">
            <input type="tel" id="studentPhone" placeholder="رقم التليفون">
            <input type="text" id="studentSecret" placeholder="الرقم السري">
            <button onclick="validateLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <div class="error-msg" id="loginError"></div>
            <div class="wait-msg" id="waitMsg">
                <i class="fas fa-spinner fa-spin"></i> في انتظار موافقة المدرس...
            </div>
        </div>
    </div>

    <div id="mainContent">
        <header>
            <div class="logo"><i class="fas fa-user-graduate"></i> طالب</div>
            <span id="nameChip"></span>
        </header>

        <canvas id="teacherBoard"></canvas>

        <div class="toolbar">
            <button class="tool-btn" id="handBtn" onclick="toggleHand()" title="رفع اليد"><i class="fas fa-hand-paper"></i></button>
            <button class="tool-btn" id="micBtn" onclick="requestMic()" title="طلب ميكروفون"><i class="fas fa-microphone"></i></button>
            <button class="tool-btn" id="uploadBtn" onclick="uploadImage()" title="رفع صورة"><i class="fas fa-upload"></i></button>
        </div>

        <div class="status-bar">
            <span><i class="fas fa-circle" style="color:#4caf50;"></i> متصل</span>
            <span class="audio-indicator" id="teacherAudioIndicator"><i class="fas fa-volume-up"></i> المدرس يتحدث</span>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        });
        const db = firebase.database();

        let studentId = null, studentName = '', approved = false, attemptCount = 0;

        window.validateLogin = () => {
            const name = document.getElementById('studentName').value.trim();
            const phone = document.getElementById('studentPhone').value.trim();
            const secret = document.getElementById('studentSecret').value.trim();
            if (!name || !phone || !secret) {
                document.getElementById('loginError').innerText = 'جميع الحقول مطلوبة';
                return;
            }
            if (secret !== phone.split('').reverse().join('')) {
                attemptCount++;
                if (attemptCount < 3) {
                    document.getElementById('loginError').innerText = `خطأ. المحاولات المتبقية: ${3-attemptCount}`;
                } else {
                    document.getElementById('loginError').innerText = 'انتهت المحاولات. أعد تحميل الصفحة.';
                    setTimeout(() => location.reload(), 2000);
                }
                return;
            }
            studentName = name;
            studentId = 's' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
            document.querySelector('button').disabled = true;
            document.getElementById('waitMsg').style.display = 'block';
            db.ref('joinRequests/' + studentId).set({ studentId, studentName: name, studentPhone: phone, timestamp: Date.now() });
            db.ref('acceptedStudents/' + studentId).on('value', (snap) => {
                if (snap.val() && !approved) {
                    approved = true;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'flex';
                    document.getElementById('nameChip').innerText = name;
                    startStudent();
                }
            });
        };

        function startStudent() {
            const canvas = document.getElementById('teacherBoard');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 130;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            db.ref('teacherDrawings').on('child_added', (snap) => {
                const d = snap.val();
                if (d.color === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = d.size;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = d.color;
                    ctx.lineWidth = d.size;
                }
                ctx.beginPath();
                ctx.moveTo(d.lastX, d.lastY);
                ctx.lineTo(d.x, d.y);
                ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
                snap.ref.remove();
            });

            db.ref('teacherCommands').on('child_added', (snap) => {
                if (snap.val().type === 'clear') ctx.clearRect(0,0,canvas.width,canvas.height);
                snap.ref.remove();
            });

            // ===== الصوت (استقبال) =====
            const audio = document.getElementById('audioPlayer');
            let peer = new Peer(studentId);
            peer.on('open', (id) => db.ref('studentPeerIds/' + studentId).set(id));
            peer.on('call', (call) => {
                call.answer();
                call.on('stream', (stream) => {
                    audio.srcObject = stream;
                    audio.play().catch(() => {});
                });
            });

            db.ref('teacherAudioActive').on('value', (snap) => {
                document.getElementById('teacherAudioIndicator').classList.toggle('active', snap.val());
            });

            // ===== إذن الميكروفون (رسالة جانبية) =====
            db.ref('micPermissions/' + studentId).on('value', (snap) => {
                if (snap.val() && snap.val().allowed) {
                    const toast = document.getElementById('permissionToast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 4000);
                    snap.ref.remove();
                }
            });
        }

        window.toggleHand = () => {
            db.ref('handRaised/' + studentId).set({ raised: true });
            setTimeout(() => db.ref('handRaised/' + studentId).remove(), 5000);
        };

        window.requestMic = () => {
            db.ref('micRequests/' + studentId).set({ studentId, studentName, timestamp: Date.now() });
            alert('تم إرسال الطلب');
        };

        // ===== رفع الصورة =====
        window.uploadImage = () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    // إرسال الصورة للمدرس عبر Firebase (يمكن تخزينها في قاعدة البيانات)
                    db.ref('studentImages/' + studentId).push({
                        imageData: event.target.result,
                        timestamp: Date.now()
                    });
                    alert('تم رفع الصورة');
                };
                reader.readAsDataURL(file);
            };
            input.click();
        };
    </script>
</body>
</html>
