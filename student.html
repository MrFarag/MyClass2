<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الطالب - MyClass2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a2634;
            display: flex;
            flex-direction: column;
            height: 100dvh;
            overflow: hidden;
            color: white;
        }
        .header {
            background: #2c3e50;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3498db;
        }
        .logo i { color: #3498db; }
        .status-badge {
            background: #27ae60;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .board-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2c3e50;
            margin: 8px;
            border-radius: 12px;
            overflow: hidden;
        }
        .board-header {
            padding: 10px 15px;
            background: #34495e;
            border-bottom: 2px solid #3498db;
        }
        .canvas-wrapper {
            flex: 1;
            overflow: auto;
            background: #ecf0f1;
            -webkit-overflow-scrolling: touch;
        }
        #teacherCanvas {
            width: 2000px;
            height: 1500px;
            display: block;
            background: white;
            pointer-events: none; /* الطالب لا يرسم */
        }

        .panel {
            background: #2c3e50;
            padding: 15px;
            border-top: 2px solid #3498db;
            max-height: 300px;
            overflow-y: auto;
        }
        .exam-card {
            background: #34495e;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .exam-option {
            display: block;
            margin: 8px 0;
            padding: 10px;
            background: #2c3e50;
            border-radius: 8px;
            cursor: pointer;
        }
        .exam-option.selected {
            background: #27ae60;
        }
        .file-upload label {
            background: #f39c12;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            cursor: pointer;
        }
        #submitBtn {
            background: #27ae60;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            margin-top: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        .audio-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .waiting-screen {
            text-align: center;
            padding: 30px;
        }
        #requestBtn {
            background: #3498db;
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }
        .file-item {
            background: #34495e;
            padding: 5px 10px;
            border-radius: 5px;
            margin: 3px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"><i class="fas fa-user-graduate"></i> MyClass2 - طالب</div>
        <div class="status-badge" id="connectionStatus">
            <span class="status-dot" style="background:#27ae60; width:10px; height:10px; border-radius:50%;"></span>
            متصل
        </div>
    </div>

    <!-- شاشة انتظار القبول (تظهر قبل الموافقة) -->
    <div id="waitingScreen" style="flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div style="background: #2c3e50; padding: 30px; border-radius: 20px; text-align: center;">
            <i class="fas fa-hourglass-half" style="font-size: 50px; color: #f39c12; margin-bottom: 20px;"></i>
            <h2>انتظار موافقة المدرس</h2>
            <p>سيتم تفعيل السبورة والصوت بعد القبول</p>
            <button id="requestBtn" onclick="sendJoinRequest()"><i class="fas fa-paper-plane"></i> إرسال طلب انضمام</button>
        </div>
    </div>

    <!-- المحتوى الرئيسي (يظهر بعد القبول) -->
    <div id="mainContent" style="display: none; flex:1; flex-direction: column;">
        <!-- سبورة المدرس -->
        <div class="board-container">
            <div class="board-header">
                <span><i class="fas fa-chalkboard-teacher"></i> سبورة المدرس</span>
                <span id="audioIndicator" style="display:none;"><i class="fas fa-volume-up"></i> صوت مباشر</span>
            </div>
            <div class="canvas-wrapper" id="teacherWrapper">
                <canvas id="teacherCanvas"></canvas>
            </div>
        </div>

        <!-- لوحة الامتحانات والملفات -->
        <div class="panel">
            <div id="examDisplay"></div>
            <div id="teacherFilesDisplay"></div>
            <div id="fileUploadArea" style="display:none;">
                <div class="file-upload">
                    <label for="fileInput"><i class="fas fa-upload"></i> رفع ملف الإجابة</label>
                    <input type="file" id="fileInput" style="display:none;">
                </div>
            </div>
            <button id="submitBtn" style="display:none;" onclick="submitAnswer()">إرسال الإجابة</button>
        </div>
    </div>

    <!-- Firebase & PeerJS -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // -------------------- Firebase --------------------
        const firebaseConfig = {
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        const studentId = 'student_' + Date.now() + '_' + Math.random().toString(36).substr(2,5);
        let accepted = false;

        // -------------------- طلب الانضمام --------------------
        window.sendJoinRequest = () => {
            const btn = document.getElementById('requestBtn');
            btn.disabled = true;
            btn.innerHTML = 'جاري الإرسال...';
            db.ref('joinRequests').push({
                studentId: studentId,
                timestamp: Date.now()
            }).then(() => {
                btn.innerHTML = 'تم الإرسال، انتظر...';
            });
        };

        // مراقبة القبول
        db.ref('acceptedStudents/' + studentId).on('value', (snap) => {
            if (snap.val() === true && !accepted) {
                accepted = true;
                document.getElementById('waitingScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'flex';
                startStudent(); // بدء تحميل الرسم والصوت
            }
        });

        // -------------------- بدء جلسة الطالب بعد القبول --------------------
        function startStudent() {
            // استقبال رسم المدرس
            const teacherCanvas = document.getElementById('teacherCanvas');
            const teacherCtx = teacherCanvas.getContext('2d');
            teacherCanvas.width = 2000; teacherCanvas.height = 1500;
            teacherCtx.lineCap = 'round'; teacherCtx.lineJoin = 'round';

            db.ref('teacherDrawings').on('child_added', (snap) => {
                const d = snap.val();
                teacherCtx.strokeStyle = d.color === 'eraser' ? '#ffffff' : d.color;
                teacherCtx.lineWidth = d.size;
                teacherCtx.beginPath();
                teacherCtx.moveTo(d.lastX, d.lastY);
                teacherCtx.lineTo(d.x, d.y);
                teacherCtx.stroke();
            });

            db.ref('teacherCommands').on('child_added', (snap) => {
                if (snap.val().type === 'clear') {
                    teacherCtx.clearRect(0, 0, teacherCanvas.width, teacherCanvas.height);
                }
            });

            // -------------------- الصوت (PeerJS) --------------------
            let peer, call;
            peer = new Peer(studentId);

            peer.on('open', (id) => {
                console.log('Student peer ID:', id);
            });

            // الاستماع لبث المدرس
            db.ref('teacherAudioId').on('value', (snap) => {
                const teacherId = snap.val();
                db.ref('teacherAudioActive').on('value', async (activeSnap) => {
                    if (activeSnap.val() && teacherId) {
                        try {
                            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                            call = peer.call(teacherId, stream);
                            document.getElementById('audioIndicator').style.display = 'inline';
                        } catch (e) {
                            console.log('لا يمكن إنشاء اتصال صوتي');
                        }
                    } else {
                        if (call) call.close();
                        document.getElementById('audioIndicator').style.display = 'none';
                    }
                });
            });

            // -------------------- استقبال الامتحانات --------------------
            db.ref('currentExam').on('value', (snap) => {
                const exam = snap.val();
                const display = document.getElementById('examDisplay');
                const fileArea = document.getElementById('fileUploadArea');
                const submitBtn = document.getElementById('submitBtn');
                if (!exam) {
                    display.innerHTML = '';
                    fileArea.style.display = 'none';
                    submitBtn.style.display = 'none';
                    return;
                }

                if (exam.type === 'text') {
                    let optionsHtml = '';
                    exam.options.forEach((opt) => {
                        optionsHtml += `<label class="exam-option" onclick="selectOption(this, '${opt}')">${opt}</label>`;
                    });
                    display.innerHTML = `
                        <div class="exam-card">
                            <div class="exam-question">${exam.question}</div>
                            ${optionsHtml}
                        </div>
                    `;
                    fileArea.style.display = 'none';
                    submitBtn.style.display = 'block';
                    submitBtn.innerText = 'إرسال الإجابة';
                } else if (exam.type === 'image') {
                    display.innerHTML = `
                        <div class="exam-card">
                            <img src="${exam.imageUrl}" style="max-width:100%; max-height:200px; border-radius:8px;">
                        </div>
                    `;
                    fileArea.style.display = 'block';
                    submitBtn.style.display = 'block';
                    submitBtn.innerText = 'رفع الإجابة';
                }
            });

            // -------------------- استقبال ملفات المدرس --------------------
            db.ref('teacherFiles').on('child_added', (snap) => {
                const file = snap.val();
                const filesDiv = document.getElementById('teacherFilesDisplay');
                const div = document.createElement('div');
                div.className = 'file-item';
                div.innerHTML = `<a href="${file.fileUrl}" target="_blank">📎 ${file.fileName}</a>`;
                filesDiv.appendChild(div);
            });
        }

        // -------------------- إرسال الإجابة --------------------
        let selectedAnswer = '';
        window.selectOption = (el, opt) => {
            document.querySelectorAll('.exam-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedAnswer = opt;
        };

        window.submitAnswer = () => {
            const examRef = db.ref('currentExam').once('value', (snap) => {
                const exam = snap.val();
                if (exam.type === 'text') {
                    if (!selectedAnswer) {
                        alert('اختر إجابة أولاً');
                        return;
                    }
                    db.ref('submissions').push({
                        studentId: studentId,
                        answer: selectedAnswer,
                        timestamp: Date.now()
                    });
                    alert('تم إرسال الإجابة');
                } else if (exam.type === 'image') {
                    const fileInput = document.getElementById('fileInput');
                    fileInput.click();
                    fileInput.onchange = async (e) => {
                        const file = e.target.files[0];
                        const storageRef = storage.ref('submissions/' + Date.now() + '_' + file.name);
                        await storageRef.put(file);
                        const url = await storageRef.getDownloadURL();
                        db.ref('submissions').push({
                            studentId: studentId,
                            fileUrl: url,
                            timestamp: Date.now()
                        });
                        alert('تم رفع الملف');
                    };
                }
            });
        };

        // -------------------- تنظيف عند الخروج --------------------
        window.addEventListener('beforeunload', () => {
            db.ref('joinRequests').orderByChild('studentId').equalTo(studentId).once('value', (snap) => {
                snap.forEach(child => child.ref.remove());
            });
        });
    </script>
</body>
</html>
