<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - الطالب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #0f1e35;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      height: 70px;
      background: linear-gradient(90deg, #071524 0%, #102040 100%);
      border-bottom: 2px solid #00aaff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .teacher-info {
      display: flex;
      flex-direction: column;
    }
    .teacher-name {
      font-size: 18px;
      font-weight: 900;
      color: #00aaff;
    }
    .teacher-desc {
      font-size: 12px;
      color: #ccc;
    }
    .teacher-phone {
      font-size: 14px;
      color: #00aaff;
      direction: ltr;
    }
    .top-center {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0,0,0,0.3);
      padding: 4px 20px;
      border-radius: 30px;
    }
    .top-center span { font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .top-center i { color: #00aaff; }

    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }

    /* لوحة المشاركين */
    .students-panel {
      width: 260px;
      background: #122040;
      border-radius: 24px;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border: 1px solid #1e4080;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #00aaff;
    }
    .student-item {
      background: #0f1e35;
      border-radius: 40px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #1e4080;
    }
    .student-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #00aaff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #000;
    }
    .student-info { flex: 1; }
    .student-name { font-weight: 700; font-size: 13px; }
    .student-status { font-size: 10px; color: #ccc; display: flex; align-items: center; gap: 4px; }

    /* منطقة السبورة */
    .board-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .board-header {
      height: 40px;
      background: #122040;
      border-radius: 20px 20px 0 0;
      padding: 0 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #1e4080;
      border-bottom: none;
    }
    .board-header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .board-header-right i { color: #00aaff; cursor: pointer; font-size: 16px; }
    .current-board-title { font-weight: 700; color: #00aaff; }
    .main-board {
      flex: 1;
      background: #122040;
      border-radius: 0 0 20px 20px;
      border: 1px solid #1e4080;
      overflow: hidden;
    }
    .main-board canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none;
    }

    /* شريط الأدوات السفلي */
    .bottom-bar {
      height: 80px;
      background: #071524;
      border-top: 2px solid #00aaff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .toolbar-tools {
      display: flex;
      gap: 20px;
      background: #0f1e35;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid #1e4080;
    }
    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #aaa;
      cursor: pointer;
      font-size: 10px;
    }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #00aaff; }
    .color-picker {
      display: flex;
      gap: 5px;
      background: #122040;
      padding: 5px 10px;
      border-radius: 40px;
    }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.active { border-color: #fff; }
    .toolbar-actions {
      display: flex;
      gap: 12px;
    }
    .action-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: #1e3a60;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-circle:hover { filter: brightness(1.2); }
    .btn-mic.active { background: #00aaff; color: #000; }
    .btn-hand.active { background: #f59e0b; animation: blink-animation 1s infinite; }
    .image-upload input { display: none; }
    .image-upload label {
      background: #00aaff;
      color: #000;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    @keyframes blink-animation {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="teacher-info">
      <span class="teacher-name">Mr_Farag_Kohail</span>
      <span class="teacher-desc">منصة الفيزياء للثانوية العامة</span>
    </div>
    <div class="teacher-phone">01141010981</div>
    <div class="top-center">
      <span><i class="fas fa-circle" style="color:#4CAF50;"></i> مباشر</span>
      <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
      <span><i class="fas fa-clock"></i> <span id="latency">24ms</span></span>
    </div>
  </div>

  <div class="main-layout">
    <!-- لوحة الطلاب -->
    <div class="students-panel">
      <div class="panel-header">
        <span><i class="fas fa-users"></i> المشاركون</span>
        <span id="studentsCountPanel">0</span>
      </div>
      <div id="participantsList"></div>
    </div>

    <!-- السبورة -->
    <div class="board-area">
      <div class="board-header">
        <div class="current-board-title">سبورة المدرس</div>
        <div class="board-header-right">
          <i class="fas fa-download" onclick="saveBoard()"></i>
          <i class="fas fa-expand" onclick="toggleFullscreen()"></i>
        </div>
      </div>
      <div class="main-board">
        <canvas id="mainBoardCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- شريط الأدوات -->
  <div class="bottom-bar">
    <div class="toolbar-tools">
      <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
      <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
      <div class="color-picker">
        <div class="color-dot active" style="background:#000000;" onclick="setColor('#000000',this)"></div>
        <div class="color-dot" style="background:#ff0000;" onclick="setColor('#ff0000',this)"></div>
        <div class="color-dot" style="background:#00ff00;" onclick="setColor('#00ff00',this)"></div>
        <div class="color-dot" style="background:#0000ff;" onclick="setColor('#0000ff',this)"></div>
      </div>
      <div class="image-upload">
        <label for="studentImage"><i class="fas fa-image"></i> رفع الواجب</label>
        <input type="file" id="studentImage" accept="image/*" onchange="uploadImage(this)">
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="action-circle btn-mic" id="micBtn" title="طلب المايك" onclick="requestMic()"><i class="fas fa-microphone"></i></button>
      <button class="action-circle btn-hand" id="handBtn" onclick="toggleHand()"><i class="fas fa-hand-paper"></i></button>
    </div>
  </div>

  <audio id="audioPlayer" style="display:none;"></audio>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    (function() {
      firebase.initializeApp({
        apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
        databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
      });
      const db = firebase.database();

      // ============================================================
      // المتغيرات
      // ============================================================
      let studentId = 's' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
      let studentName = '';
      let approved = false;
      let handRaised = false;
      let currentTool = 'pen';
      let currentColor = '#000000';
      let currentSize = 4;
      let isDrawing = false;
      let lastX = 0, lastY = 0;
      let micPermission = false;
      let mediaStream = null;
      let mediaRecorder = null;
      let lastImageTimestamp = 0;  // لمنع عرض الصور القديمة

      const mainCanvas = document.getElementById('mainBoardCanvas');
      const mainCtx = mainCanvas.getContext('2d');

      // ============================================================
      // ضبط حجم الكانفاس والحفاظ على المحتوى
      // ============================================================
      let lastImageData = null; // آخر صورة/رسم لحفظه عند تغيير الحجم

      function resizeAndRedraw() {
        // حفظ المحتوى الحالي
        let oldImageData = null;
        if (mainCanvas.width > 0 && mainCanvas.height > 0) {
          oldImageData = mainCtx.getImageData(0, 0, mainCanvas.width, mainCanvas.height);
        }
        const parent = mainCanvas.parentElement;
        mainCanvas.width = parent.clientWidth;
        mainCanvas.height = parent.clientHeight;
        mainCtx.fillStyle = '#fff';
        mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
        mainCtx.lineCap = 'round';
        mainCtx.lineJoin = 'round';
        mainCtx.lineWidth = currentSize;

        if (oldImageData) {
          try {
            mainCtx.putImageData(oldImageData, 0, 0);
          } catch (e) {
            // إذا فشل (أبعاد مختلفة)، نعيد الرسم من آخر صورة معروفة
            if (lastImageData) {
              const img = new Image();
              img.onload = () => mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
              img.src = lastImageData;
            }
          }
        }
      }
      window.addEventListener('resize', () => {
        setTimeout(resizeAndRedraw, 100);
      });
      setTimeout(resizeAndRedraw, 100);

      // ============================================================
      // طلب الانضمام (لا يمكن الدخول بدون موافقة)
      // ============================================================
      (function joinClass() {
        let name = prompt('أدخل اسمك:');
        if (!name) name = 'طالب' + Math.floor(Math.random()*1000);
        studentName = name;
        db.ref('joinRequests/' + studentId).set({ id: studentId, name: studentName, ts: Date.now() });
      })();

      // مراقبة الموافقة
      db.ref('approvedStudents/' + studentId).on('value', snap => {
        if (snap.exists() && !approved) {
          approved = true;
          db.ref('onlineStudents/' + studentId).set({ name: studentName, online: true });
          db.ref('joinRequests/' + studentId).remove();
          setupListeners();
          connectToTeacherAudio();
        }
      });

      // تتبع آخر نقطة لكل stroke ID
      let lastDrawPoint = null;
      let lastDrawSid = null;
      let lastDrawColor = null;
      let lastDrawSize = null;

      function setupListeners() {
        // رسم المدرس - ربط النقاط بشكل سلس باستخدام strokeId
        db.ref('draw_t').on('child_added', snap => {
          const d = snap.val();
          if (!d || !d.points || d.points.length === 0) return;

          const color = d.color; // null = ممحاة
          const size = d.size || 4;
          const pts = d.points;
          const sid = d.sid || null;

          mainCtx.strokeStyle = color === null ? '#fff' : color;
          mainCtx.lineWidth = color === null ? size * 5 : size;
          mainCtx.lineCap = 'round';
          mainCtx.lineJoin = 'round';
          mainCtx.beginPath();

          // نفس الـ stroke ID → ربط بآخر نقطة لإزالة التقطع
          if (lastDrawPoint && sid && sid === lastDrawSid) {
            mainCtx.moveTo(lastDrawPoint.x, lastDrawPoint.y);
          } else {
            mainCtx.moveTo(pts[0].x * mainCanvas.width, pts[0].y * mainCanvas.height);
          }

          for (let i = 0; i < pts.length; i++) {
            mainCtx.lineTo(pts[i].x * mainCanvas.width, pts[i].y * mainCanvas.height);
          }
          mainCtx.stroke();

          const last = pts[pts.length - 1];
          lastDrawPoint = { x: last.x * mainCanvas.width, y: last.y * mainCanvas.height };
          lastDrawSid = sid;
          lastDrawColor = color;
          lastDrawSize = size;

          lastImageData = mainCanvas.toDataURL();
        });

        // صورة السبورة الرئيسية
        db.ref('boardImg/main').on('value', snap => {
          const data = snap.val();
          if (data && data.data && data.ts > lastImageTimestamp) {
            lastImageTimestamp = data.ts;
            lastImageData = data.data;
            const img = new Image();
            img.onload = () => {
              mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
              mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
            };
            img.src = data.data;
          }
        });

        // الصورة المصححة من المدرس
        db.ref('boardImg/stu/' + studentId).on('value', snap => {
          const data = snap.val();
          if (data && data.data && data.byTeacher && data.ts > lastImageTimestamp) {
            lastImageTimestamp = data.ts;
            lastImageData = data.data;
            const img = new Image();
            img.onload = () => {
              mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
              mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
            };
            img.src = data.data;
          }
        });

        // أمر المسح
        db.ref('boardCmd/main').on('child_added', snap => {
          if (snap.val()?.type === 'clear') {
            mainCtx.fillStyle = '#fff';
            mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
            lastImageData = null;
          }
          snap.ref.remove();
        });

        // تحديث قائمة المشاركين
        db.ref('onlineStudents').on('value', snap => {
          updateParticipantsList(snap.val() || {});
        });
      }

      // تحديث قائمة المشاركين
      function updateParticipantsList(online) {
        const listDiv = document.getElementById('participantsList');
        let html = '';
        html += `
          <div class="student-item">
            <div class="student-avatar" style="background:#ffaa00;">م</div>
            <div class="student-info">
              <div class="student-name">المدرس</div>
              <div class="student-status"><i class="fas fa-chalkboard-teacher"></i> يشرح</div>
            </div>
          </div>
        `;
        Object.values(online).forEach(s => {
          if (s.name && s.name !== studentName) {
            html += `
              <div class="student-item">
                <div class="student-avatar">${s.name.charAt(0)}</div>
                <div class="student-info">
                  <div class="student-name">${s.name}</div>
                  <div class="student-status"><i class="fas fa-headphones"></i> مستمع</div>
                </div>
              </div>
            `;
          }
        });
        if (studentName && approved) {
          html += `
            <div class="student-item">
              <div class="student-avatar" style="background:#ffaa00;">${studentName.charAt(0)}</div>
              <div class="student-info">
                <div class="student-name">${studentName} (أنت)</div>
                <div class="student-status"><i class="fas fa-user"></i> متصل</div>
              </div>
            </div>
          `;
        }
        listDiv.innerHTML = html;
        document.getElementById('studentsCount').textContent = Object.keys(online).length + 1;
        document.getElementById('studentsCountPanel').textContent = Object.keys(online).length + 1;
      }

      // ============================================================
      // رسم الطالب (مع تحسين الجودة)
      // ============================================================
      function getCanvasPoint(e) {
        const rect = mainCanvas.getBoundingClientRect();
        const scaleX = mainCanvas.width / rect.width;
        const scaleY = mainCanvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      }

      let points = [], sendTimer = null, strokeId = 0;

      function startDraw(e) {
        e.preventDefault();
        if (!approved) return;
        isDrawing = true;
        strokeId = Date.now();
        const p = getCanvasPoint(e);
        lastX = p.x; lastY = p.y;
        points = [{ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height }];
        mainCtx.lineCap = 'round';
        mainCtx.lineJoin = 'round';
        mainCtx.beginPath();
        mainCtx.moveTo(p.x, p.y);
      }

      function draw(e) {
        e.preventDefault();
        if (!isDrawing || !approved) return;
        const p = getCanvasPoint(e);
        mainCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
        mainCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
        mainCtx.lineTo(p.x, p.y);
        mainCtx.stroke();
        mainCtx.beginPath();
        mainCtx.moveTo(p.x, p.y);
        points.push({ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height });
        if (!sendTimer) {
          sendTimer = setTimeout(() => {
            if (points.length) {
              db.ref('draw_st').push({
                points: points,
                color: currentTool === 'eraser' ? null : currentColor,
                size: currentSize,
                studentId: studentId,
                sid: strokeId,
                ts: Date.now()
              });
              points = [];
            }
            sendTimer = null;
          }, 20);
        }
      }

      function stopDraw() {
        if (!isDrawing || !approved) return;
        isDrawing = false;
        if (points.length) {
          db.ref('draw_st').push({
            points: points,
            color: currentTool === 'eraser' ? null : currentColor,
            size: currentSize,
            studentId: studentId,
            sid: strokeId,
            ts: Date.now()
          });
          points = [];
        }
        if (sendTimer) clearTimeout(sendTimer);
        sendTimer = null;
        // تحديث lastImageData بعد الرسم
        lastImageData = mainCanvas.toDataURL();
      }

      mainCanvas.addEventListener('mousedown', startDraw);
      mainCanvas.addEventListener('mousemove', draw);
      mainCanvas.addEventListener('mouseup', stopDraw);
      mainCanvas.addEventListener('mouseleave', stopDraw);
      mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
      mainCanvas.addEventListener('touchmove', draw, { passive: false });
      mainCanvas.addEventListener('touchend', stopDraw);

      // ============================================================
      // أدوات الرسم
      // ============================================================
      window.setTool = function(tool) {
        currentTool = tool;
        document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
        document.getElementById('toolPen').classList.toggle('active', tool === 'pen');
        document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
      };
      window.setColor = function(color, el) {
        currentColor = color;
        document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
      };
      window.uploadImage = function(input) {
        if (!input.files[0] || !approved) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            // الحفاظ على نسبة أبعاد الصورة
            const canvasW = mainCanvas.width;
            const canvasH = mainCanvas.height;
            const imgRatio = img.width / img.height;
            const canvasRatio = canvasW / canvasH;
            let drawW, drawH, drawX, drawY;
            if (imgRatio > canvasRatio) {
              drawW = canvasW;
              drawH = canvasW / imgRatio;
            } else {
              drawH = canvasH;
              drawW = canvasH * imgRatio;
            }
            drawX = (canvasW - drawW) / 2;
            drawY = (canvasH - drawH) / 2;
            mainCtx.fillStyle = '#fff';
            mainCtx.fillRect(0, 0, canvasW, canvasH);
            mainCtx.drawImage(img, drawX, drawY, drawW, drawH);
            const dataUrl = mainCanvas.toDataURL('image/jpeg', 0.85);
            lastImageData = dataUrl;
            db.ref('studentImages').push({
              studentId: studentId,
              studentName: studentName,
              data: dataUrl,
              ts: Date.now()
            });
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      };
      window.saveBoard = function() {
        const dataURL = mainCanvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = 'myboard.png';
        link.href = dataURL;
        link.click();
      };
      window.toggleFullscreen = function() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      };

      // ============================================================
      // رفع اليد (مع وميض)
      // ============================================================
      window.toggleHand = function() {
        if (!approved) return;
        handRaised = !handRaised;
        const btn = document.getElementById('handBtn');
        btn.classList.toggle('active', handRaised);
        if (handRaised) {
          db.ref('handRaised/' + studentId).set(true);
        } else {
          db.ref('handRaised/' + studentId).remove();
        }
      };

      // ============================================================
      // طلب المايك
      // ============================================================
      const RTC_CONFIG = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      };

      // ============================================================
      // استقبال صوت المدرس عبر WebRTC
      // ============================================================
      let teacherPc = null;

      async function connectToTeacherAudio() {
        if (teacherPc) return;
        db.ref(`webrtc/teacher_to_stu/${studentId}/offer`).on('value', async snap => {
          const offer = snap.val();
          if (!offer) return;
          if (teacherPc && teacherPc.signalingState !== 'stable') return;
          if (!teacherPc) {
            teacherPc = new RTCPeerConnection(RTC_CONFIG);
            teacherPc.ontrack = (e) => {
              const audio = document.getElementById('audioPlayer');
              audio.srcObject = e.streams[0];
              audio.play().catch(() => {});
            };
            teacherPc.onicecandidate = (e) => {
              if (e.candidate) {
                db.ref(`webrtc/stu_to_teacher/${studentId}/ice`).push(e.candidate.toJSON());
              }
            };
            db.ref(`webrtc/teacher_to_stu/${studentId}/ice`).on('child_added', async snap2 => {
              const ice = snap2.val();
              if (ice && teacherPc) try { await teacherPc.addIceCandidate(new RTCIceCandidate(ice)); } catch(e) {}
            });
          }
          await teacherPc.setRemoteDescription(new RTCSessionDescription(offer));
          const answer = await teacherPc.createAnswer();
          await teacherPc.setLocalDescription(answer);
          db.ref(`webrtc/teacher_to_stu/${studentId}/answer`).set({ sdp: answer.sdp, type: answer.type });
        });

        // إخطار المدرس للاتصال
        db.ref('webrtc/requestPeer').push(studentId);
      }

      // ============================================================
      // إرسال صوت الطالب عبر WebRTC
      // ============================================================
      let studentStream = null;
      let studentPc = null;
      let speaking = false;

      window.requestMic = async function() {
        if (!approved) return;
        const micBtn = document.getElementById('micBtn');
        if (!speaking) {
          try {
            studentStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
            speaking = true;
            micBtn.classList.add('active');
            micBtn.title = 'إيقاف المايك';

            // إرسال طلب الكلام للمدرس
            db.ref('micRequests/' + studentId).set({ studentId, studentName, ts: Date.now() });

            // انتظار إذن المايك لبدء WebRTC
            db.ref('micPermissions/' + studentId).on('value', async snap => {
              if (!snap.val() || !snap.val().allowed) return;
              if (studentPc) return;
              studentPc = new RTCPeerConnection(RTC_CONFIG);
              studentStream.getTracks().forEach(t => studentPc.addTrack(t, studentStream));

              studentPc.onicecandidate = (e) => {
                if (e.candidate) {
                  db.ref(`webrtc/stu_ice/${studentId}`).push(e.candidate.toJSON());
                }
              };

              db.ref(`webrtc/stu_answer/${studentId}`).on('value', async snap2 => {
                const ans = snap2.val();
                if (ans && studentPc.signalingState === 'have-local-offer') {
                  await studentPc.setRemoteDescription(new RTCSessionDescription(ans));
                }
              });

              db.ref(`webrtc/stu_ice_back/${studentId}`).on('child_added', async snap2 => {
                const ice = snap2.val();
                if (ice) try { await studentPc.addIceCandidate(new RTCIceCandidate(ice)); } catch(e) {}
              });

              const offer = await studentPc.createOffer();
              await studentPc.setLocalDescription(offer);
              db.ref(`webrtc/stu_offer/${studentId}`).set({ sdp: offer.sdp, type: offer.type });
            });
          } catch (err) {
            alert('تعذر الوصول للمايك. تأكد من إذن المتصفح للموقع.');
          }
        } else {
          speaking = false;
          micBtn.classList.remove('active');
          micBtn.title = 'طلب المايك';
          if (studentStream) studentStream.getTracks().forEach(t => t.stop());
          studentStream = null;
          if (studentPc) { studentPc.close(); studentPc = null; }
          db.ref('micPermissions/' + studentId).remove();
          db.ref(`webrtc/stu_offer/${studentId}`).remove();
        }
      };

      // ============================================================
      // حالة الاتصال
      // ============================================================
      setInterval(() => {
        document.getElementById('latency').textContent = Math.floor(Math.random() * 30 + 10) + 'ms';
      }, 3000);
    })();
  </script>
