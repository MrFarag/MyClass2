<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>MyClass2 - المدرس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--bl:#3b82f6;--rd:#ef4444;--gn:#22c55e;--yw:#f59e0b;
              --dk:#0f172a;--cd:#1e293b;--br:#334155;--mt:#475569;--dim:#94a3b8}
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
        html,body{height:100%;overflow:hidden;background:var(--dk);color:#fff}
        .hdr{height:50px;background:var(--cd);border-bottom:2px solid var(--br);
          padding:0 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .logo{font-size:19px;font-weight:900;color:var(--bl)}.logo b{color:#fff}
        .hchips{display:flex;gap:7px;align-items:center}
        .chip{background:var(--br);padding:3px 11px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px}
        .livec{background:var(--rd);padding:3px 11px;border-radius:20px;font-size:12px;display:flex;align-items:center;gap:5px;animation:blink 1.5s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}
        #wrap{height:calc(100vh - 50px);display:flex;flex-direction:column}
        .body{flex:1;display:flex;overflow:hidden;min-height:0}
        .sidebar{width:218px;background:var(--cd);border-left:2px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
        .stitle{padding:9px 12px;font-size:11px;font-weight:700;color:var(--dim);border-bottom:1px solid var(--br);display:flex;align-items:center;gap:5px}
        .slist{flex:1;overflow-y:auto;padding:5px}
        .sitem{padding:7px 9px;border-radius:9px;margin-bottom:3px;border:1px solid transparent;transition:.15s;cursor:pointer}
        .sitem:hover{background:var(--br)}
        .sitem.act{background:rgba(59,130,246,.13);border-color:var(--bl)}
        .ib{width:27px;height:27px;border-radius:7px;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
        .content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
        .bwrap{flex:1;background:#fff;position:relative;overflow:hidden;min-height:0}
        #mc{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair;display:block;background:#fff}
        .blbl{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.58);color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;pointer-events:none;z-index:5}
        .tbar{background:var(--cd);border-top:1px solid var(--br);padding:5px 10px;display:flex;align-items:center;gap:5px;overflow-x:auto;flex-shrink:0}
        .tb{width:34px;height:34px;border-radius:8px;border:none;background:var(--br);color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
        .tb.on{background:var(--bl);color:#fff}
        .clrs{display:flex;gap:4px;align-items:center}
        .cl{width:23px;height:23px;border-radius:50%;cursor:pointer;border:2px solid transparent}
        .cl.on{border-color:#fff;transform:scale(1.1)}
        .szs{display:flex;gap:2px;background:var(--br);padding:3px;border-radius:8px}
        .sz{border:none;background:transparent;cursor:pointer;padding:4px;border-radius:5px}
        .sz.on{background:var(--bl)}
        .sdot{background:#fff;border-radius:50%;margin:auto}
        #txtdlg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;align-items:center;justify-content:center}
        #txtdlg.on{display:flex}
        .tcard{background:var(--cd);border-radius:14px;padding:18px;width:280px;border:1px solid var(--br)}
        .sbar{height:26px;background:var(--cd);border-top:1px solid var(--br);padding:0 12px;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--dim)}
        #saveok{position:fixed;bottom:50px;right:16px;background:var(--gn);color:#fff;padding:8px 16px;border-radius:10px;display:none;z-index:700}
        .spanel{position:absolute;bottom:46px;left:42px;background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:8px;display:none;flex-wrap:wrap;gap:4px;z-index:60;width:190px}
        .spanel.on{display:flex}
        .shb{width:40px;height:40px;background:var(--br);border:none;border-radius:7px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
        .shb.on{background:var(--bl)}
    </style>
</head>
<body>
<div class="hdr">
    <div class="logo">My<b>Class</b>2</div>
    <div class="hchips">
        <div class="chip"><i class="fas fa-users"></i><span id="cnt">0</span></div>
        <div class="chip"><i class="fas fa-hand-paper" style="color:var(--yw)"></i><span id="hcnt">0</span></div>
        <div class="livec"><i class="fas fa-circle" style="font-size:7px"></i> مباشر</div>
        <button onclick="location.reload()" style="background:var(--rd);border:none;color:#fff;padding:4px 12px;border-radius:20px;cursor:pointer">إنهاء</button>
    </div>
</div>
<div id="wrap">
    <div class="body">
        <div class="content">
            <div class="bwrap" id="bwrap">
                <canvas id="mc"></canvas>
                <div class="blbl" id="blbl">السبورة الرئيسية</div>
            </div>
            <div class="tbar">
                <div class="tg" style="display:flex;gap:3px">
                    <button class="tb on" id="bpen" onclick="setTool('pen')"><i class="fas fa-pencil-alt"></i></button>
                    <button class="tb" id="bera" onclick="setTool('eraser')"><i class="fas fa-eraser"></i></button>
                    <button class="tb" id="bshp" onclick="toggleSP()"><i class="fas fa-shapes"></i></button>
                </div>
                <div class="spanel" id="spanel">
                    <button class="shb" data-s="line" onclick="pickShape(this)"><i class="fas fa-minus"></i></button>
                    <button class="shb" data-s="rect" onclick="pickShape(this)"><i class="far fa-square"></i></button>
                    <button class="shb" data-s="circle" onclick="pickShape(this)"><i class="far fa-circle"></i></button>
                    <button class="shb" data-s="text" onclick="pickShape(this)"><i class="fas fa-font"></i></button>
                </div>
                <div class="clrs">
                    <div class="cl on" style="background:#111" data-c="#111" onclick="setClr(this)"></div>
                    <div class="cl" style="background:#ef4444" data-c="#ef4444" onclick="setClr(this)"></div>
                    <div class="cl" style="background:#3b82f6" data-c="#3b82f6" onclick="setClr(this)"></div>
                    <input type="color" id="cpick" style="width:23px;height:23px;border:none;background:none;cursor:pointer" oninput="penClr=this.value">
                </div>
                <div class="szs">
                    <button class="sz" onclick="setSz(2,this)"><div class="sdot" style="width:4px;height:4px"></div></button>
                    <button class="sz on" onclick="setSz(5,this)"><div class="sdot" style="width:8px;height:8px"></div></button>
                </div>
                <button class="tb" onclick="doUndo()"><i class="fas fa-undo"></i></button>
                <button class="tb" onclick="clearBoard()" style="color:var(--rd)"><i class="fas fa-trash"></i></button>
                <button class="tb" onclick="saveImg()" style="color:var(--gn)"><i class="fas fa-download"></i></button>
            </div>
        </div>
        <div class="sidebar">
            <div class="stitle"><i class="fas fa-users"></i> الطلاب المتصلين</div>
            <div class="slist" id="slist"></div>
        </div>
    </div>
    <div class="sbar"><span>⚡ Latency: <span id="lat">0</span>ms</span><span id="viewlbl">السبورة العامة</span></div>
</div>

<div id="txtdlg">
    <div class="tcard">
        <p>أدخل النص:</p>
        <input id="txtin" type="text" style="width:100%;padding:8px;margin:10px 0;background:#334155;color:#fff;border:none;border-radius:5px">
        <div style="display:flex;gap:5px">
            <button onclick="confirmTxt()" style="flex:1;background:var(--bl);color:#fff;border:none;padding:8px;border-radius:5px">إضافة</button>
            <button onclick="closeTxt()" style="flex:1;background:var(--br);color:#fff;border:none;padding:8px;border-radius:5px">إلغاء</button>
        </div>
    </div>
</div>

<div id="saveok">✅ تم حفظ الصورة بنجاح</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
// --- تهيئة Firebase ---
const firebaseConfig = {
    apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
    authDomain: "myclaive.firebaseapp.com",
    databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
    projectId: "myclaive",
    storageBucket: "myclaive.firebasestorage.app",
    messagingSenderId: "507299311714",
    appId: "1:507299311714:web:c90440ee4353cfac17613b"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- إعدادات Canvas الأساسية ---
const CV = document.getElementById('mc'), CX = CV.getContext('2d', {alpha: false});
const DPR = window.devicePixelRatio || 1;
let penClr = '#111', penSz = 5, penTool = 'pen', penShape = null;
let isDrawing = false, startX, startY, strokeSnap = null;
let curPts = []; // لتخزين نقاط المسار الحالي

function fitCV() {
    const p = CV.parentElement;
    CV.width = p.clientWidth * DPR;
    CV.height = p.clientHeight * DPR;
    CV.style.width = p.clientWidth + 'px';
    CV.style.height = p.clientHeight + 'px';
    CX.scale(DPR, DPR);
    CX.fillStyle = '#fff'; CX.fillRect(0, 0, CV.width, CV.height);
    CX.lineCap = 'round'; CX.lineJoin = 'round';
}
window.addEventListener('resize', fitCV);
fitCV();

// --- وظائف الرسم المحسنة ---
function getXY(e) {
    const rect = CV.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x, y };
}

CV.addEventListener('mousedown', start);
CV.addEventListener('mousemove', draw);
CV.addEventListener('mouseup', stop);
CV.addEventListener('touchstart', (e) => { e.preventDefault(); start(e); });
CV.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
CV.addEventListener('touchend', stop);

function start(e) {
    isDrawing = true;
    const p = getXY(e);
    startX = p.x; startY = p.y;
    curPts = [{x: p.x, y: p.y}];
    
    // حفظ حالة الكانفاس قبل بدء رسم جديد (للإلغاء أو للأشكال)
    strokeSnap = CX.getImageData(0, 0, CV.width, CV.height);

    if(penTool === 'text') {
        document.getElementById('txtdlg').classList.add('on');
        isDrawing = false;
    }
}

function draw(e) {
    if (!isDrawing) return;
    const p = getXY(e);

    if (penTool === 'pen' || penTool === 'eraser') {
        curPts.push({x: p.x, y: p.y});
        // إعادة رسم المسار بالكامل لضمان الجودة
        CX.putImageData(strokeSnap, 0, 0);
        renderPath(curPts, penTool === 'eraser' ? '#fff' : penClr, penSz);
    } else if (penTool === 'shape') {
        CX.putImageData(strokeSnap, 0, 0);
        drawShapePreview(startX, startY, p.x, p.y);
    }
}

function stop() {
    if (!isDrawing) return;
    isDrawing = false;
    // إرسال اللقطة النهائية لـ Firebase
    sendSnapshot();
}

function renderPath(pts, color, size) {
    if (pts.length < 2) return;
    CX.beginPath();
    CX.strokeStyle = color;
    CX.lineWidth = size;
    CX.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
        CX.lineTo(pts[i].x, pts[i].y);
    }
    CX.stroke();
}

function drawShapePreview(x1, y1, x2, y2) {
    CX.beginPath();
    CX.strokeStyle = penClr;
    CX.lineWidth = penSz;
    if (penShape === 'line') {
        CX.moveTo(x1, y1); CX.lineTo(x2, y2);
    } else if (penShape === 'rect') {
        CX.strokeRect(x1, y1, x2 - x1, y2 - y1);
    } else if (penShape === 'circle') {
        let r = Math.sqrt(Math.pow(x2-x1, 2) + Math.pow(y2-y1, 2));
        CX.arc(x1, y1, r, 0, Math.PI * 2);
    }
    CX.stroke();
}

// --- أدوات التحكم ---
function setTool(t) {
    penTool = t;
    document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
    document.getElementById('b' + t).classList.add('on');
    document.getElementById('spanel').classList.remove('on');
}

function toggleSP() { document.getElementById('spanel').classList.toggle('on'); }

function pickShape(btn) {
    penShape = btn.dataset.s;
    penTool = (penShape === 'text') ? 'text' : 'shape';
    document.querySelectorAll('.shb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    toggleSP();
}

function setClr(el) {
    penClr = el.dataset.c;
    document.querySelectorAll('.cl').forEach(c => c.classList.remove('on'));
    el.classList.add('on');
}

function setSz(s, btn) {
    penSz = s;
    document.querySelectorAll('.sz').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
}

function clearBoard() {
    CX.fillStyle = '#fff';
    CX.fillRect(0, 0, CV.width, CV.height);
    sendSnapshot();
}

function sendSnapshot() {
    const data = CV.toDataURL('image/jpeg', 0.8);
    db.ref('boardImg/main').set({ data: data, ts: Date.now() });
}

function saveImg() {
    const link = document.createElement('a');
    link.download = 'board-capture.jpg';
    link.href = CV.toDataURL('image/jpeg', 1.0);
    link.click();
    const msg = document.getElementById('saveok');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
}

// --- النصوص ---
function confirmTxt() {
    const txt = document.getElementById('txtin').value;
    if (txt) {
        CX.font = `${penSz * 4}px Cairo`;
        CX.fillStyle = penClr;
        CX.fillText(txt, startX, startY);
        sendSnapshot();
    }
    closeTxt();
}
function closeTxt() { document.getElementById('txtdlg').classList.remove('on'); }

</script>
</body>
</html>
