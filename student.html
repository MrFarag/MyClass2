<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 منصة الطالب </title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: #1a2e25;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* الشريط العلوي (مطابق للصورة) */
    .top-bar {
      height: 70px;
      background: linear-gradient(90deg, #0f2a1f 0%, #1e3a2a 100%);
      border-bottom: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .teacher-info {
      display: flex;
      flex-direction: column;
    }
    .teacher-name {
      font-size: 18px;
      font-weight: 900;
      color: #ffaa00;
    }
    .teacher-desc {
      font-size: 12px;
      color: #ccc;
    }
    .teacher-phone {
      font-size: 14px;
      color: #ffaa00;
      direction: ltr;
    }
    .logo-top {
      font-size: 24px;
      font-weight: 900;
      color: #ffaa00;
    }
    .logo-top span { color: #fff; }
    .top-center {
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0,0,0,0.3);
      padding: 4px 20px;
      border-radius: 30px;
    }
    .top-center span { font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .top-center i { color: #ffaa00; }

    /* التخطيط الرئيسي */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }

    /* لوحة الطلاب (يسار) - بدون سبورة مصغرة */
    .students-panels {
      width: 340px;
      background: #1e3228;
      border-radius: 24px;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid #3a5a40;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #ffaa00;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .student-panel {
      background: #1e3228;
      border-radius: 16px;
      border: 1px solid #2a4a30;
      overflow: hidden;
    }
    .student-panel-header {
      background: #1a2e25;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #ffaa00;
    }
    .student-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #ffaa00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }
    .student-info { flex: 1; }
    .student-name { font-weight: 700; font-size: 13px; }
    .student-status { font-size: 10px; color: #ccc; display: flex; align-items: center; gap: 4px; }
    .student-actions {
      display: flex;
      gap: 12px;
      color: #ffaa00;
      font-size: 16px;
    }
    .student-actions i { cursor: pointer; transition: 0.2s; }
    .student-actions i:hover { transform: scale(1.15); color: #fff; }

    /* منطقة السبورة الرئيسية فقط */
    .board-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .main-board {
      flex: 1;
      background: #1e3228;
      border-radius: 24px;
      border: 2px solid #2a4a30;
      position: relative;
      overflow: hidden;
    }
    .board-header {
      position: absolute;
      top: 10px;
      right: 15px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 30px;
      display: flex;
      gap: 15px;
      color: #ffaa00;
      font-size: 18px;
    }
    .board-header i { cursor: pointer; }
    .main-board canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none;
    }

    /* شريط الأدوات السفلي */
    .bottom-bar {
      height: 80px;
      background: #0f2a1f;
      border-top: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .toolbar-tools {
      display: flex;
      gap: 20px;
      background: #1a2e25;
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid #3a5a40;
    }
    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #aaa;
      cursor: pointer;
      font-size: 10px;
    }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #ffaa00; }
    .color-picker {
      display: flex;
      gap: 5px;
      background: #1e3228;
      padding: 5px 10px;
      border-radius: 40px;
    }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.active { border-color: #fff; }
    .toolbar-actions {
      display: flex;
      gap: 12px;
    }
    .action-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: none;
      background: #2a4a35;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
    }
    .btn-mic.active { background: #ffaa00; color: #000; }
    .btn-hand.active { background: #f59e0b; }
    .btn-end { background: #b71c1c; }
    .image-upload input { display: none; }
    .image-upload label {
      background: #ffaa00;
      color: #000;
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <!-- الشريط العلوي مطابق للصورة (اسم المدرس يظهر للطالب) -->
  <div class="top-bar">
    <div class="teacher-info">
      <span class="teacher-name">Mr_Farag_Kohail</span>
      <span class="teacher-desc">منصة الفيزياء للثانوية العامة</span>
    </div>
    <div class="teacher-phone">01141010981</div>
    <div class="top-center">
      <span><i class="fas fa-circle" style="color:#4CAF50;"></i> مباشر</span>
      <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
      <span><i class="fas fa-clock"></i> 24ms</span>
    </div>
  </div>

  <div class="main-layout">
    <!-- لوحة الطلاب (يسار) تعرض أسماء المشاركين فقط -->
    <div class="students-panels">
      <div class="panel-title"><i class="fas fa-users"></i> المشاركون</div>
      <div id="participantsList"></div>
    </div>

    <!-- السبورة الرئيسية (يستقبل الطالب رسم المدرس) -->
    <div class="board-area">
      <div class="main-board">
        <div class="board-header">
          <i class="fas fa-download" onclick="saveBoard()"></i>
          <i class="fas fa-expand" onclick="toggleFullscreen()"></i>
        </div>
        <canvas id="mainBoardCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- شريط الأدوات السفلي للطالب (رسم على سبورته) -->
  <div class="bottom-bar">
    <div class="toolbar-tools">
      <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
      <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
      <div class="color-picker">
        <div class="color-dot active" style="background:#000000;" onclick="setColor('#000000',this)"></div>
        <div class="color-dot" style="background:#ff0000;" onclick="setColor('#ff0000',this)"></div>
        <div class="color-dot" style="background:#00ff00;" onclick="setColor('#00ff00',this)"></div>
        <div class="color-dot" style="background:#0000ff;" onclick="setColor('#0000ff',this)"></div>
      </div>
      <div class="image-upload">
        <label for="studentImage"><i class="fas fa-image"></i> رفع صورة</label>
        <input type="file" id="studentImage" accept="image/*" onchange="uploadImage(this)">
      </div>
    </div>
    <div class="toolbar-actions">
      <button class="action-circle btn-mic" id="micBtn" onclick="requestMic()"><i class="fas fa-microphone"></i></button>
      <button class="action-circle btn-hand" id="handBtn" onclick="toggleHand()"><i class="fas fa-hand-paper"></i></button>
    </div>
  </div>

  <audio id="audioPlayer" style="display:none;"></audio>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    // تهيئة Firebase
    firebase.initializeApp({
      apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
      databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
    });
    const db = firebase.database();

    let studentId = 's' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
    let studentName = '';
    let approved = false;
    let handRaised = false;
    let currentTool = 'pen';
    let currentColor = '#000000';
    let currentSize = 4;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let micPermission = false;
    let speaking = false;
    let mediaStream = null;
    let mediaRecorder = null;

    const mainCanvas = document.getElementById('mainBoardCanvas');
    const mainCtx = mainCanvas.getContext('2d');

    // ضبط حجم الكانفاس
    function resizeCanvas() {
      const parent = mainCanvas.parentElement;
      if (!parent) return;
      mainCanvas.width = parent.clientWidth;
      mainCanvas.height = parent.clientHeight;
      mainCtx.fillStyle = '#fff';
      mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
      mainCtx.lineCap = 'round';
      mainCtx.lineJoin = 'round';
      mainCtx.lineWidth = currentSize;
    }
    window.addEventListener('resize', resizeCanvas);
    setTimeout(resizeCanvas, 100);

    // طلب الانضمام
    (function joinClass() {
      let name = prompt('أدخل اسمك:');
      if (!name) { name = 'طالب' + Math.floor(Math.random()*1000); }
      studentName = name;
      db.ref('joinRequests/' + studentId).set({ id: studentId, name: studentName, ts: Date.now() });
      db.ref('approvedStudents/' + studentId).on('value', snap => {
        if (snap.exists() && !approved) {
          approved = true;
          db.ref('onlineStudents/' + studentId).set({ name: studentName, online: true });
          setupListeners();
        }
      });
    })();

    function setupListeners() {
      // استقبال رسم المدرس
      db.ref('draw_t').on('child_added', snap => {
        const d = snap.val();
        if (!d || !d.points) return;
        mainCtx.strokeStyle = d.color || '#000';
        mainCtx.lineWidth = d.size || 4;
        mainCtx.beginPath();
        mainCtx.moveTo(d.points[0].x * mainCanvas.width, d.points[0].y * mainCanvas.height);
        for (let i = 1; i < d.points.length; i++) {
          mainCtx.lineTo(d.points[i].x * mainCanvas.width, d.points[i].y * mainCanvas.height);
        }
        mainCtx.stroke();
      });

      // استقبال صورة السبورة من المدرس
      db.ref('boardImg/main').on('value', snap => {
        const data = snap.val();
        if (data && data.data) {
          const img = new Image();
          img.onload = () => {
            mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
            mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
          };
          img.src = data.data;
        }
      });

      // استقبال إذن المايك
      db.ref('micPermissions/' + studentId).on('value', snap => {
        if (snap.val()) startMic();
      });

      // استقبال أمر المسح
      db.ref('boardCmd/main').on('child_added', snap => {
        if (snap.val()?.type === 'clear') {
          mainCtx.fillStyle = '#fff';
          mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
        }
        snap.ref.remove();
      });

      // تحديث قائمة المشاركين
      db.ref('onlineStudents').on('value', snap => {
        updateParticipantsList(snap.val() || {});
      });
    }

    // تحديث قائمة المشاركين
    function updateParticipantsList(online) {
      const listDiv = document.getElementById('participantsList');
      let html = '';
      // إضافة المدرس
      html += `
        <div class="student-panel">
          <div class="student-panel-header">
            <div class="student-avatar" style="background:#ffaa00;">م</div>
            <div class="student-info">
              <div class="student-name">المدرس</div>
              <div class="student-status"><i class="fas fa-chalkboard-teacher"></i> يشرح</div>
            </div>
          </div>
        </div>
      `;
      // إضافة الطلاب الآخرين
      Object.values(online).forEach(s => {
        if (s.name && s.name !== studentName) {
          html += `
            <div class="student-panel">
              <div class="student-panel-header">
                <div class="student-avatar">${s.name.charAt(0)}</div>
                <div class="student-info">
                  <div class="student-name">${s.name}</div>
                  <div class="student-status"><i class="fas fa-headphones"></i> مستمع</div>
                </div>
              </div>
            </div>
          `;
        }
      });
      // إضافة الطالب نفسه
      if (studentName) {
        html += `
          <div class="student-panel">
            <div class="student-panel-header" style="border-color:#ffaa00;">
              <div class="student-avatar" style="background:#ffaa00;">${studentName.charAt(0)}</div>
              <div class="student-info">
                <div class="student-name">${studentName} (أنت)</div>
                <div class="student-status"><i class="fas fa-user"></i> متصل</div>
              </div>
            </div>
          </div>
        `;
      }
      listDiv.innerHTML = html;
      document.getElementById('studentsCount').textContent = Object.keys(online).length + 1;
    }

    // رسم الطالب على سبورته وإرساله للمدرس
    function getCanvasPoint(e) {
      const rect = mainCanvas.getBoundingClientRect();
      const scaleX = mainCanvas.width / rect.width;
      const scaleY = mainCanvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    let points = [];
    let sendTimer = null;

    function startDraw(e) {
      e.preventDefault();
      if (!approved) return;
      isDrawing = true;
      const p = getCanvasPoint(e);
      lastX = p.x; lastY = p.y;
      points = [{ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height }];
      mainCtx.beginPath();
      mainCtx.moveTo(p.x, p.y);
    }

    function draw(e) {
      e.preventDefault();
      if (!isDrawing || !approved) return;
      const p = getCanvasPoint(e);
      mainCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
      mainCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
      mainCtx.lineTo(p.x, p.y);
      mainCtx.stroke();
      mainCtx.beginPath();
      mainCtx.moveTo(p.x, p.y);
      points.push({ x: p.x / mainCanvas.width, y: p.y / mainCanvas.height });
      if (!sendTimer) {
        sendTimer = setTimeout(() => {
          if (points.length) {
            db.ref('draw_st').push({
              points: points,
              color: currentTool === 'eraser' ? null : currentColor,
              size: currentSize,
              studentId: studentId,
              ts: Date.now()
            });
            points = [];
          }
          sendTimer = null;
        }, 30);
      }
    }

    function stopDraw() {
      if (!isDrawing || !approved) return;
      isDrawing = false;
      if (points.length) {
        db.ref('draw_st').push({
          points: points,
          color: currentTool === 'eraser' ? null : currentColor,
          size: currentSize,
          studentId: studentId,
          ts: Date.now()
        });
        points = [];
      }
      if (sendTimer) clearTimeout(sendTimer);
      sendTimer = null;
    }

    mainCanvas.addEventListener('mousedown', startDraw);
    mainCanvas.addEventListener('mousemove', draw);
    mainCanvas.addEventListener('mouseup', stopDraw);
    mainCanvas.addEventListener('mouseleave', stopDraw);
    mainCanvas.addEventListener('touchstart', startDraw, { passive: false });
    mainCanvas.addEventListener('touchmove', draw, { passive: false });
    mainCanvas.addEventListener('touchend', stopDraw);

    // أدوات الرسم
    window.setTool = function(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
      document.getElementById('toolPen').classList.toggle('active', tool === 'pen');
      document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
    };
    window.setColor = function(color, el) {
      currentColor = color;
      document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    };
    window.uploadImage = function(input) {
      if (!input.files[0] || !approved) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          mainCtx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
          db.ref('boardImg/stu/' + studentId).set({ data: e.target.result, ts: Date.now() });
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    };
    window.saveBoard = function() {
      const dataURL = mainCanvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'myboard.png';
      link.href = dataURL;
      link.click();
    };
    window.toggleFullscreen = function() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    };

    // رفع اليد
    window.toggleHand = function() {
      if (!approved) return;
      handRaised = !handRaised;
      const btn = document.getElementById('handBtn');
      btn.classList.toggle('active', handRaised);
      if (handRaised) {
        db.ref('handRaised/' + studentId).set(true);
      } else {
        db.ref('handRaised/' + studentId).remove();
      }
    };

    // طلب المايك
    window.requestMic = function() {
      if (!approved) return;
      db.ref('micRequests/' + studentId).set({ studentId, studentName, ts: Date.now() });
      document.getElementById('micBtn').classList.add('active');
      setTimeout(() => document.getElementById('micBtn').classList.remove('active'), 2000);
    };

    async function startMic() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        speaking = true;
        document.getElementById('micBtn').classList.add('active');
        mediaRecorder = new MediaRecorder(mediaStream);
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) {
            const reader = new FileReader();
            reader.onload = () => {
              db.ref('stuAudio/chunk').set({ data: reader.result, studentId, ts: Date.now() });
            };
            reader.readAsDataURL(e.data);
          }
        };
        mediaRecorder.start(500);
      } catch (err) {}
    }
  </script>
</body>
</html>
<!-- انتهى كود الطالب -->
