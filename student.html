<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - الطالب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background: #0f1e35; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .top-bar { height: 70px; background: linear-gradient(90deg,#071524,#102040); border-bottom: 2px solid #00aaff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .teacher-name { font-size: 18px; font-weight: 900; color: #00aaff; }
    .teacher-desc { font-size: 12px; color: #ccc; }
    .teacher-phone { font-size: 14px; color: #00aaff; direction: ltr; }
    .top-center { display: flex; align-items: center; gap: 20px; background: rgba(0,0,0,0.3); padding: 4px 20px; border-radius: 30px; }
    .top-center span { font-size: 13px; display: flex; align-items: center; gap: 5px; }
    .top-center i { color: #00aaff; }
    .status-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #1e3a60; color: #aaa; }
    .status-badge.waiting { background: #7a5c00; color: #ffc; }
    .status-badge.approved { background: #004d20; color: #9f9; }
    .main-layout { flex: 1; display: flex; overflow: hidden; padding: 8px; gap: 8px; }
    .students-panel { width: 260px; background: #122040; border-radius: 24px; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; border: 1px solid #1e4080; }
    .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; color: #00aaff; font-weight: 700; }
    .student-item { background: #0f1e35; border-radius: 40px; padding: 8px 12px; display: flex; align-items: center; gap: 10px; border: 1px solid #1e4080; }
    .student-avatar { width: 36px; height: 36px; border-radius: 50%; background: #00aaff; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; flex-shrink: 0; font-size: 15px; }
    .student-info { flex: 1; min-width: 0; }
    .student-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .student-status { font-size: 10px; color: #ccc; display: flex; align-items: center; gap: 4px; }
    .board-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .board-header { height: 44px; background: #122040; border-radius: 20px 20px 0 0; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #1e4080; border-bottom: none; }
    .board-header-right { display: flex; align-items: center; gap: 18px; }
    .board-header-right i { color: #00aaff; cursor: pointer; font-size: 17px; transition: 0.2s; }
    .board-header-right i:hover { color: #fff; transform: scale(1.15); }
    .current-board-title { font-weight: 700; color: #00aaff; }
    .main-board { flex: 1; background: #122040; border-radius: 0 0 20px 20px; border: 1px solid #1e4080; overflow: hidden; }
    .main-board canvas { width: 100%; height: 100%; display: block; background: #fff; touch-action: none; cursor: crosshair; }
    .bottom-bar { height: 80px; background: #071524; border-top: 2px solid #00aaff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .toolbar-tools { display: flex; gap: 16px; background: #0f1e35; padding: 8px 20px; border-radius: 50px; border: 1px solid #1e4080; align-items: center; }
    .tool-item { display: flex; flex-direction: column; align-items: center; color: #aaa; cursor: pointer; font-size: 10px; transition: 0.2s; }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #00aaff; }
    .color-picker { display: flex; gap: 5px; background: #122040; padding: 5px 10px; border-radius: 40px; align-items: center; }
    .color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .color-dot:hover { transform: scale(1.15); }
    .color-dot.active { border-color: #fff; transform: scale(1.2); }
    .toolbar-actions { display: flex; gap: 12px; }
    .action-circle { width: 52px; height: 52px; border-radius: 50%; border: none; background: #1e3a60; color: #fff; font-size: 22px; cursor: pointer; transition: 0.2s; }
    .action-circle:hover { filter: brightness(1.25); transform: scale(1.05); }
    .btn-mic.active { background: #00aaff; color: #000; }
    .btn-hand.active { background: #f59e0b; animation: blink 1s infinite; }
    .image-upload input { display: none; }
    .image-upload label { background: #00aaff; color: #000; padding: 6px 16px; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
    /* Overlay انتظار الموافقة */
    #waitOverlay { position: fixed; inset: 0; background: rgba(7,21,36,0.97); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 20px; }
    #waitOverlay.hidden { display: none; }
    .wait-icon { font-size: 64px; color: #00aaff; animation: blink 1.5s infinite; }
    .wait-text { font-size: 22px; font-weight: 700; color: #fff; }
    .wait-sub { font-size: 14px; color: #aaa; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    .blink { animation: blink 1s infinite; }
  </style>
</head>
<body>

<!-- شاشة انتظار الموافقة -->
<div id="waitOverlay">
  <div class="wait-icon"><i class="fas fa-hourglass-half"></i></div>
  <div class="wait-text">بانتظار موافقة المدرس...</div>
  <div class="wait-sub" id="waitName"></div>
</div>

<div class="top-bar">
  <div><div class="teacher-name">Mr_Farag_Kohail</div><div class="teacher-desc">منصة الفيزياء للثانوية العامة</div></div>
  <div class="top-center">
    <span><i class="fas fa-circle" style="color:#4CAF50"></i> مباشر</span>
    <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
    <span><i class="fas fa-wifi"></i> <span id="latency">--</span></span>
  </div>
  <div class="teacher-phone">01141010981</div>
</div>

<div class="main-layout">
  <div class="students-panel">
    <div class="panel-header"><span><i class="fas fa-users"></i> المشاركون</span><span id="studentsCountPanel">0</span></div>
    <div id="participantsList"></div>
  </div>
  <div class="board-area">
    <div class="board-header">
      <div class="current-board-title" id="boardTitle">سبورة المدرس</div>
      <div class="board-header-right">
        <i class="fas fa-download" title="حفظ" onclick="saveBoard()"></i>
        <i class="fas fa-expand" title="ملء الشاشة" onclick="toggleFullscreen()"></i>
      </div>
    </div>
    <div class="main-board"><canvas id="mainCanvas"></canvas></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="toolbar-tools">
    <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
    <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
    <div class="color-picker">
      <div class="color-dot active" style="background:#000" onclick="setColor('#000',this)"></div>
      <div class="color-dot" style="background:#e53935" onclick="setColor('#e53935',this)"></div>
      <div class="color-dot" style="background:#1e88e5" onclick="setColor('#1e88e5',this)"></div>
      <div class="color-dot" style="background:#43a047" onclick="setColor('#43a047',this)"></div>
    </div>
    <div class="image-upload"><label for="sImg"><i class="fas fa-image"></i> رفع الواجب</label><input type="file" id="sImg" accept="image/*" onchange="uploadHomework(this)"></div>
  </div>
  <div class="toolbar-actions">
    <button class="action-circle btn-mic" id="micBtn" title="طلب المايك" onclick="toggleMic()"><i class="fas fa-microphone-slash"></i></button>
    <button class="action-circle btn-hand" id="handBtn" title="رفع اليد" onclick="toggleHand()"><i class="fas fa-hand-paper"></i></button>
  </div>
</div>

<audio id="audioEl" autoplay style="display:none"></audio>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
(function(){
  // ══════════════════════════════════════════════════════
  //  Firebase
  // ══════════════════════════════════════════════════════
  firebase.initializeApp({
    apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
    databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
  });
  const db = firebase.database();

  // ══════════════════════════════════════════════════════
  //  Canvas
  // ══════════════════════════════════════════════════════
  const mc = document.getElementById('mainCanvas');
  const mx = mc.getContext('2d');
  function initCtx(ctx){ ctx.lineCap='round'; ctx.lineJoin='round'; }
  initCtx(mx);

  let lastImg=null;
  function resizeMC(){
    const p=mc.parentElement;
    const prev=(mc.width>0&&mc.height>0)?mc.toDataURL():null;
    mc.width=p.clientWidth; mc.height=p.clientHeight;
    initCtx(mx); mx.fillStyle='#fff'; mx.fillRect(0,0,mc.width,mc.height);
    if(prev){const i=new Image();i.onload=()=>mx.drawImage(i,0,0,mc.width,mc.height);i.src=prev;}
    else if(lastImg){const i=new Image();i.onload=()=>mx.drawImage(i,0,0,mc.width,mc.height);i.src=lastImg;}
  }
  window.addEventListener('resize',()=>setTimeout(resizeMC,100));
  setTimeout(resizeMC,100);

  // ══════════════════════════════════════════════════════
  //  الحالة
  // ══════════════════════════════════════════════════════
  let studentId='s'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  let studentName='';
  let approved=false;
  let handRaised=false;
  let currentTool='pen', currentColor='#000', currentSize=4;
  let isDrawing=false, strokeId=0;
  let points=[], sendTimer=null;
  let micOn=false;

  // ══════════════════════════════════════════════════════
  //  طلب الانضمام
  // ══════════════════════════════════════════════════════
  (function join(){
    let name=prompt('أدخل اسمك:');
    if(!name||!name.trim()) name='طالب'+Math.floor(Math.random()*1000);
    studentName=name.trim();
    document.getElementById('waitName').textContent='اسمك: '+studentName;
    db.ref('joinRequests/'+studentId).set({id:studentId, name:studentName, ts:Date.now()});
  })();

  // مراقبة الموافقة
  db.ref('approvedStudents/'+studentId).on('value', snap=>{
    if(snap.exists()&&!approved){
      approved=true;
      document.getElementById('waitOverlay').classList.add('hidden');
      db.ref('onlineStudents/'+studentId).set({name:studentName, online:true});
      db.ref('joinRequests/'+studentId).remove();
      // تسجيل disconnect تلقائي
      db.ref('onlineStudents/'+studentId).onDisconnect().remove();
      setupListeners();
      connectToTeacher();
    }
  });

  // ══════════════════════════════════════════════════════
  //  الاستماع بعد الموافقة
  // ══════════════════════════════════════════════════════
  let tDrawLP=null, tDrawLS=null;

  function setupListeners(){
    // رسم المدرس - سلس بدون تقطع
    db.ref('draw_t').on('child_added', snap=>{
      const d=snap.val();
      if(!d||!d.pts||!d.pts.length) return;
      const pts=d.pts, c=d.c, s=d.s||4, sid=d.sid;
      initCtx(mx);
      mx.strokeStyle=c===null?'#fff':c;
      mx.lineWidth=c===null?s*5:s;
      mx.beginPath();
      if(tDrawLP && sid && sid===tDrawLS){
        mx.moveTo(tDrawLP.x, tDrawLP.y);
      } else {
        mx.moveTo(pts[0].x*mc.width, pts[0].y*mc.height);
      }
      pts.forEach(p=>mx.lineTo(p.x*mc.width, p.y*mc.height));
      mx.stroke();
      const last=pts[pts.length-1];
      tDrawLP={x:last.x*mc.width, y:last.y*mc.height};
      tDrawLS=sid;
      lastImg=mc.toDataURL();
    });

    // صورة السبورة الرئيسية
    db.ref('boardImg').on('value', snap=>{
      const d=snap.val(); if(!d||!d.data) return;
      lastImg=d.data;
      const img=new Image();
      img.onload=()=>{ mx.clearRect(0,0,mc.width,mc.height); mx.drawImage(img,0,0,mc.width,mc.height); };
      img.src=d.data;
      // إعادة ضبط نقطة الرسم بعد صورة جديدة
      tDrawLP=null; tDrawLS=null;
    });

    // الصورة المصححة من المدرس
    db.ref('correctedImg/'+studentId).on('value', snap=>{
      const d=snap.val(); if(!d||!d.data) return;
      lastImg=d.data;
      const img=new Image();
      img.onload=()=>{ mx.clearRect(0,0,mc.width,mc.height); mx.drawImage(img,0,0,mc.width,mc.height); };
      img.src=d.data;
      tDrawLP=null; tDrawLS=null;
    });

    // أمر مسح السبورة
    db.ref('boardCmd').on('child_added', snap=>{
      const cmd=snap.val(); if(cmd&&cmd.type==='clear'){ mx.fillStyle='#fff'; mx.fillRect(0,0,mc.width,mc.height); lastImg=null; tDrawLP=null; tDrawLS=null; }
    });

    // قائمة المشاركين
    db.ref('onlineStudents').on('value', snap=>renderParticipants(snap.val()||{}));
  }

  function renderParticipants(online){
    let h=`<div class="student-item">
      <div class="student-avatar" style="background:#ffaa00;color:#000">م</div>
      <div class="student-info"><div class="student-name">Mr_Farag_Kohail</div><div class="student-status"><i class="fas fa-chalkboard-teacher"></i> يشرح</div></div>
    </div>`;
    Object.values(online).forEach(s=>{
      const isMe=s.name===studentName;
      h+=`<div class="student-item">
        <div class="student-avatar" style="background:${isMe?'#00aaff':'#1e4080'};color:#000">${s.name[0]}</div>
        <div class="student-info"><div class="student-name">${s.name}${isMe?' (أنت)':''}</div><div class="student-status"><i class="fas fa-${isMe?'user':'headphones'}"></i> ${isMe?'متصل':'مستمع'}</div></div>
      </div>`;
    });
    document.getElementById('participantsList').innerHTML=h;
    const cnt=Object.keys(online).length;
    document.getElementById('studentsCount').textContent=cnt;
    document.getElementById('studentsCountPanel').textContent=cnt;
  }

  // ══════════════════════════════════════════════════════
  //  رسم الطالب على سبورته الخاصة
  // ══════════════════════════════════════════════════════
  function getXY(e){
    const r=mc.getBoundingClientRect();
    const t=e.touches?e.touches[0]:e;
    return {x:(t.clientX-r.left)*(mc.width/r.width), y:(t.clientY-r.top)*(mc.height/r.height)};
  }

  mc.addEventListener('mousedown', startDraw);
  mc.addEventListener('mousemove', moveDraw);
  mc.addEventListener('mouseup', stopDraw);
  mc.addEventListener('mouseleave', stopDraw);
  mc.addEventListener('touchstart', startDraw, {passive:false});
  mc.addEventListener('touchmove', moveDraw, {passive:false});
  mc.addEventListener('touchend', stopDraw);

  function startDraw(e){
    e.preventDefault(); if(!approved) return;
    isDrawing=true; strokeId=Date.now(); points=[];
    const p=getXY(e);
    initCtx(mx); mx.beginPath(); mx.moveTo(p.x,p.y);
    points.push({x:p.x/mc.width, y:p.y/mc.height});
  }
  function moveDraw(e){
    e.preventDefault(); if(!isDrawing||!approved) return;
    const p=getXY(e);
    mx.strokeStyle=currentTool==='eraser'?'#fff':currentColor;
    mx.lineWidth=currentTool==='eraser'?currentSize*5:currentSize;
    mx.lineTo(p.x,p.y); mx.stroke(); mx.beginPath(); mx.moveTo(p.x,p.y);
    points.push({x:p.x/mc.width, y:p.y/mc.height});
    if(!sendTimer) sendTimer=setTimeout(flush,20);
  }
  function flush(){
    sendTimer=null; if(!points.length) return;
    db.ref('draw_st').push({pts:points.slice(), c:currentTool==='eraser'?null:currentColor, s:currentSize, studentId, sid:strokeId, ts:Date.now()});
    points=[];
  }
  function stopDraw(){
    if(!isDrawing||!approved) return; isDrawing=false;
    if(sendTimer){clearTimeout(sendTimer);sendTimer=null;}
    flush();
    // حفظ صورة السبورة
    const dataUrl=mc.toDataURL('image/jpeg',0.8);
    db.ref('boardImg_stu/'+studentId).set({data:dataUrl, ts:Date.now()});
  }

  // ══════════════════════════════════════════════════════
  //  أدوات الرسم
  // ══════════════════════════════════════════════════════
  window.setTool=function(t){ currentTool=t; document.getElementById('toolPen').classList.toggle('active',t==='pen'); document.getElementById('toolEraser').classList.toggle('active',t==='eraser'); };
  window.setColor=function(c,el){ currentColor=c; document.querySelectorAll('.toolbar-tools .color-dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); };
  window.saveBoard=function(){ const a=document.createElement('a'); a.download='myboard.png'; a.href=mc.toDataURL(); a.click(); };
  window.toggleFullscreen=function(){ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen(); };
  window.uploadHomework=function(input){
    if(!input.files[0]||!approved) return;
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const cw=mc.width,ch=mc.height,r=img.width/img.height,cr=cw/ch;
        let dw,dh;
        if(r>cr){dw=cw;dh=cw/r;}else{dh=ch;dw=ch*r;}
        mx.fillStyle='#fff'; mx.fillRect(0,0,cw,ch);
        mx.drawImage(img,(cw-dw)/2,(ch-dh)/2,dw,dh);
        const dataUrl=mc.toDataURL('image/jpeg',0.85);
        lastImg=dataUrl;
        db.ref('studentImages').push({studentId,studentName,data:dataUrl,ts:Date.now()});
        db.ref('boardImg_stu/'+studentId).set({data:dataUrl,ts:Date.now()});
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(input.files[0]);
    input.value='';
  };

  // ══════════════════════════════════════════════════════
  //  رفع اليد
  // ══════════════════════════════════════════════════════
  window.toggleHand=function(){
    if(!approved) return;
    handRaised=!handRaised;
    document.getElementById('handBtn').classList.toggle('active',handRaised);
    handRaised ? db.ref('handRaised/'+studentId).set(true) : db.ref('handRaised/'+studentId).remove();
  };

  // ══════════════════════════════════════════════════════
  //  المايك - WebRTC
  // ══════════════════════════════════════════════════════
  const RTC={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
  let tPc=null; // teacher->student (استقبال صوت المدرس)
  let sPc=null; // student->teacher (إرسال صوت الطالب)
  let sStream=null;

  // الاتصال باستقبال صوت المدرس
  function connectToTeacher(){
    // إخطار المدرس أن الطالب جاهز
    db.ref('rtc/join_notify').push(studentId);

    db.ref('rtc/t2s_offer/'+studentId).on('value', async snap=>{
      const offer=snap.val(); if(!offer) return;
      if(tPc) return; // موجود بالفعل
      tPc=new RTCPeerConnection(RTC);
      tPc.ontrack=e=>{
        const a=document.getElementById('audioEl');
        a.srcObject=e.streams[0];
        a.play().catch(()=>{});
      };
      tPc.onicecandidate=e=>{ if(e.candidate) db.ref('rtc/s2t_ice/'+studentId).push(e.candidate.toJSON()); };
      // ICE من المدرس
      db.ref('rtc/t2s_ice/'+studentId).on('child_added', async snap2=>{
        const ice=snap2.val(); if(ice){try{await tPc.addIceCandidate(new RTCIceCandidate(ice));}catch(e){} snap2.ref.remove();}
      });
      await tPc.setRemoteDescription(new RTCSessionDescription(offer));
      const ans=await tPc.createAnswer();
      await tPc.setLocalDescription(ans);
      db.ref('rtc/s2t_answer/'+studentId).set({sdp:ans.sdp,type:ans.type});
    });
  }

  window.toggleMic=async function(){
    if(!approved) return;
    const btn=document.getElementById('micBtn');
    if(!micOn){
      try{
        sStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
        micOn=true; btn.classList.add('active'); btn.innerHTML='<i class="fas fa-microphone"></i>'; btn.title='إيقاف المايك';
        // إرسال طلب الكلام للمدرس أولاً
        db.ref('micRequests/'+studentId).set({studentId,studentName,ts:Date.now()});
        // انتظار الإذن
        db.ref('micPermissions/'+studentId).on('value', async snap=>{
          if(!snap.val()?.allowed) return;
          if(sPc) return;
          sPc=new RTCPeerConnection(RTC);
          sStream.getTracks().forEach(t=>sPc.addTrack(t,sStream));
          sPc.onicecandidate=e=>{ if(e.candidate) db.ref('rtc/s2t_stu_ice/'+studentId).push(e.candidate.toJSON()); };
          // ICE من المدرس للطالب
          db.ref('rtc/t2s_stu_ice/'+studentId).on('child_added', async snap2=>{
            const ice=snap2.val(); if(ice){try{await sPc.addIceCandidate(new RTCIceCandidate(ice));}catch(e){} snap2.ref.remove();}
          });
          // انتظار answer المدرس
          db.ref('rtc/t2s_stu_answer/'+studentId).on('value', async snap2=>{
            const ans=snap2.val();
            if(ans&&sPc.signalingState==='have-local-offer') await sPc.setRemoteDescription(new RTCSessionDescription(ans)).catch(()=>{});
          });
          const offer=await sPc.createOffer();
          await sPc.setLocalDescription(offer);
          db.ref('rtc/s2t_stu_offer/'+studentId).set({sdp:offer.sdp,type:offer.type});
        });
      }catch(err){ alert('تعذر تشغيل المايك:\n'+err.message); }
    }else{
      micOn=false; btn.classList.remove('active'); btn.innerHTML='<i class="fas fa-microphone-slash"></i>'; btn.title='طلب المايك';
      if(sStream){sStream.getTracks().forEach(t=>t.stop());sStream=null;}
      if(sPc){sPc.close();sPc=null;}
      db.ref('micPermissions/'+studentId).remove();
      db.ref('rtc/s2t_stu_offer/'+studentId).remove();
      db.ref('rtc/s2t_stu_ice/'+studentId).remove();
    }
  };

  // Latency
  setInterval(()=>{
    const t=Date.now();
    db.ref('ping_s').set(t);
    setTimeout(()=>{db.ref('ping_s').once('value',()=>{document.getElementById('latency').textContent=(Date.now()-t)+'ms';});},500);
  },5000);
})();
</script>
</body>
</html>
