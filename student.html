<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الطالب - MyClass2</title>
    <!-- روابط Font Awesome مزدوجة -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.4.0/css/all.css">
    <style>
        body { margin: 0; font-family: Arial; display: flex; flex-direction: column; height: 100vh; background: #333; color: white; }
        header { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        canvas { flex: 1; background: white; width: 100%; height: 100%; pointer-events: none; }
        .login-box { background: #8B0000; padding: 20px; border-radius: 10px; width: 300px; margin: auto; text-align: center; }
        .login-box input { width: 100%; padding: 8px; margin: 5px 0; border: none; border-radius: 5px; }
        .login-box button { background: #f90; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .wait-msg { margin-top: 10px; color: #ff0; display: none; }
        #mainContent { display: none; flex-direction: column; height: 100%; }
        #teacherBoard { flex: 1; }
        .toolbar { background: #444; padding: 8px; display: flex; gap: 8px; }
        .toolbar button { display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <!-- شاشة الدخول (بطاقة واحدة) -->
    <div id="loginScreen" style="display: flex; align-items: center; justify-content: center; height: 100%;">
        <div class="login-box">
            <h3><i class="fas fa-user-graduate"></i> تسجيل الدخول</h3>
            <input type="text" id="studentName" placeholder="الاسم">
            <input type="tel" id="studentPhone" placeholder="رقم التليفون">
            <input type="text" id="studentSecret" placeholder="الرقم السري">
            <button onclick="validateLogin()"><i class="fas fa-sign-in-alt"></i> دخول</button>
            <div id="loginError" style="color: #ffc; margin-top: 5px;"></div>
            <div class="wait-msg" id="waitMsg">
                <i class="fas fa-spinner fa-spin"></i> في انتظار موافقة المدرس...
            </div>
        </div>
    </div>

    <!-- المحتوى الرئيسي بعد القبول -->
    <div id="mainContent">
        <header>
            <span><i class="fas fa-user-graduate"></i> الطالب</span>
            <span id="nameChip"></span>
        </header>

        <canvas id="teacherBoard"></canvas>

        <div class="toolbar">
            <button id="handBtn" onclick="toggleHand()"><i class="fas fa-hand-paper"></i> رفع اليد</button>
            <button id="micBtn" onclick="requestMic()"><i class="fas fa-microphone"></i> طلب ميكروفون</button>
        </div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        // ===== Firebase =====
        firebase.initializeApp({
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        });
        const db = firebase.database();

        let studentId = null;
        let studentName = '';
        let approved = false;
        let attemptCount = 0;

        // ===== التحقق من الدخول (3 محاولات) =====
        window.validateLogin = () => {
            const name = document.getElementById('studentName').value.trim();
            const phone = document.getElementById('studentPhone').value.trim();
            const secret = document.getElementById('studentSecret').value.trim();
            const errorDiv = document.getElementById('loginError');
            const waitMsg = document.getElementById('waitMsg');
            const loginBtn = event.target;

            if (!name || !phone || !secret) {
                errorDiv.innerText = 'جميع الحقول مطلوبة';
                return;
            }

            const reversed = phone.split('').reverse().join('');
            if (secret !== reversed) {
                attemptCount++;
                if (attemptCount < 3) {
                    errorDiv.innerText = `الرقم السري خطأ. المحاولات المتبقية: ${3-attemptCount}`;
                } else {
                    errorDiv.innerText = 'لقد استنفدت المحاولات. أعد تحميل الصفحة.';
                    setTimeout(() => location.reload(), 2000);
                }
                return;
            }

            // نجاح
            studentName = name;
            studentId = 's' + Date.now() + '_' + Math.random().toString(36).substr(2,5);

            loginBtn.disabled = true;
            waitMsg.style.display = 'block';
            errorDiv.innerText = '';

            db.ref('studentData/' + studentId).set({ name, phone });
            db.ref('joinRequests/' + studentId).set({ studentId, studentName: name, studentPhone: phone, timestamp: Date.now() });

            // مراقبة القبول
            db.ref('acceptedStudents/' + studentId).on('value', (snap) => {
                if (snap.val() === true && !approved) {
                    approved = true;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'flex';
                    document.getElementById('nameChip').innerText = name;
                    startStudent();
                }
            });
        };

        // ===== بدء جلسة الطالب =====
        function startStudent() {
            const canvas = document.getElementById('teacherBoard');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 100;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // استقبال الرسم من المدرس
            db.ref('teacherDrawings').on('child_added', (snap) => {
                const d = snap.val();
                if (d.color === 'eraser') {
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.lineWidth = d.size;
                } else {
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.strokeStyle = d.color;
                    ctx.lineWidth = d.size;
                }
                ctx.beginPath();
                ctx.moveTo(d.lastX, d.lastY);
                ctx.lineTo(d.x, d.y);
                ctx.stroke();
                ctx.globalCompositeOperation = 'source-over';
                snap.ref.remove();
            });

            db.ref('teacherCommands').on('child_added', (snap) => {
                if (snap.val().type === 'clear') {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }
                snap.ref.remove();
            });

            // ===== الصوت (استقبال) =====
            const audio = document.getElementById('audioPlayer');
            let peer, call;
            peer = new Peer(studentId);
            peer.on('open', (id) => {
                db.ref('studentPeerIds/' + studentId).set(id);
            });
            peer.on('call', (incomingCall) => {
                incomingCall.answer(); // استقبال بدون إرسال صوت
                incomingCall.on('stream', (remoteStream) => {
                    audio.srcObject = remoteStream;
                    audio.play().catch(() => {});
                });
            });

            // مراقبة حالة الميكروفون للمدرس (للإشارة)
            db.ref('teacherAudioActive').on('value', (snap) => {
                // يمكن إضافة إشارة بصرية
            });
        }

        // ===== رفع اليد =====
        window.toggleHand = () => {
            db.ref('handRaised/' + studentId).set({ raised: true });
            setTimeout(() => db.ref('handRaised/' + studentId).remove(), 5000);
        };

        // ===== طلب الميكروفون =====
        window.requestMic = () => {
            db.ref('micRequests/' + studentId).set({ studentId, studentName, timestamp: Date.now() });
            alert('تم إرسال الطلب');
        };

        // ===== تنظيف عند الخروج =====
        window.addEventListener('beforeunload', () => {
            if (studentId) {
                db.ref('onlineStudents/' + studentId).remove();
                db.ref('acceptedStudents/' + studentId).remove();
            }
        });
    </script>
</body>
</html>
