<script>
const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "myclaive.firebaseapp.com",
    databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
    projectId: "myclaive",
    storageBucket: "myclaive.firebasestorage.app",
    messagingSenderId: "507299311714",
    appId: "1:507299311714:web:c90440ee4353cfac17613b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const stuId = db.ref().push().key; // ID فريد وآمن
const boardImg = document.getElementById('board-img');

let approvalListener = null;
let boardListener = null;

function startStudent() {

    // إرسال طلب الانضمام
    db.ref('joinRequests/' + stuId).set({
        name: "طالب جديد",
        status: "waiting",
        ts: firebase.database.ServerValue.TIMESTAMP
    });

    // مراقبة حالة القبول
    approvalListener = db.ref('joinRequests/' + stuId);
    approvalListener.on('value', (snap) => {
        const val = snap.val();

        if (!val) return;

        if (val.status === 'approved') {
            showBoard();
        }

        if (val.status === 'rejected') {
            alert("تم رفض الدخول");
        }
    });

    // حذف الطلب عند قطع الاتصال
    db.ref('joinRequests/' + stuId).onDisconnect().remove();
}

function showBoard() {
    document.getElementById('wait-screen').style.display = 'none';
    document.getElementById('viewport').style.display = 'flex';
    loadBoard();
}

function loadBoard() {

    boardListener = db.ref('boardImg/main');

    boardListener.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && data.data) {
            boardImg.src = data.data;
        }
    });
}

// تنظيف عند غلق الصفحة
window.addEventListener('beforeunload', () => {
    if (approvalListener) approvalListener.off();
    if (boardListener) boardListener.off();
});

startStudent();
</script>
