<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyClass PRO - انضمام</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Cairo;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#1e293b;padding:25px;border-radius:10px;width:90%;max-width:350px;display:flex;flex-direction:column;gap:15px}
input{padding:10px;border:none;border-radius:6px}
button{padding:10px;border:none;border-radius:6px;background:#3b82f6;color:#fff;cursor:pointer}
#wait{display:none;text-align:center}
#board{display:none;position:fixed;inset:0;background:#000;justify-content:center;align-items:center}
#board img{max-width:100%;max-height:100%}
</style>
</head>
<body>

<div class="box" id="login">
<h3>طلب انضمام للحصة</h3>
<input id="name" placeholder="ادخل اسمك">
<input id="phone" placeholder="ادخل رقمك">
<button onclick="join()">إرسال الطلب</button>
</div>

<div class="box" id="wait">
<h3>بانتظار موافقة المدرس...</h3>
</div>

<div id="board">
<img id="boardImg">
</div>

<script>
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB_URL",
projectId: "YOUR_PROJECT",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let stuId = "";

function join(){
const name = document.getElementById('name').value.trim();
const phone = document.getElementById('phone').value.trim();

if(!name || !phone){ alert("ادخل البيانات"); return; }

stuId = phone;

db.ref("joinRequests/"+stuId).set({
name:name,
phone:phone,
status:"waiting",
ts:firebase.database.ServerValue.TIMESTAMP
});

document.getElementById("login").style.display="none";
document.getElementById("wait").style.display="block";

/* الاستماع للموافقة */
db.ref("approvedStudents/"+stuId).on("value",snap=>{
if(snap.exists()){
document.getElementById("wait").style.display="none";
document.getElementById("board").style.display="flex";
loadBoard();
}
});
}

function loadBoard(){
db.ref("boardImg/main").on("value",snap=>{
if(snap.val()) document.getElementById("boardImg").src = snap.val();
});
}
</script>

</body>
</html>
