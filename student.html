<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyClass2 - الطالب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== الألوان الفاقعة (مطابقة للمدرس) ========== */
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --purple: #a855f7;
            --pink: #ec4899;
            --dark: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --medium: #475569;
            --light: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--dark);
            color: #fff;
        }

        /* ========== شاشة الدخول (بطاقة واحدة) ========== */
        #overlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .jcard {
            background: linear-gradient(145deg, #8B0000 0%, #a52a2a 100%);
            border: 2px solid var(--warning);
            border-radius: 24px;
            padding: 36px 28px;
            width: 300px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(245,158,11,0.3);
        }

        .jlogo {
            font-size: 28px;
            font-weight: 900;
            color: var(--warning);
        }

        .jlogo b { color: #fff; }

        .jsub {
            font-size: 13px;
            color: #ffd7b3;
            margin: 5px 0 20px;
        }

        .jcard input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid var(--warning);
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 15px;
            text-align: center;
            outline: none;
        }

        .jcard input:focus {
            border-color: #fff;
            background: rgba(0,0,0,0.5);
        }

        .jbtn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: var(--warning);
            border: none;
            border-radius: 12px;
            color: var(--dark);
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }

        .jbtn:hover {
            background: #ffb347;
            transform: scale(1.02);
        }

        .jbtn:disabled {
            opacity: 0.5;
            cursor: default;
        }

        .error-message {
            background: rgba(255,255,255,0.2);
            color: #ffdddd;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
            border-right: 3px solid var(--danger);
        }

        /* رسالة الانتظار داخل نفس البطاقة */
        .jwait {
            display: none;
            margin-top: 16px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            color: var(--warning);
            font-weight: bold;
            border: 1px solid var(--warning);
        }

        /* ========== باقي الأنماط للسبورة (مطابقة للمدرس تقريباً) ========== */
        #app {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
        }

        .top {
            height: 46px;
            background: linear-gradient(90deg, #2c3e50, #1e2b3a);
            border-bottom: 2px solid var(--warning);
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-size: 17px;
            font-weight: 900;
            color: var(--warning);
        }

        .logo b { color: #fff; }

        .topright {
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .nchip {
            background: var(--purple);
            padding: 3px 11px;
            border-radius: 20px;
            font-size: 12px;
            color: #fff;
        }

        .hbtn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: none;
            background: var(--medium);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hbtn.up {
            background: var(--warning);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.6; } }

        .boards {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            padding: 4px;
            gap: 4px;
        }

        .bcard {
            flex: 1;
            background: var(--card);
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bhead {
            height: 32px;
            padding: 0 10px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tboard .bhead { border-bottom: 3px solid var(--danger); }
        .sboard .bhead { border-bottom: 3px solid var(--primary); }

        .btitle {
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .carea {
            flex: 1;
            background: #fff;
            position: relative;
            overflow: hidden;
        }

        .carea canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .livebadge {
            background: var(--danger);
            padding: 2px 7px;
            border-radius: 8px;
            font-size: 10px;
            display: none;
            align-items: center;
            gap: 3px;
            color: #fff;
        }

        .livebadge.on { display: flex; }

        .micbar {
            background: linear-gradient(90deg, #2c3e50, #1e2b3a);
            border-top: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 9px;
            flex-shrink: 0;
        }

        .micbtn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--medium);
            color: #fff;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .micbtn.req { background: var(--warning); animation: pulse 0.9s infinite; }
        .micbtn.spk { background: var(--success); box-shadow: 0 0 0 4px rgba(34,197,94,0.3); }

        .miclbl {
            font-size: 12px;
            color: var(--light);
            flex: 1;
        }

        .volwrap {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .volwrap i { color: var(--light); }

        input.vol {
            width: 68px;
            height: 3px;
            background: var(--medium);
            border-radius: 2px;
            -webkit-appearance: none;
        }

        input.vol::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
        }

        .tbar {
            background: linear-gradient(90deg, #2c3e50, #1e2b3a);
            border-top: 1px solid var(--border);
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            overflow-x: auto;
            flex-shrink: 0;
        }

        .tb {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: none;
            background: var(--medium);
            color: #fff;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tb.on { background: var(--primary); }

        .clrs {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .cl {
            width: 23px;
            height: 23px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .cl.on { border-color: #fff; transform: scale(1.15); }

        .szs {
            display: flex;
            gap: 2px;
            align-items: center;
            background: var(--medium);
            padding: 3px 5px;
            border-radius: 8px;
        }

        .sz {
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 5px;
            color: #fff;
        }

        .sz.on { background: var(--primary); }

        .sdot { background: #fff; border-radius: 50%; }

        .sbar {
            height: 24px;
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 10px;
            color: var(--light);
            flex-shrink: 0;
        }

        .conn { display: flex; align-items: center; gap: 3px; }
        .cdot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }
        .tspk { color: var(--danger); display: none; align-items: center; gap: 4px; }
        .tspk.on { display: flex; }

        #endOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,23,42,0.98);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #endOverlay.on { display: flex; }
        .end-icon { font-size: 52px; }
        .end-title { font-size: 20px; font-weight: 900; }
        .end-sub { font-size: 14px; color: var(--light); max-width: 260px; }
        .end-btn { padding: 11px 28px; background: var(--primary); border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ===== شاشة الدخول (بطاقة واحدة) ===== -->
    <div id="overlay">
        <div class="jcard">
            <div class="jlogo">My<b>Class</b>2</div>
            <p class="jsub">انضم للحصة الدراسية</p>
            <input type="text" id="studentName" placeholder="الاسم" maxlength="25" autocomplete="off">
            <input type="tel" id="studentPhone" placeholder="رقم التليفون" autocomplete="off">
            <input type="text" id="studentSecret" placeholder="الرقم السري" autocomplete="off">
            <button class="jbtn" id="joinBtn" onclick="validateLogin()">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
            <div class="error-message" id="loginError"></div>
            <!-- رسالة الانتظار داخل نفس البطاقة -->
            <div class="jwait" id="waitMsg">
                <i class="fas fa-spinner fa-spin"></i> في انتظار موافقة المدرس...
            </div>
        </div>
    </div>

    <!-- ===== التطبيق الرئيسي ===== -->
    <div id="app">
        <div class="top">
            <div class="logo">My<b>Class</b>2</div>
            <div class="topright">
                <span class="nchip" id="nameChip"></span>
                <button class="hbtn" id="handBtn" onclick="toggleHand()" title="رفع اليد">
                    <i class="fas fa-hand-paper"></i>
                </button>
            </div>
        </div>

        <div class="boards">
            <!-- سبورة المدرس -->
            <div class="bcard tboard">
                <div class="bhead">
                    <div class="btitle">
                        <i class="fas fa-chalkboard-teacher" style="color:var(--danger)"></i> سبورة المدرس
                    </div>
                    <div class="livebadge" id="liveBadge">
                        <i class="fas fa-circle" style="font-size:7px"></i> مباشر
                    </div>
                </div>
                <div class="carea" id="tcArea"><canvas id="tc"></canvas></div>
            </div>
            <!-- سبورتي -->
            <div class="bcard sboard">
                <div class="bhead">
                    <div class="btitle">
                        <i class="fas fa-pencil-alt" style="color:var(--primary)"></i> سبورتي
                    </div>
                </div>
                <div class="carea" id="scArea"><canvas id="sc"></canvas></div>
            </div>
        </div>

        <!-- شريط الميكروفون -->
        <div class="micbar">
            <button class="micbtn" id="micBtn" onclick="doMic()">
                <i class="fas fa-microphone-slash" id="micIco"></i>
            </button>
            <span class="miclbl" id="micLbl">اضغط للتحدث</span>
            <div class="volwrap">
                <i class="fas fa-volume-down"></i>
                <input type="range" class="vol" min="0" max="100" value="80" oninput="tAP.volume=this.value/100">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <!-- شريط أدوات الرسم -->
        <div class="tbar">
            <div class="tg">
                <button class="tb on" id="bpen" onclick="setTool('pen')"><i class="fas fa-pencil-alt"></i></button>
                <button class="tb" id="bera" onclick="setTool('eraser')"><i class="fas fa-eraser"></i></button>
            </div>
            <div class="clrs">
                <div class="cl on" style="background:#111" data-c="#111" onclick="setClr(this)"></div>
                <div class="cl" style="background:#ef4444" data-c="#ef4444" onclick="setClr(this)"></div>
                <div class="cl" style="background:#3b82f6" data-c="#3b82f6" onclick="setClr(this)"></div>
                <div class="cl" style="background:#22c55e" data-c="#22c55e" onclick="setClr(this)"></div>
                <div class="cl" style="background:#f59e0b" data-c="#f59e0b" onclick="setClr(this)"></div>
            </div>
            <div class="szs">
                <button class="sz" onclick="setSz(1,this)"><div class="sdot" style="width:3px;height:3px"></div></button>
                <button class="sz on" onclick="setSz(2,this)"><div class="sdot" style="width:6px;height:6px"></div></button>
                <button class="sz" onclick="setSz(4,this)"><div class="sdot" style="width:10px;height:10px"></div></button>
            </div>
            <button class="tb" onclick="clearMy()"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
        </div>

        <!-- شريط الحالة -->
        <div class="sbar">
            <div class="conn"><div class="cdot" id="cdot"></div><span id="ct">متصل</span></div>
            <div class="tspk" id="tspkInd"><i class="fas fa-volume-up"></i> المدرس يتحدث</div>
            <span id="lat">--ms</span>
        </div>
    </div>

    <!-- شاشة إنهاء الحصة -->
    <div id="endOverlay">
        <div class="end-icon">👋</div>
        <div class="end-title">انتهت الحصة</div>
        <div class="end-sub">أنهى المدرس الجلسة. شكراً لمشاركتك!</div>
        <button class="end-btn" onclick="window.location.href=window.location.href">الرجوع للبداية</button>
    </div>

    <audio id="tAP" style="display:none"></audio>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ================== Firebase ==================
        firebase.initializeApp({
            apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
            authDomain: "myclaive.firebaseapp.com",
            databaseURL: "https://myclaive-default-rtdb.firebaseio.com",
            projectId: "myclaive",
            storageBucket: "myclaive.firebasestorage.app",
            messagingSenderId: "507299311714",
            appId: "1:507299311714:web:c90440ee4353cfac17613b"
        });
        const db = firebase.database();

        // ================== المتغيرات ==================
        let studentId = null;
        let studentName = '';
        let studentPhone = '';
        let approved = false;
        let attemptCount = 0;              // عدد محاولات الرقم السري
        let handUp = false;
        let micGranted = false;
        let speaking = false;
        let mStream = null;
        let mRec = null;

        // عناصر الرسم
        const teacherCanvas = document.getElementById('tc');
        const studentCanvas = document.getElementById('sc');
        const tCtx = teacherCanvas.getContext('2d');
        const sCtx = studentCanvas.getContext('2d');
        const DPR = window.devicePixelRatio || 1;

        let penTool = 'pen';
        let penClr = '#111';
        let penSz = 2;
        let drawing = false;
        let lastX = 0, lastY = 0;

        // ================== التحقق من الدخول (3 محاولات فقط) ==================
        window.validateLogin = () => {
            const name = document.getElementById('studentName').value.trim();
            const phone = document.getElementById('studentPhone').value.trim();
            const secret = document.getElementById('studentSecret').value.trim();
            const errorDiv = document.getElementById('loginError');
            const joinBtn = document.getElementById('joinBtn');
            const waitMsg = document.getElementById('waitMsg');

            if (!name || !phone || !secret) {
                errorDiv.innerText = 'جميع الحقول مطلوبة';
                return;
            }

            // التحقق من أن الرقم السري هو معكوس رقم التليفون
            const reversedPhone = phone.split('').reverse().join('');
            if (secret !== reversedPhone) {
                attemptCount++;
                const remaining = 3 - attemptCount;
                if (remaining > 0) {
                    errorDiv.innerText = `الرقم السري غير صحيح. لديك ${remaining} محاولات متبقية.`;
                } else {
                    errorDiv.innerText = 'لقد استنفدت المحاولات. سيتم إعادة تحميل الصفحة.';
                    setTimeout(() => location.reload(), 2000);
                }
                return;
            }

            // نجاح الدخول
            studentName = name;
            studentPhone = phone;
            studentId = 's' + Date.now() + '_' + Math.random().toString(36).substr(2,4);

            // تعطيل الزر وإظهار رسالة الانتظار داخل نفس البطاقة
            joinBtn.disabled = true;
            waitMsg.style.display = 'block';
            errorDiv.innerText = '';

            // تخزين بيانات الطالب
            db.ref('studentData/' + studentId).set({
                name: studentName,
                phone: studentPhone,
                timestamp: Date.now()
            });

            // إرسال طلب الانضمام
            db.ref('joinRequests/' + studentId).set({
                studentId: studentId,
                studentName: studentName,
                studentPhone: studentPhone,
                timestamp: Date.now()
            });

            // بدء مراقبة القبول
            watchAcceptance();
        };

        // ================== مراقبة القبول ==================
        function watchAcceptance() {
            if (!studentId) return;
            db.ref('approvedStudents/' + studentId).on('value', (snap) => {
                if (snap.val() && !approved) {
                    approved = true;
                    onApproved();
                }
            });
        }

        // ================== بعد القبول ==================
        function onApproved() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('nameChip').textContent = studentName;

            // الاستماع لإنهاء الحصة أو الطرد
            db.ref('kicked/' + studentId).on('value', snap => {
                if (snap.exists()) showEndMsg('kicked');
            });
            db.ref('sessionEnded').on('value', snap => {
                if (snap.exists()) showEndMsg('ended');
            });

            // تسجيل الحضور
            db.ref('onlineStudents/' + studentId).set({ online: true, name: studentName });
            db.ref('onlineStudents/' + studentId).onDisconnect().remove();
            db.ref('approvedStudents/' + studentId).onDisconnect().remove();

            // تجهيز الكانفاسات
            fitCanvases();
            startListeners();
        }

        // ================== تجهيز الكانفاسات ==================
        function fitCanvases() {
            [teacherCanvas, studentCanvas].forEach(canvas => {
                const parent = canvas.parentElement;
                const w = parent.clientWidth;
                const h = parent.clientHeight;
                if (!w || !h) return;
                canvas.width = w * DPR;
                canvas.height = h * DPR;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            });
        }
        window.addEventListener('resize', fitCanvases);

        // ================== الرسم على سبورتي ==================
        function getXY(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: ((cx - rect.left) / rect.width) * canvas.width,
                y: ((cy - rect.top) / rect.height) * canvas.height
            };
        }

        function startDraw(e) {
            e.preventDefault();
            if (!approved) return;
            drawing = true;
            const p = getXY(e, studentCanvas);
            lastX = p.x; lastY = p.y;
            sCtx.beginPath();
            sCtx.moveTo(p.x, p.y);
        }

        function draw(e) {
            e.preventDefault();
            if (!drawing || !approved) return;
            const p = getXY(e, studentCanvas);
            if (penTool === 'eraser') {
                sCtx.globalCompositeOperation = 'destination-out';
                sCtx.lineWidth = penSz * 4;
            } else {
                sCtx.globalCompositeOperation = 'source-over';
                sCtx.strokeStyle = penClr;
                sCtx.lineWidth = penSz * DPR;
            }
            sCtx.lineTo(p.x, p.y);
            sCtx.stroke();
            sCtx.beginPath();
            sCtx.moveTo(p.x, p.y);

            // إرسال الرسم للمدرس
            db.ref('stroke/S').push({
                x: p.x / studentCanvas.width,
                y: p.y / studentCanvas.height,
                lastX: lastX / studentCanvas.width,
                lastY: lastY / studentCanvas.height,
                c: penClr,
                w: penSz / 1000,
                t: penTool === 'eraser' ? 'e' : 'p',
                sid: studentId,
                ts: Date.now()
            });
            lastX = p.x; lastY = p.y;
        }

        function endDraw() {
            drawing = false;
            sCtx.beginPath();
            sCtx.globalCompositeOperation = 'source-over';
        }

        studentCanvas.addEventListener('mousedown', startDraw);
        studentCanvas.addEventListener('mousemove', draw);
        studentCanvas.addEventListener('mouseup', endDraw);
        studentCanvas.addEventListener('mouseleave', endDraw);
        studentCanvas.addEventListener('touchstart', startDraw, { passive: false });
        studentCanvas.addEventListener('touchmove', draw, { passive: false });
        studentCanvas.addEventListener('touchend', endDraw);
        studentCanvas.addEventListener('contextmenu', e => e.preventDefault());

        // ================== أدوات الرسم ==================
        window.setTool = (t) => {
            penTool = t;
            document.getElementById('bpen').classList.toggle('on', t === 'pen');
            document.getElementById('bera').classList.toggle('on', t === 'eraser');
        };

        window.setClr = (el) => {
            penClr = el.dataset.c;
            document.querySelectorAll('.cl').forEach(c => c.classList.remove('on'));
            el.classList.add('on');
        };

        window.setSz = (s, btn) => {
            penSz = s;
            document.querySelectorAll('.sz').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
        };

        window.clearMy = () => {
            sCtx.fillStyle = '#fff';
            sCtx.fillRect(0, 0, studentCanvas.width, studentCanvas.height);
        };

        // ================== استقبال الرسم من المدرس ==================
        function startListeners() {
            db.ref('stroke/T').on('child_added', (snap) => {
                const d = snap.val();
                if (!d) return;
                const x = d.x * teacherCanvas.width;
                const y = d.y * teacherCanvas.height;
                const lastX = d.lastX * teacherCanvas.width;
                const lastY = d.lastY * teacherCanvas.height;
                if (d.t === 'e') {
                    tCtx.globalCompositeOperation = 'destination-out';
                    tCtx.lineWidth = d.w * 1000 * DPR * 4;
                } else {
                    tCtx.globalCompositeOperation = 'source-over';
                    tCtx.strokeStyle = d.c;
                    tCtx.lineWidth = d.w * 1000 * DPR;
                }
                tCtx.beginPath();
                tCtx.moveTo(lastX, lastY);
                tCtx.lineTo(x, y);
                tCtx.stroke();
                snap.ref.remove();
            });

            db.ref('boardImg/main').on('value', (snap) => {
                const d = snap.val();
                if (d && d.data) {
                    const img = new Image();
                    img.onload = () => tCtx.drawImage(img, 0, 0, teacherCanvas.width, teacherCanvas.height);
                    img.src = d.data;
                }
            });

            db.ref('boardCmd').on('child_added', (snap) => {
                const d = snap.val();
                if (d && d.type === 'clear') {
                    tCtx.fillStyle = '#fff';
                    tCtx.fillRect(0, 0, teacherCanvas.width, teacherCanvas.height);
                }
                snap.ref.remove();
            });
        }

        // ================== رفع اليد ==================
        window.toggleHand = () => {
            if (!approved) return;
            handUp = !handUp;
            document.getElementById('handBtn').classList.toggle('up', handUp);
            if (handUp) {
                db.ref('handRaised/' + studentId).set({ raised: true });
            } else {
                db.ref('handRaised/' + studentId).remove();
            }
        };

        // ================== الميكروفون ==================
        window.doMic = () => {
            if (!approved) return;
            if (speaking) {
                stopSpeaking();
                return;
            }
            db.ref('micRequests/' + studentId).set({ studentId, studentName, ts: Date.now() });
            setMicUI('req', 'fa-hourglass-half', 'جاري طلب الكلام...');
        };

        function stopSpeaking() {
            if (mStream) mStream.getTracks().forEach(t => t.stop());
            if (mRec) try { mRec.stop(); } catch (_) {}
            speaking = false;
            setMicUI('', 'fa-microphone-slash', 'اضغط للتحدث');
            db.ref('stuAudio').remove();
        }

        function setMicUI(state, icon, label) {
            const btn = document.getElementById('micBtn');
            btn.className = 'micbtn' + (state ? ' ' + state : '');
            document.getElementById('micIco').className = 'fas ' + icon;
            document.getElementById('micLbl').textContent = label;
        }

        // الاستماع لمنح الميكروفون
        db.ref('micPermissions/' + studentId).on('value', async (snap) => {
            if (snap.val() && snap.val().allowed && !speaking) {
                try {
                    mStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    speaking = true;
                    setMicUI('spk', 'fa-microphone', '🔴 تتحدث الآن');
                    mRec = new MediaRecorder(mStream, { mimeType: 'audio/webm' });
                    mRec.ondataavailable = (ev) => {
                        if (ev.data.size < 1) return;
                        const reader = new FileReader();
                        reader.onload = () => db.ref('stuAudio/chunk').set({ data: reader.result, ts: Date.now() });
                        reader.readAsDataURL(ev.data);
                    };
                    mRec.start(600);
                    setInterval(() => {
                        if (speaking && mRec && mRec.state === 'recording') {
                            mRec.stop();
                            mRec.start(600);
                        }
                    }, 600);
                } catch (err) {
                    setMicUI('', 'fa-microphone-slash', 'تعذر الوصول للميكروفون');
                }
            } else if (!snap.val() && speaking) {
                stopSpeaking();
            }
        });

        // ================== صوت المدرس ==================
        const tAP = document.getElementById('tAP');
        let lastTs = 0;
        db.ref('audio/chunk').on('value', (snap) => {
            const d = snap.val();
            if (!d || !d.data || d.ts <= lastTs) return;
            lastTs = d.ts;
            const url = URL.createObjectURL(b64toBlob(d.data));
            tAP.src = url;
            tAP.play().catch(() => {});
        });

        db.ref('audioMeta').on('value', (snap) => {
            const on = snap.val() && snap.val().active;
            document.getElementById('liveBadge').classList.toggle('on', on);
            document.getElementById('tspkInd').classList.toggle('on', on);
        });

        function b64toBlob(b64) {
            const [header, data] = b64.split(',');
            const mime = header.match(/:(.*?);/)[1];
            const bin = atob(data);
            const buf = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
            return new Blob([buf], { type: mime });
        }

        // ================== إنهاء الحصة ==================
        function showEndMsg(reason) {
            const ov = document.getElementById('endOverlay');
            const icon = ov.querySelector('.end-icon');
            const title = ov.querySelector('.end-title');
            const sub = ov.querySelector('.end-sub');
            if (reason === 'kicked') {
                icon.textContent = '🚫';
                title.textContent = 'تم إزالتك من الجلسة';
                sub.textContent = 'قام المدرس بإزالتك من الحصة.';
            } else {
                icon.textContent = '🎓';
                title.textContent = 'انتهت الحصة';
                sub.textContent = 'أنهى المدرس الجلسة. شكراً لمشاركتك!';
            }
            ov.classList.add('on');
            approved = false;
        }

        // ================== حالة الاتصال ==================
        db.ref('.info/connected').on('value', (snap) => {
            const ok = !!snap.val();
            document.getElementById('cdot').style.background = ok ? 'var(--success)' : 'var(--danger)';
            document.getElementById('ct').textContent = ok ? 'متصل' : 'غير متصل';
        });

        setInterval(() => {
            document.getElementById('lat').textContent = Math.floor(10 + Math.random() * 25) + 'ms';
        }, 3000);
    </script>
</body>
</html>
