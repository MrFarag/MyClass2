<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyClass2 - الطالب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
    html,body{height:100%;background:#0f1e35;color:#fff;overflow:hidden}

    .top-bar{height:60px;background:linear-gradient(90deg,#071524,#102040);border-bottom:2px solid #00aaff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;overflow-x:auto;gap:12px}
    .teacher-name{font-size:16px;font-weight:900;color:#00aaff;white-space:nowrap}
    .teacher-desc{font-size:11px;color:#ccc}
    .teacher-phone{font-size:13px;color:#00aaff;direction:ltr;white-space:nowrap}
    .top-center{display:flex;align-items:center;gap:14px;background:rgba(0,0,0,.3);padding:4px 16px;border-radius:30px;flex-shrink:0}
    .top-center span{font-size:12px;display:flex;align-items:center;gap:4px;white-space:nowrap}
    .top-center i{color:#00aaff}

    .app-body{display:flex;flex:1;overflow:hidden;height:calc(100vh - 60px - 72px)}

    .students-panel{width:240px;min-width:180px;background:#122040;padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;border-left:1px solid #1e4080;flex-shrink:0}
    @media(max-width:800px){.students-panel{width:160px;min-width:120px}}
    .panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;color:#00aaff;font-weight:700;font-size:13px}
    .student-item{background:#0f1e35;border-radius:40px;padding:7px 10px;display:flex;align-items:center;gap:8px;border:1px solid #1e4080}
    .student-avatar{width:32px;height:32px;border-radius:50%;background:#00aaff;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;flex-shrink:0;font-size:13px}
    .student-info{flex:1;min-width:0}
    .student-name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .student-status{font-size:10px;color:#ccc;display:flex;align-items:center;gap:3px}

    .board-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .board-header{height:42px;background:#122040;padding:0 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1e4080;flex-shrink:0}
    .board-title{font-weight:700;color:#00aaff;font-size:13px}
    .board-controls{display:flex;align-items:center;gap:10px}
    .board-controls i{color:#00aaff;cursor:pointer;font-size:15px;transition:.2s}
    .board-controls i:hover{color:#fff;transform:scale(1.15)}
    .zoom-btn{background:#1e3a60;border:none;color:#00aaff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:.2s}
    .zoom-btn:hover{background:#2a5080;color:#fff}
    #zoomVal{font-size:11px;color:#aaa;min-width:36px;text-align:center}

    .board-scroll{flex:1;overflow:auto;background:#222;position:relative;display:flex;align-items:flex-start;justify-content:flex-start}
    .board-scroll.center-mode{align-items:center;justify-content:center}
    #mainCanvas{display:block;cursor:crosshair;touch-action:none;background:#fff;transform-origin:top left}

    .bottom-bar{height:72px;background:#071524;border-top:2px solid #00aaff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;overflow-x:auto;gap:10px}
    .toolbar-tools{display:flex;gap:12px;background:#0f1e35;padding:7px 16px;border-radius:50px;border:1px solid #1e4080;align-items:center;flex-shrink:0}
    .tool-item{display:flex;flex-direction:column;align-items:center;color:#aaa;cursor:pointer;font-size:10px;transition:.2s;white-space:nowrap}
    .tool-item i{font-size:22px}
    .tool-item.active{color:#00aaff}
    .color-picker{display:flex;gap:4px;background:#122040;padding:5px 8px;border-radius:40px;align-items:center}
    .color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.2s}
    .color-dot:hover{transform:scale(1.15)}
    .color-dot.active{border-color:#fff;transform:scale(1.2)}
    .toolbar-actions{display:flex;gap:10px;flex-shrink:0}
    .action-circle{width:48px;height:48px;border-radius:50%;border:none;background:#1e3a60;color:#fff;font-size:20px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center}
    .action-circle:hover{filter:brightness(1.25);transform:scale(1.06)}
    .btn-mic.active{background:#00aaff;color:#000}
    .btn-hand.active{background:#f59e0b;animation:blink 1s infinite}
    .image-upload input{display:none}
    .image-upload label{background:#00aaff;color:#000;padding:5px 14px;border-radius:30px;cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:700;font-size:12px;white-space:nowrap}

    /* Overlay انتظار الموافقة */
    #waitOverlay{position:fixed;inset:0;background:rgba(7,21,36,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;padding:20px;text-align:center}
    #waitOverlay.hidden{display:none}
    .wait-icon{font-size:64px;color:#00aaff;animation:blink 1.5s infinite}
    .wait-text{font-size:20px;font-weight:900;color:#fff}
    .wait-sub{font-size:13px;color:#aaa}

    /* Overlay إذن المايك */
    #micOverlay{position:fixed;inset:0;background:rgba(7,21,36,.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:16px;padding:20px;text-align:center}
    #micOverlay.hidden{display:none}
    .mic-icon{font-size:64px;color:#00aaff}
    .mic-title{font-size:20px;font-weight:900;color:#fff}
    .mic-sub{font-size:13px;color:#ccc;max-width:380px;line-height:1.7}
    .mic-btn{background:#00aaff;color:#000;border:none;padding:13px 36px;border-radius:50px;font-size:15px;font-weight:900;cursor:pointer;font-family:'Cairo',sans-serif;transition:.2s;display:flex;align-items:center;gap:8px}
    .mic-btn:hover{background:#33bbff;transform:scale(1.04)}
    .mic-skip{background:transparent;color:#888;border:1px solid #444;padding:9px 28px;border-radius:50px;font-size:12px;cursor:pointer;font-family:'Cairo',sans-serif}
    .mic-skip:hover{border-color:#999;color:#ccc}

    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .blink{animation:blink 1s infinite}
  </style>
</head>
<body>

<!-- Overlay إذن المايك — يظهر أول ما تفتح الصفحة -->
<div id="micOverlay">
  <div class="mic-icon"><i class="fas fa-microphone"></i></div>
  <div class="mic-title">إذن استخدام المايك</div>
  <div class="mic-sub">عند السماح لك بالكلام من المدرس، سيحتاج التطبيق إلى الميكروفون.<br>اضغط "السماح" الآن حتى يعمل بدون مشاكل لاحقاً.</div>
  <button class="mic-btn" onclick="grantMic()"><i class="fas fa-microphone"></i> السماح بالمايك</button>
  <button class="mic-skip" onclick="skipMic()">تخطي — لن أحتاج الكلام</button>
</div>

<!-- Overlay انتظار موافقة المدرس -->
<div id="waitOverlay" class="hidden">
  <div class="wait-icon"><i class="fas fa-hourglass-half"></i></div>
  <div class="wait-text">بانتظار موافقة المدرس...</div>
  <div class="wait-sub" id="waitName"></div>
</div>

<div class="top-bar">
  <div><div class="teacher-name">Mr_Farag_Kohail</div><div class="teacher-desc">منصة الفيزياء</div></div>
  <div class="top-center">
    <span><i class="fas fa-circle" style="color:#4CAF50"></i> مباشر</span>
    <span><i class="fas fa-users"></i> <span id="studentsCount">0</span></span>
    <span><i class="fas fa-wifi"></i> <span id="latency">--</span></span>
  </div>
  <div class="teacher-phone">01141010981</div>
</div>

<div class="app-body">
  <div class="students-panel">
    <div class="panel-header"><span><i class="fas fa-users"></i> المشاركون</span><span id="studentsCountPanel">0</span></div>
    <div id="participantsList"></div>
  </div>
  <div class="board-area">
    <div class="board-header">
      <div class="board-title" id="boardTitle">سبورة المدرس</div>
      <div class="board-controls">
        <button class="zoom-btn" onclick="zoom(-0.1)" title="تصغير"><i class="fas fa-minus"></i></button>
        <span id="zoomVal">100%</span>
        <button class="zoom-btn" onclick="zoom(0.1)" title="تكبير"><i class="fas fa-plus"></i></button>
        <button class="zoom-btn" onclick="resetZoom()" style="width:auto;padding:0 8px;font-size:11px">مناسب</button>
        <i class="fas fa-download" title="حفظ" onclick="saveBoard()"></i>
        <i class="fas fa-expand" title="ملء الشاشة" onclick="toggleFullscreen()"></i>
      </div>
    </div>
    <div class="board-scroll" id="boardScroll">
      <canvas id="mainCanvas"></canvas>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="toolbar-tools">
    <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
    <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
    <div class="color-picker">
      <div class="color-dot active" style="background:#000" onclick="setColor('#000',this)"></div>
      <div class="color-dot" style="background:#e53935" onclick="setColor('#e53935',this)"></div>
      <div class="color-dot" style="background:#1e88e5" onclick="setColor('#1e88e5',this)"></div>
      <div class="color-dot" style="background:#43a047" onclick="setColor('#43a047',this)"></div>
    </div>
    <div class="image-upload"><label for="sImg"><i class="fas fa-image"></i> رفع الواجب</label><input type="file" id="sImg" accept="image/*" onchange="uploadHomework(this)"></div>
  </div>
  <div class="toolbar-actions">
    <button class="action-circle btn-mic" id="micBtn" title="طلب المايك" onclick="toggleMic()"><i class="fas fa-microphone-slash"></i></button>
    <button class="action-circle btn-hand" id="handBtn" title="رفع اليد" onclick="toggleHand()"><i class="fas fa-hand-paper"></i></button>
  </div>
</div>

<audio id="audioEl" autoplay style="display:none"></audio>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
(function(){
  // ══════ Firebase ══════
  firebase.initializeApp({
    apiKey:"AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
    databaseURL:"https://myclaive-default-rtdb.firebaseio.com"
  });
  const db=firebase.database();

  // ══════ Canvas — أبعاد ثابتة 1280×720 ══════
  const CANVAS_W=1280,CANVAS_H=720;
  const mc=document.getElementById('mainCanvas');
  const mx=mc.getContext('2d');
  mc.width=CANVAS_W;mc.height=CANVAS_H;
  function initCtx(ctx){ctx.lineCap='round';ctx.lineJoin='round';}
  initCtx(mx);mx.fillStyle='#fff';mx.fillRect(0,0,CANVAS_W,CANVAS_H);

  // ══════ Zoom ══════
  let currentZoom=1;
  const scroll=document.getElementById('boardScroll');
  function applyZoom(z){
    currentZoom=Math.max(0.3,Math.min(3,z));
    mc.style.width=(CANVAS_W*currentZoom)+'px';
    mc.style.height=(CANVAS_H*currentZoom)+'px';
    document.getElementById('zoomVal').textContent=Math.round(currentZoom*100)+'%';
    if(CANVAS_W*currentZoom<scroll.clientWidth&&CANVAS_H*currentZoom<scroll.clientHeight)scroll.classList.add('center-mode');
    else scroll.classList.remove('center-mode');
  }
  window.zoom=d=>applyZoom(currentZoom+d);
  window.resetZoom=()=>{const zw=scroll.clientWidth/CANVAS_W,zh=scroll.clientHeight/CANVAS_H;applyZoom(Math.min(zw,zh)*0.97);};
  setTimeout(resetZoom,120);
  window.addEventListener('resize',()=>setTimeout(resetZoom,100));

  function getXY(e){
    const r=mc.getBoundingClientRect(),t=e.touches?e.touches[0]:e;
    return{x:(t.clientX-r.left)/currentZoom,y:(t.clientY-r.top)/currentZoom};
  }

  // ══════ حالة ══════
  let studentId='s'+Date.now()+'_'+Math.random().toString(36).substr(2,5);
  let studentName='',approved=false,handRaised=false;
  let currentTool='pen',currentColor='#000',currentSize=4;
  let isDrawing=false,strokeId=0,points=[],sendTimer=null;
  let micGranted=false,micOn=false,tPc=null,sPc=null,sStream=null;
  let lastImg=null,tDrawLP=null,tDrawLS=null;

  // ══════ إذن المايك Overlay ══════
  window.grantMic=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
      s.getTracks().forEach(t=>t.stop());
      micGranted=true;
    }catch(err){
      alert('لم يُمنح الإذن.\nتأكد من إذن المتصفح.\n'+err.message);
    }
    document.getElementById('micOverlay').classList.add('hidden');
    joinClass();
  };
  window.skipMic=()=>{
    document.getElementById('micOverlay').classList.add('hidden');
    joinClass();
  };

  // ══════ طلب الانضمام ══════
  function joinClass(){
    let name=prompt('أدخل اسمك:');
    if(!name||!name.trim()) name='طالب'+Math.floor(Math.random()*1000);
    studentName=name.trim();
    document.getElementById('waitOverlay').classList.remove('hidden');
    document.getElementById('waitName').textContent='اسمك: '+studentName;
    db.ref('joinRequests/'+studentId).set({id:studentId,name:studentName,ts:Date.now()});
    db.ref('approvedStudents/'+studentId).on('value',snap=>{
      if(snap.exists()&&!approved){
        approved=true;
        document.getElementById('waitOverlay').classList.add('hidden');
        db.ref('onlineStudents/'+studentId).set({name:studentName,online:true});
        db.ref('joinRequests/'+studentId).remove();
        db.ref('onlineStudents/'+studentId).onDisconnect().remove();
        setupListeners();
        connectTeacherAudio();
      }
    });
  }

  // ══════ بعد الموافقة ══════
  function setupListeners(){
    // رسم المدرس — سلس
    db.ref('draw_t').on('child_added',snap=>{
      const d=snap.val();if(!d||!d.pts||!d.pts.length) return;
      const pts=d.pts,c=d.c,s=d.s||4,sid=d.sid;
      initCtx(mx);
      mx.strokeStyle=c===null?'#fff':c;
      mx.lineWidth=c===null?s*5:s;
      mx.beginPath();
      if(tDrawLP&&sid&&sid===tDrawLS) mx.moveTo(tDrawLP.x,tDrawLP.y);
      else mx.moveTo(pts[0].x*CANVAS_W,pts[0].y*CANVAS_H);
      pts.forEach(p=>mx.lineTo(p.x*CANVAS_W,p.y*CANVAS_H));
      mx.stroke();
      const last=pts[pts.length-1];
      tDrawLP={x:last.x*CANVAS_W,y:last.y*CANVAS_H};tDrawLS=sid;
      lastImg=mc.toDataURL();
    });

    // صورة السبورة الرئيسية
    db.ref('boardImg').on('value',snap=>{
      const d=snap.val();if(!d||!d.data) return;
      lastImg=d.data;tDrawLP=null;tDrawLS=null;
      const img=new Image();img.onload=()=>{mx.clearRect(0,0,CANVAS_W,CANVAS_H);mx.drawImage(img,0,0,CANVAS_W,CANVAS_H);};img.src=d.data;
    });

    // الصورة المصححة
    db.ref('correctedImg/'+studentId).on('value',snap=>{
      const d=snap.val();if(!d||!d.data) return;
      lastImg=d.data;tDrawLP=null;tDrawLS=null;
      const img=new Image();img.onload=()=>{mx.clearRect(0,0,CANVAS_W,CANVAS_H);mx.drawImage(img,0,0,CANVAS_W,CANVAS_H);};img.src=d.data;
    });

    // مسح السبورة
    db.ref('boardCmd').on('child_added',snap=>{
      const cmd=snap.val();if(cmd&&cmd.type==='clear'){mx.fillStyle='#fff';mx.fillRect(0,0,CANVAS_W,CANVAS_H);lastImg=null;tDrawLP=null;tDrawLS=null;}
    });

    // قائمة المشاركين
    db.ref('onlineStudents').on('value',snap=>renderParticipants(snap.val()||{}));
  }

  function renderParticipants(online){
    let h=`<div class="student-item">
      <div class="student-avatar" style="background:#ffaa00;color:#000">م</div>
      <div class="student-info"><div class="student-name">المدرس</div><div class="student-status"><i class="fas fa-chalkboard-teacher"></i> يشرح</div></div>
    </div>`;
    Object.values(online).forEach(s=>{
      const me=s.name===studentName;
      h+=`<div class="student-item">
        <div class="student-avatar" style="background:${me?'#00aaff':'#1e4080'};color:#000">${s.name[0]}</div>
        <div class="student-info"><div class="student-name">${s.name}${me?' (أنت)':''}</div><div class="student-status"><i class="fas fa-${me?'user':'headphones'}"></i> ${me?'متصل':'مستمع'}</div></div>
      </div>`;
    });
    document.getElementById('participantsList').innerHTML=h;
    const cnt=Object.keys(online).length;
    document.getElementById('studentsCount').textContent=cnt;
    document.getElementById('studentsCountPanel').textContent=cnt;
  }

  // ══════ رسم الطالب ══════
  mc.addEventListener('mousedown',startDraw);mc.addEventListener('mousemove',moveDraw);mc.addEventListener('mouseup',stopDraw);mc.addEventListener('mouseleave',stopDraw);
  mc.addEventListener('touchstart',startDraw,{passive:false});mc.addEventListener('touchmove',moveDraw,{passive:false});mc.addEventListener('touchend',stopDraw);

  function startDraw(e){e.preventDefault();if(!approved)return;isDrawing=true;strokeId=Date.now();points=[];const p=getXY(e);initCtx(mx);mx.beginPath();mx.moveTo(p.x,p.y);points.push({x:p.x/CANVAS_W,y:p.y/CANVAS_H});}
  function moveDraw(e){
    e.preventDefault();if(!isDrawing||!approved)return;
    const p=getXY(e);
    mx.strokeStyle=currentTool==='eraser'?'#fff':currentColor;
    mx.lineWidth=currentTool==='eraser'?currentSize*5:currentSize;
    mx.lineTo(p.x,p.y);mx.stroke();mx.beginPath();mx.moveTo(p.x,p.y);
    points.push({x:p.x/CANVAS_W,y:p.y/CANVAS_H});
    if(!sendTimer)sendTimer=setTimeout(flush,20);
  }
  function flush(){sendTimer=null;if(!points.length)return;db.ref('draw_st').push({pts:points.slice(),c:currentTool==='eraser'?null:currentColor,s:currentSize,studentId,sid:strokeId,ts:Date.now()});points=[];}
  function stopDraw(){
    if(!isDrawing||!approved)return;isDrawing=false;
    if(sendTimer){clearTimeout(sendTimer);sendTimer=null;}
    flush();
    db.ref('boardImg_stu/'+studentId).set({data:mc.toDataURL('image/jpeg',0.8),ts:Date.now()});
  }

  // ══════ أدوات ══════
  window.setTool=t=>{currentTool=t;document.getElementById('toolPen').classList.toggle('active',t==='pen');document.getElementById('toolEraser').classList.toggle('active',t==='eraser');};
  window.setColor=(c,el)=>{currentColor=c;document.querySelectorAll('.toolbar-tools .color-dot').forEach(d=>d.classList.remove('active'));el.classList.add('active');};
  window.saveBoard=()=>{const a=document.createElement('a');a.download='myboard.png';a.href=mc.toDataURL();a.click();};
  window.toggleFullscreen=()=>{document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();};
  window.uploadHomework=function(input){
    if(!input.files[0]||!approved)return;
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const ir=img.width/img.height,cr=CANVAS_W/CANVAS_H;
        let dw,dh;
        if(ir>cr){dw=CANVAS_W;dh=CANVAS_W/ir;}else{dh=CANVAS_H;dw=CANVAS_H*ir;}
        mx.fillStyle='#fff';mx.fillRect(0,0,CANVAS_W,CANVAS_H);
        mx.drawImage(img,(CANVAS_W-dw)/2,(CANVAS_H-dh)/2,dw,dh);
        const dataUrl=mc.toDataURL('image/jpeg',0.85);
        lastImg=dataUrl;
        db.ref('studentImages').push({studentId,studentName,data:dataUrl,ts:Date.now()});
        db.ref('boardImg_stu/'+studentId).set({data:dataUrl,ts:Date.now()});
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(input.files[0]);input.value='';
  };

  // ══════ رفع اليد ══════
  window.toggleHand=()=>{
    if(!approved)return;handRaised=!handRaised;
    document.getElementById('handBtn').classList.toggle('active',handRaised);
    handRaised?db.ref('handRaised/'+studentId).set(true):db.ref('handRaised/'+studentId).remove();
  };

  // ══════ المايك — WebRTC ══════
  const RTC={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

  function connectTeacherAudio(){
    db.ref('rtc/join_notify').push(studentId);
    db.ref('rtc/t2s_offer/'+studentId).on('value',async snap=>{
      const offer=snap.val();if(!offer||tPc)return;
      tPc=new RTCPeerConnection(RTC);
      tPc.ontrack=e=>{const a=document.getElementById('audioEl');a.srcObject=e.streams[0];a.play().catch(()=>{});};
      tPc.onicecandidate=e=>{if(e.candidate)db.ref('rtc/s2t_ice/'+studentId).push(e.candidate.toJSON());};
      db.ref('rtc/t2s_ice/'+studentId).on('child_added',async snap2=>{const ice=snap2.val();if(ice){try{await tPc.addIceCandidate(new RTCIceCandidate(ice));}catch(e){}snap2.ref.remove();}});
      await tPc.setRemoteDescription(new RTCSessionDescription(offer));
      const ans=await tPc.createAnswer();await tPc.setLocalDescription(ans);
      db.ref('rtc/s2t_answer/'+studentId).set({sdp:ans.sdp,type:ans.type});
    });
  }

  window.toggleMic=async()=>{
    if(!approved)return;
    const btn=document.getElementById('micBtn');
    if(!micOn){
      try{
        sStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
        micOn=true;btn.classList.add('active');btn.innerHTML='<i class="fas fa-microphone"></i>';btn.title='إيقاف المايك';
        db.ref('micRequests/'+studentId).set({studentId,studentName,ts:Date.now()});
        db.ref('micPermissions/'+studentId).on('value',async snap=>{
          if(!snap.val()?.allowed||sPc)return;
          sPc=new RTCPeerConnection(RTC);
          sStream.getTracks().forEach(t=>sPc.addTrack(t,sStream));
          sPc.onicecandidate=e=>{if(e.candidate)db.ref('rtc/s2t_stu_ice/'+studentId).push(e.candidate.toJSON());};
          db.ref('rtc/t2s_stu_ice/'+studentId).on('child_added',async snap2=>{const ice=snap2.val();if(ice){try{await sPc.addIceCandidate(new RTCIceCandidate(ice));}catch(e){}snap2.ref.remove();}});
          db.ref('rtc/t2s_stu_answer/'+studentId).on('value',async snap2=>{const ans=snap2.val();if(ans&&sPc.signalingState==='have-local-offer')await sPc.setRemoteDescription(new RTCSessionDescription(ans)).catch(()=>{});});
          const offer=await sPc.createOffer();await sPc.setLocalDescription(offer);
          db.ref('rtc/s2t_stu_offer/'+studentId).set({sdp:offer.sdp,type:offer.type});
        });
      }catch(err){alert('تعذر تشغيل المايك:\n'+err.message);}
    }else{
      micOn=false;btn.classList.remove('active');btn.innerHTML='<i class="fas fa-microphone-slash"></i>';btn.title='طلب المايك';
      if(sStream){sStream.getTracks().forEach(t=>t.stop());sStream=null;}
      if(sPc){sPc.close();sPc=null;}
      db.ref('micPermissions/'+studentId).remove();
      db.ref('rtc/s2t_stu_offer/'+studentId).remove();
      db.ref('rtc/s2t_stu_ice/'+studentId).remove();
    }
  };

  // Latency
  setInterval(()=>{const t=Date.now();db.ref('ping_s').set(t);setTimeout(()=>db.ref('ping_s').once('value',()=>{document.getElementById('latency').textContent=(Date.now()-t)+'ms';}),600);},6000);
})();
</script>
</body>
