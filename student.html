<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MyClass2 - الطالب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body {
      background: linear-gradient(145deg, #0f2a1f 0%, #1a3a2a 100%);
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      height: 60px;
      background: rgba(10, 25, 18, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .logo-top { font-size: 24px; font-weight: 900; color: #ffaa00; }
    .logo-top span { color: #fff; }
    .student-badge {
      background: #2a4a35;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #ffaa00;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
      gap: 8px;
      padding: 8px;
      background: rgba(0,0,0,0.2);
    }
    .students-panels {
      width: 300px;
      background: rgba(20, 40, 30, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 12px;
      overflow-y: auto;
      border: 1px solid #3a5a40;
    }
    .panel-title {
      font-size: 18px;
      margin-bottom: 15px;
      color: #ffaa00;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .student-list-item {
      background: #1e3228;
      border-radius: 40px;
      padding: 8px 15px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid #2a4a30;
    }
    .student-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #ffaa00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }
    .student-list-item .info { flex: 1; }
    .student-list-item .name { font-weight: 600; }
    .student-list-item .status { font-size: 11px; color: #ccc; }
    .student-list-item i { margin: 0 5px; }
    .board-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
    }
    .board {
      flex: 1;
      background: #1e3228;
      border-radius: 24px;
      border: 2px solid #2a4a30;
      position: relative;
      overflow: hidden;
    }
    .board-header {
      position: absolute;
      top: 10px;
      right: 15px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      padding: 5px 15px;
      border-radius: 40px;
      color: #ffaa00;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #fff;
      touch-action: none;
    }
    .bottom-bar {
      height: 70px;
      background: rgba(10, 25, 18, 0.95);
      backdrop-filter: blur(12px);
      border-top: 2px solid #ffaa00;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .toolbar-tools {
      display: flex;
      gap: 15px;
      background: #1a2e25;
      padding: 8px 20px;
      border-radius: 50px;
    }
    .tool-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #aaa;
      cursor: pointer;
      font-size: 11px;
    }
    .tool-item i { font-size: 24px; }
    .tool-item.active { color: #ffaa00; }
    .action-circle {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: #2a4a35;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
    }
    .btn-hand.active { background: #f59e0b; }
    .btn-mic.active { background: #ffaa00; color: #000; }
    .image-upload input { display: none; }
    .image-upload label {
      background: #ffaa00;
      color: #000;
      padding: 5px 15px;
      border-radius: 30px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .color-picker {
      display: flex;
      gap: 5px;
      background: #1e3228;
      padding: 5px 10px;
      border-radius: 40px;
    }
    .color-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .color-dot.active { border-color: #fff; }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="logo-top">My<span>Class</span>2</div>
    <div class="student-badge" id="studentNameDisplay"><i class="fas fa-user"></i> <span>...</span></div>
  </div>
  <div class="main-layout">
    <div class="students-panels">
      <div class="panel-title"><i class="fas fa-users"></i> المشاركون</div>
      <div id="participantsList"></div>
    </div>
    <div class="board-area">
      <div class="board">
        <div class="board-header"><i class="fas fa-chalkboard-teacher"></i> سبورة المدرس</div>
        <canvas id="teacherBoardCanvas"></canvas>
      </div>
      <div class="board">
        <div class="board-header"><i class="fas fa-pencil-alt"></i> سبورتي</div>
        <canvas id="studentBoardCanvas"></canvas>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="toolbar-tools">
      <div class="tool-item active" onclick="setTool('pen')" id="toolPen"><i class="fas fa-pen-nib"></i><span>قلم</span></div>
      <div class="tool-item" onclick="setTool('eraser')" id="toolEraser"><i class="fas fa-eraser"></i><span>ممحاة</span></div>
      <div class="color-picker">
        <div class="color-dot active" style="background:#000000;" onclick="setColor('#000000',this)"></div>
        <div class="color-dot" style="background:#ff0000;" onclick="setColor('#ff0000',this)"></div>
        <div class="color-dot" style="background:#00ff00;" onclick="setColor('#00ff00',this)"></div>
        <div class="color-dot" style="background:#0000ff;" onclick="setColor('#0000ff',this)"></div>
        <div class="color-dot" style="background:#ffff00;" onclick="setColor('#ffff00',this)"></div>
      </div>
      <div class="image-upload">
        <label for="studentImage"><i class="fas fa-image"></i> رفع صورة</label>
        <input type="file" id="studentImage" accept="image/*" onchange="uploadStudentImage(this)">
      </div>
    </div>
    <div>
      <button class="action-circle btn-hand" id="handBtn" onclick="toggleHand()"><i class="fas fa-hand-paper"></i></button>
      <button class="action-circle btn-mic" id="micBtn" onclick="requestMic()"><i class="fas fa-microphone"></i></button>
    </div>
  </div>
  <audio id="audioPlayer" style="display:none;"></audio>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyB7E4NsGQbCehVSQ3Kj97yExRZwpHzTOl8",
      databaseURL: "https://myclaive-default-rtdb.firebaseio.com"
    });
    const db = firebase.database();
    let studentId = 's' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
    let studentName = '';
    let approved = false;
    let handRaised = false;
    let currentTool = 'pen';
    let currentColor = '#000000';
    let currentSize = 4;
    let isDrawing = false;
    let lastX = 0, lastY = 0;
    let micPermission = false;
    let speaking = false;
    let mediaStream = null;
    let mediaRecorder = null;

    const teacherCanvas = document.getElementById('teacherBoardCanvas');
    const studentCanvas = document.getElementById('studentBoardCanvas');
    const teacherCtx = teacherCanvas.getContext('2d');
    const studentCtx = studentCanvas.getContext('2d');

    function resizeCanvases() {
      [teacherCanvas, studentCanvas].forEach(c => {
        const parent = c.parentElement;
        c.width = parent.clientWidth;
        c.height = parent.clientHeight;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = currentSize;
      });
    }
    window.addEventListener('resize', resizeCanvases);
    setTimeout(resizeCanvases, 100);

    // طلب الانضمام
    function joinClass() {
      let name = prompt('أدخل اسمك:');
      if (!name) return;
      studentName = name;
      document.getElementById('studentNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${studentName}`;
      db.ref('joinRequests/' + studentId).set({ id: studentId, name: studentName, ts: Date.now() });
      db.ref('approvedStudents/' + studentId).on('value', snap => {
        if (snap.exists() && !approved) {
          approved = true;
          db.ref('onlineStudents/' + studentId).set({ name: studentName, online: true });
          setupListeners();
        }
      });
    }
    joinClass();

    function setupListeners() {
      // استقبال رسم المدرس
      db.ref('draw_t').on('child_added', snap => {
        const d = snap.val();
        if (!d || !d.points) return;
        teacherCtx.strokeStyle = d.color || '#000';
        teacherCtx.lineWidth = d.size || 4;
        teacherCtx.beginPath();
        teacherCtx.moveTo(d.points[0].x * teacherCanvas.width, d.points[0].y * teacherCanvas.height);
        for (let i = 1; i < d.points.length; i++) {
          teacherCtx.lineTo(d.points[i].x * teacherCanvas.width, d.points[i].y * teacherCanvas.height);
        }
        teacherCtx.stroke();
      });

      // استقبال صورة السبورة الرئيسية
      db.ref('boardImg/main').on('value', snap => {
        const data = snap.val();
        if (data && data.data) {
          const img = new Image();
          img.onload = () => {
            teacherCtx.clearRect(0, 0, teacherCanvas.width, teacherCanvas.height);
            teacherCtx.drawImage(img, 0, 0, teacherCanvas.width, teacherCanvas.height);
          };
          img.src = data.data;
        }
      });

      // استقبال إذن المايك
      db.ref('micPermissions/' + studentId).on('value', snap => {
        if (snap.val()) startMic();
      });

      // استقبال صورة السبورة المصححة من المدرس
      db.ref('boardImg/stu/' + studentId).on('value', snap => {
        const data = snap.val();
        if (data && data.data) {
          const img = new Image();
          img.onload = () => {
            studentCtx.clearRect(0, 0, studentCanvas.width, studentCanvas.height);
            studentCtx.drawImage(img, 0, 0, studentCanvas.width, studentCanvas.height);
          };
          img.src = data.data;
        }
      });

      // استقبال أمر المسح
      db.ref('boardCmd/main').on('child_added', snap => {
        if (snap.val()?.type === 'clear') {
          teacherCtx.fillStyle = '#fff';
          teacherCtx.fillRect(0, 0, teacherCanvas.width, teacherCanvas.height);
        }
        snap.ref.remove();
      });
    }

    // رسم الطالب
    function getCanvasPoint(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    let points = [];
    let sendTimer = null;

    function startDraw(e) {
      e.preventDefault();
      if (!approved) return;
      isDrawing = true;
      const p = getCanvasPoint(e, studentCanvas);
      lastX = p.x; lastY = p.y;
      points = [{ x: p.x / studentCanvas.width, y: p.y / studentCanvas.height }];
      studentCtx.beginPath();
      studentCtx.moveTo(p.x, p.y);
    }

    function draw(e) {
      e.preventDefault();
      if (!isDrawing || !approved) return;
      const p = getCanvasPoint(e, studentCanvas);
      studentCtx.strokeStyle = currentTool === 'eraser' ? '#fff' : currentColor;
      studentCtx.lineWidth = currentTool === 'eraser' ? currentSize * 5 : currentSize;
      studentCtx.lineTo(p.x, p.y);
      studentCtx.stroke();
      studentCtx.beginPath();
      studentCtx.moveTo(p.x, p.y);
      points.push({ x: p.x / studentCanvas.width, y: p.y / studentCanvas.height });
      if (!sendTimer) {
        sendTimer = setTimeout(() => {
          if (points.length > 0) {
            db.ref('draw_st').push({
              points: points,
              color: currentTool === 'eraser' ? null : currentColor,
              size: currentSize,
              studentId: studentId,
              ts: Date.now()
            });
            points = [];
          }
          sendTimer = null;
        }, 30);
      }
    }

    function stopDraw() {
      if (isDrawing) {
        isDrawing = false;
        if (points.length > 0) {
          db.ref('draw_st').push({
            points: points,
            color: currentTool === 'eraser' ? null : currentColor,
            size: currentSize,
            studentId: studentId,
            ts: Date.now()
          });
          points = [];
        }
        if (sendTimer) clearTimeout(sendTimer);
        sendTimer = null;
      }
    }

    studentCanvas.addEventListener('mousedown', startDraw);
    studentCanvas.addEventListener('mousemove', draw);
    studentCanvas.addEventListener('mouseup', stopDraw);
    studentCanvas.addEventListener('mouseleave', stopDraw);
    studentCanvas.addEventListener('touchstart', startDraw, { passive: false });
    studentCanvas.addEventListener('touchmove', draw, { passive: false });
    studentCanvas.addEventListener('touchend', stopDraw);

    window.setTool = function(tool) {
      currentTool = tool;
      document.querySelectorAll('.tool-item').forEach(el => el.classList.remove('active'));
      document.getElementById('toolPen').classList.toggle('active', tool === 'pen');
      document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
    };

    window.setColor = function(color, el) {
      currentColor = color;
      document.querySelectorAll('.color-dot').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
    };

    window.uploadStudentImage = function(input) {
      if (!input.files[0] || !approved) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          studentCtx.drawImage(img, 0, 0, studentCanvas.width, studentCanvas.height);
          db.ref('boardImg/stu/' + studentId).set({ data: e.target.result, ts: Date.now() });
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    };

    window.toggleHand = function() {
      if (!approved) return;
      handRaised = !handRaised;
      const btn = document.getElementById('handBtn');
      btn.classList.toggle('active', handRaised);
      if (handRaised) {
        db.ref('handRaised/' + studentId).set(true);
      } else {
        db.ref('handRaised/' + studentId).remove();
      }
    };

    window.requestMic = function() {
      if (!approved) return;
      db.ref('micRequests/' + studentId).set({ studentId, studentName, ts: Date.now() });
      document.getElementById('micBtn').classList.add('active');
      setTimeout(() => document.getElementById('micBtn').classList.remove('active'), 3000);
    };

    async function startMic() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        speaking = true;
        document.getElementById('micBtn').classList.add('active');
        mediaRecorder = new MediaRecorder(mediaStream);
        mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) {
            const reader = new FileReader();
            reader.onload = () => {
              db.ref('stuAudio/chunk').set({ data: reader.result, studentId, ts: Date.now() });
            };
            reader.readAsDataURL(e.data);
          }
        };
        mediaRecorder.start(500);
      } catch (err) {}
    }

    // تحديث قائمة المشاركين
    db.ref('onlineStudents').on('value', snap => {
      const list = snap.val() || {};
      let html = '';
      // إضافة المدرس
      html += `<div class="student-list-item"><div class="student-avatar" style="background:#ffaa00;">م</div><div class="info"><div class="name">المدرس</div><div class="status"><i class="fas fa-chalkboard-teacher"></i> يشرح</div></div><i class="fas fa-volume-up"></i></div>`;
      // إضافة الطلاب
      Object.values(list).forEach(s => {
        if (s.name && s.name !== studentName) {
          html += `<div class="student-list-item"><div class="student-avatar">${s.name.charAt(0)}</div><div class="info"><div class="name">${s.name}</div><div class="status"><i class="fas fa-headphones"></i> مستمع</div></div></div>`;
        }
      });
      if (studentName) {
        html += `<div class="student-list-item" style="border-color:#ffaa00;"><div class="student-avatar" style="background:#ffaa00;">${studentName.charAt(0)}</div><div class="info"><div class="name">${studentName} (أنت)</div><div class="status"><i class="fas fa-user"></i> متصل</div></div></div>`;
      }
      document.getElementById('participantsList').innerHTML = html;
    });
  </script>
</body>
</html>
<!-- انتهى كود الطالب -->
